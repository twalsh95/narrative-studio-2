<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Narrative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Belleza&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#1e1824; --bg2:#251f2c; --bg3:#2d2638; --border:#3d3450; --border2:#4a4060;
    --primary:#9378ca; --primary-d:#7a5fb5; --accent:#6893ef;
    --fg:#ede9f6; --fg2:#b8afd0; --fg3:#7a7090;
    --red:#e05c6f; --green:#6fcf97; --gold:#e5b86e; --teal:#5ecac8; --rose:#e578a8;
    --card-bg:#231d2b; --shadow:0 4px 24px rgba(0,0,0,0.45); --radius:12px; --radius-sm:8px;
  }
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Lora',Georgia,serif;font-size:15px;line-height:1.6;}
  #app{height:100%;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Belleza',serif;letter-spacing:0.03em;}
  ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Lora',serif;font-size:13px;transition:all 0.18s ease;white-space:nowrap;}
  .btn-primary{background:var(--primary);color:white;} .btn-primary:hover{background:var(--primary-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(147,120,202,0.35);}
  .btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--border);} .btn-ghost:hover{background:var(--bg3);color:var(--fg);border-color:var(--border2);}
  .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,92,111,0.3);} .btn-danger:hover{background:rgba(224,92,111,0.1);}
  .btn-icon{padding:7px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;color:var(--fg3);transition:all 0.15s;font-size:14px;} .btn-icon:hover{background:var(--bg3);color:var(--fg);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .input,.textarea,.select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);font-family:'Lora',serif;font-size:14px;outline:none;transition:border-color 0.2s;}
  .input:focus,.textarea:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(147,120,202,0.18);}
  .textarea{resize:vertical;min-height:80px;line-height:1.6;} .select{appearance:none;cursor:pointer;}
  .input::placeholder,.textarea::placeholder{color:var(--fg3);}
  .label{font-size:12px;color:var(--fg3);margin-bottom:5px;display:block;letter-spacing:0.06em;text-transform:uppercase;}
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(30,24,36,0.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Belleza',serif;font-size:22px;color:var(--primary);letter-spacing:0.08em;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg3);}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'Belleza',serif;font-size:14px;color:white;}
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--fg3);}
  .breadcrumb span{cursor:pointer;transition:color 0.15s;} .breadcrumb span:hover{color:var(--primary);} .breadcrumb .sep{opacity:0.4;}
  #main{flex:1;display:flex;overflow:hidden;}
  #sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;}
  #content{flex:1;overflow-y:auto;}
  .sidebar-project{padding:16px 16px 10px;} .sidebar-project-name{font-family:'Belleza',serif;font-size:15px;color:var(--fg);margin-bottom:2px;line-height:1.3;} .sidebar-project-tag{font-size:11px;color:var(--fg3);}
  .sidebar-divider{height:1px;background:var(--border);margin:8px 0;}
  .nav-section{padding:6px 10px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--fg2);transition:all 0.15s;}
  .nav-item:hover{background:var(--bg3);color:var(--fg);} .nav-item.active{background:rgba(147,120,202,0.18);color:var(--primary);}
  .sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border);}
  .page{padding:32px 40px;max-width:1100px;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
  .page-title{font-family:'Belleza',serif;font-size:28px;color:var(--fg);} .page-subtitle{color:var(--fg3);font-size:13px;margin-top:3px;}
  #home-wrap{padding:40px;max-width:1100px;margin:0 auto;}
  .home-hero{text-align:center;padding:60px 20px 48px;}
  .home-hero h1{font-family:'Belleza',serif;font-size:48px;color:var(--primary);margin-bottom:10px;}
  .home-hero p{color:var(--fg3);font-size:16px;max-width:500px;margin:0 auto 32px;}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .project-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .project-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
  .project-card-color{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
  .project-card h3{font-family:'Belleza',serif;font-size:18px;margin-bottom:6px;color:var(--fg);}
  .project-card p{font-size:13px;color:var(--fg3);line-height:1.5;margin-bottom:16px;max-height:52px;overflow:hidden;}
  .project-card-footer{display:flex;align-items:center;justify-content:space-between;}
  .project-card-meta{font-size:11px;color:var(--fg3);}
  .project-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;} .project-card:hover .project-card-actions{opacity:1;}
  .color-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;} .color-swatch.selected{border-color:white;transform:scale(1.2);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--fg3);}
  .empty-state h3{font-family:'Belleza',serif;font-size:20px;color:var(--fg2);margin-bottom:8px;}
  .empty-state p{font-size:13px;max-width:340px;margin:0 auto 20px;}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .item-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all 0.2s;}
  .item-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,0.3);}

  .item-card-footer{margin-top:14px;display:flex;justify-content:flex-end;gap:6px;opacity:0;transition:opacity 0.15s;} .item-card:hover .item-card-footer{opacity:1;}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;justify-content:flex-end;animation:fadeIn 0.15s;}
  .drawer{width:480px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn 0.2s ease;overflow:hidden;}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
  .drawer-title{font-family:'Belleza',serif;font-size:20px;}
  .drawer-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
  .drawer-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
  .field{display:flex;flex-direction:column;gap:6px;} .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;background:rgba(147,120,202,0.15);color:var(--primary);border:1px solid rgba(147,120,202,0.2);}
  .doc-list{display:flex;flex-direction:column;gap:10px;}
  .doc-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s;}
  .doc-item:hover{border-color:var(--border2);background:var(--bg3);}
  .doc-item-left h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:3px;}
  .doc-item-badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;}
  .badge-narrative{background:rgba(104,147,239,0.15);color:var(--accent);border:1px solid rgba(104,147,239,0.2);}
  .badge-screenplay{background:rgba(229,184,110,0.15);color:var(--gold);border:1px solid rgba(229,184,110,0.2);}
  .editor-view{display:flex;flex-direction:column;height:calc(100vh - 57px);}
  .editor-topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg2);}
  .editor-title-input{font-family:'Belleza',serif;font-size:18px;background:transparent;border:none;color:var(--fg);outline:none;flex:1;min-width:150px;}
  .editor-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
  .toolbar-btn{padding:5px 8px;border-radius:5px;background:transparent;border:none;cursor:pointer;color:var(--fg2);font-size:13px;transition:all 0.15s;font-family:'Lora',serif;}
  .toolbar-btn:hover{background:var(--bg3);color:var(--fg);} .toolbar-btn.active{background:rgba(147,120,202,0.2);color:var(--primary);}
  .editor-body{flex:1;padding:40px;overflow-y:auto;}
  .editor-content{max-width:700px;margin:0 auto;min-height:400px;outline:none;font-size:16px;line-height:1.85;color:var(--fg);}
  .editor-content:empty::before{content:attr(data-placeholder);color:var(--fg3);pointer-events:none;}
  .editor-content p{margin-bottom:0.8em;}
  .editor-content h1,.editor-content h2,.editor-content h3{font-family:'Belleza',serif;color:var(--primary);margin:1.2em 0 0.5em;}
  .editor-content ul,.editor-content ol{padding-left:1.6em;margin-bottom:0.8em;}
  .editor-word-count{padding:8px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--fg3);text-align:right;background:var(--bg2);}
  .screenplay-body{flex:1;padding:40px;overflow-y:auto;background:var(--bg);}
  .screenplay-page{max-width:680px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:60px;min-height:600px;}
  .screenplay-content{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;outline:none;}
  .screenplay-content [data-type="scene-heading"]{text-transform:uppercase;font-weight:600;color:var(--fg);margin:1.4em 0 0.6em;}
  .screenplay-content [data-type="character"]{text-align:center;text-transform:uppercase;margin:1em 0 0;color:var(--primary);padding-left:160px;}
  .screenplay-content [data-type="dialogue"]{padding:0 80px;margin:0 0 0.4em;color:var(--fg2);}
  .screenplay-content [data-type="parenthetical"]{text-align:center;padding:0 120px;color:var(--fg3);font-style:italic;margin:0;}
  .screenplay-content [data-type="action"]{margin:0.7em 0;color:var(--fg);}
  .screenplay-content [data-type="transition"]{text-align:right;text-transform:uppercase;font-weight:600;margin:1.2em 0;color:var(--fg3);}
  .screenplay-type-selector{display:flex;gap:6px;flex-wrap:wrap;}
  .type-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--fg3);transition:all 0.15s;}
  .type-btn:hover{border-color:var(--border2);color:var(--fg);} .type-btn.active{background:rgba(147,120,202,0.2);color:var(--primary);border-color:rgba(147,120,202,0.3);}
  .scene-list{display:flex;flex-direction:column;gap:10px;}
  .scene-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;gap:14px;align-items:flex-start;transition:all 0.2s;}
  .scene-item:hover{border-color:var(--border2);}
  .scene-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3);background:var(--bg3);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
  .scene-body{flex:1;} .scene-body h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:4px;} .scene-body p{font-size:12px;color:var(--fg3);}
  .scene-chars{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .world-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .world-section h3{font-family:'Belleza',serif;font-size:15px;color:var(--primary);margin-bottom:10px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease;}
  .modal-title{font-family:'Belleza',serif;font-size:22px;margin-bottom:20px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
  #toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:500;}
  .toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--fg);box-shadow:var(--shadow);animation:toastIn 0.2s ease;min-width:200px;}
  .toast.success{border-left:3px solid var(--green);} .toast.error{border-left:3px solid var(--red);} .toast.info{border-left:3px solid var(--accent);}
  @keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .outline-list{display:flex;flex-direction:column;gap:6px;}
  .outline-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .outline-handle{color:var(--fg3);cursor:grab;font-size:14px;padding-top:1px;}
  .outline-content{flex:1;} .outline-content input{background:transparent;border:none;outline:none;font-family:'Lora',serif;font-size:14px;color:var(--fg);width:100%;} .outline-content input::placeholder{color:var(--fg3);}
  .outline-level{display:flex;gap:4px;margin-top:6px;}
  .stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;cursor:pointer;transition:border-color 0.2s;}
  .stat-card:hover{border-color:var(--border2);}
  .stat-num{font-family:'Belleza',serif;font-size:32px;color:var(--primary);} .stat-label{font-size:12px;color:var(--fg3);}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
  /* Auth screen */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:400px;max-width:95vw;}
  .auth-logo{font-family:'Belleza',serif;font-size:28px;color:var(--primary);text-align:center;margin-bottom:6px;}
  .auth-sub{text-align:center;color:var(--fg3);font-size:13px;margin-bottom:32px;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--fg3);border-bottom:2px solid transparent;transition:all 0.15s;}
  .auth-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .auth-error{background:rgba(224,92,111,0.1);border:1px solid rgba(224,92,111,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;}
  .saving-indicator{font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar" style="display:none;">
    <div class="topbar-logo" id="logo-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2L13.5 8H20L14.5 12L16.5 18.5L11 15L5.5 18.5L7.5 12L2 8H8.5L11 2Z" fill="currentColor" opacity="0.85"/></svg>
      Narrative Studio
    </div>
    <div id="breadcrumb-area"></div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div id="main" style="display:none;">
    <div id="sidebar" style="display:none;"></div>
    <div id="content"></div>
  </div>
  <div id="auth-container"></div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, collection, doc, addDoc, getDoc, getDocs,
  updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, writeBatch
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════
//  FIREBASE INIT
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyClzB9zJGEDptWLy8BNrnD0QAdVRJDbk1E",
  authDomain: "narrative-studio-backend.firebaseapp.com",
  projectId: "narrative-studio-backend",
  storageBucket: "narrative-studio-backend.firebasestorage.app",
  messagingSenderId: "465446631091",
  appId: "1:465446631091:web:fe86a6f49d8e8e947d22c6"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const COLOR_MAP = {purple:'#9378ca',blue:'#6893ef',teal:'#5ecac8',rose:'#e578a8',red:'#e05c6f',gold:'#e5b86e',green:'#6fcf97',gray:'#7a7090'};
function colorStyle(label){return COLOR_MAP[label]||COLOR_MAP.purple;}
function relativeTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff=Date.now()-d.getTime(), s=Math.floor(diff/1000), m=Math.floor(s/60), h=Math.floor(m/60), dy=Math.floor(h/24);
  if(s<60) return 'just now'; if(m<60) return m+'m ago'; if(h<24) return h+'h ago';
  if(dy===1) return 'yesterday'; if(dy<30) return dy+'d ago';
  return d.toLocaleDateString();
}
function toast(msg, type='success'){
  const e=document.createElement('div'); e.className='toast '+type; e.textContent=msg;
  document.getElementById('toast-container').appendChild(e);
  setTimeout(()=>e.remove(), 2800);
}
function el(tag, attrs, children){
  attrs=attrs||{}; children=children||[];
  const e=document.createElement(tag);
  Object.keys(attrs).forEach(k=>{
    const v=attrs[k];
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  const kids=Array.isArray(children)?children:[children];
  kids.forEach(c=>{
    if(c===null||c===undefined) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function v(id){const e=document.getElementById(id); return e?e.value.trim():'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function wordCount(html){const t=html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim(); return t?t.split(' ').length:0;}
function showSaving(){ setSavingIndicator('◌ Saving…','var(--fg3)'); }
function showSaved(){  setSavingIndicator('✓ Saved','var(--green)'); setTimeout(()=>setSavingIndicator('',''),2000); }
function setSavingIndicator(text,color){

let currentUser = null;

function userCol(colName){ return collection(db,'users',currentUser.uid,colName); }
function userDoc(colName,id){ return doc(db,'users',currentUser.uid,colName,id); }

async function fsCreate(colName, data){
  const ref = await addDoc(userCol(colName), {...data, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
  return ref.id;
}
async function fsGet(colName, id){
  const snap = await getDoc(userDoc(colName,id));
  return snap.exists() ? {id:snap.id,...snap.data()} : null;
}
async function fsQuery(colName, ...constraints){
  const q = query(userCol(colName), ...constraints);
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fsUpdate(colName, id, data){
  await updateDoc(userDoc(colName,id), {...data, updatedAt:serverTimestamp()});
}
async function fsDelete(colName, id){
  await deleteDoc(userDoc(colName,id));
}
async function fsBatchDelete(colName, fieldName, value){
  const items = await fsQuery(colName, where(fieldName,'==',value));
  if(!items.length) return;
  const batch = writeBatch(db);
  items.forEach(item => batch.delete(userDoc(colName,item.id)));
  await batch.commit();
}

let currentRoute = {page:'home', projectId:null, sub:null, subId:null};
function navigate(page, projectId, sub, subId){
  currentRoute = {page:page||'home', projectId:projectId||null, sub:sub||null, subId:subId||null};
  render();
}

// ══════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════
async function render(){
  const {page,projectId,sub,subId} = currentRoute;
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const bc = document.getElementById('breadcrumb-area');
  const tr = document.getElementById('topbar-right');

  // Rebuild topbar right (preserve saving indicator)
  tr.innerHTML = '';
  const savingSpan = document.createElement('span');
  savingSpan.id = 'saving-indicator';
  savingSpan.className = 'saving-indicator';
  tr.appendChild(savingSpan);

  if(page==='home'){
    sidebar.style.display='none';
    bc.innerHTML='';
    renderHomeButtons(tr);
    await renderHome(content);
  } else if(page==='dashboard'){
    sidebar.style.display='flex';
    sidebar.style.flexDirection='column';
    await renderSidebar(sidebar, projectId, sub||'overview');
    renderBreadcrumb(bc, projectId, sub);
    renderDashboardButtons(tr);
    const s = sub||'overview';
    if(s==='overview')        await renderOverview(content, projectId);
    else if(s==='characters') await renderCharacters(content, projectId);
    else if(s==='locations')  await renderLocations(content, projectId);
    else if(s==='scenes')     await renderScenes(content, projectId);
    else if(s==='world')      await renderWorld(content, projectId);
    else if(s==='outline')    await renderOutline(content, projectId);
    else if(s==='writing'){
      if(subId) await renderEditor(content, projectId, subId);
      else await renderWritingDesk(content, projectId);
    }
  }
}

function renderHomeButtons(tr){
  const userDiv = el('div',{class:'user-badge'});
  const avatar = el('div',{class:'user-avatar'},[currentUser.displayName?currentUser.displayName[0].toUpperCase():'U']);
  const name = el('span',{},[currentUser.displayName||currentUser.email]);
  const signOutBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>handleSignOut()},'Sign Out');
  userDiv.append(avatar,name);
  tr.insertBefore(signOutBtn,tr.firstChild);
  tr.insertBefore(userDiv,tr.firstChild);
}

function renderDashboardButtons(tr){
  const home = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>navigate('home')},'All Projects');
  tr.insertBefore(home,tr.firstChild);
}

function renderBreadcrumb(bc, projectId, sub){
  bc.innerHTML='';
  // We'll update this after project loads — set a placeholder
  bc.innerHTML='<div class="breadcrumb"><span onclick="navigate(\'home\')">Projects</span>'+(sub&&sub!=='overview'?'<span class="sep">/</span><span style="color:var(--primary)">'+capitalize(sub)+'</span>':'')+'</div>';
}

function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
function renderAuth(){
  document.getElementById('topbar').style.display='none';
  document.getElementById('main').style.display='none';
  const container = document.getElementById('auth-container');
  container.innerHTML='';

  let activeTab = 'signin';
  let errorMsg = '';

  function buildAuth(){
    container.innerHTML='';
    const wrap = el('div',{class:'auth-wrap'});
    const card = el('div',{class:'auth-card'});
    card.innerHTML=`
      <div class="auth-logo">✦ Narrative Studio</div>
      <div class="auth-sub">Your personal writing workspace</div>
      <div class="auth-tabs">
        <div class="auth-tab${activeTab==='signin'?' active':''}" id="tab-signin">Sign In</div>
        <div class="auth-tab${activeTab==='signup'?' active':''}" id="tab-signup">Create Account</div>
      </div>
      ${errorMsg?`<div class="auth-error">${esc(errorMsg)}</div>`:''}
      ${activeTab==='signup'?`<div class="field" style="margin-bottom:14px"><label class="label">Your Name</label><input class="input" id="auth-name" placeholder="How should we address you?"></div>`:''}
      <div class="field" style="margin-bottom:14px"><label class="label">Email</label><input class="input" id="auth-email" type="email" placeholder="you@example.com"></div>
      <div class="field" style="margin-bottom:24px"><label class="label">Password</label><input class="input" id="auth-pass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="auth-submit">${activeTab==='signin'?'Sign In':'Create Account'}</button>
    `;
    wrap.appendChild(card);
    container.appendChild(wrap);

    card.querySelector('#tab-signin').onclick=()=>{activeTab='signin';errorMsg='';buildAuth();};
    card.querySelector('#tab-signup').onclick=()=>{activeTab='signup';errorMsg='';buildAuth();};
    card.querySelector('#auth-submit').onclick=()=>handleAuth();
    card.addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
    setTimeout(()=>{const em=document.getElementById('auth-email');if(em)em.focus();},50);
  }

  async function handleAuth(){
    const email=v('auth-email'), pass=v('auth-pass'), name=v('auth-name');
    if(!email||!pass){errorMsg='Please enter your email and password.';buildAuth();return;}
    const btn=document.getElementById('auth-submit');
    if(btn){btn.textContent='…';btn.disabled=true;}
    try{
      if(activeTab==='signup'){
        const cred = await createUserWithEmailAndPassword(auth,email,pass);
        if(name) await updateProfile(cred.user,{displayName:name});
      } else {
        await signInWithEmailAndPassword(auth,email,pass);
      }
      // onAuthStateChanged handles the rest
    } catch(err){
      errorMsg = friendlyAuthError(err.code);
      buildAuth();
    }
  }

  buildAuth();
}

function friendlyAuthError(code){
  const map = {
    'auth/email-already-in-use':'That email is already registered. Try signing in.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password. Please try again.',
    'auth/invalid-credential':'Incorrect email or password. Please try again.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment and try again.',
  };
  return map[code]||'Something went wrong. Please try again.';
}

async function handleSignOut(){
  await signOut(auth);
}

async function renderHome(container){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading your projects…</div>';
  const projects = await fsQuery('projects', orderBy('updatedAt','desc'));
  container.innerHTML='';
  const wrap = el('div',{id:'home-wrap'});
  const hero = el('div',{class:'home-hero'});
  hero.innerHTML='<h1>Narrative Studio</h1><p>Welcome back, '+(currentUser.displayName||'writer')+'.</p>';
  const newBtn = el('button',{class:'btn btn-primary',style:'font-size:15px;padding:12px 28px;',onclick:()=>createAndOpenProject()});
  newBtn.textContent='+ New Story';
  hero.appendChild(newBtn);
  wrap.appendChild(hero);

  if(projects.length===0){
    wrap.appendChild(emptyState('✦','No Stories Yet','Begin your first project and build a world that lasts.'));
  } else {
    const grid = el('div',{class:'projects-grid'});
    projects.forEach(p=>grid.appendChild(projectCard(p)));
    wrap.appendChild(grid);
  }
  container.appendChild(wrap);
}

function projectCard(p){
  const card = el('div',{class:'project-card',onclick:()=>navigate('dashboard',p.id)});
  card.appendChild(el('div',{class:'project-card-color',style:'background:'+colorStyle(p.colorLabel)}));
  card.appendChild(el('h3',{},[p.name||'Untitled']));
  card.appendChild(el('p',{},[p.description||'No description yet.']));
  const footer = el('div',{class:'project-card-footer'});
  const meta = el('div',{class:'project-card-meta'},[relativeTime(p.updatedAt)]);
  const actions = el('div',{class:'project-card-actions'});
  const editBtn = el('button',{class:'btn-icon',title:'Edit',onclick:e=>{e.stopPropagation();openEditProject(p);}});editBtn.textContent='✎';
  const delBtn = el('button',{class:'btn-icon',title:'Delete',style:'color:var(--red)',onclick:e=>{e.stopPropagation();confirmDelete('Delete "'+p.name+'"? This will also delete all characters, scenes, and documents inside it.',async()=>{await deleteProjectCascade(p.id);renderHome(document.getElementById('content'));toast('Project deleted');});}});delBtn.textContent='✕';
  actions.append(editBtn,delBtn);
  footer.append(meta,actions);
  card.appendChild(footer);
  return card;
}

async function createAndOpenProject(){
  const id = await fsCreate('projects',{name:'Untitled Story',description:'',tags:[],colorLabel:'purple'});
  navigate('dashboard',id,'overview');
}

async function deleteProjectCascade(projectId){
  await Promise.all([
    fsDelete('projects',projectId),
    fsBatchDelete('characters','storyProjectId',projectId),
    fsBatchDelete('locations','storyProjectId',projectId),
    fsBatchDelete('scenes','storyProjectId',projectId),
    fsBatchDelete('worlds','storyProjectId',projectId),
    fsBatchDelete('outlines','storyProjectId',projectId),
    fsBatchDelete('documents','storyProjectId',projectId),
  ]);
}

const NAV_ITEMS=[{id:'overview',label:'Overview',icon:'◈'},{id:'characters',label:'Characters',icon:'◉'},{id:'locations',label:'Locations',icon:'⬡'},{id:'scenes',label:'Scenes',icon:'◧'},{id:'world',label:'World Building',icon:'◎'},{id:'outline',label:'Outline',icon:'≡'},{id:'writing',label:'Writing Desk',icon:'✦'}];

async function renderSidebar(sb, projectId, active){
  sb.innerHTML='';
  const p = await fsGet('projects',projectId);
  if(p){
    const info = el('div',{class:'sidebar-project'});
    info.innerHTML='<div class="sidebar-project-name">'+esc(p.name)+'</div><div class="sidebar-project-tag">'+relativeTime(p.updatedAt)+'</div>';
    sb.appendChild(info);
    sb.appendChild(el('div',{class:'sidebar-divider'}));
  }
  const nav = el('div',{class:'nav-section'});
  NAV_ITEMS.forEach(item=>{
    const isActive = item.id===active || (item.id==='writing' && active==='writing');
    const navItem = el('div',{class:'nav-item'+(isActive?' active':''),onclick:()=>navigate('dashboard',projectId,item.id)});
    navItem.innerHTML='<span style="font-size:14px">'+item.icon+'</span><span>'+item.label+'</span>';
    nav.appendChild(navItem);
  });
  sb.appendChild(nav);
  const bottom = el('div',{class:'sidebar-bottom'});
  const delBtn = el('button',{class:'btn btn-ghost btn-sm',style:'width:100%;justify-content:center;color:var(--red)',onclick:()=>confirmDelete('Delete this entire project and all its contents?',async()=>{await deleteProjectCascade(projectId);navigate('home');toast('Project deleted');})});
  delBtn.textContent='✕ Delete Project';
  bottom.appendChild(delBtn);
  sb.appendChild(bottom);
}

  wrap.innerHTML=`

        <div class="page-title" contenteditable="true" id="proj-name-edit" style="outline:none;border-bottom:1px solid transparent;padding:2px 4px;border-radius:4px;">${esc(p.name)}</div>

      <div style="display:flex;gap:8px;align-items:center;">
        <div class="color-picker">${Object.keys(COLOR_MAP).map(k=>`<div class="color-swatch${p.colorLabel===k?' selected':''}" style="background:${COLOR_MAP[k]}" onclick="setProjectColorFb('${projectId}','${k}')" title="${k}"></div>`).join('')}</div>
      </div>
    </div>
    <div class="overview-grid">
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','characters')"><div class="stat-num">${chars.length}</div><div class="stat-label">Characters</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','locations')"><div class="stat-num">${locs.length}</div><div class="stat-label">Locations</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','scenes')"><div class="stat-num">${scenes.length}</div><div class="stat-label">Scenes</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','writing')"><div class="stat-num">${docs.length}</div><div class="stat-label">Documents</div></div>
    </div>
    <div class="field" style="max-width:600px;">
      <label class="label">Project Description</label>
      <textarea class="textarea" id="proj-desc" rows="3" placeholder="What is this story about?">${esc(p.description||'')}</textarea>
    </div>
    <div style="margin-top:10px;"><button class="btn btn-ghost btn-sm" onclick="saveProjDescFb('${projectId}')">Save Description</button></div>

  nameEl.addEventListener('blur',async()=>{

    showSaved();
    renderSidebar(document.getElementById('sidebar'),projectId,currentRoute.sub||'overview');
  });
}

window.setProjectColorFb = async function(id,color){
  showSaving();
  await fsUpdate('projects',id,{colorLabel:color});
  showSaved();
  render();
};
window.saveProjDescFb = async function(id){
  const desc = document.getElementById('proj-desc')?.value||'';
  showSaving();
  await fsUpdate('projects',id,{description:desc});
  showSaved();
  toast('Saved');
};

  const addBtn = el('button',{class:'btn btn-primary',onclick:()=>openCharacterDrawer(null,projectId)});addBtn.textContent='+ Add Character';

  else{
    const grid = el('div',{class:'items-grid'});

      card.innerHTML='<h3>'+esc(c.name)+'</h3><p>'+esc(c.traits||c.occupation||'No traits defined')+'</p>'+(c.age?'<p style="margin-top:6px;font-size:11px;color:var(--fg3);">Age: '+esc(c.age)+(c.pronouns?' · '+esc(c.pronouns):'')+'</p>':'');

    <div class="drawer-body">

      </div>

      <div class="field"><label class="label">Backstory</label><textarea class="textarea" id="cd-back" rows="5" placeholder="Their history, motivations, secrets...">${esc(data.backstory||'')}</textarea></div>
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this character?',async()=>{await fsDelete('characters','${char.id}');document.querySelector('.drawer-overlay').remove();renderCharacters(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}

async function renderScenes(container, projectId){

  const [scenes, chars, locs] = await Promise.all([

      if(loc||scChars.length){
        const meta = el('div',{class:'scene-chars'});
        if(loc){const lt=el('span',{class:'tag',style:'background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.2)'});lt.textContent='⬡ '+loc.name;meta.appendChild(lt);}
        scChars.forEach(c=>{const ct=el('span',{class:'tag'});ct.textContent='◉ '+c.name;meta.appendChild(ct);});

      const acts = el('div',{style:'display:flex;gap:6px;margin-left:auto;opacity:0;transition:opacity 0.15s;'});

      const eb=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openSceneDrawer(sc,projectId,chars,locs,scenes.length+1)});eb.textContent='Edit';

      acts.append(eb,db2); item.append(num,body,acts); list.appendChild(item);
    });
    wrap.appendChild(list);
  }
  container.appendChild(wrap);
}

function openSceneDrawer(scene, projectId, chars, locs, nextSeq){

      ${chars.length?`<div class="field"><label class="label">Characters</label><div style="display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);">${charOpts}</div></div>`:''}

}

function renderOutlineList(projectId, outlines){
  const list = document.getElementById('outline-list'); if(!list) return;
  list.innerHTML='';
  if(outlines.length===0){list.appendChild(emptyState('≡','Empty Outline','Add beats, acts, or chapters to plan your story.'));return;}
  outlines.forEach(o=>{
    const item = el('div',{class:'outline-item',style:'margin-left:'+((o.level-1)*22)+'px'});
    const handle = el('div',{class:'outline-handle'});handle.textContent='⠿';
    const content = el('div',{class:'outline-content'});
    const input = el('input',{placeholder:'Outline beat...',value:o.text||''});
    input.addEventListener('blur',async()=>{await fsUpdate('outlines',o.id,{text:input.value});});
    input.addEventListener('keydown',async e=>{
      if(e.key==='Enter'){e.preventDefault(); const outlines2=await fsQuery('outlines',where('storyProjectId','==',projectId)); outlines2.sort((a,b)=>(a.order||0)-(b.order||0)); addOutlineItem(projectId,o.order+1,o.level,outlines2);}
      if(e.key==='Tab'){e.preventDefault(); const nl=e.shiftKey?Math.max(1,o.level-1):Math.min(4,o.level+1); await fsUpdate('outlines',o.id,{level:nl}); const outlines2=await fsQuery('outlines',where('storyProjectId','==',projectId)); outlines2.sort((a,b)=>(a.order||0)-(b.order||0)); renderOutlineList(projectId,outlines2);}
      if(e.key==='Backspace'&&input.value===''){e.preventDefault(); await fsDelete('outlines',o.id); const outlines2=await fsQuery('outlines',where('storyProjectId','==',projectId)); outlines2.sort((a,b)=>(a.order||0)-(b.order||0)); renderOutlineList(projectId,outlines2);}
    });
    const levelDots = el('div',{class:'outline-level'});
    for(let i=1;i<=4;i++){
      (function(lvl){
        const d=el('div',{style:'width:8px;height:8px;border-radius:50%;background:'+(lvl<=o.level?'var(--primary)':'var(--border)')+';cursor:pointer;',onclick:async()=>{await fsUpdate('outlines',o.id,{level:lvl}); const outlines2=await fsQuery('outlines',where('storyProjectId','==',projectId)); outlines2.sort((a,b)=>(a.order||0)-(b.order||0)); renderOutlineList(projectId,outlines2);}});
        levelDots.appendChild(d);
      })(i);
    }
    const del=el('button',{class:'btn-icon',style:'font-size:11px;',onclick:async()=>{await fsDelete('outlines',o.id); const outlines2=await fsQuery('outlines',where('storyProjectId','==',projectId)); outlines2.sort((a,b)=>(a.order||0)-(b.order||0)); renderOutlineList(projectId,outlines2);}});del.textContent='✕';
    content.append(input,levelDots); item.append(handle,content,del); list.appendChild(item);
  });
}

async function addOutlineItem(projectId, order, level, currentOutlines){
  await fsCreate('outlines',{storyProjectId:projectId,text:'',level:level||1,order:order||currentOutlines.length});
  const outlines2 = await fsQuery('outlines',where('storyProjectId','==',projectId));
  outlines2.sort((a,b)=>(a.order||0)-(b.order||0));
  renderOutlineList(projectId,outlines2);
  setTimeout(()=>{const inputs=document.querySelectorAll('#outline-list input');if(inputs.length)inputs[inputs.length-1].focus();},100);
}

let editorSaveTimer=null;
async function renderEditor(container, projectId, docId){

function renderNarrativeEditor(view, doc, projectId){
  const toolbar=el('div',{class:'editor-topbar'});
  const titleIn=el('input',{class:'editor-title-input',value:doc.title||'',placeholder:'Document title...'});
  titleIn.addEventListener('blur',async()=>{ showSaving(); await fsUpdate('documents',doc.id,{title:titleIn.value}); showSaved(); });
  toolbar.appendChild(titleIn); toolbar.appendChild(el('div',{class:'editor-divider'}));
  const fmtBtns=[{cmd:'bold',label:'B',style:'font-weight:700'},{cmd:'italic',label:'I',style:'font-style:italic'},{cmd:'underline',label:'U',style:'text-decoration:underline'}];
  fmtBtns.forEach(b=>{
    const btn=el('button',{class:'toolbar-btn',style:b.style,title:b.cmd}); btn.textContent=b.label;
    btn.addEventListener('click',()=>{document.execCommand(b.cmd); editor.focus(); updateToolbar();});
    toolbar.appendChild(btn);
  });
  toolbar.appendChild(el('div',{class:'editor-divider'}));
  ['H1','H2','H3'].forEach((h,i)=>{
    const btn=el('button',{class:'toolbar-btn',title:'Heading '+(i+1)}); btn.textContent=h;
    btn.addEventListener('click',()=>{document.execCommand('formatBlock',false,'h'+(i+1)); editor.focus();});
    toolbar.appendChild(btn);
  });
  toolbar.appendChild(el('div',{class:'editor-divider'}));
  const listBtn=el('button',{class:'toolbar-btn'}); listBtn.textContent='• List';
  listBtn.addEventListener('click',()=>{document.execCommand('insertUnorderedList'); editor.focus();});
  toolbar.appendChild(listBtn); toolbar.appendChild(el('div',{class:'editor-divider'}));
  const backBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>navigate('dashboard',projectId,'writing')}); backBtn.textContent='← Back';
  toolbar.appendChild(backBtn);

  const body=el('div',{class:'editor-body'});
  const editor=el('div',{class:'editor-content',contenteditable:'true','data-placeholder':'Begin your story here...'});
  editor.innerHTML=doc.content||'';
  const wc=el('div',{class:'editor-word-count'},[wordCount(editor.innerHTML)+' words']);
  editor.addEventListener('input',()=>{
    wc.textContent=wordCount(editor.innerHTML)+' words';
    clearTimeout(editorSaveTimer);
    editorSaveTimer=setTimeout(async()=>{ showSaving(); await fsUpdate('documents',doc.id,{content:editor.innerHTML}); showSaved(); },1000);
  });
  editor.addEventListener('keyup',()=>updateToolbar()); editor.addEventListener('mouseup',()=>updateToolbar());
  body.appendChild(editor); view.append(toolbar,body,wc);
  function updateToolbar(){fmtBtns.forEach((b,i)=>{toolbar.querySelectorAll('.toolbar-btn')[i].classList.toggle('active',document.queryCommandState(b.cmd));});}
}

const SP_TYPES=['scene-heading','action','character','dialogue','parenthetical','transition'];
const SP_LABELS={'scene-heading':'Scene Heading','action':'Action','character':'Character','dialogue':'Dialogue','parenthetical':'Parenthetical','transition':'Transition'};
let currentSpType='scene-heading';

function renderScreenplayEditor(view, doc, projectId){
  const toolbar=el('div',{class:'editor-topbar',style:'flex-wrap:wrap;gap:6px;'});
  const titleIn=el('input',{class:'editor-title-input',value:doc.title||'',placeholder:'Screenplay title...'});
  titleIn.addEventListener('blur',async()=>{ showSaving(); await fsUpdate('documents',doc.id,{title:titleIn.value}); showSaved(); });
  toolbar.appendChild(titleIn); toolbar.appendChild(el('div',{class:'editor-divider'}));
  const typeBar=el('div',{class:'screenplay-type-selector'});
  SP_TYPES.forEach(t=>{
    const btn=el('button',{class:'type-btn'+(t===currentSpType?' active':''),onclick:()=>setSpType(t,typeBar)});
    btn.textContent=SP_LABELS[t]; btn.dataset.type=t; typeBar.appendChild(btn);
  });
  toolbar.append(typeBar,el('div',{class:'editor-divider'}));
  const backBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>navigate('dashboard',projectId,'writing')}); backBtn.textContent='← Back';
  toolbar.appendChild(backBtn);
  const body=el('div',{class:'screenplay-body'});
  const page=el('div',{class:'screenplay-page'});
  const editor=el('div',{class:'screenplay-content',contenteditable:'true'});
  editor.innerHTML=doc.content||'<p data-type="scene-heading">INT. LOCATION - DAY</p>';
  editor.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();const idx=SP_TYPES.indexOf(currentSpType);const next=e.shiftKey?SP_TYPES[(idx-1+SP_TYPES.length)%SP_TYPES.length]:SP_TYPES[(idx+1)%SP_TYPES.length];setSpType(next,typeBar);applyTypeToCurrentLine(editor,next);}
    if(e.key==='Enter'){setTimeout(()=>{if(currentSpType==='character')setSpType('dialogue',typeBar);else if(currentSpType==='dialogue')setSpType('action',typeBar);else if(currentSpType==='parenthetical')setSpType('dialogue',typeBar);applyTypeToCurrentLine(editor,currentSpType);},0);}
  });
  editor.addEventListener('keyup',()=>syncTypeFromCursor(editor,typeBar));
  editor.addEventListener('mouseup',()=>syncTypeFromCursor(editor,typeBar));
  editor.addEventListener('input',()=>{
    clearTimeout(editorSaveTimer);
    editorSaveTimer=setTimeout(async()=>{ showSaving(); await fsUpdate('documents',doc.id,{content:editor.innerHTML}); showSaved(); },1000);
  });
  page.appendChild(editor); body.appendChild(page);
  const wc=el('div',{class:'editor-word-count'},'Tab cycles line types · Shift+Tab to go back');
  view.append(toolbar,body,wc);
  if(!doc.content) applyTypeToCurrentLine(editor,'scene-heading');
}

function setSpType(type,typeBar){currentSpType=type;typeBar.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));}
function applyTypeToCurrentLine(editor,type){const sel=window.getSelection();if(!sel.rangeCount)return;let node=sel.getRangeAt(0).startContainer;while(node&&node.parentNode!==editor)node=node.parentNode;if(node&&node!==editor){node.dataset.type=type;}else{const p=document.createElement('p');p.dataset.type=type;editor.appendChild(p);const r=document.createRange();r.setStart(p,0);r.collapse(true);sel.removeAllRanges();sel.addRange(r);}}
function syncTypeFromCursor(editor,typeBar){const sel=window.getSelection();if(!sel.rangeCount)return;let node=sel.getRangeAt(0).startContainer;while(node&&node.parentNode!==editor)node=node.parentNode;if(node&&node.dataset&&node.dataset.type)setSpType(node.dataset.type,typeBar);}

}
function confirmDelete(msg,onConfirm){
  const overlay=el('div',{class:'modal-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const modal=el('div',{class:'modal'});
  modal.innerHTML='<div class="modal-title">Confirm Delete</div><p style="color:var(--fg2);font-size:14px;">'+msg+'</p><p style="color:var(--fg3);font-size:12px;margin-top:8px;">This action cannot be undone.</p>';
  const footer=el('div',{class:'modal-footer'});
  const cancelBtn=el('button',{class:'btn btn-ghost',onclick:()=>overlay.remove()});cancelBtn.textContent='Cancel';
  const delBtn=el('button',{class:'btn btn-danger',onclick:()=>{overlay.remove();onConfirm();}});delBtn.textContent='Delete';
  footer.append(cancelBtn,delBtn); modal.appendChild(footer); overlay.appendChild(modal); document.body.appendChild(overlay);
}
function openEditProject(p){
  const overlay=el('div',{class:'modal-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const modal=el('div',{class:'modal'});
  modal.innerHTML=`
    <div class="modal-title">Edit Project</div>
    <div class="field" style="margin-bottom:14px;"><label class="label">Name</label><input class="input" id="ep-name" value="${esc(p.name)}"></div>
    <div class="field" style="margin-bottom:14px;"><label class="label">Description</label><textarea class="textarea" id="ep-desc" rows="3">${esc(p.description||'')}</textarea></div>
    <div class="field" style="margin-bottom:14px;"><label class="label">Color</label><div class="color-picker">${Object.keys(COLOR_MAP).map(k=>`<div class="color-swatch${p.colorLabel===k?' selected':''}" style="background:${COLOR_MAP[k]}" onclick="this.parentNode.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));this.classList.add('selected')" data-color="${k}"></div>`).join('')}</div></div>`;
  const footer=el('div',{class:'modal-footer'});
  const cancelBtn=el('button',{class:'btn btn-ghost',onclick:()=>overlay.remove()});cancelBtn.textContent='Cancel';
  const saveBtn=el('button',{class:'btn btn-primary',onclick:async()=>{
    const color=(modal.querySelector('.color-swatch.selected')||{dataset:{}}).dataset.color||p.colorLabel;
    showSaving();
    await fsUpdate('projects',p.id,{name:v('ep-name')||p.name,description:v('ep-desc'),colorLabel:color});
    showSaved();
    overlay.remove(); renderHome(document.getElementById('content')); toast('Project updated');
  }});saveBtn.textContent='Save';
  footer.append(cancelBtn,saveBtn); modal.appendChild(footer); overlay.appendChild(modal); document.body.appendChild(overlay);
}

// Make these available to inline onclick handlers
window.navigate = navigate;
window.fsDelete = fsDelete;
window.renderCharacters = renderCharacters;
window.renderLocations = renderLocations;
window.renderScenes = renderScenes;
window.confirmDelete = confirmDelete;
window.toast = toast;

// ══════════════════════════════════════════════
//  AUTH STATE LISTENER — app entry point
// ══════════════════════════════════════════════
onAuthStateChanged(auth, user=>{
  if(user){
    currentUser = user;
    document.getElementById('auth-container').innerHTML='';
    document.getElementById('topbar').style.display='flex';
    document.getElementById('main').style.display='flex';
    document.getElementById('logo-btn').addEventListener('click',()=>navigate('home'));
    navigate('home');
  } else {
    currentUser = null;
    document.getElementById('topbar').style.display='none';
    document.getElementById('main').style.display='none';
    renderAuth();
  }
});

</script>
