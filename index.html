}

function sbWarning(text){
  const box=el('div',{style:'background:rgba(229,184,110,0.08);border:1px solid rgba(229,184,110,0.25);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--gold);line-height:1.6;'});
  box.textContent='⚠ '+text;
  return box;
}

// ── Step 1: S — Setup ──
function sbSetup(pane, data, chars, locs){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='S — Setup: Who wants what?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='The Setup is not the situation — it is the desire behind it. Every character entering this scene must want something specific. That want is the engine of the scene.';
  pane.append(t,s);
  pane.appendChild(sbCallout('◎','A scene in which nothing changes is not a scene — it is description. Before you write a single line, know what each character wants going IN.'));

  pane.appendChild(cbDivider('Scene Identity'));
  pane.appendChild(sbF('title','Scene Title *','e.g. "The Confession", "Last Meal", "The Interview"',data.title,1,'A working title that captures the essential action or pressure of the scene.'));
  // Location combo — allows typing a new location name or picking from existing.
  // Uses the same wizard-field styling as other fields.
  const locComboWiz = (function(){
    const wrap=el('div',{class:'wizard-field'});
    const lbl=el('label',{class:'wizard-field-label'});lbl.textContent='Location (optional)';lbl.htmlFor='sb-loc';
    wrap.appendChild(lbl);
    const hint=el('div',{class:'wizard-field-hint'});hint.textContent='Type a new location name or pick an existing one. New locations are saved automatically.';
    wrap.appendChild(hint);
    const inp=el('input',{class:'input',id:'sb-loc',list:'sb-loc-list',placeholder:'e.g. The Kitchen, Downtown Alley…'});
    // Pre-fill with existing location name if set
    if(data.locationId){
      const sel = locs.find(l=>l.id===data.locationId);
      if(sel) inp.value = sel.name;
    }
    const dl=el('datalist',{id:'sb-loc-list'});
    locs.forEach(l=>{ const opt=el('option',{value:l.name}); dl.appendChild(opt); });
    wrap.append(inp,dl);
    return wrap;
  })();
  pane.appendChild(cbRow(
    sbF('seq','Sequence Number','e.g. 4',String(data.sequenceNumber)),
    locComboWiz
  ));
  pane.appendChild(sbF('sceneGoal','What is this scene trying to accomplish in the story?','e.g. The protagonist learns the antagonist’s true motive. The relationship breaks beyond repair.',data.sceneGoal,2,'Not what happens, but what the scene DOES for the story. What would be missing if you cut it?',[
    'If you removed this scene from the script, would the story be identical? If yes, the scene is dead weight.',
    'Try finishing this sentence: "After this scene, the story can never go back to..."',
    'A scene earns its place by changing something: status, knowledge, relationship, or intention.',
  ]));

  pane.appendChild(cbDivider('Character Wants'));
  pane.appendChild(sbF('charAWant','What does Character A (or the protagonist) want entering this scene?','e.g. To get a straight answer. To leave without a confrontation. To be forgiven.',data.charAWant,2,'Want is the invisible pressure a character carries into the room. Not the situation — the desire behind it.',[
    'Wants can be small and immediate ("I need them to say yes") or large and unconscious ("I need them to see me as I am").',
    'Try: what does this character need from THIS scene, in THIS moment?',
    'A want does not have to be villainous. Even kindness can be a want with stakes.',
  ]));
  pane.appendChild(sbF('charBWant','What does Character B (or the opposing force) want?','e.g. To keep the secret. To buy time. To make Character A feel responsible.',data.charBWant,2,'The opposing want creates tension — even when characters appear to be on the same side.',[
    'Tension does not require conflict. Two people who want the same thing can still be in tension if their methods are incompatible.',
    'Ask: what would Character B need this scene to accomplish for them?',
  ]));
  pane.appendChild(sbF('stakesDescription','What are the stakes of this scene?','e.g. If they do not reconcile now, the window is closed. The mission fails if this lie is uncovered.',data.stakesDescription,2,'What does each character stand to gain or lose? Stakes are what make the audience lean forward.',[
    'No stakes = no tension. Even a quiet scene needs something at risk.',
    'Stakes can be emotional ("she will never trust him again") or external ("the deal falls apart").',
  ]));
  pane.appendChild(sbSelect('tensionType','Type of tension in this scene',[
    {val:'',label:'— Choose one —'},
    {val:'conflict',label:'Conflict — Characters want opposite things (one stays, the other leaves)'},
    {val:'tension-method',label:'Tension — Same want, incompatible methods (both want to win, one is cheating)'},
    {val:'tension-knowledge',label:'Tension — Information asymmetry (one character knows something the other does not)'},
    {val:'tension-stakes',label:'Tension — Unequal stakes (one character cares far more than the other)'},
    {val:'internal',label:'Internal conflict — One character is at war with themselves'},
    {val:'atmospheric',label:'Atmospheric tension — Dread, unease, or suspense without direct confrontation'},
  ],data.tensionType,'Is this CONFLICT (opposite wants) or TENSION (same want, incompatible methods)? Both are valid — knowing which you have shapes how you write it.'));

  if(chars.length){
    pane.appendChild(cbDivider('Characters in this Scene'));
    const charGrid=el('div',{style:'display:flex;flex-direction:column;gap:8px;padding:12px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);'});
    chars.forEach(c=>{
      const lbl2=el('label',{style:'display:flex;align-items:center;gap:10px;font-size:13px;color:var(--fg2);cursor:pointer;'});
      const cb2=el('input',{type:'checkbox',value:c.id,'data-sb-char':'1'});
      if((data.characterIds||[]).includes(c.id)) cb2.checked=true;
      const span=el('span');span.textContent=c.name;
      lbl2.append(cb2,span); charGrid.appendChild(lbl2);
    });
    const charWrap=el('div',{class:'wizard-field'});
    const charLbl=el('label',{class:'wizard-field-label'});charLbl.textContent='Select characters present in this scene';
    charWrap.append(charLbl,charGrid);
    pane.appendChild(charWrap);
  }
}

// ── Step 2: C — Confrontation ──
function sbConfrontation(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='C — Confrontation: Where wants collide';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Confrontation is where the wants from your Setup come into tension. Conflict is NOT required — tension always is. A silence, an unanswered question, or a polite exchange can all be confrontation.';
  pane.append(t,s);
  pane.appendChild(sbCallout('◉','Two characters can want the SAME thing and still be in confrontation — if their methods, timelines, or costs are incompatible. A negotiation. A truce. A proposal. These are all confrontations.'));

  pane.appendChild(sbSelect('confrontationType','What kind of confrontation is this?',[
    {val:'',label:'— Choose one —'},
    {val:'direct-conflict',label:'Direct conflict — Characters openly oppose each other'},
    {val:'verbal-tension',label:'Verbal tension — Words as weapons, subtext doing the work'},
    {val:'silent',label:'Silent confrontation — Avoidance, absence, unanswered questions'},
    {val:'one-sided',label:'One-sided — One character does not know there is a confrontation'},
    {val:'internal-external',label:'Internal/External — A character confronts both themselves and another'},
    {val:'cooperative-tension',label:'Cooperative tension — Working toward the same goal but methods clash'},
    {val:'atmospheric',label:'Atmospheric — Environment or situation creates pressure, not another character'},
  ],data.confrontationType,'The confrontation type shapes how you write dialogue, pacing, and staging.'));
  pane.appendChild(sbF('confrontationDesc','Describe how the confrontation plays out','e.g. She asks him directly where he was. He deflects. She finds a different angle. He stalls. Neither is saying what they mean.',data.confrontationDesc,4,'What does the middle of this scene look like? How do the two wants push against each other?',[
    'The confrontation is not the dramatic peak — it is the ongoing pressure between Setup and Turn.',
    'Try writing it in beats: A does X. B responds with Y. A escalates to Z.',
    'Remember: a silence can be a confrontation. An unanswered question is pressure.',
    'Ask: what is each character trying NOT to say, and how does that shape what they actually say?',
  ]));

  pane.appendChild(cbDivider('The Obstacle'));
  pane.appendChild(sbSelect('obstacleType','What is the primary obstacle standing between the characters and what they want?',[
    {val:'',label:'— Choose one —'},
    {val:'interpersonal',label:'Interpersonal — The other character is the obstacle'},
    {val:'internal',label:'Internal — A character’s own fear, pride, guilt, or denial'},
    {val:'external',label:'External — A situation, rule, deadline, or circumstance'},
    {val:'informational',label:'Informational — Someone is missing knowledge they need'},
    {val:'moral',label:'Moral — A character cannot do what they need to without crossing a line'},
  ],data.obstacleType));
  pane.appendChild(sbF('obstacleDesc','Describe the obstacle in specific terms','e.g. He cannot tell her the truth without implicating himself. She cannot leave without making it worse.',data.obstacleDesc,3,'Be specific. The more concrete the obstacle, the more pressure the scene has.',[
    'An obstacle that is too vague is not an obstacle — it is a feeling. Name the specific thing in the way.',
    'The obstacle and the want together create the confrontation. Both must be specific.',
  ]));
}

// ── Step 3: T — Turn ──
function sbTurn(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='T — The Turn: Find the pivot';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='The Turn is the most important element of the scene. It is NOT the climax and NOT the loudest moment. It is the exact beat where the scene changes direction — often a single line, a look, or a silence.';
  pane.append(t,s);
  pane.appendChild(sbWarning('Common mistake: picking the most dramatic moment as the Turn. The Turn is often the QUIETEST — a confession, a word said differently, a door that closes. Find the pivot, not the peak.'));
  pane.appendChild(sbCallout('⚡','Ask yourself: which specific line, action, or silence is the exact moment this scene changes direction? Not the section — the moment. Find the line. Find the beat.'));

  pane.appendChild(sbF('turnLine','Write the Turn — the exact line, action, or silence','e.g. She stops. She looks at him differently. She says: "I already know." / He sets his keys on the table and does not pick them up. / Silence. Neither of them moves.',data.turnLine,3,'The Turn is a SPECIFIC moment. Not "when things get tense." Not "around the middle." The exact beat where the scene changes direction.',[
    'Try starting with the word "When" — "When she says X" or "When he does Y."',
    'If you cannot pin it to a single line or action, you may not have a Turn yet.',
    'The Turn often works because of what has been withheld up to this point.',
    'Ask: what is the moment AFTER which the scene is different? That is your Turn.',
  ]));
  pane.appendChild(sbSelect('turnType','What kind of Turn is this?',[
    {val:'',label:'— Choose one —'},
    {val:'revelation',label:'Revelation — Something hidden is exposed (a truth, a lie, a decision)'},
    {val:'reversal',label:'Reversal — Power or position flips unexpectedly'},
    {val:'decision',label:'Decision — A character makes a choice that closes off another path'},
    {val:'silence',label:'Silence or absence — What is NOT said changes everything'},
    {val:'action',label:'Physical action — A gesture, movement, or object that pivots the scene'},
    {val:'emotional-shift',label:'Emotional shift — A the character feeling visibly changes'},
    {val:'exit',label:'Exit or refusal — A character leaves or refuses to continue'},
  ],data.turnType,'Naming the type helps you see if the Turn is working the way you intend.'));
  pane.appendChild(sbF('turnDescription','What changes BECAUSE of the Turn?','e.g. She now knows he was lying. He realizes she was never going to help him. The alliance is over.',data.turnDescription,3,'The Turn must cause something. What is different in the scene after the Turn hits?',[
    'If nothing changes because of the Turn, it is not a Turn — it is just a moment.',
    'The change can be in knowledge, in power, in relationship, or in intention.',
  ]));
  pane.appendChild(sbF('turnQuiet','How can you make the Turn QUIETER or more specific?','e.g. Instead of a speech, she just sets down her glass. He does not answer. The camera stays on his hands.',data.turnQuiet,2,'Optional: a note to yourself about how to execute the Turn with restraint. The best Turns are often underwritten.',[
    'Silence is a form of action on the page. "She does not answer" can hit harder than a speech.',
    'Ask: can you cut three lines and trust the actor to land this?',
    'Details that are already in the room (an object, a sound, a physical action) are often stronger than new dialogue.',
  ]));
}

// ── Step 4: R — Resolution ──
function sbResolution(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='R — Resolution: Something must change';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='The Resolution is not the ending — it is the answer to the question the Setup created. Something must be different when the scene ends. A scene where nothing changes is not a scene.';
  pane.append(t,s);
  pane.appendChild(sbCallout('◈','Four things can change: STATUS (who has power now?), KNOWLEDGE (who knows something they did not?), RELATIONSHIP (how do they see each other differently?), INTENTION (what does someone now plan to do that they would not have before?). At least one must change.'));

  pane.appendChild(sbSelect('changeType','What kind of change does this scene produce?',[
    {val:'',label:'— Choose one —'},
    {val:'status',label:'Status — Who has power now? The power dynamic has shifted.'},
    {val:'knowledge',label:'Knowledge — Someone knows something they did not at the start of the scene.'},
    {val:'relationship',label:'Relationship — How these characters see or feel about each other has changed.'},
    {val:'intention',label:'Intention — A character now plans to do something they would not have before.'},
    {val:'multiple',label:'Multiple — More than one of the above has changed.'},
  ],data.changeType,'If none of the above applies, the scene may not have a Resolution yet. Ask: what is different?'));
  pane.appendChild(sbF('whoChanges','Who changes, and how?','e.g. She leaves with information she did not have before. He leaves with a decision made that he cannot unmake.',data.whoChanges,3,'Name the character(s) and describe specifically how they are different when the scene ends.',[
    'Try: "At the start of the scene, [character] believed/planned/felt X. At the end, they believe/plan/feel Y."',
    'Even a small internal shift counts — but it must be specific.',
    'If both characters are identical when the scene ends, the scene may not be earning its place.',
  ]));
  pane.appendChild(sbF('resolutionChange','Describe the Resolution in full','e.g. The truce is agreed but both of them know it will not hold. She has what she came for. He has lost something he cannot name.',data.resolutionChange,4,'What does the end of the scene look like? What is the emotional and narrative state as we cut away?',[
    'The Resolution does not need to be resolved in the comfortable sense — it needs to be different from the Setup.',
    'Ask: what is the LAST IMAGE of this scene? What do we see or hear before the cut?',
    'The end of a scene should be a closed door or an open question — not a rest stop.',
  ]));
  pane.appendChild(sbF('newStatus','What is the new status quo after this scene?','e.g. He now knows she is investigating him. She owes him a favor she will regret. The plan has changed.',data.newStatus,2,'A brief note on what the story looks like after this scene — what has shifted in the larger narrative.',[
    'This is a writerly note, not dialogue. It helps you track causality across scenes.',
    'Ask: what can now happen in your story that could not happen before this scene?',
  ]));

  pane.appendChild(cbDivider('The Scene Test'));
  const testBox=el('div',{style:'background:rgba(104,147,239,0.06);border:1px solid rgba(104,147,239,0.18);border-radius:var(--radius-sm);padding:16px;margin-bottom:8px;'});
  const _tbH=el('div',{style:"font-family:'Belleza',serif;font-size:15px;color:var(--accent);margin-bottom:8px;"});_tbH.textContent='The Scene Test';
  const _tbT=el('div',{style:'font-size:13px;color:var(--fg2);line-height:1.7;'});
  const _tbQ=document.createTextNode('“If I removed this scene from the script, would anything be different?” ');
  const _tbY=el('strong',{style:'color:var(--fg);'});_tbY.textContent='YES';
  const _tbM1=document.createTextNode(' — scene earns its place. ');
  const _tbN=el('strong',{style:'color:var(--fg);'});_tbN.textContent='NO';
  const _tbM2=document.createTextNode(' — dead weight. Cut or rewrite.');
  _tbT.append(_tbQ,_tbY,_tbM1,_tbN,_tbM2);
  testBox.append(_tbH,_tbT);
  pane.appendChild(testBox);
  pane.appendChild(sbF('sceneTest','Does this scene pass the Scene Test? Why?','e.g. Yes — without this scene, the audience never learns that she knows, and the third act does not work.',data.sceneTest,2,'Be honest with yourself here. If the answer is no, you may need to revise the Resolution or rethink the scene`s purpose.',[
    'Ask: if a future reader or audience member never saw this scene, would they be missing something essential?',
    'A scene that provides only information can often be replaced by a line of dialogue in the next scene.',
    'A scene earns its place by changing something that matters to the story.',
  ]));
}

// ── Step 5: Craft & Context ──
function sbCraft(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='Craft & Context';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Optional craft layer. These questions help you think about subtext, tone, and staging — the difference between a scene that works and one that resonates.';
  pane.append(t,s);

  pane.appendChild(cbDivider('Subtext'));
  pane.appendChild(sbCallout('❯','Subtext is what the scene is REALLY about underneath the dialogue. The surface is what characters appear to be talking about. The subtext is what they actually mean or are afraid to say.'));
  pane.appendChild(sbF('subtext','What is this scene really about? (The subtext)','e.g. On the surface: two colleagues discuss the project timeline. Underneath: she is deciding whether to trust him after what he did.',data.subtext,3,'What are the characters NOT saying, and how does that shape every line they DO say?',[
    'Ask: what does each character want to say but cannot? What would they never say out loud?',
    'Subtext is created by withholding — letting the audience feel what the characters cannot express.',
    'If your dialogue says exactly what the scene is about, there may be no subtext yet.',
  ]));

  pane.appendChild(cbDivider('Opening & Closing Images'));
  pane.appendChild(sbF('openingImage','Opening image — how does the scene begin?','e.g. She is already there when he arrives, reading, not looking up. The room is too bright.',data.openingImage,2,'The first moment of the scene — what the audience sees or hears before anything is said.',[
    'A strong opening image carries information before dialogue begins.',
    'Ask: what does the physical world of this scene feel like before anyone speaks?',
  ]));
  pane.appendChild(sbF('closingImage','Closing image — how does the scene end?','e.g. He walks out. She does not watch him go. We hold on the door for a beat too long.',data.closingImage,2,'The last moment of the scene before the cut. What does the audience leave with?',[
    'The closing image should FEEL different from the opening image, even if nothing has explicitly changed.',
    'Ask: what is the emotional residue of this scene? What image holds that feeling?',
  ]));

  pane.appendChild(cbDivider('Tone & Notes'));
  pane.appendChild(sbF('toneNotes','Tone, pacing, and director/production notes','e.g. This scene should move fast — no pauses. Claustrophobic. Handheld camera. No score.',data.toneNotes,3,'Optional: any notes about how this scene should FEEL in terms of pacing, visual language, sound, or performance direction.',[
    'Tone notes are not dialogue. They are your instincts about atmosphere and execution.',
    'These can be as short as two words: "Quiet. Unbearable."',
  ]));
}

// ── Step 6: Review ──
function sbReview(pane, data, chars, locs){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='Review your scene.';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Here is everything you have built. Go back to any step to make changes, or save now and edit from the scene card at any time.';
  pane.append(t,s);

  if(!data.title){
    const warn=el('div',{class:'wizard-tip',style:'border-color:var(--red);margin-bottom:16px;'});
    warn.innerHTML='<div class="wizard-tip-label" style="color:var(--red);">Missing title</div><p style="margin:0;">Go back to Step 1 and give your scene a title before saving.</p>';
    pane.appendChild(warn);
  }

  const loc = locs.find(l=>l.id===data.locationId);
  const scChars = chars.filter(c=>(data.characterIds||[]).includes(c.id));

  function revSec(heading, icon, fields){
    const hasContent = fields.some(({key})=>data[key]&&data[key].trim());
    if(!hasContent) return null;
    const sec=el('div',{class:'wizard-review-section'});
    const h=el('h3');h.textContent=icon+' '+heading;sec.appendChild(h);
    fields.forEach(({label,key})=>{
      if(!data[key]||!data[key].trim()) return;
      const f=el('div',{class:'wizard-review-field'});
      const l=el('div',{class:'wizard-review-label'});l.textContent=label;
      const v2=el('div',{class:'wizard-review-value'});v2.textContent=data[key];
      f.append(l,v2); sec.appendChild(f);
    });
    return sec;
  }

  const sections=[
    {heading:'Setup', icon:'S —', fields:[
      {label:'Title',key:'title'},{label:'Sequence #',key:'sequenceNumber'},
      {label:'Scene Goal',key:'sceneGoal'},{label:'Character A Wants',key:'charAWant'},
      {label:'Character B Wants',key:'charBWant'},{label:'Stakes',key:'stakesDescription'},
      {label:'Tension Type',key:'tensionType'},
    ]},
    {heading:'Confrontation', icon:'C —', fields:[
      {label:'Type',key:'confrontationType'},{label:'How it plays out',key:'confrontationDesc'},
      {label:'Obstacle Type',key:'obstacleType'},{label:'The Obstacle',key:'obstacleDesc'},
    ]},
    {heading:'Turn', icon:'T —', fields:[
      {label:'The Turn',key:'turnLine'},{label:'Type',key:'turnType'},
      {label:'What changes',key:'turnDescription'},{label:'Execution note',key:'turnQuiet'},
    ]},
    {heading:'Resolution', icon:'R —', fields:[
      {label:'Change Type',key:'changeType'},{label:'Who changes & how',key:'whoChanges'},
      {label:'Resolution',key:'resolutionChange'},{label:'New status quo',key:'newStatus'},
      {label:'Scene Test',key:'sceneTest'},
    ]},
    {heading:'Craft', icon:'❯', fields:[
      {label:'Subtext',key:'subtext'},{label:'Opening image',key:'openingImage'},
      {label:'Closing image',key:'closingImage'},{label:'Tone notes',key:'toneNotes'},
    ]},
  ];

  // Identity block (non-text fields handled separately)
  const idSec=el('div',{class:'wizard-review-section'});
  const idH=el('h3');idH.textContent='Scene Identity';idSec.appendChild(idH);
  if(loc){const f=el('div',{class:'wizard-review-field'});const l=el('div',{class:'wizard-review-label'});l.textContent='Location';const v2=el('div',{class:'wizard-review-value'});v2.textContent=loc.name;f.append(l,v2);idSec.appendChild(f);}
  if(scChars.length){const f=el('div',{class:'wizard-review-field'});const l=el('div',{class:'wizard-review-label'});l.textContent='Characters';const v2=el('div',{class:'wizard-review-value'});v2.textContent=scChars.map(c=>c.name).join(', ');f.append(l,v2);idSec.appendChild(f);}
  if(idSec.children.length>1) pane.appendChild(idSec);

  sections.forEach(s=>{
    const sec=revSec(s.heading, s.icon, s.fields);
    if(sec) pane.appendChild(sec);
  });
}

// ══════════════════════════════════════════════
//  SCENES
// ══════════════════════════════════════════════
async function renderScenes(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const [scenes, chars, locs] = await Promise.all([
    fsQuery('scenes',where('storyProjectId','==',projectId)),
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
  ]);
  scenes.sort((a,b)=>(a.sequenceNumber||0)-(b.sequenceNumber||0));

  // Fetch v2 screenplays and build a map: sceneId → { block, doc } for linked
  // scenes. This lets us show accurate word counts and "in script" indicators
  // on linked scenes without per-card async lookups.
  const v2Docs = await getV2Screenplays(projectId);
  const linkMap = {};
  v2Docs.forEach(d => {
    const blocks = migrateV2Blocks(d.sceneBlocks || []);
    blocks.forEach(b => {
      if(b.sceneId){
        linkMap[b.sceneId] = { block: b, doc: d };
      }
    });
  });

  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Scenes</div><div class="page-subtitle">'+scenes.length+' scene'+(scenes.length!==1?'s':'')+'</div></div>';
  const hbtns=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});
  const wizBtn=el('button',{class:'btn btn-primary',onclick:()=>openSceneBuilder(projectId,chars,locs,scenes.length+1)});
  wizBtn.innerHTML='&#10022; Build Scene from Template';
  wizBtn.title='Guided scene builder using SCTR structure';
  const addBtn=el('button',{class:'btn btn-ghost',onclick:()=>openSceneDrawer(null,projectId,chars,locs,scenes.length+1)});addBtn.textContent='+ Create Blank Scene';
  const pdfBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateScenesPdf(projectId)});pdfBtn.textContent='📄 Create Document';
  hbtns.append(wizBtn,addBtn,pdfBtn);
  header.appendChild(hbtns); wrap.appendChild(header);
  // Fine-print explainer about auto-linking
  const explain = el('div',{style:
    'font-size:11px;color:var(--fg3);line-height:1.55;margin:0 0 14px;padding:8px 12px;'+
    'background:var(--bg2);border-left:2px solid var(--border);border-radius:0 4px 4px 0;'
  });
  explain.innerHTML = 'Sluglines you write directly in a screenplay automatically appear here as scenes. Scenes you create here are not added to a script until you choose to insert them.';
  wrap.appendChild(explain);
  const _hintSc=toolHintBanner('scenes'); if(_hintSc) wrap.appendChild(_hintSc);
  if(scenes.length===0){wrap.appendChild(emptyState('◧','No Scenes Yet','Break your story into scenes and keep track of the action.'));}
  else{
    const list = el('div',{class:'scene-list'});
    scenes.forEach(sc=>{
      const loc = locs.find(l=>l.id===sc.locationId);
      const scChars = chars.filter(c=>sc.characterIds&&sc.characterIds.includes(c.id));
      const item = el('div',{class:'scene-item'});
      const num = el('div',{class:'scene-num'},['#'+sc.sequenceNumber]);
      const body = el('div',{class:'scene-body'});

      // Word count: prefer linked block content, fall back to draftContent
      const link = linkMap[sc.id];
      const wordSrc = link ? (link.block.content || '') : (sc.draftContent || '');
      const draftWords = wordSrc ? wordCount(wordSrc) : 0;

      // Build chips: word count + in-script indicator
      let chips = '';
      if(draftWords > 0){
        chips += '<span style="display:inline-block;margin-left:8px;font-size:10px;font-family:\'JetBrains Mono\',monospace;background:rgba(94,202,200,0.1);color:var(--teal);border:1px solid rgba(94,202,200,0.22);padding:1px 6px;border-radius:8px;letter-spacing:0.3px;" title="Word count">✎ '+draftWords+'w</span>';
      }
      if(link){
        chips += '<span style="display:inline-block;margin-left:6px;font-size:10px;font-family:\'JetBrains Mono\',monospace;background:rgba(94,202,200,0.06);color:var(--teal);border:1px solid rgba(94,202,200,0.15);padding:1px 6px;border-radius:8px;letter-spacing:0.3px;" title="In script: '+esc(link.doc.title||'Untitled')+'">✦ in script</span>';
      }
      body.innerHTML='<h3>'+esc(sc.title)+chips+'</h3><p>'+esc(sc.description||'No description')+'</p>';

      if(loc||scChars.length){
        const meta = el('div',{class:'scene-chars'});
        if(loc){const lt=el('span',{class:'tag',style:'background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.2)'});lt.textContent='⬡ '+loc.name;meta.appendChild(lt);}
        scChars.forEach(c=>{const ct=el('span',{class:'tag'});ct.textContent='◉ '+c.name;meta.appendChild(ct);});
        body.appendChild(meta);
      }
      const acts = el('div',{style:'display:flex;gap:6px;margin-left:auto;opacity:0;transition:opacity 0.15s;'});
      item.addEventListener('mouseenter',()=>acts.style.opacity='1'); item.addEventListener('mouseleave',()=>acts.style.opacity='0');
      const draftSceneBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openSceneDraftEditor(sc,projectId,chars,locs),title: link ? 'Edit this scene (changes also update the script)' : 'Write or edit the screenplay prose for this scene'});
      draftSceneBtn.textContent = draftWords > 0 ? '✎ Edit' : '✎ Draft';
      const eb=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openSceneDrawer(sc,projectId,chars,locs,scenes.length+1)});eb.textContent='Details';
      const db2=el('button',{class:'btn btn-danger btn-sm',onclick:()=>confirmDelete('Delete "'+sc.title+'"?',async()=>{await fsDelete('scenes',sc.id);renderScenes(container,projectId);toast('Deleted');})});db2.textContent='✕';
      acts.append(draftSceneBtn,eb,db2); item.append(num,body,acts); list.appendChild(item);
    });
    wrap.appendChild(list);
  }
  container.appendChild(wrap);
}

// Resolve a location value to an ID. If the value is already a known location
// ID, returns it. If it's a non-empty string that doesn't match any existing
// location, creates a new location card and returns the new ID. Returns '' for
// empty/no-location values.
async function resolveOrCreateLocation(projectId, locValue, locs){
  if(!locValue || !locValue.trim()) return '';
  // Check if it's an existing location ID
  const byId = locs.find(l => l.id === locValue);
  if(byId) return byId.id;
  // Check if it matches an existing location name exactly (case-insensitive)
  const byName = locs.find(l => l.name.toLowerCase() === locValue.trim().toLowerCase());
  if(byName) return byName.id;
  // New location — create it
  const newId = await fsCreate('locations', {
    storyProjectId: projectId,
    name: locValue.trim(),
    description: 'Auto-created from Scene Builder.',
    atmosphere: '',
  });
  toast('Location "' + locValue.trim() + '" created');
  return newId;
}

// Build a location combo field: a text input backed by a datalist of existing
// locations, so the user can pick an existing one OR type a new name. The
// value can be read as the input's value; the save handler uses
// resolveOrCreateLocation to turn it into a location ID.
function buildLocationCombo(id, locs, selectedLocId, hint){
  const wrap = el('div',{class:'field'});
  const lbl = el('label',{class:'label'}); lbl.textContent = 'Location'; lbl.htmlFor = id;
  wrap.appendChild(lbl);
  if(hint){
    const h = el('div',{style:'font-size:11px;color:var(--fg3);margin-bottom:6px;line-height:1.4;'});
    h.textContent = hint;
    wrap.appendChild(h);
  }
  const inp = el('input',{class:'input', id, list:id+'-list', placeholder:'Type a new location or pick an existing one…'});
  // Pre-fill: if we have a selected location, show its name
  if(selectedLocId){
    const sel = locs.find(l => l.id === selectedLocId);
    if(sel) inp.value = sel.name;
  }
  const dl = el('datalist',{id:id+'-list'});
  locs.forEach(l => {
    const opt = el('option',{value:l.name});
    dl.appendChild(opt);
  });
  wrap.append(inp, dl);
  return wrap;
}

function openSceneDrawer(scene, projectId, chars, locs, nextSeq){
  const isNew=!scene; const data=scene||{title:'',description:'',locationId:'',characterIds:[],sequenceNumber:nextSeq||1};
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  const charOpts=chars.map(c=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg2);cursor:pointer;"><input type="checkbox" value="${c.id}" ${(data.characterIds||[]).includes(c.id)?'checked':''}> ${esc(c.name)}</label>`).join('');
  drawer.innerHTML=`
    <div class="drawer-header"><div class="drawer-title">${isNew?'New Scene':'Edit Scene'}</div><button class="btn-icon" onclick="this.closest('.drawer-overlay').remove()">✕</button></div>
    <div class="drawer-body">
      <div class="field-row">
        <div class="field"><label class="label">Title</label><input class="input" id="sd-title" value="${esc(data.title)}" placeholder="Scene title"></div>
        <div class="field"><label class="label">Sequence #</label><input class="input" id="sd-seq" type="number" value="${data.sequenceNumber||1}" min="1"></div>
      </div>
      <div class="field"><label class="label">Description</label><textarea class="textarea" id="sd-desc" rows="3" placeholder="What happens in this scene?">${esc(data.description||'')}</textarea></div>
      <div id="sd-loc-container"></div>
      ${chars.length?`<div class="field"><label class="label">Characters</label><div style="display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);">${charOpts}</div></div>`:''}
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this scene?',async()=>{await fsDelete('scenes','${scene.id}');document.querySelector('.drawer-overlay').remove();renderScenes(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      ${!isNew?`<button class="btn btn-ghost" id="sd-draft" title="Write the actual screenplay prose for this scene">✎ Draft Scene</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="sd-save">Save Scene</button>
    </div>`;
  // Insert location combo into the container
  const locCombo = buildLocationCombo('sd-loc', locs, data.locationId);
  drawer.querySelector('#sd-loc-container').appendChild(locCombo);
  document.body.appendChild(overlay); overlay.appendChild(drawer);
  drawer.querySelector('#sd-save').onclick=async()=>{
    const cbs=Array.from(drawer.querySelectorAll('input[type="checkbox"]:checked')).map(c=>c.value);
    const locVal = v('sd-loc');
    const locId = await resolveOrCreateLocation(projectId, locVal, locs);
    const up={title:v('sd-title'),description:v('sd-desc'),locationId:locId,sequenceNumber:parseInt(v('sd-seq'))||1,characterIds:cbs};
    showSaving();
    if(isNew) await fsCreate('scenes',{storyProjectId:projectId,...up});
    else await fsUpdate('scenes',scene.id,up);
    showSaved();
    overlay.remove(); renderScenes(document.getElementById('content'),projectId); toast(isNew?'Scene created':'Scene saved');
  };
  // "Draft Scene" button on existing scenes — opens the per-scene editor.
  // Save current edits to the scene record first so the draft editor sees the
  // latest title/location/characters in its read-only context header.
  const draftBtn = drawer.querySelector('#sd-draft');
  if(draftBtn){
    draftBtn.onclick = async () => {
      const cbs=Array.from(drawer.querySelectorAll('input[type="checkbox"]:checked')).map(c=>c.value);
      const locVal = v('sd-loc');
      const locId = await resolveOrCreateLocation(projectId, locVal, locs);
      const up={title:v('sd-title'),description:v('sd-desc'),locationId:locId,sequenceNumber:parseInt(v('sd-seq'))||1,characterIds:cbs};
      showSaving();
      await fsUpdate('scenes',scene.id,up);
      showSaved();
      overlay.remove();
      const fresh = await fsGet('scenes', scene.id);
      // Refresh locs in case a new one was created
      const freshLocs = await fsQuery('locations', where('storyProjectId','==',projectId));
      openSceneDraftEditor(fresh, projectId, chars, freshLocs);
    };
  }
}

// ══════════════════════════════════════════════
//  PER-SCENE DRAFT EDITOR
// ══════════════════════════════════════════════
// A focused screenplay editor scoped to a single scene. Reuses the global
// screenplay editor helpers (SP_TYPES, setSpType, applyTypeToCurrentLine,
// syncTypeFromCursor, applyContinuedMarkers, getLineSuggestions, etc.) so
// behavior matches the Writing Desk editor exactly. Saves to scene.draftContent
// rather than to a document.
//
// Layout: full-screen overlay, three regions:
//   - Top: scene context header (title, sequence #, location, characters) +
//     close/save buttons + word count
//   - Center: the screenplay editing surface
//   - Right: collapsible SCTR reference panel showing the planning fields

let _sceneDraftSaveTimer = null;

async function openSceneDraftEditor(scene, projectId, chars, locs){
  // Pre-load autofill caches so character/location autocomplete works
  loadAutofillNames(projectId);
  loadLinkCache(projectId);

  const loc = locs.find(l=>l.id===scene.locationId);
  const scChars = chars.filter(c=>(scene.characterIds||[]).includes(c.id));

  // Look for a script block linked to this scene. If found, the block is the
  // source of truth for the scene's prose — we read from and write to the
  // block's content field, not scene.draftContent.
  const linkedDoc = await findLinkedScriptDoc(scene.id, projectId);
  const linkedBlock = linkedDoc ? linkedDoc.sceneBlocks.find(b => b.sceneId === scene.id) : null;
  const isLinked = !!linkedBlock;

  const overlay = el('div',{class:'wizard-overlay',style:'background:var(--bg);'});

  // ── TOP BAR ──
  const topbar = el('div',{
    style:'display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;'
  });
  const titleBlock = el('div',{style:'flex:1;min-width:200px;'});
  const titleLine = el('div',{style:'display:flex;align-items:center;gap:10px;flex-wrap:wrap;'});
  const numTag = el('span',{style:'font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--fg3);background:var(--bg3);padding:2px 7px;border-radius:4px;'});
  numTag.textContent = '#'+(scene.sequenceNumber||'?');
  const titleText = el('div',{style:'font-family:"Belleza",serif;font-size:18px;color:var(--fg);'});
  titleText.textContent = scene.title || 'Untitled Scene';
  const draftLabel = el('span',{style:'font-size:10px;font-family:"JetBrains Mono",monospace;letter-spacing:1px;color:var(--fg3);text-transform:uppercase;'});
  draftLabel.textContent = '· DRAFT ·';
  titleLine.append(numTag, titleText, draftLabel);
  const ctxLine = el('div',{style:'display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;'});
  if(loc){
    const lt = el('span',{style:'font-size:11px;color:var(--teal);'});
    lt.textContent = '⬡ '+loc.name;
    ctxLine.appendChild(lt);
  }
  scChars.forEach(c=>{
    const ct = el('span',{style:'font-size:11px;color:var(--fg3);'});
    ct.textContent = '◉ '+c.name;
    ctxLine.appendChild(ct);
  });
  titleBlock.append(titleLine, ctxLine);
  topbar.appendChild(titleBlock);

  // Type selector (same as writing desk)
  const typeBar = el('div',{class:'screenplay-type-selector'});
  SP_TYPES.forEach(t=>{
    const btn = el('button',{class:'type-btn'+(t===currentSpType?' active':''),onclick:()=>setSpType(t,typeBar)});
    btn.textContent = SP_LABELS[t]; btn.dataset.type = t; btn.dataset.short = SP_SHORT[t]||t.slice(0,3).toUpperCase();
    typeBar.appendChild(btn);
  });
  topbar.appendChild(typeBar);

  // Word count + actions
  const wcSpan = el('span',{style:'font-size:11px;color:var(--fg3);font-family:"JetBrains Mono",monospace;'});
  wcSpan.textContent = '0 words';
  topbar.appendChild(wcSpan);

  // Toggle SCTR reference panel
  const refToggleBtn = el('button',{class:'btn btn-ghost btn-sm',title:'Show or hide your scene planning notes'});
  refToggleBtn.textContent = '◧ Planning';
  topbar.appendChild(refToggleBtn);

  // Insert into Script — only meaningful for unlinked scenes. Linked scenes
  // are already in a script (the block IS the storage), so we show a small
  // indicator instead.
  if(isLinked){
    const linkedTag = el('span', {style:
      'display:inline-flex;align-items:center;gap:5px;padding:3px 9px;'+
      'border-radius:10px;font-size:10px;font-family:"JetBrains Mono",monospace;'+
      'background:rgba(94,202,200,0.1);color:var(--teal);'+
      'border:1px solid rgba(94,202,200,0.22);letter-spacing:0.5px;'
    });
    linkedTag.innerHTML = '✦ In: ' + esc(linkedDoc.title || 'Untitled');
    linkedTag.title = 'This scene is part of "'+esc(linkedDoc.title || 'Untitled')+'". Edits here update the script directly.';
    topbar.appendChild(linkedTag);
  } else {
    // Unlinked scene — Insert button is active.
    const insertBtn = el('button',{class:'btn btn-ghost btn-sm',title:'Add this scene into a screenplay. The script becomes the storage for this scene.'});
    insertBtn.textContent = '↗ Insert into Script';
    insertBtn.onclick = async () => {
      // Force any pending draft save to flush before we read scene state
      if(_sceneDraftSaveTimer){
        clearTimeout(_sceneDraftSaveTimer);
        _sceneDraftSaveTimer = null;
        await fsUpdate('scenes', scene.id, {
          draftContent: editor.innerHTML,
          draftUpdatedAt: new Date().toISOString(),
        });
      }
      // Re-fetch fresh to ensure we have latest draft content
      const freshScene = await fsGet('scenes', scene.id);
      insertBtn.disabled = true;
      insertBtn.textContent = 'Inserting…';
      const insertedDocId = await insertSceneIntoScript(freshScene, projectId, locs);
      if(insertedDocId){
        // Successful insert — close this editor and reopen it so the UI
        // refreshes with the now-linked state (block-backed editor + linked
        // tag instead of insert button).
        overlay.remove();
        // Re-fetch and reopen for a clean state
        const updatedScene = await fsGet('scenes', freshScene.id);
        const allChars = await fsQuery('characters', where('storyProjectId','==',projectId));
        const allLocs = await fsQuery('locations', where('storyProjectId','==',projectId));
        openSceneDraftEditor(updatedScene, projectId, allChars, allLocs);
      } else {
        // Cancelled or errored — restore button
        insertBtn.disabled = false;
        insertBtn.textContent = '↗ Insert into Script';
      }
    };
    topbar.appendChild(insertBtn);
  }

  const closeBtn = el('button',{class:'btn btn-primary btn-sm'});
  closeBtn.textContent = 'Done';
  closeBtn.onclick = () => {
    // Force one final save before closing
    if(_sceneDraftSaveTimer){
      clearTimeout(_sceneDraftSaveTimer);
      _sceneDraftSaveTimer = null;
    }
    overlay.remove();
    renderScenes(document.getElementById('content'), projectId);
  };
  topbar.appendChild(closeBtn);

  // ── BODY: editor + reference side panel ──
  const bodyWrap = el('div',{style:'flex:1;display:flex;overflow:hidden;'});

  const editorWrap = el('div',{style:'flex:1;overflow-y:auto;background:var(--bg);padding:40px;'});
  const page = el('div',{class:'screenplay-page'});
  const editor = el('div',{class:'screenplay-content',contenteditable:'true'});
  editor.style.position = 'relative';
  // Load content from the linked block if this scene is in a script,
  // otherwise from the scene's own draftContent.
  const initialContent = isLinked
    ? (linkedBlock.content || '')
    : (scene.draftContent || '<p data-type="action">Begin writing your scene…</p>');
  editor.innerHTML = initialContent;
  editor._docId = isLinked ? linkedDoc.id : ('scene:' + scene.id);
  page.appendChild(editor);
  editorWrap.appendChild(page);

  // SCTR reference panel
  const refPanel = el('div',{
    style:'width:300px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:20px;flex-shrink:0;'
  });
  refPanel.appendChild(buildSceneRefPanelContent(scene));

  let refOpen = true;
  refToggleBtn.onclick = () => {
    refOpen = !refOpen;
    refPanel.style.display = refOpen ? 'block' : 'none';
    refToggleBtn.classList.toggle('active', refOpen);
  };

  bodyWrap.append(editorWrap, refPanel);

  // ── KEYBOARD + INPUT BEHAVIORS (mirrors Writing Desk screenplay editor) ──
  editor.addEventListener('keydown', e => {
    const box = document.getElementById('sp-suggest-box');
    if(box){
      if(e.key==='ArrowDown'){ e.preventDefault(); moveFocus(1); return; }
      if(e.key==='ArrowUp'){ e.preventDefault(); moveFocus(-1); return; }
      if(e.key==='Tab' || e.key==='Enter'){
        const sel = window.getSelection();
        let node = sel.rangeCount ? sel.getRangeAt(0).startContainer : null;
        while(node && node.parentNode !== editor) node = node.parentNode;
        if(acceptFocusedSuggestion(node)){ e.preventDefault(); return; }
      }
      if(e.key==='Escape'){ removeSuggestions(); return; }
    }
    if(e.key==='Tab'){
      e.preventDefault();
      // Read current paragraph type from DOM (matches v2 chrome behavior so
      // the two editors stay in sync). Falls back to currentSpType if cursor
      // isn't in any paragraph yet.
      const sel = window.getSelection();
      let node = sel.rangeCount ? sel.getRangeAt(0).startContainer : null;
      while(node && node.parentNode !== editor) node = node.parentNode;
      const currentType = (node && node !== editor && node.dataset?.type) || currentSpType || 'action';
      const idx = SP_TYPES.indexOf(currentType);
      const next = e.shiftKey ? SP_TYPES[(idx-1+SP_TYPES.length)%SP_TYPES.length] : SP_TYPES[(idx+1)%SP_TYPES.length];
      // Strip parens when leaving parenthetical type so they don't pollute
      // the next type (e.g., a slugline ending up as "(INT. KITCHEN)").
      if(currentType === 'parenthetical' && next !== 'parenthetical' && node && node !== editor){
        unwrapParenthetical(node);
      }
      setSpType(next, typeBar); applyTypeToCurrentLine(editor, next);
      // Auto-wrap text in ( ) when cycling INTO parenthetical
      if(next === 'parenthetical' && node && node !== editor){
        autoWrapParenthetical(node);
      }
      setTimeout(() => syncTypeFromCursor(editor, typeBar), 0);
    }
    if(e.key==='Enter'){
      removeSuggestions();
      // Autocorrect any scene-heading the user just finished typing before
      // the browser inserts the new paragraph. Runs synchronously so the
      // corrected text is what gets saved.
      const sel0 = window.getSelection();
      if(sel0.rangeCount){
        let n = sel0.getRangeAt(0).startContainer;
        while(n && n.parentNode !== editor) n = n.parentNode;
        if(n && n !== editor && n.dataset?.type === 'scene-heading'){
          autocorrectSluglineNode(n);
        }
      }
      // If the cursor is inside a parenthetical that ends with ), move it
      // past the closing paren before the browser splits the paragraph —
      // otherwise the close-paren ends up on the new line.
      if(sel0.rangeCount){
        let n = sel0.getRangeAt(0).startContainer;
        while(n && n.parentNode !== editor) n = n.parentNode;
        if(n && n !== editor && n.dataset?.type === 'parenthetical'){
          const txt = n.textContent || '';
          if(txt.endsWith(')')){
            const tn = n.firstChild;
            if(tn && tn.nodeType === 3){
              const newRange = document.createRange();
              newRange.setStart(tn, tn.length);
              newRange.collapse(true);
              sel0.removeAllRanges();
              sel0.addRange(newRange);
            }
          }
        }
      }
      setTimeout(()=>{
        // Bug fix: scene-heading must progress to action on Enter.
        if(currentSpType==='scene-heading') setSpType('action', typeBar);
        else if(currentSpType==='character') setSpType('dialogue', typeBar);
        else if(currentSpType==='dialogue') setSpType('action', typeBar);
        else if(currentSpType==='parenthetical') setSpType('dialogue', typeBar);
        applyTypeToCurrentLine(editor, currentSpType);
        applyContinuedMarkers(editor);
        syncTypeFromCursor(editor, typeBar);
      }, 0);
    }
  });

  editor.addEventListener('keyup', e => {
    if(['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)){
      removeSuggestions(); syncTypeFromCursor(editor, typeBar); return;
    }
    syncTypeFromCursor(editor, typeBar);
    const sel = window.getSelection();
    if(!sel.rangeCount) return;
    let node = sel.getRangeAt(0).startContainer;
    while(node && node.parentNode !== editor) node = node.parentNode;
    showSuggestions(editor, typeBar, node);
  });

  editor.addEventListener('mouseup', () => { removeSuggestions(); syncTypeFromCursor(editor, typeBar); });

  editor.addEventListener('input', () => {
    applyContinuedMarkers(editor);
    wcSpan.textContent = wordCount(editor.innerHTML) + ' words';
    clearTimeout(_sceneDraftSaveTimer);
    _sceneDraftSaveTimer = setTimeout(async () => {
      showSaving();
      if(isLinked){
        // Update the block's content in the linked doc. We re-fetch the doc
        // each save so we don't clobber any other concurrent changes
        // (e.g., the user editing in the script editor at the same time).
        const freshDoc = await fsGet('documents', linkedDoc.id);
        const freshBlocks = migrateV2Blocks(freshDoc.sceneBlocks || []);
        const targetBlock = freshBlocks.find(b => b.sceneId === scene.id);
        if(targetBlock){
          targetBlock.content = editor.innerHTML;
          await fsUpdate('documents', linkedDoc.id, {
            sceneBlocks: freshBlocks,
            content: flattenBlocksToHtml(freshBlocks),
          });
        }
      } else {
        // Unlinked scene — store on the scene record's draftContent.
        await fsUpdate('scenes', scene.id, {
          draftContent: editor.innerHTML,
          draftUpdatedAt: new Date().toISOString(),
        });
      }
      showSaved();
    }, 1000);
  });

  // Initial setup
  wcSpan.textContent = wordCount(editor.innerHTML) + ' words';
  setTimeout(()=>applyContinuedMarkers(editor), 50);
  setupEditorLinkClicks(editor, projectId);

  // Assemble + mount
  overlay.append(topbar, bodyWrap);
  document.body.appendChild(overlay);

  // Focus editor at end
  setTimeout(()=>{
    editor.focus();
    const sel = window.getSelection();
    const r = document.createRange();
    r.selectNodeContents(editor);
    r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
    syncTypeFromCursor(editor, typeBar);
  }, 100);
}

// Builds the contents of the SCTR reference side panel for a scene.
// Renders only the fields the writer actually filled in. If they used the
// blank "Create Scene" path (no SCTR data), shows a friendly note instead.
function buildSceneRefPanelContent(scene){
  const wrap = el('div');

  const heading = el('div',{
    style:'font-family:"Belleza",serif;font-size:14px;color:var(--primary);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px;'
  });
  heading.textContent = 'Scene Planning';
  wrap.appendChild(heading);

  // Sections matching SCTR + Craft + free description
  const sections = [
    {label:'Description', fields:[{k:'description',l:''}]},
    {label:'S — Setup', fields:[
      {k:'sceneGoal',l:'Scene goal'},
      {k:'charAWant',l:'Character A wants'},
      {k:'charBWant',l:'Character B wants'},
      {k:'stakesDescription',l:'Stakes'},
      {k:'tensionType',l:'Tension type'},
    ]},
    {label:'C — Confrontation', fields:[
      {k:'confrontationType',l:'Type'},
      {k:'confrontationDesc',l:'How it plays out'},
      {k:'obstacleType',l:'Obstacle type'},
      {k:'obstacleDesc',l:'The obstacle'},
    ]},
    {label:'T — Turn', fields:[
      {k:'turnLine',l:'The turn'},
      {k:'turnType',l:'Type'},
      {k:'turnDescription',l:'What changes'},
      {k:'turnQuiet',l:'Execution note'},
    ]},
    {label:'R — Resolution', fields:[
      {k:'changeType',l:'Change type'},
      {k:'whoChanges',l:'Who changes & how'},
      {k:'resolutionChange',l:'Resolution'},
      {k:'newStatus',l:'New status quo'},
      {k:'sceneTest',l:'Scene test'},
    ]},
    {label:'Craft', fields:[
      {k:'subtext',l:'Subtext'},
      {k:'openingImage',l:'Opening image'},
      {k:'closingImage',l:'Closing image'},
      {k:'toneNotes',l:'Tone notes'},
    ]},
  ];

  let anyContent = false;
  sections.forEach(sec => {
    const present = sec.fields.filter(f => scene[f.k] && String(scene[f.k]).trim());
    if(!present.length) return;
    anyContent = true;
    const secWrap = el('div',{style:'margin-bottom:18px;'});
    if(sec.label){
      const h = el('div',{
        style:'font-size:11px;font-family:"JetBrains Mono",monospace;letter-spacing:0.5px;color:var(--fg3);text-transform:uppercase;margin-bottom:8px;'
      });
      h.textContent = sec.label;
      secWrap.appendChild(h);
    }
    present.forEach(f => {
      const block = el('div',{style:'margin-bottom:10px;'});
      if(f.l){
        const lbl = el('div',{style:'font-size:10px;color:var(--fg3);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.4px;'});
        lbl.textContent = f.l;
        block.appendChild(lbl);
      }
      const val = el('div',{style:'font-size:12px;color:var(--fg2);line-height:1.55;white-space:pre-wrap;'});
      val.textContent = scene[f.k];
      block.appendChild(val);
      secWrap.appendChild(block);
    });
    wrap.appendChild(secWrap);
  });

  if(!anyContent){
    const note = el('div',{
      style:'font-size:12px;color:var(--fg3);line-height:1.6;padding:14px;background:var(--bg3);border-radius:var(--radius-sm);border-left:2px solid var(--border);'
    });
    note.textContent = 'No planning notes yet. You can use "Build Scene from Template" in the Scenes list to plan a scene with the SCTR framework before drafting.';
    wrap.appendChild(note);
  }

  return wrap;
}

async function renderWorld(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const worlds = await fsQuery('worlds',where('storyProjectId','==',projectId));
  const world = worlds[0]||{};
  container.innerHTML='';
  const wrap = el('div',{class:'page'});

  // Guide prompts for each section (writer's block helpers)
  const GUIDES = {
    moodAndTone: 'Consider: What is the dominant emotional register — hope, dread, wonder, irony? What does the sky look like? What do people do on a Tuesday? What\'s the smell of the air?',
    lawsOfPhysics: 'Consider: Are there forces beyond science? What are the hard limits of power? What happens when those limits are broken? What does the impossible cost?',
    society: 'Consider: Who holds power and how did they get it? What do ordinary people fear? What do they celebrate? What is polite to say and what is forbidden?',
    history: 'Consider: What war or catastrophe shaped the present? What do people remember wrong? What has been deliberately forgotten? What wound has never healed?',
    technology: 'Consider: What problem does the dominant technology solve? What new problem did it create? Who has access and who doesn\'t? What do people do by hand that they used to do by machine, or vice versa?',
    conflicts: 'Consider: What does your protagonist want? What does the world want? Where do those two things collide? What does winning look like — and what does it cost?',
    geography: 'Consider: What does the land look like? Are there borders, walls, oceans, mountains that matter? What do people call the dangerous places? What lies beyond the edge of the map?',
    religion: 'Consider: What do people pray to, fear, or revere? Is faith a comfort or a weapon here? What happens to the faithless? What happens to the devout?',
    language: 'Consider: Are there multiple languages or dialects? What words exist here that don\'t exist in our world? What concepts are untranslatable? What does swearing sound like?',
    economy: 'Consider: What is scarce? What is abundant? What do people trade, barter, or hoard? What is the gap between the richest and the poorest, and what lives in that gap?',
  };

  const SECTIONS = [
    {id:'w-mood',     field:'moodAndTone',   icon:'◎', title:'Mood & Tone'},
    {id:'w-physics',  field:'lawsOfPhysics', icon:'◉', title:'Laws of Physics / Magic'},
    {id:'w-society',  field:'society',       icon:'⬡', title:'Society & Culture'},
    {id:'w-history',  field:'history',       icon:'✦', title:'History & Mythology'},
    {id:'w-tech',     field:'technology',    icon:'◈', title:'Technology & Economy'},
    {id:'w-conflicts',field:'conflicts',     icon:'≡', title:'Conflicts & Themes'},
    {id:'w-geography',field:'geography',     icon:'⊕', title:'Geography & Place'},
    {id:'w-religion', field:'religion',      icon:'✧', title:'Religion & Belief'},
    {id:'w-language', field:'language',      icon:'❧', title:'Language & Dialect'},
    {id:'w-economy',  field:'economy',       icon:'◇', title:'Power & Economy'},
  ];

  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">World Building</div><div class="page-subtitle">Define the rules, tone, and fabric of your world. Use the wizard for guided creation, or fill in sections directly.</div></div>';
  const worldBtns = el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});
  const wizardBtn = el('button',{class:'btn btn-primary',onclick:()=>openWorldBuilder(projectId, world)});
  wizardBtn.innerHTML='&#10022; Build from Template';
  wizardBtn.title='Guided step-by-step world building with template options';
  const pdfWorldBtn = el('button',{class:'btn btn-ghost btn-sm'});pdfWorldBtn.textContent='📄 Create Document';
  pdfWorldBtn.onclick = ()=>generateWorldPdf(projectId);
  const saveBtn = el('button',{class:'btn btn-ghost'});saveBtn.textContent='Save World';
  worldBtns.append(wizardBtn,saveBtn,pdfWorldBtn);
  header.appendChild(worldBtns);
  wrap.appendChild(header);
  const _hintW=toolHintBanner('world'); if(_hintW) wrap.appendChild(_hintW);

  const grid = el('div',{class:'world-grid'});
  SECTIONS.forEach(sec=>{
    const section = el('div',{class:'world-section'});
    const h3 = document.createElement('h3');
    h3.textContent = sec.icon+' '+sec.title;
    const guideToggle = el('div',{class:'guide-toggle'});
    guideToggle.innerHTML='▸ Writing prompt';
    const guideText = el('div',{class:'world-section-guide',style:'display:none;'});
    guideText.textContent = GUIDES[sec.field]||'';
    guideToggle.onclick=()=>{
      const open = guideText.style.display==='none';
      guideText.style.display = open?'block':'none';
      guideToggle.innerHTML = (open?'▾':'▸')+' Writing prompt';
    };
    const textarea = el('textarea',{class:'textarea',id:sec.id,rows:'4'});
    textarea.placeholder='';
    textarea.value = esc(world[sec.field]||'');
    section.append(h3,guideToggle,guideText,textarea);
    grid.appendChild(section);
  });
  wrap.appendChild(grid);
  container.appendChild(wrap);

  saveBtn.onclick=async()=>{
    const data={};
    SECTIONS.forEach(sec=>{
      const el2=document.getElementById(sec.id);
      if(el2) data[sec.field]=el2.value;
    });
    showSaving();
    if(world.id) await fsUpdate('worlds',world.id,data);
    else await fsCreate('worlds',{storyProjectId:projectId,...data});
    showSaved(); toast('World saved');
  };
}

  function renderTemplatePicker(){
    const topbar = el("div",{class:"wizard-topbar"});
    const titleEl = el("div",{class:"wizard-topbar-title"});titleEl.textContent="World Builder";
    const closeBtn = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>wizardExitConfirm(()=>overlay.remove())});

    topbar.append(titleEl,closeBtn);

    const body = el("div",{class:"wizard-body"});
    const pane = el("div",{class:"wizard-pane"});
    const title=el("div",{class:"wizard-pane-title"});title.textContent="Choose a template.";
    const sub=el("div",{class:"wizard-pane-sub"});
    sub.textContent="Templates set the default emphasis and question order. You can always access sections from any template once inside the wizard — nothing is locked.";

    const grid=el("div",{class:"wb-template-grid"});

      const icon=el("div",{class:"wb-template-icon"});icon.textContent=tmpl.icon;
      const name=el("div",{class:"wb-template-name"});name.textContent=tmpl.name;
      const desc=el("div",{class:"wb-template-desc"});desc.textContent=tmpl.desc;
      const tags=el("div",{class:"wb-template-tags"});
      tmpl.tags.forEach(t=>{const tg=el("span",{class:"wb-template-tag"});tg.textContent=t;tags.appendChild(tg);});
      card.append(acc,icon,name,desc,tags);
      card.onclick=()=>{
        selectedTemplate=key;
        grid.querySelectorAll(".wb-template-card").forEach(c=>c.classList.remove("selected"));
        card.classList.add("selected");
      };
      grid.appendChild(card);
    });
    pane.appendChild(grid);

    const footer=el("div",{class:"wizard-footer"});
    const left=el("div");
    const right=el("div",{class:"wizard-footer-nav"});
