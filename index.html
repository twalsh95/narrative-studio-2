// ══════════════════════════════════════════════
//  V2 SCRIPT CHROME (block-based architecture)
// ══════════════════════════════════════════════
// In v2, the editor renders one contenteditable region per block in a vertical
// flow. doc.sceneBlocks is the single source of truth — doc.content is derived
// from it. This means:
//   - block IDs are minted once, never regenerated, never recovered via parsing
//   - typing in one block only updates that block's content field
//   - inserts/deletes are array operations on sceneBlocks, not HTML surgery
//   - no parser is needed at runtime; HTML is generated FROM blocks, never TO

// Compute the displayed scene number for a block at index `i`. Respects manual
// overrides. In 'draft' mode, automatic numbers are sequential integers. In
// 'locked' mode, automatic numbers preserve gaps from manual overrides.
function computeSceneNumber(blocks, i, lockState){
  const b = blocks[i];
  if(!b) return { value: '', kind: 'auto' };
  if(b.kind === 'preamble') return { value: '', kind: 'preamble' };
  if(b.manualNumber) return { value: b.manualNumber, kind: 'manual' };
  // Walk backward to find the most recent block with a manual integer number.
  let lastIntIdx = -1;
  let countableBlocksSinceLastInt = 0;
  for(let j=i-1; j>=0; j--){
    const prev = blocks[j];
    if(!prev || prev.kind === 'preamble') continue;
    if(prev.manualNumber && /^\d+$/.test(prev.manualNumber)){
      lastIntIdx = j; break;
    }
    countableBlocksSinceLastInt++;
  }
  if(lastIntIdx < 0){
    // Count countable blocks before this one
    let n = 1;
    for(let j=0; j<i; j++){
      if(blocks[j] && blocks[j].kind !== 'preamble') n++;
    }
    return { value: String(n), kind: lockState==='locked' ? 'locked' : 'auto' };
  }
  const baseNum = parseInt(blocks[lastIntIdx].manualNumber, 10);
  return { value: String(baseNum + countableBlocksSinceLastInt + 1), kind: lockState==='locked' ? 'locked' : 'auto' };
}

// Extract slugline text from a block's content (the first scene-heading paragraph).
function getBlockSlug(block){
  if(!block || !block.content) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = block.content;
  const heading = Array.from(tmp.children).find(p => p.getAttribute && p.getAttribute('data-type') === 'scene-heading');
  return heading ? (heading.textContent || '').trim() : '';
}

// Parse a slugline string (e.g. "INT. THE CAGE (BAR) - NIGHT") and extract
// a clean location name. Returns null if the slug doesn't look like a
// standard INT./EXT. scene heading.
function extractLocationFromSlug(slug){
  if(!slug) return null;
  const s = slug.trim().toUpperCase();
  // Must start with INT., EXT., or INT./EXT.
  const m = s.match(/^(?:INT\.|EXT\.|INT\.\/EXT\.)\s+(.+?)(?:\s+-\s+(?:DAY|NIGHT|DAWN|DUSK|CONTINUOUS|LATER|MOMENTS LATER|MORNING|EVENING|AFTERNOON|SUNSET|SUNRISE|CONTINUOUS ACTION))?$/);
  if(!m) return null;
  // Clean up: strip trailing time-of-day if it snuck in, trim, title-case
  let name = m[1].trim();
  // Remove a trailing dash + anything (catches non-standard time labels)
  name = name.replace(/\s*-\s*\S+.*$/, '').trim();
  if(!name) return null;
  // Convert ALL-CAPS to Title Case for cleaner display
  name = name.split(/\s+/).map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' ');
  return name;
}

// Count words in a block's content.
function getBlockWordCount(block){
  if(!block || !block.content) return 0;
  return wordCount(block.content);
}

// Build the v2 status bar.
function buildV2StatusBar(doc, blocks, totalWords, callbacks){
  const bar = el('div', {class: 'v2-status-bar'});
  const navToggle = el('button', {class:'btn btn-ghost btn-sm', title: callbacks.navCollapsed ? 'Show scene navigator' : 'Hide scene navigator'});
  navToggle.innerHTML = callbacks.navCollapsed ? '⟩ Navigator' : '⟨ Navigator';
  navToggle.onclick = callbacks.onNavToggle;
  bar.appendChild(navToggle);
  bar.appendChild(el('div',{style:'width:1px;height:14px;background:var(--border);margin:0 2px;'}));

  const sceneCount = blocks.filter(b => b.kind !== 'preamble').length;
  const sceneStat = el('div', {class:'v2-stat'});
  sceneStat.innerHTML = '<strong>'+sceneCount+'</strong> '+(sceneCount===1?'scene':'scenes');
  bar.appendChild(sceneStat);

  const wordStat = el('div', {class:'v2-stat'});
  wordStat.innerHTML = '<strong>'+totalWords+'</strong> words';
  bar.appendChild(wordStat);

  const pages = totalWords > 0 ? Math.max(1, Math.round(totalWords/250)) : 0;
  const pageStat = el('div', {class:'v2-stat'});
  pageStat.innerHTML = '<strong>~'+pages+'</strong> '+(pages===1?'page':'pages');
  bar.appendChild(pageStat);

  bar.appendChild(el('div',{class:'v2-spacer'}));

  const lockState = doc.lockState || 'draft';
  const modePill = el('span', {class:'v2-mode-pill ' + lockState});
  modePill.textContent = lockState;
  bar.appendChild(modePill);

  const cleanupBtn = el('button', {class:'btn btn-ghost btn-sm', title:'Scan for duplicate, empty, or corrupted scenes and fix them.'});
  cleanupBtn.innerHTML = '✦ Clean Up';
  cleanupBtn.onclick = callbacks.onCleanup;
  bar.appendChild(cleanupBtn);

  if(lockState === 'draft'){
    const lockBtn = el('button', {class:'btn btn-ghost btn-sm', title:'Freeze scene numbers. Locked numbering preserves identifiers across revisions.'});
    lockBtn.innerHTML = '🔒 Lock numbering';
    lockBtn.onclick = callbacks.onLockToggle;
    bar.appendChild(lockBtn);
  } else if(lockState === 'locked'){
    const unlockBtn = el('button', {class:'btn btn-ghost btn-sm', title:'Return to draft mode where scenes renumber freely.'});
    unlockBtn.innerHTML = '🔓 Unlock';
    unlockBtn.onclick = callbacks.onLockToggle;
    bar.appendChild(unlockBtn);
  }
  return bar;
}

// Build the navigator panel.
function buildV2Navigator(blocks, doc, lockState, callbacks){
  const nav = el('div', {class:'v2-navigator'});
  const header = el('div', {class:'v2-nav-header'});
  const title = el('span'); title.textContent = 'Scene Navigator';
  const collapse = el('button', {class:'btn-icon', style:'font-size:14px;padding:2px 6px;', title:'Collapse navigator'});
  collapse.textContent = '⟨';
  collapse.onclick = callbacks.onCollapse;
  header.append(title, collapse);
  nav.appendChild(header);

  const list = el('div', {class:'v2-nav-list'});
  const scenes = blocks.filter(b => b.kind !== 'preamble');
  if(scenes.length === 0){
    const empty = el('div', {style:'padding:14px 10px;font-size:11px;color:var(--fg3);line-height:1.5;'});
    empty.textContent = 'No scenes yet. Type a slugline (INT./EXT.) to start.';
    list.appendChild(empty);
  } else {
    blocks.forEach((b, i) => {
      if(b.kind === 'preamble') return;
      const item = el('div', {class:'v2-nav-item'+(b.kind==='placeholder'?' placeholder':'')});
      const numInfo = computeSceneNumber(blocks, i, lockState);
      const num = el('div', {class:'v2-nav-num'}); num.textContent = numInfo.value;
      const text = el('div', {class:'v2-nav-text'});
      const slug = el('div', {class:'v2-nav-slug'});
      slug.textContent = getBlockSlug(b) || '(empty heading)';
      text.appendChild(slug);
      const meta = el('div', {class:'v2-nav-meta'});
      const wc = getBlockWordCount(b);
      meta.textContent = wc + ' words';
      if(!b.sceneId){
        const orphan = el('span',{class:'v2-nav-orphan',style:'margin-left:6px;'});
        orphan.textContent = '· orphan';
        orphan.title = 'This scene is not linked to a Scene Builder card.';
        meta.appendChild(orphan);
      }
      text.appendChild(meta);
      item.append(num, text);
      item.onclick = () => callbacks.onJump(b);
      list.appendChild(item);
    });
  }
  nav.appendChild(list);
  return nav;
}

// Build a single block editor: a contenteditable region with the block's
// content, wired up with all the screenplay editor behaviors. Returns the
// outer wrapper element. The wrapper has data-block-id so we can locate it
// later for scrolling/highlighting.
function buildBlockEditor(block, blocks, blockIndex, lockState, projectId, callbacks){
  const wrap = el('div', {
    class: 'v2-block' + (block.kind === 'placeholder' ? ' placeholder' : '') + (block.kind === 'preamble' ? ' preamble' : ''),
    'data-block-id': block.id,
  });

  // Gutter: scene number chip on the left
  if(block.kind !== 'preamble'){
    const numInfo = computeSceneNumber(blocks, blockIndex, lockState);
    const chip = el('div', {
      class: 'v2-block-num' + (numInfo.kind==='manual' ? ' manual' : (numInfo.kind==='locked' ? ' locked' : '')),
      title: numInfo.kind === 'manual' ? 'Manual number — click to edit' : 'Click to override (e.g., 14A)',
    });
    chip.textContent = numInfo.value;
    chip.onclick = (e) => {
      e.stopPropagation();
      callbacks.onClickNumber(block, chip);
    };
    wrap.appendChild(chip);
    // (Orphan blocks are auto-linked to Scene Builder scenes on save — no
    // manual link button needed.)
  }

  // Placeholder: render as a non-editable card with metadata
  if(block.kind === 'placeholder'){
    const card = el('div', {class:'v2-placeholder-card'});
    const slug = el('div', {class:'v2-placeholder-card-slug'});
    slug.textContent = getBlockSlug(block) || '(no slugline)';
    card.appendChild(slug);
    if(block.placeholderDescription){
      const desc = el('div', {class:'v2-placeholder-card-desc'});
      desc.textContent = block.placeholderDescription;
      card.appendChild(desc);
    }
    const action = el('button', {class:'btn btn-ghost btn-sm', style:'margin-top:10px;'});
    action.textContent = block.sceneId ? '✎ Write this Scene' : '✎ Configure';
    action.onclick = () => callbacks.onPlaceholderAction(block);
    card.appendChild(action);
    wrap.appendChild(card);
    return wrap;
  }

  // Drafted/preamble: contenteditable region
  const editor = el('div', {
    class: 'v2-block-editor screenplay-content',
    contenteditable: 'true',
  });
  editor.innerHTML = block.content || '<p data-type="action"></p>';
  // Stamp the block ID on the inner editor for cursor/blur handlers
  editor.dataset.blockId = block.id;

  // Track focus: when this block gains focus, mark it as the active block
  editor.addEventListener('focus', () => {
    callbacks.onFocusBlock(block, editor);
  });

  // Save on input (debounced). The handler bails if its editor has been
  // replaced (e.g., after a block split) — without this guard, a stale
  // editor's deferred save could clobber state that a later operation set.
  let saveTimer = null;
  editor.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      if(editor._isStale) return;
      callbacks.onBlockChange(block.id, editor.innerHTML);
    }, 700);
  });

  // Save immediately on blur (also guarded against stale editors)
  editor.addEventListener('blur', () => {
    clearTimeout(saveTimer);
    if(editor._isStale) return;
    // Autocorrect any scene-heading paragraph the user just left
    Array.from(editor.children).forEach(p => autocorrectSluglineNode(p));
    callbacks.onBlockChange(block.id, editor.innerHTML);
  });

  // Keyboard handling for line-type cycling (Tab) and Enter behavior
  editor.addEventListener('keydown', (e) => {
    callbacks.onBlockKeydown(e, block, editor);
  });

  editor.addEventListener('mouseup', () => callbacks.onCursorMove(block, editor));
  editor.addEventListener('keyup', (e) => {
    if(['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)){
      callbacks.onCursorMove(block, editor);
    }
  });

  wrap.appendChild(editor);
  return wrap;
}

// Show a popover next to a scene number chip to let the user enter a custom
// scene number (e.g., '14A'). Empty input clears the override.
function showNumberEditPopover(block, anchorEl, onSave){
  document.querySelectorAll('.v2-num-popover').forEach(p=>p.remove());
  const pop = el('div', {class:'v2-num-popover'});
  const t = el('div', {class:'v2-pop-title'}); t.textContent = 'Scene number';
  const inp = el('input', {type:'text', value: block.manualNumber || '', placeholder:'e.g. 14A or leave blank for auto'});
  const hint = el('div', {class:'v2-pop-hint'});
  hint.innerHTML = 'Use letters to mark a multi-location scene part (14A, 14B). Clear the field to return to automatic numbering.';
  const actions = el('div', {class:'v2-pop-actions'});
  const cancel = el('button', {class:'btn btn-ghost btn-sm', onclick: ()=>pop.remove()});
  cancel.textContent = 'Cancel';
  const save = el('button', {class:'btn btn-primary btn-sm', onclick: ()=>{
    const val = inp.value.trim();
    onSave(val || null);
    pop.remove();
  }});
  save.textContent = 'Save';
  actions.append(cancel, save);
  pop.append(t, inp, hint, actions);
  document.body.appendChild(pop);
  const ar = anchorEl.getBoundingClientRect();
  pop.style.top = (ar.bottom + window.scrollY + 6) + 'px';
  pop.style.left = (ar.left + window.scrollX) + 'px';
  setTimeout(()=>{ inp.focus(); inp.select(); }, 30);
  setTimeout(()=>{
    const dismiss = (e) => {
      if(!pop.contains(e.target)){
        pop.remove();
        document.removeEventListener('mousedown', dismiss);
      }
    };
    document.addEventListener('mousedown', dismiss);
  }, 50);
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){ save.click(); }
    if(e.key==='Escape'){ pop.remove(); }
  });
}

// Create a Scene Builder scene linked to a script block. The block IS the
// storage for the scene's prose — the scene record stores only metadata
// (title, location, characters, planning fields). draftContent is intentionally
// not populated for linked scenes.
//
// `sequenceNumber` should reflect the block's position in the script.
async function createSceneForBlock(block, projectId, sequenceNumber){
  const slug = getBlockSlug(block) || 'Untitled scene';
  const newId = await fsCreate('scenes', {
    storyProjectId: projectId,
    title: slug.length > 60 ? slug.slice(0,60)+'…' : slug,
    description: 'Auto-linked from script.',
    locationId: '',
    characterIds: [],
    sequenceNumber: sequenceNumber || 1,
    // Linked scenes don't carry draftContent — the block is the source of truth.
    draftContent: null,
    draftUpdatedAt: null,
  });
  return newId;
}

// Walk a doc's blocks and auto-create Scene Builder scenes for any block
// that has a non-empty slugline but no sceneId yet. Returns the updated
// blocks array (with sceneIds stamped). Caller is responsible for saving
// the doc afterward.
//
// Sequence numbers for new scenes match their block's position among
// drafted/preamble blocks. Existing Scene Builder scenes' sequence numbers
// are NOT modified — only new ones get auto-assigned.
async function autoLinkBlocks(blocks, projectId){
  if(!blocks || !blocks.length) return blocks;
  let modified = false;
  // Position counter — block index among non-preamble blocks
  let scenePosition = 0;
  for(let i = 0; i < blocks.length; i++){
    const b = blocks[i];
    if(b.kind === 'preamble') continue;
    scenePosition++;
    if(b.kind !== 'drafted') continue;
    if(b.sceneId) continue; // already linked
    const slug = getBlockSlug(b);
    if(!slug || !slug.trim()) continue; // no slugline yet — wait
    // Create the scene at this block's position
    const newSceneId = await createSceneForBlock(b, projectId, scenePosition);
    b.sceneId = newSceneId;
    modified = true;
  }
  return { blocks, modified };
}

// Walk blocks and ensure every distinct INT./EXT. location name has a
// corresponding Location record in the project. New records are created
// with a note that they were auto-created from the script. The autofill
// cache is refreshed so the suggestion dropdown picks up new names
// immediately. Already-known names (checked against the live cache) are
// skipped to avoid redundant Firestore reads on every keystroke.
async function autoAddLocationsFromBlocks(blocks, projectId){
  if(!blocks || !blocks.length) return;
  // Collect all distinct location names from sluglines
  const names = new Set();
  blocks.forEach(b => {
    const slug = getBlockSlug(b);
    const name = extractLocationFromSlug(slug);
    if(name) names.add(name);
  });
  if(!names.size) return;
  // Fast path: use the session-level Set (loaded once on editor open).
  // Falls back to the autofill cache if the session set hasn't been loaded yet.
  const checkSet = _sessionLocNames;
  const missing = checkSet
    ? [...names].filter(n => !checkSet.has(n.toUpperCase()))
    : [...names].filter(n => !_cachedLocNames.includes(n.toUpperCase()));
  if(!missing.length) return;
  // Only do a live Firestore read when the session set says something is new,
  // as a final double-check against concurrent writes from another tab.
  const existing = await fsQuery('locations', where('storyProjectId','==',projectId));
  const existingNames = new Set(existing.map(l => l.name.trim().toUpperCase()));
  // Also sync session set with what Firestore actually has
  if(checkSet) existing.forEach(l => checkSet.add(l.name.trim().toUpperCase()));
  const toCreate = missing.filter(n => !existingNames.has(n.toUpperCase()));
  if(!toCreate.length) return;
  await Promise.all(toCreate.map(name => fsCreate('locations', {
    storyProjectId: projectId,
    name,
    description: '',
    atmosphere: '',
    storyRole: '',
    autoCreated: true,
  })));
  // Add new names to session set immediately so subsequent saves skip reads
  if(checkSet) toCreate.forEach(n => checkSet.add(n.toUpperCase()));
  // Refresh autofill cache so screenplay suggestions include new names
  loadAutofillNames(projectId);
}

// Render a v2 screenplay editor inside the given view. This is the main entry
// point for v2 docs — replaces renderScreenplayEditor's body for v2.
async function renderV2ScreenplayEditor(view, doc, projectId){
  loadAutofillNames(projectId);
  loadLinkCache(projectId);
  // Load session-level location Set once so autoAddLocationsFromBlocks
  // skips Firestore reads on every debounced save while the student is typing.
  loadSessionLocNames(projectId);

  // Migrate blocks if needed (legacy `html` → new `content`)
  let blocks = migrateV2Blocks(doc.sceneBlocks || []);
  // If migration produced different blocks, persist immediately
  const needsPersist = (doc.sceneBlocks || []).some(b => b.html !== undefined && b.content === undefined);
  if(needsPersist){
    await fsUpdate('documents', doc.id, { sceneBlocks: blocks });
  }
  // Ensure at least one block exists so the editor isn't empty
  if(blocks.length === 0){
    blocks = [{
      id: 'blk_init_' + Date.now().toString(36),
      kind: 'drafted',
      sceneId: null,
      manualNumber: null,
      content: '<p data-type="scene-heading">INT. LOCATION - DAY</p>',
      contentAtSync: null,
      lastSyncedAt: null,
    }];
    await fsUpdate('documents', doc.id, { sceneBlocks: blocks, content: flattenBlocksToHtml(blocks) });
  }

  // ── Toolbar ──
  const toolbar = el('div', {class:'editor-topbar', style:'flex-wrap:wrap;gap:6px;'});
  const titleIn = el('input', {class:'editor-title-input', value: doc.title || '', placeholder:'Screenplay title...'});
  titleIn.addEventListener('blur', async () => {
    showSaving();
    await fsUpdate('documents', doc.id, { title: titleIn.value });
    showSaved();
  });
  toolbar.appendChild(titleIn);
  toolbar.appendChild(buildVersionBadge(doc));
  toolbar.appendChild(el('div',{class:'editor-divider'}));

  // Type selector — operates on the currently focused block
  const typeBar = el('div', {class:'screenplay-type-selector'});
  SP_TYPES.forEach(t => {
    const btn = el('button', {class: 'type-btn', onclick: () => {
      if(activeBlockEditor){
        applyTypeToCurrentLine(activeBlockEditor, t);
        currentSpType = t;
        typeBar.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === t));
      }
    }});
    btn.textContent = SP_LABELS[t]; btn.dataset.type = t; btn.dataset.short = SP_SHORT[t]||t.slice(0,3).toUpperCase();
    typeBar.appendChild(btn);
  });
  toolbar.append(typeBar, el('div',{class:'editor-divider'}));

  // 🔗 Link button — wraps selection in a link span pointing at a character,
  // location, scene, or prop. The save callback finds whichever block currently
  // has focus, syncs its content from the live editor DOM (which now contains
  // the new link span), and schedules the doc-level save.
  const v2LinkBtn = addLinkToolbarBtn(toolbar, null, projectId, () => {
    // Find the block that currently contains the selection (savedRange's
    // common ancestor). After restoreSelection + wrapSelectionAsLink the
    // selection has been collapsed by the wrap, so the active block is the
    // last one we tracked focus on.
    if(activeBlock && activeBlockEditor){
      updateBlockContent(activeBlock.id, activeBlockEditor.innerHTML);
    }
  });
  toolbar.appendChild(v2LinkBtn);
  toolbar.appendChild(el('div',{class:'editor-divider'}));

  const backBtn = el('button', {class:'btn btn-ghost btn-sm', onclick: () => {
    removeSuggestions();
    navigate('dashboard', projectId, 'writing');
  }});
  backBtn.textContent = '← Back';
  const exportBtn = el('button', {class:'btn btn-ghost btn-sm', onclick: () => generateWritingDeskPdf(projectId, Object.assign({}, doc, { content: flattenBlocksToHtml(state.blocks) }))});
  exportBtn.textContent = '📄 Export';
  toolbar.append(backBtn, exportBtn);

  if(doc._v1Backup || doc._v1Backup === ''){
    const revertBtn = el('button', {class:'btn btn-ghost btn-sm', title:'Restore the original pre-upgrade version of this script'});
    revertBtn.textContent = '↺ Revert to v1';
    revertBtn.onclick = async () => {
      confirmDelete(
        'Revert to the pre-upgrade version? Any scene-aware changes since the upgrade will be lost.',
        async () => {
          await revertScreenplayToV1(doc);
          toast('Reverted to original format');
          const container = document.getElementById('content');
          if(container) renderEditor(container, projectId, doc.id);
        }
      );
    };
    toolbar.appendChild(revertBtn);
  }

  // Compact mode toggle — far-right end of toolbar, persists via localStorage
  toolbar.appendChild(buildCompactToggle(toolbar));

  view.style.display = 'flex';
  view.style.flexDirection = 'column';
  view.appendChild(toolbar);

  // ── Status bar (built dynamically) ──
  let statusBarEl = null;

  // ── Body wrap: navigator | editor flow ──
  const wrap = el('div', {class:'v2-body-wrap'});
  view.appendChild(wrap);

  let navigatorEl = null;
  let navCollapsed = false;

  // Editor flow container
  const editorHost = el('div', {class:'v2-editor-host'});
  const flowContainer = el('div', {class:'v2-flow'});
  editorHost.appendChild(flowContainer);
  wrap.appendChild(editorHost);

  // ── Pin Workspace ──
  // Right column: pinned-references dock. Cards persist on doc.pinnedRefs.
  // Workspace is destroyed when the user navigates away (handled below).
  const pinCtx = makeStudentPinContext(doc, projectId);
  const pinWorkspace = createPinWorkspace({ host: wrap, ctx: pinCtx });
  // Track the workspace so we can clean it up on navigation
  view._pinWorkspace = pinWorkspace;

  // Footer
  const footer = el('div', {class:'editor-word-count'}, 'Tab cycles line types · Click a scene number to override · ↑↓ between blocks · Sluglines auto-link to Scene Builder');
  view.appendChild(footer);

  // ── Editor state (shared across handlers) ──
  const state = {
    blocks: blocks,
    blockMap: {},     // blockId → live editor element
    saveTimers: {},   // blockId → timeout id
  };
  blocks.forEach(b => { state.blockMap[b.id] = null; });

  // The currently focused block editor (for type-selector, autofill positioning)
  let activeBlockEditor = null;
  let activeBlock = null;

  // ── Save logic ──
  // Save the entire blocks array. Debounced per-doc. Before saving, walk the
  // blocks and auto-create Scene Builder scenes for any block that has a
  // non-empty slugline but no sceneId. This is how scenes written directly in
  // the script become first-class Scene Builder entries.
  let docSaveTimer = null;
  function scheduleDocSave(){
    clearTimeout(docSaveTimer);
    docSaveTimer = setTimeout(async () => {
      showSaving();
      // Auto-link first
      try {
        const result = await autoLinkBlocks(state.blocks, projectId);
        if(result.modified){
          // Block list mutated in place; re-render chrome (navigator/status)
          // to reflect new sceneId links (orphan tag removal).
          rerenderChrome();
        }
      } catch(e){ /* non-fatal */ }
      // Auto-create Location records for any slugline location names that
      // don't already exist in the project's locations collection.
      try {
        await autoAddLocationsFromBlocks(state.blocks, projectId);
      } catch(e){ /* non-fatal */ }
      await fsUpdate('documents', doc.id, {
        sceneBlocks: state.blocks,
        content: flattenBlocksToHtml(state.blocks),
      });
      showSaved();
    }, 600);
  }

  function updateBlockContent(blockId, newHtml){
    const b = state.blocks.find(b => b.id === blockId);
    if(!b) return;
    if(b.content === newHtml) return; // no-op
    b.content = newHtml;
    scheduleDocSave();
    // Refresh the navigator and status bar shortly so the slugline shown in
    // the navigator reflects the current heading text. Debounced so we don't
    // pay the cost on every keystroke — 400ms feels live but isn't expensive.
    scheduleChromeRefresh();
  }

  let chromeRefreshTimer = null;
  function scheduleChromeRefresh(){
    clearTimeout(chromeRefreshTimer);
    chromeRefreshTimer = setTimeout(() => {
      rerenderChrome();
    }, 400);
  }

  // ── Navigator/status bar/cleanup callbacks ──
  function jumpToBlock(block){
    const wrap = flowContainer.querySelector('[data-block-id="'+block.id+'"]');
    if(wrap){
      wrap.scrollIntoView({behavior:'smooth', block:'center'});
      const editor = wrap.querySelector('.v2-block-editor');
      if(editor){
        editor.focus();
        const sel = window.getSelection();
        const r = document.createRange();
        r.selectNodeContents(editor);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);
      }
      // Brief highlight pulse
      wrap.classList.add('highlight-pulse');
      setTimeout(() => wrap.classList.remove('highlight-pulse'), 700);
    }
  }

  function onClickNumber(block, anchor){
    showNumberEditPopover(block, anchor, async (newVal) => {
      const b = state.blocks.find(x => x.id === block.id);
      if(!b) return;
      if(newVal) b.manualNumber = newVal;
      else delete b.manualNumber;
      await fsUpdate('documents', doc.id, { sceneBlocks: state.blocks });
      rerenderFlow();
    });
  }

  async function onLockToggle(){
    const next = (doc.lockState === 'draft' || !doc.lockState) ? 'locked' : 'draft';
    await fsUpdate('documents', doc.id, { lockState: next });
    doc.lockState = next;
    toast(next === 'locked' ? 'Numbering locked' : 'Numbering unlocked');
    rerenderChrome();
  }

  function onNavToggle(){
    navCollapsed = !navCollapsed;
    if(navigatorEl) navigatorEl.classList.toggle('collapsed', navCollapsed);
    rerenderChrome();
  }

  async function onCleanup(){
    const issues = scanScriptIssues(state.blocks);
    showCleanupModal(issues, async (selectedIndices) => {
      state.blocks = state.blocks.filter((b, i) => !selectedIndices.includes(i));
      await fsUpdate('documents', doc.id, {
        sceneBlocks: state.blocks,
        content: flattenBlocksToHtml(state.blocks),
      });
      toast('Removed ' + selectedIndices.length + ' block' + (selectedIndices.length === 1 ? '' : 's'));
      rerenderFlow();
    });
  }

  function onPlaceholderAction(block){
    // Placeholder integration is wired in chunk 3b
    toast('Placeholder integration coming in next chunk');
  }

  // ── Block editor callbacks (per-block) ──
  function onFocusBlock(block, editorEl){
    activeBlock = block;
    activeBlockEditor = editorEl;
    syncTypeFromCursor(editorEl, typeBar);
  }

  function onCursorMove(block, editorEl){
    if(activeBlockEditor !== editorEl){
      activeBlockEditor = editorEl;
      activeBlock = block;
    }
    syncTypeFromCursor(editorEl, typeBar);
    // Trigger autofill suggestions
    const sel = window.getSelection();
    if(!sel.rangeCount) return;
    let node = sel.getRangeAt(0).startContainer;
    while(node && node.parentNode !== editorEl) node = node.parentNode;
    showSuggestions(editorEl, typeBar, node);
  }

  // Split a block at the given paragraph index. Everything from that
  // paragraph onward becomes a new block; everything before stays in the
  // original block. After the split, focus moves into the new block.
  function splitBlockAtParagraph(block, editorEl, paragraphIdx){
    if(block.kind !== 'drafted') return;
    if(paragraphIdx <= 0) return;
    const allParas = Array.from(editorEl.children);
    if(paragraphIdx >= allParas.length) return;
    // Capture cursor position so we can restore it in the new block
    const sel = window.getSelection();
    let cursorOffset = 0;
    let cursorParaIdxInNew = 0;
    if(sel.rangeCount){
      const range = sel.getRangeAt(0);
      let n = range.startContainer;
      while(n && n.parentNode !== editorEl) n = n.parentNode;
      if(n && n !== editorEl){
        const idxInOld = allParas.indexOf(n);
        if(idxInOld >= paragraphIdx){
          cursorParaIdxInNew = idxInOld - paragraphIdx;
          cursorOffset = range.startOffset;
        }
      }
    }
    const beforeContent = allParas.slice(0, paragraphIdx).map(p => p.outerHTML).join('');
    const afterContent = allParas.slice(paragraphIdx).map(p => p.outerHTML).join('');
    const blockIdx = state.blocks.findIndex(b => b.id === block.id);
    if(blockIdx < 0) return;
    const newBlockId = 'blk_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6) + '_split';
    state.blocks[blockIdx].content = beforeContent;
    const newBlock = {
      id: newBlockId,
      kind: 'drafted',
      sceneId: null,
      manualNumber: null,
      content: afterContent,
      contentAtSync: null,
      lastSyncedAt: null,
    };
    state.blocks.splice(blockIdx + 1, 0, newBlock);
    scheduleDocSave();
    rerenderFlow();
    setTimeout(() => {
      const newWrap = flowContainer.querySelector('[data-block-id="'+newBlockId+'"]');
      const newEd = newWrap?.querySelector('.v2-block-editor');
      if(newEd){
        newEd.focus();
        const targetPara = newEd.children[cursorParaIdxInNew];
        if(targetPara){
          const range = document.createRange();
          const sel2 = window.getSelection();
          const textNode = targetPara.firstChild || targetPara;
          if(textNode.nodeType === 3){ // text node
            const max = textNode.length || 0;
            range.setStart(textNode, Math.min(cursorOffset, max));
          } else {
            range.setStart(targetPara, 0);
          }
          range.collapse(true);
          sel2.removeAllRanges();
          sel2.addRange(range);
        }
      }
    }, 30);
  }

  function onBlockKeydown(e, block, editorEl){
    // Suggestion box navigation
    const box = document.getElementById('sp-suggest-box');
    if(box){
      if(e.key === 'ArrowDown'){ e.preventDefault(); moveFocus(1); return; }
      if(e.key === 'ArrowUp'){ e.preventDefault(); moveFocus(-1); return; }
      if(e.key === 'Tab' || e.key === 'Enter'){
        const sel = window.getSelection();
        let node = sel.rangeCount ? sel.getRangeAt(0).startContainer : null;
        while(node && node.parentNode !== editorEl) node = node.parentNode;
        if(acceptFocusedSuggestion(node)){ e.preventDefault(); return; }
      }
      if(e.key === 'Escape'){ removeSuggestions(); return; }
    }
    // Tab cycles line types — read the CURRENT paragraph's type from DOM
    // rather than relying on the global currentSpType, which can drift across
    // block focus changes.
    if(e.key === 'Tab'){
      e.preventDefault();
      const sel = window.getSelection();
      if(!sel.rangeCount) return;
      let node = sel.getRangeAt(0).startContainer;
      while(node && node.parentNode !== editorEl) node = node.parentNode;
      if(!node || node === editorEl) return;
      const currentType = node.dataset?.type || 'action';
      const idx = SP_TYPES.indexOf(currentType);
      const next = e.shiftKey ? SP_TYPES[(idx-1+SP_TYPES.length)%SP_TYPES.length] : SP_TYPES[(idx+1)%SP_TYPES.length];
      // If we're leaving parenthetical type for any other type, strip the parens
      // so they don't pollute the next type.
      if(currentType === 'parenthetical' && next !== 'parenthetical'){
        unwrapParenthetical(node);
      }
      currentSpType = next;
      typeBar.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === next));
      applyTypeToCurrentLine(editorEl, next);
      // If they cycled INTO parenthetical, auto-wrap text in ( )
      if(next === 'parenthetical'){
        autoWrapParenthetical(node);
      }
      // Reconcile the type bar with the actual paragraph type — without this,
      // the toolbar can drift after rerenders or unwrap operations.
      setTimeout(() => syncTypeFromCursor(editorEl, typeBar), 0);
      return;
    }
    // Enter: auto-progress line type, and split the block if the user
    // just finished a slugline that wasn't already at the start of a scene.
    if(e.key === 'Enter'){
      removeSuggestions();
      // BEFORE the browser creates the new paragraph, check what type the
      // current paragraph is and where it sits in the block. We need to
      // capture this here because after Enter the cursor moves to a new line.
      const sel0 = window.getSelection();
      let curPara = null;
      let curParaIdx = -1;
      let curIsSceneHeading = false;
      let curIsParenthetical = false;
      let curHasText = false;
      if(sel0.rangeCount){
        let n = sel0.getRangeAt(0).startContainer;
        while(n && n.parentNode !== editorEl) n = n.parentNode;
        if(n && n !== editorEl){
          curPara = n;
          curParaIdx = Array.from(editorEl.children).indexOf(n);
          curIsSceneHeading = n.dataset?.type === 'scene-heading';
          curIsParenthetical = n.dataset?.type === 'parenthetical';
          curHasText = (n.textContent || '').trim().length > 0;
        }
      }
      // Autocorrect the slugline text before the browser inserts the new
      // paragraph. This way the corrected text is what gets saved and what
      // the autoLinkBlocks/autoAddLocations path will see.
      if(curIsSceneHeading && curPara && curHasText){
        autocorrectSluglineNode(curPara);
      }
      // If we're inside a parenthetical that ends with ) and the cursor is
      // before the closing paren, move the cursor to AFTER the ) before the
      // browser splits the paragraph. Otherwise the closing paren ends up
      // on the next line.
      if(curIsParenthetical && curPara){
        const txt = curPara.textContent || '';
        if(txt.endsWith(')')){
          const range = sel0.getRangeAt(0);
          const tn = curPara.firstChild;
          if(tn && tn.nodeType === 3){
            // Place cursor at end of the text node (past the close paren)
            const newRange = document.createRange();
            newRange.setStart(tn, tn.length);
            newRange.collapse(true);
            sel0.removeAllRanges();
            sel0.addRange(newRange);
          }
        }
      }
      setTimeout(() => {
        // Bug fix: scene-heading must progress to action on Enter.
        // Also: if the new paragraph has no data-type at all (browser default),
        // stamp it explicitly so syncTypeFromCursor can read it.
        if(currentSpType === 'scene-heading') currentSpType = 'action';
        else if(currentSpType === 'character') currentSpType = 'dialogue';
        else if(currentSpType === 'dialogue') currentSpType = 'action';
        else if(currentSpType === 'parenthetical') currentSpType = 'dialogue';
        typeBar.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === currentSpType));
        // Stamp the new (browser-created) paragraph with data-type so it is
        // never left as a typeless node that causes type-bar drift on keyup.
        applyTypeToCurrentLine(editorEl, currentSpType);
        applyContinuedMarkers(editorEl);
        // If the user just pressed Enter while on a non-first scene-heading
        // line that has text, split the block. Otherwise reconcile the type
        // bar with whatever paragraph the cursor ends up in.
        if(curIsSceneHeading && curHasText && curParaIdx > 0 && block.kind === 'drafted'){
          splitBlockAtParagraph(block, editorEl, curParaIdx);
        } else {
          syncTypeFromCursor(editorEl, typeBar);
        }
      }, 0);
    }
    // ArrowUp at start of block → move to previous block's end
    if(e.key === 'ArrowUp'){
      const sel = window.getSelection();
      if(!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      // If at very top of editor, jump to previous block
      if(range.startOffset === 0 && range.startContainer === editorEl.firstChild?.firstChild){
        const idx = state.blocks.findIndex(b => b.id === block.id);
        if(idx > 0){
          const prev = state.blocks[idx-1];
          if(prev.kind !== 'placeholder'){
            e.preventDefault();
            const prevWrap = flowContainer.querySelector('[data-block-id="'+prev.id+'"]');
            const prevEd = prevWrap?.querySelector('.v2-block-editor');
            if(prevEd){
              prevEd.focus();
              const r = document.createRange();
              r.selectNodeContents(prevEd);
              r.collapse(false);
              sel.removeAllRanges();
              sel.addRange(r);
            }
          }
        }
      }
    }
    // ArrowDown at end of block → move to next block's start
    if(e.key === 'ArrowDown'){
      const sel = window.getSelection();
      if(!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const lastChild = editorEl.lastChild;
      if(lastChild && range.endContainer === lastChild.lastChild && range.endOffset === (lastChild.lastChild.length || 0)){
        const idx = state.blocks.findIndex(b => b.id === block.id);
        if(idx < state.blocks.length - 1){
          const nxt = state.blocks[idx+1];
          if(nxt.kind !== 'placeholder'){
            e.preventDefault();
            const nxtWrap = flowContainer.querySelector('[data-block-id="'+nxt.id+'"]');
            const nxtEd = nxtWrap?.querySelector('.v2-block-editor');
            if(nxtEd){
              nxtEd.focus();
              const r = document.createRange();
              r.selectNodeContents(nxtEd);
              r.collapse(true);
              sel.removeAllRanges();
              sel.addRange(r);
            }
          }
        }
      }
    }
  }

  function onBlockChange(blockId, newHtml){
    updateBlockContent(blockId, newHtml);
  }

  // ── Render functions ──
  function rerenderChrome(){
    const totalWords = state.blocks.reduce((sum, b) => sum + getBlockWordCount(b), 0);
    const callbacks = { onLockToggle, onNavToggle, navCollapsed, onCleanup };
    const newStatus = buildV2StatusBar(doc, state.blocks, totalWords, callbacks);
    if(statusBarEl) statusBarEl.replaceWith(newStatus);
    else view.insertBefore(newStatus, wrap);
    statusBarEl = newStatus;

    const newNav = buildV2Navigator(state.blocks, doc, doc.lockState || 'draft', {
      onJump: jumpToBlock,
      onCollapse: onNavToggle,
    });
    if(navigatorEl) navigatorEl.replaceWith(newNav);
    else wrap.insertBefore(newNav, editorHost);
    navigatorEl = newNav;
    if(navCollapsed) navigatorEl.classList.add('collapsed');
  }

  function rerenderFlow(){
    // Mark every existing editor as stale so any pending deferred saves
    // (from input/blur handlers) become no-ops. Without this, a save that
    // was scheduled before a structural mutation (like a block split) would
    // fire after the rerender and clobber the new state.
    flowContainer.querySelectorAll('.v2-block-editor').forEach(ed => { ed._isStale = true; });
    flowContainer.innerHTML = '';
    state.blocks.forEach((b, i) => {
      const blockEl = buildBlockEditor(b, state.blocks, i, doc.lockState || 'draft', projectId, {
        onClickNumber, onPlaceholderAction,
        onFocusBlock, onCursorMove, onBlockKeydown, onBlockChange,
      });
      flowContainer.appendChild(blockEl);
      const innerEditor = blockEl.querySelector('.v2-block-editor');
      if(innerEditor){
        state.blockMap[b.id] = innerEditor;
        setupEditorLinkClicks(innerEditor, projectId);
        // Wire the save callback so the floating selection tooltip can persist
        // a newly-wrapped link span. Closure captures the block id; we read the
        // editor's live innerHTML at save time.
        const blockIdForCallback = b.id;
        innerEditor._linkSaveCallback = () => {
          updateBlockContent(blockIdForCallback, innerEditor.innerHTML);
        };
      }
    });
    rerenderChrome();
  }

  // Initial render
  rerenderFlow();

  // Click outside suggestions to dismiss
  document.addEventListener('mousedown', e => {
    if(!e.target.closest('#sp-suggest-box') && !e.target.closest('.v2-block-editor')){
      removeSuggestions();
    }
  });
}

// Generate a formatted slugline from a scene's location data.
// Falls back to scene title if no location is assigned.
function generateSlugline(scene, locs){
  const loc = locs.find(l => l.id === scene.locationId);
  if(loc){
    const name = (loc.name || 'UNKNOWN').toUpperCase();
    // Try to detect INT/EXT from location type or name
    let prefix = 'INT.';
    const n = name.toLowerCase();
    if(n.includes('ext') || n.includes('outside') || n.includes('street') || n.includes('park') || n.includes('garden') || n.includes('roof') || n.includes('yard')) prefix = 'EXT.';
    return prefix + ' ' + name + ' - DAY';
  }
  // No location — use title as slugline
  return 'INT. ' + (scene.title || 'UNTITLED').toUpperCase() + ' - DAY';
}

// Query all v2 screenplay documents in a project. Returns sorted by updatedAt desc.
async function getV2Screenplays(projectId){
  const docs = await fsQuery('documents', where('storyProjectId','==',projectId));
  return docs
    .filter(d => d.type === 'screenplay' && (d.formatVersion || 'v1') === 'v2')
    .sort((a,b) => {
      const at = a.updatedAt?.toDate ? a.updatedAt.toDate() : new Date(a.updatedAt||0);
      const bt = b.updatedAt?.toDate ? b.updatedAt.toDate() : new Date(b.updatedAt||0);
      return bt - at;
    });
}

// Find the v2 screenplay doc that contains a block linked to the given sceneId.
// Returns the doc (with migrated blocks) or null. Used by the per-scene draft
// editor to determine whether the scene is "linked" (block-backed) or
// "unlinked" (using its own draftContent field).
async function findLinkedScriptDoc(sceneId, projectId){
  const screenplays = await getV2Screenplays(projectId);
  for(const d of screenplays){
    const blocks = migrateV2Blocks(d.sceneBlocks || []);
    if(blocks.some(b => b.sceneId === sceneId)){
      return Object.assign({}, d, { sceneBlocks: blocks });
    }
  }
  return null;
}

// Show a picker when multiple v2 screenplays exist. Returns the chosen doc or null.
function showScriptPicker(screenplays){
  return new Promise(resolve => {
    const overlay = el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay){overlay.remove();resolve(null);}}});
    const drawer = el('div',{class:'drawer'});
    const header = el('div',{class:'drawer-header'});
    header.innerHTML = '<div class="drawer-title">Choose a Script</div>';
    const close = el('button',{class:'btn-icon',onclick:()=>{overlay.remove();resolve(null);}});
    close.textContent = '✕'; header.appendChild(close);
    const body = el('div',{class:'drawer-body'});
    body.innerHTML = '<p style="font-size:13px;color:var(--fg3);margin-bottom:14px;">Which screenplay should this scene be inserted into?</p>';
    screenplays.forEach(d => {
      const item = el('div',{
        class:'doc-item',
        style:'cursor:pointer;padding:14px;margin-bottom:8px;',
        onclick:()=>{overlay.remove();resolve(d);}
      });
      item.innerHTML = '<h3>'+esc(d.title||'Untitled')+'</h3><span class="doc-item-badge badge-screenplay">screenplay</span>';
      body.appendChild(item);
    });
    drawer.append(header, body);
    overlay.appendChild(drawer); document.body.appendChild(overlay);
  });
}

// Build the content for a brand-new script block from a scene. The slugline
// is generated from the scene's location data; the body is the scene's draft
// prose. The block ID is added at the calling site, not here.
//
// If the scene's draftContent happens to start with its own scene-heading
// paragraph(s) (which can happen if the user typed a slugline while drafting,
// or if the scene was originally promoted from a script block), those leading
// headings are stripped to avoid producing a block with multiple stacked
// sluglines.
function buildBlockContentForScene(scene, locs){
  const slug = generateSlugline(scene, locs);
  const heading = '<p data-type="scene-heading">'+esc(slug)+'</p>';
  let body = scene.draftContent || '';
  if(body){
    const tmp = document.createElement('div');
    tmp.innerHTML = body;
    // Drop any leading scene-heading paragraphs from the draft body
    while(tmp.firstChild &&
          tmp.firstChild.getAttribute &&
          tmp.firstChild.getAttribute('data-type') === 'scene-heading'){
      tmp.removeChild(tmp.firstChild);
    }
    body = tmp.innerHTML;
  }
  return heading + body;
}

// Walk a target script's blocks and find the position where this scene should
// be inserted, based on sequenceNumber order vs. the linked scenes already in
// the script. Returns:
//   { kind: 'position', index: N }              — insert at index N
//   { kind: 'conflict', index: N, with: scene } — same sequenceNumber as
//                                                 existing linked scene
async function planInsertPosition(scene, targetBlocks, projectId){
  // Build a lookup: blockIndex → linkedScene (if any) for blocks with sceneIds
  const linkedSceneIds = targetBlocks
    .map((b, i) => ({ block: b, index: i }))
    .filter(({ block }) => block.sceneId);

  // Fetch all linked scenes' sequence numbers in one query
  const allScenes = await fsQuery('scenes', where('storyProjectId','==',projectId));
  const sceneById = {};
  allScenes.forEach(s => { sceneById[s.id] = s; });

  // Build [{ blockIndex, sequenceNumber, scene }] for each linked block
  const positions = linkedSceneIds.map(({ block, index }) => ({
    blockIndex: index,
    sequenceNumber: sceneById[block.sceneId]?.sequenceNumber || null,
    scene: sceneById[block.sceneId],
  })).filter(p => p.sequenceNumber != null);

  const targetSeq = scene.sequenceNumber || 1;

  // Conflict check: any existing position with same sequenceNumber?
  const conflict = positions.find(p => p.sequenceNumber === targetSeq);
  if(conflict){
    return { kind: 'conflict', index: conflict.blockIndex, with: conflict.scene };
  }

  // No conflict — find the position. We insert after the last linked block
  // whose linked-scene sequenceNumber is < ours.
  let insertAt = targetBlocks.length; // default: end
  for(let i = 0; i < positions.length; i++){
    if(positions[i].sequenceNumber > targetSeq){
      insertAt = positions[i].blockIndex;
      break;
    }
  }
  // If we ended up after the last linked block but there are unlinked
  // (orphan) blocks AFTER it, we want to insert AFTER those orphans too —
  // putting our scene at the natural end. Already handled by default-to-end.

  return { kind: 'position', index: insertAt };
}

// Show a small modal asking how to resolve a sequence-number conflict.
// Returns 'before' | 'end' | null (cancelled).
function showConflictResolutionModal(scene, conflictingScene, scriptTitle){
  return new Promise(resolve => {
    const overlay = el('div',{class:'v2-conflict-overlay',onclick:e=>{if(e.target===overlay){overlay.remove();resolve(null);}}});
    const modal = el('div',{class:'v2-conflict-modal',style:'max-width:540px;'});
    const header = el('div',{class:'v2-conflict-header'});
    const h = el('h3'); h.textContent = 'Scene number conflict';
    const closeBtn = el('button',{class:'btn-icon',onclick:()=>{overlay.remove();resolve(null);}});
    closeBtn.textContent = '✕';
    header.append(h, closeBtn);

    const body = el('div',{style:'padding:24px;font-size:13px;color:var(--fg2);line-height:1.55;'});
    body.innerHTML =
      '<p style="margin:0 0 14px;">"<strong>'+esc(scriptTitle)+'</strong>" already has a scene at position <strong>#'+(scene.sequenceNumber||1)+'</strong> ('+esc(conflictingScene.title || 'Untitled')+').</p>' +
      '<p style="margin:0 0 18px;color:var(--fg3);font-size:12px;">Where should "'+esc(scene.title || 'Untitled')+'" go?</p>';

    const actions = el('div',{style:'display:flex;flex-direction:column;gap:8px;'});

    const beforeBtn = el('button',{class:'btn btn-ghost',style:'justify-content:flex-start;text-align:left;padding:12px 14px;height:auto;'});
    beforeBtn.innerHTML = '<div style="font-weight:600;color:var(--fg);margin-bottom:3px;">Insert before scene #'+(scene.sequenceNumber||1)+'</div><div style="font-size:11px;color:var(--fg3);">Place this scene at position #'+(scene.sequenceNumber||1)+'. Existing scene moves down in script order. Sequence numbers stay as-is — you can renumber later.</div>';
    beforeBtn.onclick = () => { overlay.remove(); resolve('before'); };

    const endBtn = el('button',{class:'btn btn-ghost',style:'justify-content:flex-start;text-align:left;padding:12px 14px;height:auto;'});
    endBtn.innerHTML = '<div style="font-weight:600;color:var(--fg);margin-bottom:3px;">Append to end of script</div><div style="font-size:11px;color:var(--fg3);">Add this scene after all existing scenes, regardless of its sequence number.</div>';
    endBtn.onclick = () => { overlay.remove(); resolve('end'); };

    actions.append(beforeBtn, endBtn);
    body.appendChild(actions);

    const footer = el('div',{class:'v2-conflict-footer'});
    const cancelBtn = el('button',{class:'btn btn-ghost',onclick:()=>{overlay.remove();resolve(null);}});
    cancelBtn.textContent = 'Cancel';
    footer.appendChild(cancelBtn);

    modal.append(header, body, footer);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  });
}

// Main insert flow. Handles target-script selection, position planning,
// conflict resolution, and the actual block insertion. Designed against the
// new block-based v2 architecture: no parsing, no fuzzy matching, no conflict
// detection on subsequent edits — the inserted block IS the storage from now
// on, with two-way sync via the per-scene editor.
async function insertSceneIntoScript(scene, projectId, locs){
  // 1. Save check
  if(!scene.draftContent || !scene.draftContent.trim()){
    toast('Write some scene content before inserting into a script', 'error');
    return null;
  }

  // 2. Find v2 screenplays
  const screenplays = await getV2Screenplays(projectId);
  if(screenplays.length === 0){
    toast('No scene-aware screenplays found. Create or upgrade a screenplay first.', 'error');
    return null;
  }

  // 3. Pick the target script
  let targetDoc;
  if(screenplays.length === 1) targetDoc = screenplays[0];
  else targetDoc = await showScriptPicker(screenplays);
  if(!targetDoc) return null;

  // Re-fetch fresh — never trust possibly-stale state from getV2Screenplays
  const freshDoc = await fsGet('documents', targetDoc.id);
  let blocks = migrateV2Blocks(freshDoc.sceneBlocks || []);

  // 4. Defensive check: is this scene ALREADY in this script? Shouldn't
  // happen via normal flow (the Insert button is hidden for linked scenes),
  // but guard against the edge case.
  if(blocks.some(b => b.sceneId === scene.id)){
    toast('"'+(scene.title||'This scene')+'" is already in '+(targetDoc.title||'this script'));
    return targetDoc.id;
  }

  // 5. Plan the insertion position
  const plan = await planInsertPosition(scene, blocks, projectId);

  let insertAt;
  if(plan.kind === 'conflict'){
    const choice = await showConflictResolutionModal(scene, plan.with, targetDoc.title || 'Untitled');
    if(!choice) return null; // user cancelled
    if(choice === 'end'){
      insertAt = blocks.length;
    } else { // 'before'
      insertAt = plan.index;
    }
  } else {
    insertAt = plan.index;
  }

  // 6. Build the new block. We stamp manualNumber with the scene's
  // sequenceNumber so the gutter chip in the script shows the intended scene
  // number (e.g., "99") rather than the block's positional index. Users can
  // still edit it via the gutter popover later.
  const newBlock = {
    id: 'blk_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6) + '_ins',
    kind: 'drafted',
    sceneId: scene.id,
    manualNumber: scene.sequenceNumber ? String(scene.sequenceNumber) : null,
    content: buildBlockContentForScene(scene, locs),
    contentAtSync: null,
    lastSyncedAt: new Date().toISOString(),
  };

  // 7. Splice and save
  blocks.splice(insertAt, 0, newBlock);
  const newContent = flattenBlocksToHtml(blocks);
  showSaving();
  await fsUpdate('documents', targetDoc.id, {
    sceneBlocks: blocks,
    content: newContent,
  });
  showSaved();

  // 8. Toast with link to script
  const t = toast('Scene "'+(scene.title||'Untitled')+'" inserted into "'+(targetDoc.title||'Untitled')+'"');
  // The toast helper doesn't currently support clickable actions, so we
  // settle for the message. (Future enhancement: add a link.)

  return targetDoc.id;
}


function renderScreenplayEditor(view, doc, projectId) {
  // For v2 docs, hand off to the dedicated block-based renderer.
  // The v1 path below stays intact for legacy documents.
  if(getFormatVersion(doc) === 'v2'){
    renderV2ScreenplayEditor(view, doc, projectId);
    return;
  }

  // Pre-load character/location names for autofill AND link cache
  loadAutofillNames(projectId);
  loadLinkCache(projectId);

  const toolbar=el('div',{class:'editor-topbar',style:'flex-wrap:wrap;gap:6px;'});
  const titleIn=el('input',{class:'editor-title-input',value:doc.title||'',placeholder:'Screenplay title...'});
  titleIn.addEventListener('blur',async()=>{ showSaving(); await fsUpdate('documents',doc.id,{title:titleIn.value}); showSaved(); });
  toolbar.appendChild(titleIn);
  // Version badge (v2 only) — small visual indicator that this script is scene-aware
  const verBadge = buildVersionBadge(doc);
  if(verBadge) toolbar.appendChild(verBadge);
  toolbar.appendChild(el('div',{class:'editor-divider'}));
  const typeBar=el('div',{class:'screenplay-type-selector'});
  SP_TYPES.forEach(t=>{
    const btn=el('button',{class:'type-btn'+(t===currentSpType?' active':''),onclick:()=>setSpType(t,typeBar)});
    btn.textContent=SP_LABELS[t]; btn.dataset.type=t; btn.dataset.short=SP_SHORT[t]||t.slice(0,3).toUpperCase(); typeBar.appendChild(btn);
  });
  toolbar.append(typeBar,el('div',{class:'editor-divider'}));
  const backBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{removeSuggestions();navigate('dashboard',projectId,'writing');}}); backBtn.textContent='← Back';
  const exportSpBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateWritingDeskPdf(projectId,doc)});exportSpBtn.textContent='📄 Export';
  toolbar.appendChild(backBtn);
  toolbar.appendChild(exportSpBtn);
  // Revert option for v2 docs that have a v1 backup
  if(getFormatVersion(doc)==='v2' && (doc._v1Backup || doc._v1Backup==='')){
    const revertBtn = el('button',{class:'btn btn-ghost btn-sm',title:'Restore the original pre-upgrade version of this script'});
    revertBtn.textContent = '↺ Revert to v1';
    revertBtn.onclick = async () => {
      confirmDelete(
        'Revert to the pre-upgrade version? Any scene-aware changes since the upgrade will be lost. (The current text is still safe via your browser undo if needed.)',
        async () => {
          await revertScreenplayToV1(doc);
          toast('Reverted to original format');
          // Re-render the editor with the restored doc
          const container = document.getElementById('content');
          if(container) renderEditor(container, projectId, doc.id);
        }
      );
    };
    toolbar.appendChild(revertBtn);
  }
  // Upgrade banner for v1 docs (placed in a header strip above the editor body)
  let upgradeBanner = null;
  if(getFormatVersion(doc)==='v1'){
    upgradeBanner = buildV1UpgradeBanner(doc, projectId, () => {
      // Re-render the editor after upgrade so v2 chrome appears immediately
      const container = document.getElementById('content');
      if(container) renderEditor(container, projectId, doc.id);
    });
  }
  const body=el('div',{class:'screenplay-body'});
  const page=el('div',{class:'screenplay-page'});
  const editor=el('div',{class:'screenplay-content',contenteditable:'true'});
  editor.style.position='relative';
  editor.innerHTML=doc.content||'<p data-type="scene-heading">INT. LOCATION - DAY</p>';
  // For v2 docs, strip ALL data-block-id attributes from the live DOM on load.
  // This forces the first scanEditorHeadings call to reassign IDs from the
  // (deduped) editor._lastSavedBlocks via positional matching, guaranteeing
  // uniqueness. Without this, old docs with duplicate IDs baked into doc.content
  // would poison every subsequent parse with the same duplicates.
  if(getFormatVersion(doc)==='v2'){
    Array.from(editor.querySelectorAll('[data-block-id]')).forEach(p => p.removeAttribute('data-block-id'));
  }
  editor._docId = doc.id; // needed by link toolbar save
  // Add link button now that editor is defined
  const linkToolbarBtn = addLinkToolbarBtn(toolbar, editor, projectId);
  toolbar.appendChild(linkToolbarBtn);
  // Compact mode toggle — far-right, persists via localStorage
  toolbar.appendChild(buildCompactToggle(toolbar));

  editor.addEventListener('keydown',e=>{
    // Handle suggestion navigation
    const box = document.getElementById('sp-suggest-box');
    if (box) {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); return; }
      if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); return; }
      if (e.key === 'Tab' || e.key === 'Enter') {
        // Try to accept suggestion first
        const sel = window.getSelection();
        let node = sel.rangeCount ? sel.getRangeAt(0).startContainer : null;
        while (node && node.parentNode !== editor) node = node.parentNode;
        if (acceptFocusedSuggestion(node)) { e.preventDefault(); return; }
      }
      if (e.key === 'Escape') { removeSuggestions(); return; }
    }

    if (e.key === 'Tab') {
      e.preventDefault();
      const idx=SP_TYPES.indexOf(currentSpType);
      const next=e.shiftKey?SP_TYPES[(idx-1+SP_TYPES.length)%SP_TYPES.length]:SP_TYPES[(idx+1)%SP_TYPES.length];
      setSpType(next,typeBar); applyTypeToCurrentLine(editor,next);
    }
    if (e.key === 'Enter') {
      removeSuggestions();
      setTimeout(()=>{
        if(currentSpType==='character') setSpType('dialogue',typeBar);
        else if(currentSpType==='dialogue') setSpType('action',typeBar);
        else if(currentSpType==='parenthetical') setSpType('dialogue',typeBar);
        applyTypeToCurrentLine(editor,currentSpType);
        applyContinuedMarkers(editor);
      },0);
    }
  });

  editor.addEventListener('keyup', e => {
    if (['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) {
      removeSuggestions();
      syncTypeFromCursor(editor, typeBar);
      return;
    }
    syncTypeFromCursor(editor, typeBar);
    // Show suggestions for current line
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    let node = sel.getRangeAt(0).startContainer;
    while (node && node.parentNode !== editor) node = node.parentNode;
    showSuggestions(editor, typeBar, node);
  });

  editor.addEventListener('mouseup', () => { removeSuggestions(); syncTypeFromCursor(editor, typeBar); });
  editor.addEventListener('input', () => {
    applyContinuedMarkers(editor);
    clearTimeout(editorSaveTimer);
    editorSaveTimer = setTimeout(async()=>{
      showSaving();
      await fsUpdate('documents',doc.id, { content: editor.innerHTML });
      showSaved();
    }, 1000);
  });
  // Autocorrect all scene-headings and flush a save immediately on blur so
  // corrected content is persisted even if the debounced save hasn't fired.
  editor.addEventListener('blur', () => {
    let corrected = false;
    Array.from(editor.children).forEach(p => { if(autocorrectSluglineNode(p)) corrected = true; });
    if(corrected){
      clearTimeout(editorSaveTimer);
      fsUpdate('documents', doc.id, { content: editor.innerHTML });
    }
  });
  // Close suggestions if clicking outside
  document.addEventListener('mousedown', e => {
    if (!e.target.closest('#sp-suggest-box') && !e.target.closest('.screenplay-content')) {
      removeSuggestions();
    }
  });

  page.appendChild(editor); body.appendChild(page);
  const wc=el('div',{class:'editor-word-count'},'Tab cycles line types · I/E + Tab autofills INT./EXT. · ↑↓ navigate suggestions');
  // Assemble: toolbar, optional upgrade banner (v1 only), body+dock, word count
  view.append(toolbar);
  if(upgradeBanner) view.appendChild(upgradeBanner);
  // Wrap body in horizontal flex so the pin dock can sit beside it
  const bodyWrap = el('div',{style:'flex:1;display:flex;overflow:hidden;'});
  bodyWrap.appendChild(body);
  const pinCtx = makeStudentPinContext(doc, projectId);
  const pinWorkspace = createPinWorkspace({ host: bodyWrap, ctx: pinCtx });
  view._pinWorkspace = pinWorkspace;
  view.append(bodyWrap, wc);
  if(!doc.content) applyTypeToCurrentLine(editor,'scene-heading');
  else setTimeout(()=>applyContinuedMarkers(editor), 50);
  setupEditorLinkClicks(editor, projectId);
}

function setSpType(type,typeBar){currentSpType=type;typeBar.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));}

// Auto-wrap a parenthetical paragraph's text in ( ) if not already wrapped.
// Called when the user cycles a line into parenthetical type. Places cursor
// just before the closing paren so typing fills in the parenthetical.
function autoWrapParenthetical(paragraphNode){
  if(!paragraphNode) return;
  const txt = (paragraphNode.textContent || '');
  const trimmed = txt.trim();
  if(!trimmed){
    paragraphNode.textContent = '()';
    const sel = window.getSelection();
    const r = document.createRange();
    r.setStart(paragraphNode.firstChild, 1);
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
    return;
  }
  // Already wrapped?
  if(trimmed.startsWith('(') && trimmed.endsWith(')')) return;
  paragraphNode.textContent = '(' + trimmed + ')';
  // Place cursor just before the closing paren
  const sel = window.getSelection();
  const r = document.createRange();
  const txtNode = paragraphNode.firstChild;
  if(txtNode){
    r.setStart(txtNode, txtNode.length - 1);
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
  }
}

// Strip surrounding ( ) from a paragraph's text. Called when cycling OUT of
// parenthetical to any other line type, so the parens don't end up stuck on
// (e.g.) a slugline that the user cycled past parenthetical to reach.
function unwrapParenthetical(paragraphNode){
  if(!paragraphNode) return;
  const txt = (paragraphNode.textContent || '').trim();
  if(txt.startsWith('(') && txt.endsWith(')') && txt.length >= 2){
    const inner = txt.slice(1, -1);
    paragraphNode.textContent = inner;
    const sel = window.getSelection();
    const r = document.createRange();
    const tn = paragraphNode.firstChild;
    if(tn){
      r.setStart(tn, tn.length);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }
  }
}

function applyTypeToCurrentLine(editor,type){
  const sel=window.getSelection();if(!sel.rangeCount)return;
  let node=sel.getRangeAt(0).startContainer;
  while(node&&node.parentNode!==editor)node=node.parentNode;
  if(node&&node!==editor){node.dataset.type=type;}
  else{
    const p=document.createElement('p');p.dataset.type=type;editor.appendChild(p);
    const r=document.createRange();r.setStart(p,0);r.collapse(true);
    sel.removeAllRanges();sel.addRange(r);
  }
  // After setting type, refresh CONT'D markers
  setTimeout(()=>applyContinuedMarkers(editor),0);
}

function syncTypeFromCursor(editor,typeBar){
  const sel=window.getSelection();if(!sel.rangeCount)return;
  let node=sel.getRangeAt(0).startContainer;
  while(node&&node.parentNode!==editor)node=node.parentNode;
  if(node&&node.dataset&&node.dataset.type)setSpType(node.dataset.type,typeBar);
}

// ── CONT'D logic ──
// Rule: if a character line's name matches the most recent previous character
// line name (regardless of intervening action/dialogue/parenthetical lines),
// append (CONT'D) to the second occurrence.
function getCharName(node){
  // Strip existing (CONT'D) suffix to get the base name
  return (node.textContent||'').replace(/\s*\(CONT'D\)\s*$/i,'').trim().toUpperCase();
}

function applyContinuedMarkers(editor){
  const lines = Array.from(editor.children);
  let lastCharName = null;

  // Helper: was the cursor inside this node before we rewrite it? Returns the
  // cursor's offset within the node's text, or null if cursor wasn't in this
  // node. After rewrite we use the offset to place cursor in the NEW text node.
  function captureCursorOffsetInNode(node){
    const sel = window.getSelection();
    if(!sel.rangeCount) return null;
    const r = sel.getRangeAt(0);
    if(!node.contains(r.startContainer)) return null;
    // Compute offset by walking text nodes up to startContainer
    let offset = 0;
    let found = false;
    function walk(n){
      if(found) return;
      if(n === r.startContainer){
        offset += r.startOffset;
        found = true;
        return;
      }
      if(n.nodeType === 3){ // text
        offset += n.textContent.length;
      } else {
        for(const c of n.childNodes){
          walk(c);
          if(found) return;
        }
      }
    }
    walk(node);
    return found ? offset : null;
  }

  function placeCursorAtOffset(node, offset){
    const tn = node.firstChild;
    if(!tn || tn.nodeType !== 3) return;
    const max = tn.textContent.length;
    const sel = window.getSelection();
    const r = document.createRange();
    r.setStart(tn, Math.min(offset, max));
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
  }

  lines.forEach(node=>{
    const type = node.dataset && node.dataset.type;

    if(type === 'character'){
      const baseName = getCharName(node);
      if(!baseName) return;

      const hasContinued = /\(CONT'D\)$/i.test(node.textContent.trim());

      if(lastCharName && baseName === lastCharName){
        // Same character — add CONT'D if not already present
        if(!hasContinued){
          // Capture cursor offset (if cursor is in this node) so we can
          // restore it correctly to the new text node after rewrite.
          const cursorOffset = captureCursorOffsetInNode(node);
          const newText = baseName + " (CONT'D)";
          node.textContent = newText;
          // If the cursor was at or past the end of the base name (the user
          // just finished typing it), place it at the end of the full new
          // string. Otherwise preserve their position within the base name.
          if(cursorOffset !== null){
            const targetOffset = cursorOffset >= baseName.length ? newText.length : cursorOffset;
            placeCursorAtOffset(node, targetOffset);
          }
        }
        // Keep lastCharName as-is (same char continues)
      } else {
        // Different character — remove CONT'D if present
        if(hasContinued){
          const cursorOffset = captureCursorOffsetInNode(node);
          node.textContent = baseName;
          if(cursorOffset !== null){
            // Preserve cursor position, clamped to the new shorter text
            placeCursorAtOffset(node, Math.min(cursorOffset, baseName.length));
          }
        }
        lastCharName = baseName;
      }
    }
    // Non-character lines don't reset lastCharName —
    // CONT'D fires whenever the same character appears again, regardless of intervening lines
  });
}

function buildScreenplayPdf(project,doc){
  const rawHtml=doc.content||'';
  const parser=new DOMParser();
  const parsed=parser.parseFromString('<div>'+rawHtml+'</div>','text/html');
  const nodes=parsed.querySelector('div').children;
  let body='';
  Array.from(nodes).forEach(node=>{
    const type=node.dataset&&node.dataset.type;
    const text=node.textContent||'';
    if(!text.trim()&&type!=='scene-heading')return;
    switch(type){
      case 'scene-heading': body+=`<p style="text-transform:uppercase;font-weight:bold;margin:1.5em 0 0.5em;">${escHtml(text.toUpperCase())}</p>`; break;
      case 'action':        body+=`<p style="margin:0 0 1em;">${escHtml(text)}</p>`; break;
      case 'character':     body+=`<p style="margin:1em 0 0;margin-left:200px;text-transform:uppercase;">${escHtml(text)}</p>`; break;
      case 'dialogue':      body+=`<p style="margin:0 100px 0.5em 120px;">${escHtml(text)}</p>`; break;
      case 'parenthetical': body+=`<p style="margin:0 160px 0.25em 150px;font-style:italic;">${escHtml(text)}</p>`; break;
      case 'transition':    body+=`<p style="text-align:right;text-transform:uppercase;margin:1em 0;font-weight:bold;">${escHtml(text)}</p>`; break;
      default:              body+=`<p style="margin:0 0 0.5em;">${escHtml(text)}</p>`;
    }
  });
  const tp=doc.titlePage||{};
  const titlePage=`<div style="min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;page-break-after:always;text-align:center;"><div style="margin-bottom:60px;"><div style="font-size:22px;font-weight:bold;text-transform:uppercase;margin-bottom:12px;">${escHtml(tp.title||doc.title||'Untitled')}</div>${tp.writtenBy?`<div style="margin-top:20px;font-size:14px;">Written by</div><div style="font-size:16px;font-weight:bold;">${escHtml(tp.writtenBy)}</div>`:''}${tp.basedOn?`<div style="margin-top:16px;font-size:13px;color:#555;">${escHtml(tp.basedOn)}</div>`:''}</div>${tp.contact?`<div style="margin-top:40px;font-size:12px;color:#555;text-align:left;">${escHtml(tp.contact)}</div>`:''}</div>`;
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:white;color:#111;font-family:'Courier New',Courier,monospace;font-size:12pt;line-height:1.7;}.sp-page{max-width:680px;margin:0 auto;padding:72px 72px 72px 96px;}@media print{.sp-page{padding:1in 1in 1in 1.5in;}}</style></head><body><div class="sp-page">${titlePage}${body}</div></body></html>`;
}

function buildNarrativePdf(project,doc){
  let rawHtml=doc.content||'<p>Empty document.</p>';
  // Strip link-chip wrapping spans for clean PDF output. The text content of
  // the link is preserved; only the colored chip styling and the leading icon
  // are removed. Operates on the HTML string to avoid mutating the live DOM.
  try {
    const tmp = document.createElement('div');
    tmp.innerHTML = rawHtml;
    tmp.querySelectorAll('.link-btn').forEach(span => {
      // The first child is the icon (◉/⬡/◧/◇ + space) — drop it
      if(span.firstChild && span.firstChild.nodeType === 3){
        const t = span.firstChild.textContent || '';
        // Trim the leading icon glyph plus its trailing space (matches getLinkIcon output)
        span.firstChild.textContent = t.replace(/^[◉⬡◧◇]\s*/, '');
      }
      // Replace the span with its inner contents
      const parent = span.parentNode;
      while(span.firstChild) parent.insertBefore(span.firstChild, span);
      parent.removeChild(span);
    });
    rawHtml = tmp.innerHTML;
  } catch(e){ /* non-fatal — fall through with original HTML */ }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">${pdfBaseStyles()}<style>.narrative-body{max-width:640px;margin:0 auto;font-size:14px;line-height:1.9;}.narrative-body h1,.narrative-body h2,.narrative-body h3{font-family:'Belleza',serif;color:#2d6a4f;margin:1.4em 0 0.5em;}.narrative-body p{margin-bottom:0.8em;}.narrative-body ul,.narrative-body ol{padding-left:1.6em;margin-bottom:0.8em;}</style></head><body><div class="pdf-page">${pdfHeader(project.name,escHtml(doc.title||'Untitled'),'Narrative document')}<div class="narrative-body">${rawHtml}</div>${pdfFooter(project.name)}</div></body></html>`;
}

function showPdfOverlay(title,htmlContent,onDownload){
  const existing=document.getElementById('pdf-overlay-wrap');
  if(existing)existing.remove();
  const overlay=document.createElement('div');overlay.className='pdf-overlay';overlay.id='pdf-overlay-wrap';
  const frame=document.createElement('div');frame.className='pdf-frame';
  const topbar=document.createElement('div');topbar.className='pdf-frame-topbar';
  topbar.innerHTML=`<div class="pdf-frame-title">${escHtml(title)}</div>`;
  const actions=document.createElement('div');actions.className='pdf-frame-actions';
  const dlBtn=document.createElement('button');dlBtn.className='btn btn-primary btn-sm';dlBtn.textContent='⬇ Download PDF';dlBtn.onclick=onDownload;
  const closeBtn=document.createElement('button');closeBtn.className='btn btn-ghost btn-sm';closeBtn.style.cssText='background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:white;';closeBtn.textContent='✕ Close';closeBtn.onclick=()=>overlay.remove();
  actions.append(dlBtn,closeBtn);topbar.appendChild(actions);
  const body=document.createElement('div');body.className='pdf-frame-body';
  const iframe=document.createElement('iframe');iframe.style.cssText='width:100%;height:100%;min-height:70vh;border:none;background:white;';iframe.srcdoc=htmlContent;
  body.appendChild(iframe);frame.append(topbar,body);overlay.appendChild(frame);document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function downloadPdf(htmlContent,filename){
  const win=window.open('','_blank');
  if(!win){toast('Please allow popups to download PDF','error');return;}
  win.document.write(htmlContent);win.document.close();
  win.onload=()=>setTimeout(()=>win.print(),300);
}

async function hashData(data){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(JSON.stringify(data)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

const DOC_TYPES={
  'project':{label:'Full Project PDF',icon:'◈'},
  'characters':{label:'Characters',icon:'◉'},
  'locations':{label:'Locations',icon:'⬡'},
  'scenes':{label:'Scenes',icon:'◧'},
  'world':{label:'World Building',icon:'◎'},
  'outline':{label:'Outline',icon:'≡'},
  'screenplay':{label:'Screenplay',icon:'✦'},
  'narrative':{label:'Narrative Document',icon:'✦'},
};


async function generateAndStorePdf(docType,projectId,project,sourceId,sourceTitle,htmlContent,dataSnapshot){
  // dataSnapshot is a compact JSON of the source data — stored instead of HTML
  const snapshotStr = dataSnapshot ? JSON.stringify(dataSnapshot) : htmlContent;
  const contentHash = await hashData(snapshotStr);

  const existing = await fsQuery('generatedDocs',where('storyProjectId','==',projectId));
  const matching = existing.filter(d=>d.docType===docType&&(d.sourceId||'')===(sourceId||''));
  matching.sort((a,b)=>b.version-a.version);

  if(matching.length>0 && matching[0].contentHash===contentHash){
    toast('No changes since last version — showing existing document');
    const html = matching[0].dataSnapshot
      ? await rehydratePdf(matching[0].docType, JSON.parse(matching[0].dataSnapshot), matching[0].sourceTitle, projectId)
      : matching[0].htmlContent||'';
    showPdfOverlay(sourceTitle||DOC_TYPES[docType]?.label||docType, html,
      ()=>downloadPdf(html, sanitizeFilename(sourceTitle||docType)+'.pdf'));
    return;
  }

  const newVersion = matching.length>0 ? matching[0].version+1 : 1;
  showSaving();

  // Store only the compact snapshot — never the full HTML
  const docData = {
    storyProjectId:projectId,
    docType, sourceId:sourceId||'', sourceTitle:sourceTitle||DOC_TYPES[docType]?.label||docType,
    version:newVersion, contentHash,
    dataSnapshot: dataSnapshot ? JSON.stringify(dataSnapshot) : null,
    // Fallback for writing desk docs which use raw HTML content
    htmlContent: dataSnapshot ? null : htmlContent,
  };

  await fsCreate('generatedDocs', docData);
  showSaved();
  toast('Version '+newVersion+' saved to Document Library');
  showPdfOverlay(sourceTitle||DOC_TYPES[docType]?.label||docType, htmlContent,
    ()=>downloadPdf(htmlContent, sanitizeFilename(sourceTitle||docType)+'.pdf'));
}

// Regenerate HTML from a stored snapshot
async function rehydratePdf(docType, snapshot, sourceTitle, projectId){
  const project = snapshot.project || await fsGet('projects',projectId);
  switch(docType){
    case 'characters':  return buildCharactersPdf(project, snapshot.chars||[]);
    case 'locations':   return buildLocationsPdf(project, snapshot.locs||[]);
    case 'scenes':      return buildScenesPdf(project, snapshot.scenes||[], snapshot.chars||[], snapshot.locs||[]);
    case 'world':       return buildWorldPdf(project, snapshot.world||{});
    case 'outline':     return buildOutlinePdf(project, snapshot.items||[], sourceTitle||'Outline');
    case 'project':     return buildProjectPdf(project, snapshot.chars||[], snapshot.locs||[], snapshot.scenes||[], snapshot.world||{}, snapshot.outlineItems||[], snapshot.outlineName||'Outline');
    default:            return snapshot.htmlContent||'';
  }
}

    fsQuery('worlds',where('storyProjectId','==',projectId)),
