// Updated renderDocumentLibrary to use rehydration
async function renderDocumentLibrary(container,projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const[project,generatedDocs]=await Promise.all([fsGet('projects',projectId),fsQuery('generatedDocs',where('storyProjectId','==',projectId))]);
  generatedDocs.sort((a,b)=>{
    const at=a.updatedAt?.toDate?a.updatedAt.toDate():new Date(a.updatedAt||0);
    const bt=b.updatedAt?.toDate?b.updatedAt.toDate():new Date(b.updatedAt||0);
    return bt-at;
  });
  container.innerHTML='';
  const wrap=el('div',{class:'page'});
  const header=el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Document Library</div><div class="page-subtitle">Generated PDFs. New versions are only saved when data has changed.</div></div>';
  const exportBtn=el('button',{class:'btn btn-primary',onclick:()=>generateFullProjectPdf(projectId,project)});
  exportBtn.textContent='◈ Export Full Project';
  header.appendChild(exportBtn);
  wrap.appendChild(header);
  const _hintLib=toolHintBanner('library'); if(_hintLib) wrap.appendChild(_hintLib);
  if(!generatedDocs.length){
    wrap.appendChild(emptyState('📁','No Documents Yet','Generate PDFs from any tool page, or click Export Full Project above.'));
  } else {
    const groups={};
    generatedDocs.forEach(d=>{
      const key=d.docType+'|'+(d.sourceId||'');
      if(!groups[key])groups[key]={docType:d.docType,sourceId:d.sourceId,sourceTitle:d.sourceTitle,versions:[]};
      groups[key].versions.push(d);
    });
    const list=el('div',{class:'doclibrary-list'});
    Object.values(groups).forEach(group=>{
      group.versions.sort((a,b)=>b.version-a.version);
      const latest=group.versions[0];
      const typeInfo=DOC_TYPES[group.docType]||{label:group.docType,icon:'◈'};
      const item=el('div',{class:'doclibrary-item'});
      const itemHeader=el('div',{class:'doclibrary-item-header'});
      const titleBlock=el('div');
      titleBlock.innerHTML=`<div class="doclibrary-item-title">${typeInfo.icon} ${escHtml(group.sourceTitle||typeInfo.label)}</div><div class="doclibrary-item-meta">${group.versions.length} version${group.versions.length!==1?'s':''} · Latest: ${relativeTime(latest.updatedAt)}</div>`;
      const actions=el('div',{style:'display:flex;gap:6px;flex-shrink:0;'});
      const previewBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:async()=>{
        const html=await rehydratePdf(latest.docType,latest.dataSnapshot?JSON.parse(latest.dataSnapshot):{htmlContent:latest.htmlContent},latest.sourceTitle,projectId);
        showPdfOverlay(group.sourceTitle||typeInfo.label,html,()=>downloadPdf(html,sanitizeFilename(group.sourceTitle||group.docType)+'.pdf'));
      }});previewBtn.textContent='👁 Preview';
      const dlBtn=el('button',{class:'btn btn-primary btn-sm',onclick:async()=>{
        const html=await rehydratePdf(latest.docType,latest.dataSnapshot?JSON.parse(latest.dataSnapshot):{htmlContent:latest.htmlContent},latest.sourceTitle,projectId);
        downloadPdf(html,sanitizeFilename(group.sourceTitle||group.docType)+'.pdf');
      }});dlBtn.textContent='⬇ Download';
      actions.append(previewBtn,dlBtn);itemHeader.append(titleBlock,actions);item.appendChild(itemHeader);
      if(group.versions.length>1){
        const versions=el('div',{class:'doclibrary-versions'});
        group.versions.forEach((ver,i)=>{
          const vrow=el('div',{class:'doclibrary-version'});
          const vlabel=el('div',{class:'doclibrary-version-label'});
          const badge=el('span',{class:'version-badge'+(i===0?' version-current':'')});badge.textContent='v'+ver.version;
          vlabel.append(badge,document.createTextNode(' '+relativeTime(ver.updatedAt)));
          const vdl=el('button',{class:'btn btn-ghost btn-sm',onclick:async()=>{
            const html=await rehydratePdf(ver.docType,ver.dataSnapshot?JSON.parse(ver.dataSnapshot):{htmlContent:ver.htmlContent},ver.sourceTitle,projectId);
            downloadPdf(html,sanitizeFilename(group.sourceTitle||group.docType)+'-v'+ver.version+'.pdf');
          }});vdl.textContent='⬇';vrow.append(vlabel,vdl);versions.appendChild(vrow);
        });
        item.appendChild(versions);
      }
      list.appendChild(item);
    });
    wrap.appendChild(list);
  }
  container.appendChild(wrap);
}

async function renderProps(container,projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const props=await fsQuery('props',where('storyProjectId','==',projectId));
  container.innerHTML='';
  const wrap=el('div',{class:'page'});
  const header=el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Props</div><div class="page-subtitle">'+props.length+' prop'+(props.length!==1?'s':'')+' · Linkable from the screenplay and outline editors</div></div>';
  const addBtn=el('button',{class:'btn btn-primary',onclick:()=>openPropDrawer(null,projectId)});addBtn.textContent='+ Add Prop';
  header.appendChild(addBtn);wrap.appendChild(header);
  const _hintP=toolHintBanner('props'); if(_hintP) wrap.appendChild(_hintP);
  if(!props.length){wrap.appendChild(emptyState('◇','No Props Yet','Track significant objects — weapons, vehicles, MacGuffins, anything that recurs across scenes.'));}
  else{
    const grid=el('div',{class:'items-grid'});
    props.forEach(p=>{
      const card=el('div',{class:'item-card'});
      card.innerHTML='<h3>'+escHtml(p.name)+'</h3><p>'+escHtml(p.description||'No description')+'</p>'+(p.significance?'<p style="margin-top:6px;font-size:11px;"><span class="tag" style="background:rgba(229,184,110,0.1);color:var(--gold);border-color:rgba(229,184,110,0.25);font-size:10px;">'+escHtml(p.significance)+'</span></p>':'');
      const footer=el('div',{class:'item-card-footer'});
      const eb=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openPropDrawer(p,projectId)});eb.textContent='Edit';
      const db=el('button',{class:'btn btn-danger btn-sm',onclick:()=>confirmDelete('Delete "'+p.name+'"?',async()=>{await fsDelete('props',p.id);renderProps(container,projectId);toast('Deleted');})});db.textContent='✕';
      footer.append(eb,db);card.appendChild(footer);grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }
  container.appendChild(wrap);
}

function openPropDrawer(prop,projectId){
  const isNew=!prop;const data=prop||{name:'',description:'',significance:'',appearsIn:''};
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  drawer.innerHTML=`
    <div class="drawer-header"><div class="drawer-title">${isNew?'New Prop':'Edit Prop'}</div><button class="btn-icon" onclick="this.closest('.drawer-overlay').remove()">✕</button></div>
    <div class="drawer-body">
      <div class="field"><label class="label">Name</label><input class="input" id="pd-name" value="${escHtml(data.name)}" placeholder="e.g. The Silver Revolver"></div>
      <div class="field"><label class="label">Description</label><textarea class="textarea" id="pd-desc" rows="3" placeholder="What does it look like? Where did it come from?">${escHtml(data.description||'')}</textarea></div>
      <div class="field"><label class="label">Story Significance</label><input class="input" id="pd-sig" value="${escHtml(data.significance||'')}" placeholder="e.g. Murder weapon, MacGuffin, Symbol of power"></div>
      <div class="field"><label class="label">Appears In</label><input class="input" id="pd-appears" value="${escHtml(data.appearsIn||'')}" placeholder="e.g. Act I, Scenes 3 and 7"></div>
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this prop?',async()=>{await fsDelete('props','${prop.id}');document.querySelector('.drawer-overlay').remove();renderProps(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="pd-save">Save Prop</button>
    </div>`;
  document.body.appendChild(overlay);overlay.appendChild(drawer);
  drawer.querySelector('#pd-save').onclick=async()=>{
    const up={name:v('pd-name'),description:v('pd-desc'),significance:v('pd-sig'),appearsIn:v('pd-appears')};
    showSaving();
    if(isNew)await fsCreate('props',{storyProjectId:projectId,...up});
    else await fsUpdate('props',prop.id,up);
    showSaved();
    overlay.remove();renderProps(document.getElementById('content'),projectId);toast(isNew?'Prop created':'Prop saved');
  };
}

// Cache for link data within a session
let _linkCache = { chars:[], locs:[], scenes:[], props:[], projectId:null };
// Saved selection range (survives button click clearing the selection)
let _savedRange = null;

function saveSelection(){
  const sel = window.getSelection();
  if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
    _savedRange = sel.getRangeAt(0).cloneRange();
    return true;
  }
  return false;
}

function restoreSelection(){
  if(!_savedRange) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedRange);
  return true;
}

async function loadLinkCache(projectId){
  if(_linkCache.projectId===projectId) return;
  const[chars,locs,scenes,props]=await Promise.all([
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
    fsQuery('scenes',where('storyProjectId','==',projectId)),
    fsQuery('props',where('storyProjectId','==',projectId)),
  ]);
  _linkCache={chars,locs,scenes,props,projectId};
}

function removeLinkPopover(){
  const p=document.getElementById('link-popover');
  if(p)p.remove();
}

function showLinkPopover(anchorEl, onSelect, projectId){
  removeLinkPopover();
  const rect=anchorEl.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='link-popover';
  pop.id='link-popover';
  pop.style.cssText=`position:fixed;top:${rect.bottom+4}px;left:${rect.left}px;`;

  const sections=[
    {title:'Characters', items:_linkCache.chars, type:'char', icon:'◉'},
    {title:'Locations',  items:_linkCache.locs,  type:'loc',  icon:'⬡'},
    {title:'Scenes',     items:_linkCache.scenes, type:'scene',icon:'◧'},
    {title:'Props',      items:_linkCache.props,  type:'prop', icon:'◇'},
  ];

  let hasContent=false;
  sections.forEach(sec=>{
    if(!sec.items.length)return;
    hasContent=true;
    const title=document.createElement('div');title.className='link-popover-title';title.textContent=sec.title;pop.appendChild(title);
    sec.items.slice(0,6).forEach(item=>{
      const row=document.createElement('div');row.className='link-popover-item';
      row.innerHTML=`<span>${sec.icon}</span><span>${escHtml(item.name||item.title||'Untitled')}</span>`;
      row.onmousedown=e=>{e.preventDefault();removeLinkPopover();onSelect(sec.type,item);};
      pop.appendChild(row);
    });
    const sep=document.createElement('div');sep.className='link-popover-sep';pop.appendChild(sep);
  });

  if(!hasContent){
    const empty=document.createElement('div');empty.className='link-popover-title';empty.textContent='No entities yet — add characters, locations, scenes or props first.';pop.appendChild(empty);
  }

  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('mousedown',outsideHandler),0);
  function outsideHandler(e){if(!pop.contains(e.target)){removeLinkPopover();document.removeEventListener('mousedown',outsideHandler);}}
}

function getLinkClass(type){
  return {char:'link-char',loc:'link-loc',scene:'link-scene',prop:'link-prop'}[type]||'link-char';
}
function getLinkIcon(type){
  return {char:'◉',loc:'⬡',scene:'◧',prop:'◇'}[type]||'◉';
}

function wrapSelectionAsLink(type, entity){
  const sel=window.getSelection();
  if(!sel.rangeCount)return;
  const range=sel.getRangeAt(0);
  if(range.collapsed)return;
  const span=document.createElement('span');
  span.className='link-btn '+getLinkClass(type);
  span.dataset.linkType=type;
  span.dataset.linkId=entity.id;
  span.dataset.linkName=entity.name||entity.title||'';
  span.innerHTML=getLinkIcon(type)+' ';
  try{
    range.surroundContents(span);
    sel.removeAllRanges();
  }catch(e){
    // If selection spans multiple nodes, just insert at cursor
    const frag=range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
}

// Open a quick-reference popup for a linked entity. Loads the entity from
// Firestore and renders a rich, read-only card so writers can check details
// without leaving the editor. Uses the same field structure as the main
// dashboard cards so wizard-built content displays in full.
function openLinkedCard(type, id, projectId){
  // Find the active pin workspace (if any) so the drawer can offer a Pin
  // toggle that adds/removes from the right workspace.
  const ws = getActivePinWorkspace();
  const pinContext = ws ? {
    getPins: () => ws.getPins(),
    addPin: (pin) => ws.addPin(pin),
    removePin: (type, id) => ws.removePin(type, id),
  } : null;
  const opts = pinContext ? { pinContext } : {};
  const loaders={
    char:  ()=>fsGet('characters',id).then(e=>showRichEntityPanel('character',e,projectId,opts)),
    loc:   ()=>fsGet('locations',id).then(e=>showRichEntityPanel('location',e,projectId,opts)),
    scene: ()=>fsGet('scenes',id).then(e=>showRichEntityPanel('scene',e,projectId,opts)),
    prop:  ()=>fsGet('props',id).then(e=>showRichEntityPanel('prop',e,projectId,opts)),
  };
  if(loaders[type])loaders[type]();
}

// Render a small read-only field block. Returns null if the value is empty
// so callers can skip empty sections.
function _linkPanelField(label, value, opts){
  opts = opts || {};
  if(!value || (typeof value === 'string' && !value.trim())) return null;
  const sec = el('div', {class:'char-card-section'});
  const lbl = el('div', {class:'char-card-section-label'}); lbl.textContent = label;
  const txt = el('div', {class:'char-card-section-text'});
  const text = String(value);
  txt.textContent = (opts.truncate && text.length > opts.truncate) ? text.substring(0, opts.truncate) + '…' : text;
  sec.append(lbl, txt);
  return sec;
}

// Build a DOM node containing the rich card content for an entity. Pure
// function — no side effects, no event listeners. Reused by the entity drawer,
// floating pinned cards, and docked pinned cards. Caller is responsible for
// chrome (header, close button, drag handles, pin toggle).
async function buildEntityCardContent(type, entity, projectId){
  const card = el('div');
  if(!entity){
    const empty = el('div',{class:'pin-card-deleted'});
    empty.textContent = 'This card has been deleted.';
    card.appendChild(empty);
    return card;
  }

  if(type === 'character' || type === 'char'){
    const c = entity;
    const metaParts = [];
    if(c.age) metaParts.push('Age '+c.age);
    if(c.pronouns) metaParts.push(c.pronouns);
    if(c.occupation) metaParts.push(c.occupation);
    if(c.archetype) metaParts.push('◈ '+c.archetype);
    if(c.nationality) metaParts.push(c.nationality);
    if(metaParts.length){
      const m = el('div',{style:'font-size:12px;color:var(--fg3);margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;'});
      m.textContent = metaParts.join(' · ');
      card.appendChild(m);
    }
    if(c.traits){ const t=el('div',{class:'char-card-traits'});t.textContent=c.traits;card.appendChild(t); }
    const appearParts=[];
    if(c.height||c.build) appearParts.push([c.height,c.build].filter(Boolean).join(', '));
    if(c.hairColor) appearParts.push('Hair: '+c.hairColor+(c.hairStyle?' ('+c.hairStyle+')':''));
    if(c.eyeColor) appearParts.push('Eyes: '+c.eyeColor);
    if(c.skinTone) appearParts.push('Skin: '+c.skinTone);
    if(c.clothingStyle) appearParts.push(c.clothingStyle);
    const appearText = appearParts.length ? appearParts.join(' · ') : (c.appearance||'');
    [
      _linkPanelField('Appearance', appearText),
      _linkPanelField('Distinguishing Marks', c.distinguishingMarks),
      _linkPanelField('First Impression', c.firstImpression),
      _linkPanelField('Voice & Manner', [c.speakingStyle,c.speechHabit,c.humor?'Humor: '+c.humor:''].filter(Boolean).join(' · ')),
      _linkPanelField('Psychology', [c.personality,c.internalConflict].filter(Boolean).join(' / ')),
      _linkPanelField('Fear / Desire', [c.fear&&'Fear: '+c.fear, c.desire&&'Desire: '+c.desire].filter(Boolean).join('  ·  ')),
      _linkPanelField('Backstory', c.backstory||(c.childhoodHome||c.formativeEvent ? [c.childhoodHome&&'From: '+c.childhoodHome, c.formativeEvent].filter(Boolean).join('. ') : ''), {truncate:400}),
      _linkPanelField('The Wound', c.wound),
      _linkPanelField('Secret', c.secret),
      _linkPanelField('Want / Need / Motivation', [c.wantVsNeed,c.motivation].filter(Boolean).join(' · ')),
      _linkPanelField('Character Arc', c.arc),
      _linkPanelField('Role in Story', c.storyRole),
    ].forEach(f => { if(f) card.appendChild(f); });
    const tags=[];
    if(c.flaw) tags.push({text:'Flaw: '+c.flaw,color:'var(--rose)'});
    if(c.strength) tags.push({text:'Strength: '+c.strength,color:'var(--green)'});
    if(c.secret) tags.push({text:'Has a secret',color:'var(--accent)'});
    if(tags.length){
      const tagsEl=el('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;'});
      tags.forEach(t=>{ const tg=el('span',{class:'tag',style:'font-size:10px;color:'+t.color+';background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);'});tg.textContent=t.text;tagsEl.appendChild(tg); });
      card.appendChild(tagsEl);
    }
  } else if(type === 'location' || type === 'loc'){
    const l = entity;
    [
      _linkPanelField('Type / Setting', l.locationType),
      _linkPanelField('Description', l.description, {truncate:400}),
      _linkPanelField('Atmosphere & Mood', l.atmosphere, {truncate:300}),
      _linkPanelField('Geography', l.geography, {truncate:300}),
      _linkPanelField('History', l.history, {truncate:300}),
      _linkPanelField('Sensory Detail', l.sensoryDetail, {truncate:300}),
      _linkPanelField('Role in Story', l.storyRole),
    ].forEach(f => { if(f) card.appendChild(f); });
    if(l.autoCreated){
      const tag=el('div',{style:'margin-top:10px;'});
      tag.innerHTML='<span class="tag" style="font-size:10px;color:var(--fg3);">◈ Auto-linked from script</span>';
      card.appendChild(tag);
    }
  } else if(type === 'scene'){
    const sc = entity;
    let locName = '', charNames = [];
    try {
      if(sc.locationId){ const l = await fsGet('locations', sc.locationId); if(l) locName = l.name; }
      if(sc.characterIds && sc.characterIds.length){
        const charLoaders = await Promise.all(sc.characterIds.map(id => fsGet('characters', id).catch(()=>null)));
        charNames = charLoaders.filter(Boolean).map(c => c.name);
      }
    } catch(e){ /* non-fatal — show what we can */ }
    if(sc.sequenceNumber){
      const seq=el('div',{style:'font-size:11px;color:var(--fg3);font-family:\'JetBrains Mono\',monospace;margin-bottom:12px;'});
      seq.textContent='SCENE #'+sc.sequenceNumber;
      card.appendChild(seq);
    }
    if(locName || charNames.length){
      const meta=el('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;'});
      if(locName){const lt=el('span',{class:'tag',style:'background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.2);font-size:10px;'});lt.textContent='⬡ '+locName;meta.appendChild(lt);}
      charNames.forEach(n=>{const ct=el('span',{class:'tag',style:'font-size:10px;'});ct.textContent='◉ '+n;meta.appendChild(ct);});
      card.appendChild(meta);
    }
    [
      _linkPanelField('Description', sc.description, {truncate:400}),
      _linkPanelField('Setup (S)', [sc.sceneGoal&&'Goal: '+sc.sceneGoal, sc.charAWant&&'A wants: '+sc.charAWant, sc.charBWant&&'B wants: '+sc.charBWant].filter(Boolean).join(' · ')),
      _linkPanelField('Confrontation (C)', [sc.confrontationDesc, sc.obstacleDesc].filter(Boolean).join(' / ')),
      _linkPanelField('Turn (T)', sc.turnLine||sc.turnDescription),
      _linkPanelField('Resolution (R)', [sc.resolutionChange, sc.newStatus].filter(Boolean).join(' → ')),
      _linkPanelField('Subtext / Craft', sc.subtext),
      _linkPanelField('Tone Notes', sc.toneNotes),
    ].forEach(f => { if(f) card.appendChild(f); });
  } else if(type === 'prop'){
    const p = entity;
    [
      _linkPanelField('Description', p.description, {truncate:400}),
      _linkPanelField('Story Role / Significance', p.storyRole || p.significance),
      _linkPanelField('Notes', p.notes),
      _linkPanelField('Appears In', p.appearsIn),
    ].forEach(f => { if(f) card.appendChild(f); });
  }

  if(!card.children.length){
    const empty=el('div',{style:'padding:24px;text-align:center;color:var(--fg3);font-size:13px;'});
    empty.textContent='This card has no details filled in yet.';
    card.appendChild(empty);
  }
  return card;
}

// Build and show a rich quick-reference drawer for any linked entity.
async function showRichEntityPanel(type, entity, projectId, opts){
  if(!entity){ toast('Linked card not found — it may have been deleted','error'); return; }
  opts = opts || {};
  // Drawer scaffold
  const overlay = el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer = el('div',{class:'drawer'});
  const header = el('div',{class:'drawer-header'});

  const typeLabels = { character:'Character', location:'Location', scene:'Scene', prop:'Prop' };
  const typeIcons  = { character:'◉',         location:'⬡',        scene:'◧',     prop:'◇'    };
  const typeName = entity.name || entity.title || 'Untitled';
  const titleBlock = el('div');
  titleBlock.innerHTML = `<div class="drawer-title">${typeIcons[type]} ${escHtml(typeName)}</div><div style="font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;">${typeLabels[type]} · Linked Reference</div>`;
  header.appendChild(titleBlock);

  // Pin toggle button — hidden if no pin context provided (e.g. opened from
  // outside an editor surface). Shows current pinned state and toggles it.
  if(opts.pinContext){
    const ctx = opts.pinContext;
    // Normalize type to short form for pin storage (char/loc/scene/prop)
    const shortType = type === 'character' ? 'char' : type === 'location' ? 'loc' : type;
    const isPinned = (ctx.getPins() || []).some(p => p.type === shortType && p.id === entity.id);
    const pinBtn = el('button',{class:'btn btn-ghost btn-sm',style:'margin-right:8px;'});
    pinBtn.innerHTML = isPinned ? '📌 Unpin' : '📌 Pin to Workspace';
    pinBtn.onclick = () => {
      if(isPinned){
        ctx.removePin(shortType, entity.id);
        toast('Unpinned');
      } else {
        ctx.addPin({ type: shortType, id: entity.id, state: 'floating', collapsed: false, x: null, y: null });
        toast('Pinned to workspace');
      }
      overlay.remove();
    };
    header.appendChild(pinBtn);
  }

  const closeBtn = el('button',{class:'btn-icon',onclick:()=>overlay.remove()});closeBtn.textContent='✕';
  header.appendChild(closeBtn);

  const body = el('div',{class:'drawer-body'});
  const cardOuter = el('div',{style:'background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;'});
  const cardContent = await buildEntityCardContent(type, entity, projectId);
  // Move all children of cardContent into cardOuter (so we don't nest divs)
  while(cardContent.firstChild) cardOuter.appendChild(cardContent.firstChild);
  body.appendChild(cardOuter);
  drawer.append(header, body);
  overlay.appendChild(drawer);
  document.body.appendChild(overlay);
}

// Legacy entity panel (kept for backwards compatibility — flat field list).
// Active code paths now use showRichEntityPanel() above.
function showEntityPanel(typeName, entity, fields){
  if(!entity){toast('Entity not found','error');return;}
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  const header=el('div',{class:'drawer-header'});
  header.innerHTML=`<div class="drawer-title">${escHtml(typeName)}</div>`;
  const closeBtn=el('button',{class:'btn-icon',onclick:()=>overlay.remove()});closeBtn.textContent='✕';
  header.appendChild(closeBtn);
  const body=el('div',{class:'drawer-body'});
  fields.forEach(f=>{
    const val=entity[f];
    if(!val&&val!==0)return;
    const field=el('div',{class:'field'});
    const label=el('label',{class:'label'});label.textContent=f.charAt(0).toUpperCase()+f.slice(1).replace(/([A-Z])/g,' $1');
    const value=el('div',{style:'font-size:14px;color:var(--fg2);line-height:1.6;'});value.textContent=String(val);
    field.append(label,value);body.appendChild(field);
  });
  drawer.append(header,body);overlay.appendChild(drawer);document.body.appendChild(overlay);
}

// Add a "🔗 Link" button to an editor toolbar.
//   editor      — the contenteditable element where selection lives
//   projectId   — the active project
//   saveCallback— optional () => void invoked after a link is wrapped, so the
//                 caller can persist the change. If omitted, the legacy v1
//                 path is used (editor._docId + editorSaveTimer global).
function addLinkToolbarBtn(toolbar, editor, projectId, saveCallback){
  const linkBtn=el('button',{class:'toolbar-btn',title:'Link selected text to a character, location, scene or prop'});
  linkBtn.innerHTML='🔗 Link';
  // Save selection on mousedown — BEFORE the click clears it
  linkBtn.addEventListener('mousedown', e=>{
    e.preventDefault(); // prevents button from stealing focus and clearing selection
    saveSelection();
  });
  linkBtn.onclick=async()=>{
    // Check saved range — selection is already gone by the time onclick fires
    if(!_savedRange){toast('Select some text first to link it','info');return;}
    await loadLinkCache(projectId);
    showLinkPopover(linkBtn,(type,entity)=>{
      restoreSelection(); // put the selection back before wrapping
      wrapSelectionAsLink(type,entity);
      _savedRange = null;
      if(typeof saveCallback === 'function'){
        // Caller-provided save (v2 uses scheduleDocSave())
        saveCallback();
      } else if(editor && editor._docId){
        // Legacy v1 path: save directly to documents.content
        clearTimeout(editorSaveTimer);
        editorSaveTimer=setTimeout(async()=>{showSaving();await fsUpdate('documents',editor._docId,{content:editor.innerHTML});showSaved();},800);
      }
    },projectId);
  };
  return linkBtn;
}

// Click handler for links inside editors — opens entity panel
function setupEditorLinkClicks(editor, projectId){
  // Mark the editor as link-aware so the floating selection tooltip knows it
  // should appear when text is selected inside this element.
  editor.dataset.linkAware = 'true';
  editor.dataset.linkProjectId = projectId;
  editor.addEventListener('click',e=>{
    const link=e.target.closest('.link-btn');
    if(!link)return;
    e.preventDefault();e.stopPropagation();
    openLinkedCard(link.dataset.linkType,link.dataset.linkId,projectId);
  });
}

// ── Floating selection tooltip ──
// A single global "🔗 Link" pill that follows the user's selection inside any
// link-aware editor. Reduces friction vs. moving up to the toolbar button.
// The save callback for each editor is stored on the editor element itself
// (editor._linkSaveCallback). v2 block editors get this set when they're
// built; v1 editors fall back to the editor._docId path.
let _linkTooltipEl = null;
let _linkTooltipHideTimer = null;

function ensureLinkTooltip(){
  if(_linkTooltipEl) return _linkTooltipEl;
  const btn = document.createElement('button');
  btn.className = 'link-selection-tooltip';
  btn.id = 'link-selection-tooltip';
  btn.innerHTML = '🔗 Link';
  btn.title = 'Link selected text to a character, location, scene or prop';
  // Save selection on mousedown so the click handler can wrap it
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    saveSelection();
  });
  btn.addEventListener('click', async () => {
    if(!_savedRange){ hideLinkTooltip(); return; }
    // Find the editor containing the selection so we know which save path to use
    const editor = _findLinkAwareEditorForRange(_savedRange);
    if(!editor){ hideLinkTooltip(); return; }
    const projectId = editor.dataset.linkProjectId;
    await loadLinkCache(projectId);
    showLinkPopover(btn, (type, entity) => {
      restoreSelection();
      wrapSelectionAsLink(type, entity);
      _savedRange = null;
      hideLinkTooltip();
      if(typeof editor._linkSaveCallback === 'function'){
        editor._linkSaveCallback();
      } else if(editor._docId){
        clearTimeout(editorSaveTimer);
        editorSaveTimer = setTimeout(async () => {
          showSaving();
          await fsUpdate('documents', editor._docId, {content: editor.innerHTML});
          showSaved();
        }, 800);
      }
    }, projectId);
  });
  document.body.appendChild(btn);
  _linkTooltipEl = btn;
  return btn;
}

function hideLinkTooltip(){
  if(_linkTooltipEl) _linkTooltipEl.classList.remove('visible');
}

function _findLinkAwareEditorForRange(range){
  if(!range) return null;
  let node = range.commonAncestorContainer;
  if(node.nodeType === 3) node = node.parentNode;
  while(node && node !== document.body){
    if(node.dataset && node.dataset.linkAware === 'true') return node;
    node = node.parentNode;
  }
  return null;
}

function _updateLinkTooltipPosition(){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount || sel.isCollapsed){ hideLinkTooltip(); return; }
  // Never show the link tooltip while the autofill suggestion dropdown is
  // visible — two floating UI elements competing in the same area is
  // confusing, and the student is likely mid-word rather than selecting text
  // they want to link.
  if(document.getElementById('sp-suggest-box')){ hideLinkTooltip(); return; }
  const range = sel.getRangeAt(0);
  const editor = _findLinkAwareEditorForRange(range);
  if(!editor){ hideLinkTooltip(); return; }
  // Don't show if the selection is collapsed visually (zero-width rect)
  const rect = range.getBoundingClientRect();
  if(rect.width < 2 && rect.height < 2){ hideLinkTooltip(); return; }
  const tip = ensureLinkTooltip();
  // Position just below and slightly right of the selection's end
  const top = rect.bottom + 6;
  const left = Math.min(rect.right - 30, window.innerWidth - 90);
  tip.style.top = top + 'px';
  tip.style.left = Math.max(8, left) + 'px';
  tip.classList.add('visible');
}

document.addEventListener('selectionchange', () => {
  // Debounce slightly so we don't fight with selection updates from arrow keys
  clearTimeout(_linkTooltipHideTimer);
  _linkTooltipHideTimer = setTimeout(_updateLinkTooltipPosition, 60);
});
// Hide when scrolling — the position would otherwise stay frozen
document.addEventListener('scroll', hideLinkTooltip, true);
// Hide when clicking outside the tooltip itself
document.addEventListener('mousedown', (e) => {
  if(!_linkTooltipEl) return;
  if(e.target === _linkTooltipEl || _linkTooltipEl.contains(e.target)) return;
  // Don't hide if the click is starting a new selection inside an editor
  // (the selectionchange handler will reposition it)
  hideLinkTooltip();
});

// ══════════════════════════════════════════════════════════════════════
//  PIN WORKSPACE — floating + docked entity reference cards
// ══════════════════════════════════════════════════════════════════════
// A "pin" is a persistent entity reference attached to a document-viewing
// session. Pins can be either floating (free-positioned overlays) or docked
// (parked in a right-side sidebar). Pins persist across sessions: students
// see their own pins on each of their own docs; teachers reviewing student
// work see their own pin set per-student-per-doc, stored under the teacher's
// account so the student's data is never modified.
//
// Public surface:
//   createPinWorkspace({ host, ctx }) → { dockEl, refresh, destroy }
//
//   ctx contract:
//     .getPins()             → Array<Pin>     current pin set
//     .savePins(pins)        → Promise        persist new pin set
//     .loadEntity(type, id)  → Promise<obj?>  fetch entity by type+id
//     .projectId             → string         used for resolving sub-entities
//
//   Pin shape: { type, id, state:'floating'|'docked', collapsed, x, y, dockOrder }

const _activeWorkspaces = new Set();

// Walk all .link-btn chips in the current page and toggle the .pinned class
// based on whether a matching pin exists in the provided pins array.
// Called with requestAnimationFrame so it never runs synchronously during
// editor input events (avoids disrupting cursor position).
// linkType on chip uses full names ('character','location','scene','prop');
// pin.type uses short names ('char','loc','scene','prop'). Map accordingly.
const _linkTypeToPinType = { character:'char', location:'loc', scene:'scene', prop:'prop' };
function refreshChipPinStates(pins){
  if(!pins || !pins.length){
    document.querySelectorAll('.link-btn.pinned').forEach(b => b.classList.remove('pinned'));
    return;
  }
  const pinSet = new Set(pins.map(p => p.type + ':' + p.id));
  document.querySelectorAll('.link-btn[data-link-type][data-link-id]').forEach(btn => {
    const pinType = _linkTypeToPinType[btn.dataset.linkType] || btn.dataset.linkType;
    const key = pinType + ':' + btn.dataset.linkId;
    btn.classList.toggle('pinned', pinSet.has(key));
  });
}

function createPinWorkspace(opts){
  const { host, ctx } = opts;

  // ── State ──
  let pins = (ctx.getPins() || []).slice();
  // Map<pinKey, HTMLElement> — live card elements keyed by type:id
  const cardEls = new Map();
  // Pending save timer for debouncing
  let saveTimer = null;

  function pinKey(p){ return p.type + ':' + p.id; }
  function findPin(type, id){ return pins.find(p => p.type === type && p.id === id); }

  function persistDebounced(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      ctx.savePins(pins).catch(() => {/* non-fatal */});
    }, 300);
  }

  // ── Build dock column ──
  const dock = el('div', {class:'pin-dock'});
  // Restore collapsed state from saved context
  const initCollapsed = ctx.getDockCollapsed ? ctx.getDockCollapsed() : false;
  if(initCollapsed) dock.classList.add('collapsed');
  const dockHeader = el('div', {class:'pin-dock-header'});
  const dockTitle = el('div', {class:'pin-dock-title'}); dockTitle.textContent = '📌 Pinned';
  const dockToggle = el('button', {class:'pin-dock-toggle', title: initCollapsed ? 'Expand pinned panel' : 'Collapse pinned panel'});
  dockToggle.textContent = initCollapsed ? '⇤' : '⇥';
  dockToggle.onclick = () => {
    dock.classList.toggle('collapsed');
    const nowCollapsed = dock.classList.contains('collapsed');
    dockToggle.textContent = nowCollapsed ? '⇤' : '⇥';
    dockToggle.title = nowCollapsed ? 'Expand pinned panel' : 'Collapse pinned panel';
    // Persist the new collapsed state
    if(ctx.setDockCollapsed) ctx.setDockCollapsed(nowCollapsed);
  };
  dockHeader.append(dockTitle, dockToggle);
  dock.appendChild(dockHeader);
  const dockBody = el('div', {class:'pin-dock-body'});
  dock.appendChild(dockBody);
  host.appendChild(dock);

  // ── Render dock contents ──
  function renderDock(){
    dockBody.innerHTML = '';
    const docked = pins.filter(p => p.state === 'docked')
                       .sort((a,b) => (a.dockOrder||0) - (b.dockOrder||0));
    if(!docked.length){
      const empty = el('div', {class:'pin-dock-empty'});
      empty.innerHTML = '<span class="pin-dock-empty-icon">📌</span>Click any linked name in your script to open its card, then pin it here for quick reference while writing.';
      dockBody.appendChild(empty);
      return;
    }
    docked.forEach(pin => {
      const card = renderCardFor(pin);
      if(card) dockBody.appendChild(card);
    });
  }

  // ── Render a single pinned card (floating or docked) ──
  // Returns an HTMLElement. The caller decides where to attach it.
  function renderCardFor(pin){
    const key = pinKey(pin);
    // Reuse existing element if one exists (so drag handlers stay attached)
    let card = cardEls.get(key);
    if(!card){
      card = el('div', {class:'pin-card'});
      cardEls.set(key, card);
    } else {
      card.innerHTML = ''; // refresh contents
    }
    // Apply state class
    card.classList.toggle('pin-docked', pin.state === 'docked');
    if(pin.collapsed) card.classList.add('collapsed'); else card.classList.remove('collapsed');

    // Header
    const header = el('div', {class:'pin-card-header'});
    const typeIcons = { char:'◉', loc:'⬡', scene:'◧', prop:'◇' };
    const typeLabels = { char:'Character', loc:'Location', scene:'Scene', prop:'Prop' };
    const icon = el('span', {class:'pin-card-icon'}); icon.textContent = typeIcons[pin.type] || '◈';
    const title = el('span', {class:'pin-card-title'}); title.textContent = 'Loading…';
    const typeTag = el('span', {class:'pin-card-type'}); typeTag.textContent = typeLabels[pin.type] || '';
    const collapseBtn = el('button', {class:'pin-card-btn', title:'Toggle expand'});
    collapseBtn.textContent = pin.collapsed ? '▸' : '▾';
    collapseBtn.onclick = (e) => {
      e.stopPropagation();
      pin.collapsed = !pin.collapsed;
      card.classList.toggle('collapsed', pin.collapsed);
      collapseBtn.textContent = pin.collapsed ? '▸' : '▾';
      persistDebounced();
    };
    const unpinBtn = el('button', {class:'pin-card-btn', title:'Unpin'});
    unpinBtn.textContent = '✕';
    unpinBtn.onclick = (e) => {
      e.stopPropagation();
      removePinByObj(pin);
    };
    header.append(icon, title, typeTag, collapseBtn, unpinBtn);

    const body = el('div', {class:'pin-card-body'});
    body.innerHTML = '<div style="font-size:12px;color:var(--fg3);font-style:italic;">Loading…</div>';

    card.append(header, body);

    // Apply position if floating
    if(pin.state === 'floating'){
      // Clamp position to viewport
      const x = (typeof pin.x === 'number') ? Math.max(8, Math.min(window.innerWidth - 290, pin.x)) : 200;
      const y = (typeof pin.y === 'number') ? Math.max(8, Math.min(window.innerHeight - 100, pin.y)) : 120;
      card.style.left = x + 'px';
      card.style.top  = y + 'px';
    } else {
      // Docked — clear inline position styles
      card.style.left = '';
      card.style.top = '';
    }

    // Async load entity content
    ctx.loadEntity(pin.type, pin.id).then(async entity => {
      if(!entity){
        title.textContent = 'Deleted';
        body.innerHTML = '';
        const dlt = el('div', {class:'pin-card-deleted'}); dlt.textContent = 'This card has been deleted.';
        body.appendChild(dlt);
        return;
      }
      title.textContent = entity.name || entity.title || 'Untitled';
      body.innerHTML = '';
      const fullType = pin.type === 'char' ? 'character' : pin.type === 'loc' ? 'location' : pin.type;
      const content = await buildEntityCardContent(fullType, entity, ctx.projectId);
      while(content.firstChild) body.appendChild(content.firstChild);
    }).catch(() => {
      title.textContent = 'Error';
      body.innerHTML = '<div class="pin-card-deleted">Failed to load this card.</div>';
    });

    // Attach drag handlers to header
    attachDragHandlers(card, header, pin);
    return card;
  }

  // ── Drag handlers ──
  // Header is the drag handle. On pointermove, the card follows; on pointerup,
  // we check if the pointer is over the dock zone and transition state if so.
  function attachDragHandlers(card, handle, pin){
    handle.addEventListener('pointerdown', (e) => {
      // Don't initiate drag from collapse/unpin buttons
      if(e.target.classList.contains('pin-card-btn')) return;
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const rect = card.getBoundingClientRect();
      const offX = startX - rect.left;
      const offY = startY - rect.top;
      let moved = false;

      // If currently docked, prepare to detach: move card to body so it can
      // freely follow the cursor without being clipped by the dock's overflow
      const wasDocked = (pin.state === 'docked');

      function onMove(ev){
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if(!moved && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
        if(!moved){
          moved = true;
          card.classList.add('dragging');
          if(wasDocked){
            // Detach to body for free movement
            document.body.appendChild(card);
            card.classList.remove('pin-docked');
            card.style.position = 'fixed';
            card.style.width = '280px';
          }
        }
        const newX = ev.clientX - offX;
        const newY = ev.clientY - offY;
        card.style.left = newX + 'px';
        card.style.top  = newY + 'px';
        // Highlight dock if pointer is over it
        const overDock = isPointOverDock(ev.clientX, ev.clientY);
        dock.classList.toggle('drag-over', overDock);
      }

      function onUp(ev){
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        card.classList.remove('dragging');
        dock.classList.remove('drag-over');
        if(!moved){
          // Treat as a click on header (no-op for now — collapse btn handles its own click)
          return;
        }
        const overDock = isPointOverDock(ev.clientX, ev.clientY);
        if(overDock){
          // Transition to docked
          pin.state = 'docked';
          pin.dockOrder = pins.filter(p => p.state === 'docked').length; // append
          card.style.position = '';
          card.style.left = '';
          card.style.top = '';
          card.style.width = '';
          card.classList.add('pin-docked');
          // Move into dock body
          renderDock(); // re-render whole dock to get ordering right
          persistDebounced();
        } else {
          // Stay floating — record new position
          pin.state = 'floating';
          pin.x = parseInt(card.style.left, 10) || 0;
          pin.y = parseInt(card.style.top, 10)  || 0;
          card.classList.remove('pin-docked');
          // Ensure it lives in body if it was docked before
          if(wasDocked && card.parentElement !== document.body){
            document.body.appendChild(card);
          }
          persistDebounced();
        }
      }

      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  }

  function isPointOverDock(x, y){
    const r = dock.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }

  // ── Pin add/remove (called externally + from unpin buttons) ──
  function addPin(pin){
    // Avoid duplicates
    if(findPin(pin.type, pin.id)) return;
    pins.push(pin);
    persistDebounced();
    refresh();
    // Update pin indicators on all link chips in the page
    requestAnimationFrame(() => refreshChipPinStates(pins));
  }

  function removePinByObj(pin){
    const idx = pins.findIndex(p => p.type === pin.type && p.id === pin.id);
    if(idx < 0) return;
    pins.splice(idx, 1);
    // Clean up DOM
    const key = pinKey(pin);
    const card = cardEls.get(key);
    if(card && card.parentElement) card.parentElement.removeChild(card);
    cardEls.delete(key);
    renderDock();
    persistDebounced();
    // Update pin indicators on all link chips in the page
    requestAnimationFrame(() => refreshChipPinStates(pins));
  }

  function removePin(type, id){
    const pin = findPin(type, id);
    if(pin) removePinByObj(pin);
  }

  // ── Refresh: spawn cards for any pins that don't yet have DOM elements ──
  function refresh(){
    pins.forEach(pin => {
      const key = pinKey(pin);
      if(!cardEls.get(key)){
        const card = renderCardFor(pin);
        if(pin.state === 'floating'){
          document.body.appendChild(card);
        }
        // Docked cards are placed by renderDock()
      }
    });
    renderDock();
  }

  // ── Destroy: clean up all cards (called when navigating away) ──
  function destroy(){
    cardEls.forEach((card) => {
      if(card.parentElement) card.parentElement.removeChild(card);
    });
    cardEls.clear();
    if(dock.parentElement) dock.parentElement.removeChild(dock);
    _activeWorkspaces.delete(workspace);
  }

  const workspace = {
    dockEl: dock,
    refresh,
    destroy,
    addPin,
    removePin,
    getPins: () => pins,
  };
  _activeWorkspaces.add(workspace);
  // Initial render
  refresh();
  // Mark any chips already pinned from a previous session
  requestAnimationFrame(() => refreshChipPinStates(pins));
  return workspace;
}

// Find the active pin workspace (if any). Returns null if no pin workspace
// is currently mounted. Used by the entity drawer's pin button to know
// which workspace to add the pin to.
function getActivePinWorkspace(){
  // Return the most recently created workspace (last in iteration order)
  let last = null;
  _activeWorkspaces.forEach(w => { last = w; });
  return last;
}

// ── Pin context factories ─────────────────────────────────────────────
// These build a `ctx` object suitable for createPinWorkspace, with the
// right load/save behavior for student-as-self vs. teacher-as-reviewer.

// Student viewing/writing in their own document: pins live on doc.pinnedRefs.
function makeStudentPinContext(doc, projectId){
  let cachedPins = (doc.pinnedRefs || []).slice();
  let dockCollapsed = doc.pinDockCollapsed === true;
  return {
    projectId,
    getPins: () => cachedPins,
    getDockCollapsed: () => dockCollapsed,
    setDockCollapsed: (v) => {
      dockCollapsed = v;
      doc.pinDockCollapsed = v;
      fsUpdate('documents', doc.id, { pinDockCollapsed: v }).catch(()=>{});
    },
    savePins: async (pins) => {
      cachedPins = pins.slice();
      doc.pinnedRefs = cachedPins;
      await fsUpdate('documents', doc.id, { pinnedRefs: cachedPins });
    },
    loadEntity: async (type, id) => {
      const collMap = { char:'characters', loc:'locations', scene:'scenes', prop:'props' };
      const coll = collMap[type];
      if(!coll) return null;
      try { return await fsGet(coll, id); }
      catch(e){ return null; }
    },
  };
}

// Teacher reviewing a student's document: pins live in a teacher-scoped
// document at users/{teacherUid}/teacherPins/{studentUid}_{docId}. The
// student's data is never modified.
function makeTeacherPinContext(studentUid, docId, projectId, stuDoc){
  const teacherUid = auth.currentUser ? auth.currentUser.uid : null;
  const pinDocKey = studentUid + '_' + docId;
  let cachedPins = [];
  let loaded = false;

  async function ensureLoaded(){
    if(loaded) return;
    loaded = true;
    if(!teacherUid) return;
    try {
      const ref = doc(db, 'users', teacherUid, 'teacherPins', pinDocKey);
      const snap = await getDoc(ref);
      if(snap.exists()){
        const data = snap.data();
        cachedPins = (data.pinnedRefs || []).slice();
        dockCollapsed = data.pinDockCollapsed === true;
      }
    } catch(e){ /* non-fatal */ }
  }

  let dockCollapsed = false;

  return {
    projectId,
    getPins: () => cachedPins,
    getDockCollapsed: () => dockCollapsed,
    setDockCollapsed: (v) => {
      dockCollapsed = v;
      if(!teacherUid) return;
      const ref = doc(db, 'users', teacherUid, 'teacherPins', pinDocKey);
      setDoc(ref, { pinDockCollapsed: v }, { merge: true }).catch(()=>{});
    },
    ensureLoaded,
    savePins: async (pins) => {
      cachedPins = pins.slice();
      if(!teacherUid) return;
      try {
        const ref = doc(db, 'users', teacherUid, 'teacherPins', pinDocKey);
        await setDoc(ref, { pinnedRefs: cachedPins, studentUid, docId, updatedAt: serverTimestamp() }, { merge: true });
      } catch(e){ /* non-fatal */ }
    },
    loadEntity: async (type, id) => {
      const collMap = { char:'characters', loc:'locations', scene:'scenes', prop:'props' };
      const coll = collMap[type];
      if(!coll) return null;
      try {
        const snap = await getDoc(stuDoc(coll, id));
        return snap.exists() ? { id, ...snap.data() } : null;
      } catch(e){ return null; }
    },
  };
}


// ══════════════════════════════════════════════
//  BEAT BOARD
// ══════════════════════════════════════════════
async function renderBeatBoard(container,projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';

  const[beats,chars,locs]=await Promise.all([
    fsQuery('beats',where('storyProjectId','==',projectId)),
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
  ]);

  // NOTE: Outline sync is intentionally NOT run here. It runs only when the
  // user clicks "↺ Sync from Outline". Running it on every render caused race
  // conditions where Firestore writes hadn't landed yet, producing duplicated
  // or blank beats after edits and drag-reorders.
  const finalBeats = [...beats];
  finalBeats.sort((a,b)=>(a.order||0)-(b.order||0));

  const charMap={};chars.forEach(c=>charMap[c.id]=c.name);
  const locMap={};locs.forEach(l=>locMap[l.id]=l.name);

  container.innerHTML='';
  const wrap=el('div',{class:'page'});
  const header=el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Beat Board</div><div class="page-subtitle">Auto-populated from your outline · Drag to reorder · Edit cards to add detail</div></div>';

  const hbtns=el('div',{style:'display:flex;gap:8px;'});
  const syncBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:async()=>{
    syncBtn.disabled=true; syncBtn.textContent='↺ Syncing…';
    try {
      // Load the outline and run sync logic (only on explicit user request)
      const allOutlines = await fsQuery('outlines',where('storyProjectId','==',projectId));
      const groupCounts={};
      allOutlines.forEach(o=>{ const gid=o.outlineId||'default'; groupCounts[gid]=(groupCounts[gid]||0)+1; });
      const firstGroupId=Object.keys(groupCounts).sort((a,b)=>groupCounts[b]-groupCounts[a])[0]||'default';
      const outlineItems=allOutlines
        .filter(o=>(o.outlineId||'default')===firstGroupId && o.text && o.text.trim())
        .sort((a,b)=>(a.order||0)-(b.order||0));
      const currentBeats = await fsQuery('beats',where('storyProjectId','==',projectId));
      const existingSourceIds=new Set(currentBeats.filter(b=>b.sourceOutlineId).map(b=>b.sourceOutlineId));
      const createPromises=[];
      outlineItems.forEach((item,idx)=>{
        if(!existingSourceIds.has(item.id)){
          createPromises.push(fsCreate('beats',{
            storyProjectId:projectId,
            title:item.text,
            description:'',notes:'',locationId:'',characterIds:[],
            order:currentBeats.length+idx,
            sourceOutlineId:item.id,
            outlineLevel:item.level||1,
          }));
        }
      });
      if(createPromises.length) await Promise.all(createPromises);
      toast(createPromises.length ? `Synced — ${createPromises.length} new beat${createPromises.length!==1?'s':''} added` : 'Already in sync');
    } catch(err){ toast('Sync failed','error'); }
    await renderBeatBoard(container,projectId);
  }});syncBtn.textContent='↺ Sync from Outline';
  const addBtn=el('button',{class:'btn btn-primary',onclick:()=>openBeatDrawer(null,projectId,chars,locs,finalBeats.length)});addBtn.textContent='+ Add Beat';
  hbtns.append(syncBtn,addBtn);
  header.appendChild(hbtns);
  wrap.appendChild(header);
  const _hintBB=toolHintBanner('beatboard'); if(_hintBB) wrap.appendChild(_hintBB);

  if(!finalBeats.length){
    wrap.appendChild(emptyState('▦','No Beats Yet','Add items to your Outline and they will appear here automatically, or click + Add Beat to create one manually.'));
  } else {
    const board=el('div',{class:'beat-board',id:'beat-board'});
    finalBeats.forEach(b=>board.appendChild(beatCard(b,projectId,chars,locs,charMap,locMap,finalBeats,container)));

    board.appendChild(addCard);
    wrap.appendChild(board);
  }
  container.appendChild(wrap);
}

function beatCard(b,projectId,chars,locs,charMap,locMap,allBeats,container){
  const card=el('div',{class:'beat-card'});
  card.draggable=true;
  card.dataset.id=b.id;
  const locName=b.locationId&&locMap[b.locationId]?locMap[b.locationId]:'';
  const charNames=(b.characterIds||[]).map(id=>charMap[id]).filter(Boolean);
  card.innerHTML=`
    <div class="beat-card-num">Beat #${(b.order||0)+1}</div>
    <div class="beat-card-title">${escHtml(b.title||'Untitled Beat')}</div>
    ${b.description?`<div class="beat-card-desc">${escHtml(b.description)}</div>`:''}
    ${b.notes?`<div style="font-size:11px;color:var(--fg3);font-style:italic;margin-top:4px;">${escHtml(b.notes)}</div>`:''}
    <div class="beat-card-tags">
      ${locName?`<span class="tag" style="background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.25);font-size:10px;">⬡ ${escHtml(locName)}</span>`:''}
      ${charNames.map(n=>`<span class="tag" style="font-size:10px;">◉ ${escHtml(n)}</span>`).join('')}
    </div>
    <div class="beat-card-actions">
      <button class="btn-icon" style="font-size:11px;" title="Edit">✎</button>
      <button class="btn-icon" style="font-size:11px;color:var(--red);" title="Delete">✕</button>
    </div>`;
  card.querySelectorAll('.beat-card-actions button')[0].onclick=e=>{e.stopPropagation();openBeatDrawer(b,projectId,chars,locs,allBeats.length);};
  card.querySelectorAll('.beat-card-actions button')[1].onclick=e=>{e.stopPropagation();confirmDelete('Delete beat "'+b.title+'"?',async()=>{await fsDelete('beats',b.id);await renderBeatBoard(container,projectId);toast('Deleted');});};

  // Drag and drop
  let dragSrc=null;
  const board=()=>document.getElementById('beat-board');
  card.addEventListener('dragstart',e=>{dragSrc=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',b.id);});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');board()&&board().querySelectorAll('.beat-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';board()&&board().querySelectorAll('.beat-card').forEach(c=>c.classList.remove('drag-over'));card.classList.add('drag-over');});
  card.addEventListener('drop',async e=>{
    e.preventDefault();if(dragSrc===card)return;
    card.classList.remove('drag-over');
    const allCards=Array.from(board().querySelectorAll('.beat-card'));
    const srcIdx=allCards.indexOf(dragSrc),dstIdx=allCards.indexOf(card);
    if(srcIdx<dstIdx)card.after(dragSrc);else card.before(dragSrc);
    const reordered=Array.from(board().querySelectorAll('.beat-card'));
    const reorderBatch = writeBatch(db);
    reordered.forEach((c,i) => reorderBatch.update(userDoc('beats',c.dataset.id),{order:i}));
    await reorderBatch.commit();
    await renderBeatBoard(container,projectId);
  });
  return card;
}

function openBeatDrawer(beat,projectId,chars,locs,nextOrder){
  const isNew=!beat;const data=beat||{title:'',description:'',notes:'',locationId:'',characterIds:[],order:nextOrder||0};
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  const charOpts=chars.map(c=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg2);cursor:pointer;"><input type="checkbox" value="${c.id}" ${(data.characterIds||[]).includes(c.id)?'checked':''}> ${escHtml(c.name)}</label>`).join('');
  drawer.innerHTML=`
    <div class="drawer-header"><div class="drawer-title">${isNew?'New Beat':'Edit Beat'}</div><button class="btn-icon" onclick="this.closest('.drawer-overlay').remove()">✕</button></div>
    <div class="drawer-body">
      <div class="field"><label class="label">Title</label><input class="input" id="bd-title" value="${escHtml(data.title||'')}" placeholder="What happens in this beat?"></div>
      <div class="field"><label class="label">Description</label><textarea class="textarea" id="bd-desc" rows="3" placeholder="Describe the beat in detail...">${escHtml(data.description||'')}</textarea></div>
      <div class="field"><label class="label">Notes / Director's Notes</label><textarea class="textarea" id="bd-notes" rows="2" placeholder="Subtext, tone, visual ideas...">${escHtml(data.notes||'')}</textarea></div>
      <div class="field"><label class="label">Location</label><select class="select" id="bd-loc"><option value="">— No Location —</option>${locs.map(l=>`<option value="${l.id}"${data.locationId===l.id?' selected':''}>${escHtml(l.name)}</option>`).join('')}</select></div>
      ${chars.length?`<div class="field"><label class="label">Characters</label><div style="display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);">${charOpts}</div></div>`:''}
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this beat?',async()=>{await fsDelete('beats','${beat.id}');document.querySelector('.drawer-overlay').remove();renderBeatBoard(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="bd-save">Save Beat</button>
    </div>`;
  document.body.appendChild(overlay);overlay.appendChild(drawer);
  drawer.querySelector('#bd-save').onclick=async()=>{
    const cbs=Array.from(drawer.querySelectorAll('input[type="checkbox"]:checked')).map(c=>c.value);
    const up={title:v('bd-title'),description:v('bd-desc'),notes:v('bd-notes'),locationId:v('bd-loc'),characterIds:cbs};
    showSaving();
    if(isNew)await fsCreate('beats',{storyProjectId:projectId,order:nextOrder||0,...up});
    else await fsUpdate('beats',beat.id,up);
    showSaved();
    overlay.remove();
    await renderBeatBoard(document.getElementById('content'),projectId);
    toast(isNew?'Beat created':'Beat saved');
  };
}

</p><p data-type="dialogue">Folks! You look like people who know how to have a good time.</p><p data-type="character">GARY</p><p data-type="dialogue">Oh! We\'re from Akron.</p><p data-type="character">BRENDA</p><p data-type="dialogue">We don\'t do drugs, sweetheart.</p><p data-type="character">GARY</p><p data-type="dialogue">But we appreciate the offer. Very friendly city.</p><p data-type="action">Gary accepts Renzo\'s card with both hands, like it is a gift.</p><p data-type="transition">CUT TO:</p><p data-type="scene-heading">EXT. ALLEYWAY - BEHIND THE CAGE - NIGHT</p><p data-type="action">Buck steps out the back. At the end of the alley: a black SUV, engine running. Dark windows.</p><p data-type="action">Buck looks at it. Looks away. Heads for his car.</p><p data-type="scene-heading">INT. THE CAGE (BATHROOM) - MOMENTS LATER</p><p data-type="action">Buck pushes back through the door. He forgot his keys.</p><p data-type="action">He stops. The bathroom door is open. The light is on.</p><p data-type="action">ELENA is on the floor. She is not moving.</p><p data-type="action">He takes out his phone. Then stops. In the mirror: two men in the back room shadow. One taking photographs. The other watching Buck hold his phone.</p><p data-type="character">SAL (O.S.)</p><p data-type="parenthetical">(quiet, almost gentle)</p><p data-type="dialogue">Put the phone down, son. We have a situation that needs to be... resolved.</p><p data-type="transition">CUT TO:</p><p data-type="scene-heading">EXT. ALLEYWAY - MOMENTS LATER</p><p data-type="action">Buck gets to the Taurus. Key in the ignition. Nothing.</p><p data-type="action">He hits the dash. Turns the key three times. Waits.</p><p data-type="action">Behind him: the back door swings open. A man in a dark suit steps out.</p><p data-type="action">Buck turns the key. The Taurus starts. He pulls out without headlights.</p><p data-type="transition">SMASH CUT TO:</p><p data-type="scene-heading">EXT. FREMONT STREET EXPERIENCE - NIGHT</p><p data-type="action">Buck merges into the river of people. Paranoia is a physical sensation. Every face is a variable.</p><p data-type="action">He keeps moving.</p><p data-type="transition">FADE OUT.</p>',
