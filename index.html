function buildProjectPdf(project,chars,locs,scenes,world,outlineItems,outlineName){
  const charMap={};chars.forEach(c=>charMap[c.id]=c.name);
  const locMap={};locs.forEach(l=>locMap[l.id]=l.name);
  const worldFields=[
    {key:'moodAndTone',label:'Mood & Tone'},{key:'lawsOfPhysics',label:'Laws of Physics / Magic'},
    {key:'society',label:'Society & Culture'},{key:'history',label:'History & Mythology'},
    {key:'technology',label:'Technology & Economy'},{key:'conflicts',label:'Conflicts & Themes'},
    {key:'geography',label:'Geography & Place'},{key:'religion',label:'Religion & Belief'},
    {key:'language',label:'Language & Dialect'},{key:'economy',label:'Power & Economy'},
  ];
  let body = '';
  if(project.description) body+=`<div class="pdf-section"><div class="pdf-card"><div class="pdf-field-label">Project Description</div><div class="pdf-field-value">${escHtml(project.description)}</div></div></div>`;
  body+=`<div class="pdf-section"><div class="pdf-section-title">Characters (${chars.length})</div>`;
  if(!chars.length) body+='<p style="color:#7a9070;font-style:italic;font-size:12px;">No characters added yet.</p>';
  chars.forEach(c=>{
    body+=`<div class="pdf-card"><div class="pdf-card-title">${escHtml(c.name)}</div><div class="pdf-meta-row">${c.age?`<span class="pdf-meta-item"><strong>Age:</strong> ${escHtml(c.age)}</span>`:''}${c.pronouns?`<span class="pdf-meta-item"><strong>Pronouns:</strong> ${escHtml(c.pronouns)}</span>`:''}${c.occupation?`<span class="pdf-meta-item"><strong>Occupation:</strong> ${escHtml(c.occupation)}</span>`:''}</div>${c.traits?`<div class="pdf-field" style="margin-top:8px;"><div class="pdf-field-label">Traits</div><div class="pdf-field-value">${escHtml(c.traits)}</div></div>`:''}${c.backstory?`<div class="pdf-field"><div class="pdf-field-label">Backstory</div><div class="pdf-field-value">${escHtml(c.backstory)}</div></div>`:''}</div>`;
  });
  body+='</div>';
  body+=`<div class="pdf-section"><div class="pdf-section-title">Locations (${locs.length})</div>`;
  if(!locs.length) body+='<p style="color:#7a9070;font-style:italic;font-size:12px;">No locations added yet.</p>';
  locs.forEach(l=>{
    body+=`<div class="pdf-card"><div class="pdf-card-title">${escHtml(l.name)}</div>${l.storyRole?`<div style="margin-bottom:6px;"><span class="pdf-tag">${escHtml(l.storyRole)}</span></div>`:''}${l.description?`<div class="pdf-field"><div class="pdf-field-label">Description</div><div class="pdf-field-value">${escHtml(l.description)}</div></div>`:''}${l.atmosphere?`<div class="pdf-field"><div class="pdf-field-label">Atmosphere</div><div class="pdf-field-value">${escHtml(l.atmosphere)}</div></div>`:''}</div>`;
  });
  body+='</div>';
  scenes.sort((a,b)=>(a.sequenceNumber||0)-(b.sequenceNumber||0));
  body+=`<div class="pdf-section"><div class="pdf-section-title">Scenes (${scenes.length})</div>`;
  if(!scenes.length) body+='<p style="color:#7a9070;font-style:italic;font-size:12px;">No scenes added yet.</p>';
  scenes.forEach(sc=>{
    const locName=sc.locationId&&locMap[sc.locationId]?locMap[sc.locationId]:'';
    const charNames=(sc.characterIds||[]).map(id=>charMap[id]).filter(Boolean);
    body+=`<div class="pdf-scene-row"><span class="pdf-scene-num">#${sc.sequenceNumber}</span><div class="pdf-scene-body"><div style="font-family:'Belleza',serif;font-size:13px;color:#1a2e22;margin-bottom:3px;">${escHtml(sc.title)}</div>${sc.description?`<div style="font-size:12px;color:#3d5c48;margin-bottom:5px;">${escHtml(sc.description)}</div>`:''}<div style="display:flex;flex-wrap:wrap;gap:3px;">${locName?`<span class="pdf-tag" style="background:#e8f4ef;">⬡ ${escHtml(locName)}</span>`:''}${charNames.map(n=>`<span class="pdf-tag">◉ ${escHtml(n)}</span>`).join('')}</div></div></div>`;
  });
  body+='</div>';
  const filledFields=worldFields.filter(f=>world&&world[f.key]);
  if(filledFields.length){
    body+=`<div class="pdf-section"><div class="pdf-section-title">World Building</div><div class="pdf-world-grid">`;
    filledFields.forEach(f=>{ body+=`<div class="pdf-world-section"><h3>${escHtml(f.label)}</h3><div style="font-size:12px;color:#3d5c48;line-height:1.6;">${escHtml(world[f.key])}</div></div>`; });
    body+='</div></div>';
  }
  if(outlineItems.length){
    body+=`<div class="pdf-section"><div class="pdf-section-title">${escHtml(outlineName||'Outline')}</div>`;
    outlineItems.forEach(o=>{ body+=`<div class="pdf-outline-item level-${o.level||1}">${escHtml(o.text)}</div>`; });
    body+='</div>';
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">${pdfBaseStyles()}</head><body><div class="pdf-page">${pdfHeader(project.name,'Project Overview — '+escHtml(project.name),'Complete project package')}${body}${pdfFooter(project.name)}</div></body></html>`;
}

function buildScreenplayPdf(project,doc){
  const rawHtml=doc.content||'';
  const parser=new DOMParser();
  const parsed=parser.parseFromString('<div>'+rawHtml+'</div>','text/html');
  const nodes=parsed.querySelector('div').children;
  let body='';
  Array.from(nodes).forEach(node=>{
    const type=node.dataset&&node.dataset.type;
    const text=node.textContent||'';
    if(!text.trim()&&type!=='scene-heading')return;
    switch(type){
      case 'scene-heading': body+=`<p style="text-transform:uppercase;font-weight:bold;margin:1.5em 0 0.5em;">${escHtml(text.toUpperCase())}</p>`; break;
      case 'action':        body+=`<p style="margin:0 0 1em;">${escHtml(text)}</p>`; break;
      case 'character':     body+=`<p style="margin:1em 0 0;margin-left:200px;text-transform:uppercase;">${escHtml(text)}</p>`; break;
      case 'dialogue':      body+=`<p style="margin:0 100px 0.5em 120px;">${escHtml(text)}</p>`; break;
      case 'parenthetical': body+=`<p style="margin:0 160px 0.25em 150px;font-style:italic;">${escHtml(text)}</p>`; break;
      case 'transition':    body+=`<p style="text-align:right;text-transform:uppercase;margin:1em 0;font-weight:bold;">${escHtml(text)}</p>`; break;
      default:              body+=`<p style="margin:0 0 0.5em;">${escHtml(text)}</p>`;
    }
  });
  const tp=doc.titlePage||{};
  const titlePage=`<div style="min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;page-break-after:always;text-align:center;"><div style="margin-bottom:60px;"><div style="font-size:22px;font-weight:bold;text-transform:uppercase;margin-bottom:12px;">${escHtml(tp.title||doc.title||'Untitled')}</div>${tp.writtenBy?`<div style="margin-top:20px;font-size:14px;">Written by</div><div style="font-size:16px;font-weight:bold;">${escHtml(tp.writtenBy)}</div>`:''}${tp.basedOn?`<div style="margin-top:16px;font-size:13px;color:#555;">${escHtml(tp.basedOn)}</div>`:''}</div>${tp.contact?`<div style="margin-top:40px;font-size:12px;color:#555;text-align:left;">${escHtml(tp.contact)}</div>`:''}</div>`;
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:white;color:#111;font-family:'Courier New',Courier,monospace;font-size:12pt;line-height:1.7;}.sp-page{max-width:680px;margin:0 auto;padding:72px 72px 72px 96px;}@media print{.sp-page{padding:1in 1in 1in 1.5in;}}</style></head><body><div class="sp-page">${titlePage}${body}</div></body></html>`;
}

function buildNarrativePdf(project,doc){
  const rawHtml=doc.content||'<p>Empty document.</p>';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">${pdfBaseStyles()}<style>.narrative-body{max-width:640px;margin:0 auto;font-size:14px;line-height:1.9;}.narrative-body h1,.narrative-body h2,.narrative-body h3{font-family:'Belleza',serif;color:#2d6a4f;margin:1.4em 0 0.5em;}.narrative-body p{margin-bottom:0.8em;}.narrative-body ul,.narrative-body ol{padding-left:1.6em;margin-bottom:0.8em;}</style></head><body><div class="pdf-page">${pdfHeader(project.name,escHtml(doc.title||'Untitled'),'Narrative document')}<div class="narrative-body">${rawHtml}</div>${pdfFooter(project.name)}</div></body></html>`;
}

function showPdfOverlay(title,htmlContent,onDownload){
  const existing=document.getElementById('pdf-overlay-wrap');
  if(existing)existing.remove();
  const overlay=document.createElement('div');overlay.className='pdf-overlay';overlay.id='pdf-overlay-wrap';
  const frame=document.createElement('div');frame.className='pdf-frame';
  const topbar=document.createElement('div');topbar.className='pdf-frame-topbar';
  topbar.innerHTML=`<div class="pdf-frame-title">${escHtml(title)}</div>`;
  const actions=document.createElement('div');actions.className='pdf-frame-actions';
  const dlBtn=document.createElement('button');dlBtn.className='btn btn-primary btn-sm';dlBtn.textContent='⬇ Download PDF';dlBtn.onclick=onDownload;
  const closeBtn=document.createElement('button');closeBtn.className='btn btn-ghost btn-sm';closeBtn.style.cssText='background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:white;';closeBtn.textContent='✕ Close';closeBtn.onclick=()=>overlay.remove();
  actions.append(dlBtn,closeBtn);topbar.appendChild(actions);
  const body=document.createElement('div');body.className='pdf-frame-body';
  const iframe=document.createElement('iframe');iframe.style.cssText='width:100%;height:100%;min-height:70vh;border:none;background:white;';iframe.srcdoc=htmlContent;
  body.appendChild(iframe);frame.append(topbar,body);overlay.appendChild(frame);document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function downloadPdf(htmlContent,filename){
  const win=window.open('','_blank');
  if(!win){toast('Please allow popups to download PDF','error');return;}
  win.document.write(htmlContent);win.document.close();
  win.onload=()=>setTimeout(()=>win.print(),300);
}

async function hashData(data){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(JSON.stringify(data)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

const DOC_TYPES={
  'project':{label:'Full Project PDF',icon:'◈'},
  'characters':{label:'Characters',icon:'◉'},
  'locations':{label:'Locations',icon:'⬡'},
  'scenes':{label:'Scenes',icon:'◧'},
  'world':{label:'World Building',icon:'◎'},
  'outline':{label:'Outline',icon:'≡'},
  'screenplay':{label:'Screenplay',icon:'✦'},
  'narrative':{label:'Narrative Document',icon:'✦'},
};


async function generateAndStorePdf(docType,projectId,project,sourceId,sourceTitle,htmlContent,dataSnapshot){
  // dataSnapshot is a compact JSON of the source data — stored instead of HTML
  const snapshotStr = dataSnapshot ? JSON.stringify(dataSnapshot) : htmlContent;
  const contentHash = await hashData(snapshotStr);

  const existing = await fsQuery('generatedDocs',where('storyProjectId','==',projectId));
  const matching = existing.filter(d=>d.docType===docType&&(d.sourceId||'')===(sourceId||''));
  matching.sort((a,b)=>b.version-a.version);

  if(matching.length>0 && matching[0].contentHash===contentHash){
    toast('No changes since last version — showing existing document');
    const html = matching[0].dataSnapshot
      ? await rehydratePdf(matching[0].docType, JSON.parse(matching[0].dataSnapshot), matching[0].sourceTitle, projectId)
      : matching[0].htmlContent||'';
    showPdfOverlay(sourceTitle||DOC_TYPES[docType]?.label||docType, html,
      ()=>downloadPdf(html, sanitizeFilename(sourceTitle||docType)+'.pdf'));
    return;
  }

  const newVersion = matching.length>0 ? matching[0].version+1 : 1;
  showSaving();

  // Store only the compact snapshot — never the full HTML
  const docData = {
    storyProjectId:projectId,
    docType, sourceId:sourceId||'', sourceTitle:sourceTitle||DOC_TYPES[docType]?.label||docType,
    version:newVersion, contentHash,
    dataSnapshot: dataSnapshot ? JSON.stringify(dataSnapshot) : null,
    // Fallback for writing desk docs which use raw HTML content
    htmlContent: dataSnapshot ? null : htmlContent,
  };

  await fsCreate('generatedDocs', docData);
  showSaved();
  toast('Version '+newVersion+' saved to Document Library');
  showPdfOverlay(sourceTitle||DOC_TYPES[docType]?.label||docType, htmlContent,
    ()=>downloadPdf(htmlContent, sanitizeFilename(sourceTitle||docType)+'.pdf'));
}

// Regenerate HTML from a stored snapshot
async function rehydratePdf(docType, snapshot, sourceTitle, projectId){
  const project = snapshot.project || await fsGet('projects',projectId);
  switch(docType){
    case 'characters':  return buildCharactersPdf(project, snapshot.chars||[]);
    case 'locations':   return buildLocationsPdf(project, snapshot.locs||[]);
    case 'scenes':      return buildScenesPdf(project, snapshot.scenes||[], snapshot.chars||[], snapshot.locs||[]);
    case 'world':       return buildWorldPdf(project, snapshot.world||{});
    case 'outline':     return buildOutlinePdf(project, snapshot.items||[], sourceTitle||'Outline');
    case 'project':     return buildProjectPdf(project, snapshot.chars||[], snapshot.locs||[], snapshot.scenes||[], snapshot.world||{}, snapshot.outlineItems||[], snapshot.outlineName||'Outline');
    default:            return snapshot.htmlContent||'';
  }
}

async function generateFullProjectPdf(projectId,project){
  if(!project)project=await fsGet('projects',projectId);
  showSaving();
  const[chars,locs,scenes,worlds,allOutlines]=await Promise.all([
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
    fsQuery('scenes',where('storyProjectId','==',projectId)),
    fsQuery('worlds',where('storyProjectId','==',projectId)),
    fsQuery('outlines',where('storyProjectId','==',projectId)),
  ]);
  const world=worlds[0]||{};
  const firstGroupId=allOutlines.length?(allOutlines[0].outlineId||'default'):'default';
  const outlineItems=allOutlines.filter(i=>(i.outlineId||'default')===firstGroupId).sort((a,b)=>(a.order||0)-(b.order||0));
  const outlineName=outlineItems.length?(outlineItems[0].outlineName||'Outline'):'Outline';
  scenes.sort((a,b)=>(a.sequenceNumber||0)-(b.sequenceNumber||0));
  const html=buildProjectPdf(project,chars,locs,scenes,world,outlineItems,outlineName);
  await generateAndStorePdf('project',projectId,project,'project','Full Project — '+project.name,html,
    {project,chars,locs,scenes,world,outlineItems,outlineName});
}

}

      const dlBtn=el('button',{class:'btn btn-primary btn-sm',onclick:async()=>{
        const html=await rehydratePdf(latest.docType,latest.dataSnapshot?JSON.parse(latest.dataSnapshot):{htmlContent:latest.htmlContent},latest.sourceTitle,projectId);
        downloadPdf(html,sanitizeFilename(group.sourceTitle||group.docType)+'.pdf');
      }});dlBtn.textContent='⬇ Download';
      actions.append(previewBtn,dlBtn);itemHeader.append(titleBlock,actions);item.appendChild(itemHeader);
      if(group.versions.length>1){
        const versions=el('div',{class:'doclibrary-versions'});
        group.versions.forEach((ver,i)=>{
          const vrow=el('div',{class:'doclibrary-version'});

          }});vdl.textContent='⬇';vrow.append(vlabel,vdl);versions.appendChild(vrow);
        });
        item.appendChild(versions);
      }
      list.appendChild(item);

// Cache for link data within a session
let _linkCache = { chars:[], locs:[], scenes:[], props:[], projectId:null };

async function loadLinkCache(projectId){
  if(_linkCache.projectId===projectId) return;
  const[chars,locs,scenes,props]=await Promise.all([
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
    fsQuery('scenes',where('storyProjectId','==',projectId)),
    fsQuery('props',where('storyProjectId','==',projectId)),
  ]);
  _linkCache={chars,locs,scenes,props,projectId};
}

function removeLinkPopover(){
  const p=document.getElementById('link-popover');
  if(p)p.remove();
}

function showLinkPopover(anchorEl, onSelect, projectId){
  removeLinkPopover();
  const rect=anchorEl.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='link-popover';
  pop.id='link-popover';
  pop.style.cssText=`position:fixed;top:${rect.bottom+window.scrollY+4}px;left:${rect.left+window.scrollX}px;`;

  const sections=[
    {title:'Characters', items:_linkCache.chars, type:'char', icon:'◉'},
    {title:'Locations',  items:_linkCache.locs,  type:'loc',  icon:'⬡'},
    {title:'Scenes',     items:_linkCache.scenes, type:'scene',icon:'◧'},
    {title:'Props',      items:_linkCache.props,  type:'prop', icon:'◇'},
  ];

  let hasContent=false;
  sections.forEach(sec=>{
    if(!sec.items.length)return;
    hasContent=true;
    const title=document.createElement('div');title.className='link-popover-title';title.textContent=sec.title;pop.appendChild(title);
    sec.items.slice(0,6).forEach(item=>{
      const row=document.createElement('div');row.className='link-popover-item';
      row.innerHTML=`<span>${sec.icon}</span><span>${escHtml(item.name||item.title||'Untitled')}</span>`;
      row.onmousedown=e=>{e.preventDefault();removeLinkPopover();onSelect(sec.type,item);};
      pop.appendChild(row);
    });
    const sep=document.createElement('div');sep.className='link-popover-sep';pop.appendChild(sep);
  });

  if(!hasContent){
    const empty=document.createElement('div');empty.className='link-popover-title';empty.textContent='No entities yet — add characters, locations, scenes or props first.';pop.appendChild(empty);
  }

  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('mousedown',outsideHandler),0);
  function outsideHandler(e){if(!pop.contains(e.target)){removeLinkPopover();document.removeEventListener('mousedown',outsideHandler);}}
}

function getLinkClass(type){
  return {char:'link-char',loc:'link-loc',scene:'link-scene',prop:'link-prop'}[type]||'link-char';
}
function getLinkIcon(type){
  return {char:'◉',loc:'⬡',scene:'◧',prop:'◇'}[type]||'◉';
}

function wrapSelectionAsLink(type, entity){
  const sel=window.getSelection();
  if(!sel.rangeCount)return;
  const range=sel.getRangeAt(0);
  if(range.collapsed)return;
  const span=document.createElement('span');
  span.className='link-btn '+getLinkClass(type);
  span.dataset.linkType=type;
  span.dataset.linkId=entity.id;
  span.dataset.linkName=entity.name||entity.title||'';
  span.innerHTML=getLinkIcon(type)+' ';
  try{
    range.surroundContents(span);
    sel.removeAllRanges();
  }catch(e){
    // If selection spans multiple nodes, just insert at cursor
    const frag=range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
}

function openLinkedCard(type, id, projectId){
  // Load and show the entity in a side panel
  const loaders={
    char:  ()=>fsGet('characters',id).then(e=>showEntityPanel('Character',e,['name','age','pronouns','occupation','traits','backstory'])),
    loc:   ()=>fsGet('locations',id).then(e=>showEntityPanel('Location',e,['name','description','atmosphere','storyRole'])),
    scene: ()=>fsGet('scenes',id).then(e=>showEntityPanel('Scene',e,['title','description','sequenceNumber'])),
    prop:  ()=>fsGet('props',id).then(e=>showEntityPanel('Prop',e,['name','description','significance','appearsIn'])),
  };
  if(loaders[type])loaders[type]();
}

function showEntityPanel(typeName, entity, fields){
  if(!entity){toast('Entity not found','error');return;}
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  const header=el('div',{class:'drawer-header'});
  header.innerHTML=`<div class="drawer-title">${escHtml(typeName)}</div>`;
  const closeBtn=el('button',{class:'btn-icon',onclick:()=>overlay.remove()});closeBtn.textContent='✕';
  header.appendChild(closeBtn);
  const body=el('div',{class:'drawer-body'});
  fields.forEach(f=>{
    const val=entity[f];
    if(!val&&val!==0)return;
    const field=el('div',{class:'field'});
    const label=el('label',{class:'label'});label.textContent=f.charAt(0).toUpperCase()+f.slice(1).replace(/([A-Z])/g,' $1');
    const value=el('div',{style:'font-size:14px;color:var(--fg2);line-height:1.6;'});value.textContent=String(val);
    field.append(label,value);body.appendChild(field);
  });
  drawer.append(header,body);overlay.appendChild(drawer);document.body.appendChild(overlay);
}

// Add a "🔗 Link" button to screenplay editor toolbar
function addLinkToolbarBtn(toolbar, editor, projectId){
  const linkBtn=el('button',{class:'toolbar-btn',title:'Link selected text to a character, location, scene or prop'});
  linkBtn.innerHTML='🔗 Link';
  linkBtn.onclick=async()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed){toast('Select some text first to link it','info');return;}
    await loadLinkCache(projectId);
    showLinkPopover(linkBtn,(type,entity)=>{
      wrapSelectionAsLink(type,entity);
      // Trigger save
      clearTimeout(editorSaveTimer);
      editorSaveTimer=setTimeout(async()=>{showSaving();await fsUpdate('documents',editor._docId,{content:editor.innerHTML});showSaved();},800);
    },projectId);
  };
  return linkBtn;
}

// Click handler for links inside editors — opens entity panel
function setupEditorLinkClicks(editor, projectId){
  editor.addEventListener('click',e=>{
    const link=e.target.closest('.link-btn');
    if(!link)return;
    e.preventDefault();e.stopPropagation();
    openLinkedCard(link.dataset.linkType,link.dataset.linkId,projectId);
  });
}

async function renderBeatBoard(container,projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const[beats,chars,locs]=await Promise.all([
    fsQuery('beats',where('storyProjectId','==',projectId)),
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
  ]);
  beats.sort((a,b)=>(a.order||0)-(b.order||0));
  const charMap={};chars.forEach(c=>charMap[c.id]=c.name);
  const locMap={};locs.forEach(l=>locMap[l.id]=l.name);
  container.innerHTML='';
  const wrap=el('div',{class:'page'});
  const header=el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Beat Board</div><div class="page-subtitle">Drag cards to reorder · Click to edit · Double-click title to rename</div></div>';
  const addBtn=el('button',{class:'btn btn-primary',onclick:()=>openBeatDrawer(null,projectId,chars,locs,beats.length)});addBtn.textContent='+ Add Beat';
  header.appendChild(addBtn);wrap.appendChild(header);
  const board=el('div',{class:'beat-board',id:'beat-board'});
  beats.forEach(b=>board.appendChild(beatCard(b,projectId,chars,locs,charMap,locMap,beats,container)));
  // Add card button at end
  const addCard=el('div',{class:'beat-add-card',onclick:()=>openBeatDrawer(null,projectId,chars,locs,beats.length)});
  addCard.innerHTML='<span style="font-size:20px;font-weight:300;">+</span><span>Add Beat</span>';
  board.appendChild(addCard);
  wrap.appendChild(board);
  container.appendChild(wrap);
}

function beatCard(b,projectId,chars,locs,charMap,locMap,allBeats,container){
  const card=el('div',{class:'beat-card'});
  card.draggable=true;
  card.dataset.id=b.id;
  const locName=b.locationId&&locMap[b.locationId]?locMap[b.locationId]:'';
  const charNames=(b.characterIds||[]).map(id=>charMap[id]).filter(Boolean);
  card.innerHTML=`
    <div class="beat-card-num">Beat #${(b.order||0)+1}</div>
    <div class="beat-card-title">${escHtml(b.title||'Untitled Beat')}</div>
    ${b.description?`<div class="beat-card-desc">${escHtml(b.description)}</div>`:''}
    ${b.notes?`<div style="font-size:11px;color:var(--fg3);font-style:italic;margin-top:4px;">${escHtml(b.notes)}</div>`:''}
    <div class="beat-card-tags">
      ${locName?`<span class="tag" style="background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.25);font-size:10px;">⬡ ${escHtml(locName)}</span>`:''}
      ${charNames.map(n=>`<span class="tag" style="font-size:10px;">◉ ${escHtml(n)}</span>`).join('')}
    </div>
    <div class="beat-card-actions">
      <button class="btn-icon" style="font-size:11px;" title="Edit">✎</button>
      <button class="btn-icon" style="font-size:11px;color:var(--red);" title="Delete">✕</button>
    </div>`;
  card.querySelectorAll('.beat-card-actions button')[0].onclick=e=>{e.stopPropagation();openBeatDrawer(b,projectId,chars,locs,allBeats.length);};
  card.querySelectorAll('.beat-card-actions button')[1].onclick=e=>{e.stopPropagation();confirmDelete('Delete beat "'+b.title+'"?',async()=>{await fsDelete('beats',b.id);await renderBeatBoard(container,projectId);toast('Deleted');});};

  // Drag and drop
  let dragSrc=null;
  const board=()=>document.getElementById('beat-board');
  card.addEventListener('dragstart',e=>{dragSrc=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',b.id);});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');board()&&board().querySelectorAll('.beat-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';board()&&board().querySelectorAll('.beat-card').forEach(c=>c.classList.remove('drag-over'));card.classList.add('drag-over');});
  card.addEventListener('drop',async e=>{
    e.preventDefault();if(dragSrc===card)return;
    card.classList.remove('drag-over');
    const allCards=Array.from(board().querySelectorAll('.beat-card'));
    const srcIdx=allCards.indexOf(dragSrc),dstIdx=allCards.indexOf(card);
    if(srcIdx<dstIdx)card.after(dragSrc);else card.before(dragSrc);
    const reordered=Array.from(board().querySelectorAll('.beat-card'));
    await Promise.all(reordered.map((c,i)=>fsUpdate('beats',c.dataset.id,{order:i})));
    await renderBeatBoard(container,projectId);
  });
  return card;
}

function openBeatDrawer(beat,projectId,chars,locs,nextOrder){
  const isNew=!beat;const data=beat||{title:'',description:'',notes:'',locationId:'',characterIds:[],order:nextOrder||0};
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  const charOpts=chars.map(c=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg2);cursor:pointer;"><input type="checkbox" value="${c.id}" ${(data.characterIds||[]).includes(c.id)?'checked':''}> ${escHtml(c.name)}</label>`).join('');
  drawer.innerHTML=`
    <div class="drawer-header"><div class="drawer-title">${isNew?'New Beat':'Edit Beat'}</div><button class="btn-icon" onclick="this.closest('.drawer-overlay').remove()">✕</button></div>
    <div class="drawer-body">
      <div class="field"><label class="label">Title</label><input class="input" id="bd-title" value="${escHtml(data.title||'')}" placeholder="What happens in this beat?"></div>
      <div class="field"><label class="label">Description</label><textarea class="textarea" id="bd-desc" rows="3" placeholder="Describe the beat in detail...">${escHtml(data.description||'')}</textarea></div>
      <div class="field"><label class="label">Notes / Director's Notes</label><textarea class="textarea" id="bd-notes" rows="2" placeholder="Subtext, tone, visual ideas...">${escHtml(data.notes||'')}</textarea></div>
      <div class="field"><label class="label">Location</label><select class="select" id="bd-loc"><option value="">— No Location —</option>${locs.map(l=>`<option value="${l.id}"${data.locationId===l.id?' selected':''}>${escHtml(l.name)}</option>`).join('')}</select></div>
      ${chars.length?`<div class="field"><label class="label">Characters</label><div style="display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);">${charOpts}</div></div>`:''}
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this beat?',async()=>{await fsDelete('beats','${beat.id}');document.querySelector('.drawer-overlay').remove();renderBeatBoard(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="bd-save">Save Beat</button>
    </div>`;
  document.body.appendChild(overlay);overlay.appendChild(drawer);
  drawer.querySelector('#bd-save').onclick=async()=>{
    const cbs=Array.from(drawer.querySelectorAll('input[type="checkbox"]:checked')).map(c=>c.value);
    const up={title:v('bd-title'),description:v('bd-desc'),notes:v('bd-notes'),locationId:v('bd-loc'),characterIds:cbs};
    showSaving();
    if(isNew)await fsCreate('beats',{storyProjectId:projectId,order:nextOrder||0,...up});
    else await fsUpdate('beats',beat.id,up);
    showSaved();
    overlay.remove();
    await renderBeatBoard(document.getElementById('content'),projectId);
    toast(isNew?'Beat created':'Beat saved');
  };
}

</p><p data-type="dialogue">Folks! You look like people who know how to have a good time.</p><p data-type="character">GARY</p><p data-type="dialogue">Oh! We\'re from Akron.</p><p data-type="character">BRENDA</p><p data-type="dialogue">We don\'t do drugs, sweetheart.</p><p data-type="character">GARY</p><p data-type="dialogue">But we appreciate the offer. Very friendly city.</p><p data-type="action">Gary accepts Renzo\'s card with both hands, like it is a gift.</p><p data-type="transition">CUT TO:</p><p data-type="scene-heading">EXT. ALLEYWAY - BEHIND THE CAGE - NIGHT</p><p data-type="action">Buck steps out the back. At the end of the alley: a black SUV, engine running. Dark windows.</p><p data-type="action">Buck looks at it. Looks away. Heads for his car.</p><p data-type="scene-heading">INT. THE CAGE (BATHROOM) - MOMENTS LATER</p><p data-type="action">Buck pushes back through the door. He forgot his keys.</p><p data-type="action">He stops. The bathroom door is open. The light is on.</p><p data-type="action">ELENA is on the floor. She is not moving.</p><p data-type="action">He takes out his phone. Then stops. In the mirror: two men in the back room shadow. One taking photographs. The other watching Buck hold his phone.</p><p data-type="character">SAL (O.S.)</p><p data-type="parenthetical">(quiet, almost gentle)</p><p data-type="dialogue">Put the phone down, son. We have a situation that needs to be... resolved.</p><p data-type="transition">CUT TO:</p><p data-type="scene-heading">EXT. ALLEYWAY - MOMENTS LATER</p><p data-type="action">Buck gets to the Taurus. Key in the ignition. Nothing.</p><p data-type="action">He hits the dash. Turns the key three times. Waits.</p><p data-type="action">Behind him: the back door swings open. A man in a dark suit steps out.</p><p data-type="action">Buck turns the key. The Taurus starts. He pulls out without headlights.</p><p data-type="transition">SMASH CUT TO:</p><p data-type="scene-heading">EXT. FREMONT STREET EXPERIENCE - NIGHT</p><p data-type="action">Buck merges into the river of people. Paranoia is a physical sensation. Every face is a variable.</p><p data-type="action">He keeps moving.</p><p data-type="transition">FADE OUT.</p>',
