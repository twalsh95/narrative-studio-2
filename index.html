<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Narrative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Belleza&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK MODE (default) ── */
  :root, [data-theme="dark"] {
    --bg:#181f1a; --bg2:#1c2620; --bg3:#223028; --border:#2a3d2d; --border2:#3a5540;
    --primary:#52b788; --primary-d:#3d9e72; --primary-h:#74c99e;
    --accent:#6893ef; --accent2:#5ecac8;
    --fg:#d4ede0; --fg2:#8aad96; --fg3:#536b5c;
    --red:#e05c6f; --green:#6fcf97; --gold:#e5b86e; --teal:#5ecac8; --rose:#e578a8;
    --card-bg:#1c2620; --shadow:0 4px 24px rgba(0,0,0,0.5); --radius:12px; --radius-sm:8px;
    --topbar-bg:rgba(24,31,26,0.92);
    --active-bg:rgba(82,183,136,0.14);
    --tag-bg:rgba(82,183,136,0.12); --tag-color:#74c99e; --tag-border:rgba(82,183,136,0.2);
    --toolbar-active-bg:rgba(82,183,136,0.18);
    --input-focus-shadow:rgba(82,183,136,0.2);
    --btn-primary-shadow:rgba(82,183,136,0.3);
    --sp-char-color:#74c99e;
  }

  /* ── LIGHT MODE ── */
  [data-theme="light"] {
    --bg:#f2f3f1; --bg2:#e8ebe7; --bg3:#dde3da; --border:#d1d8d0; --border2:#b8c4b6;
    --primary:#2d6a4f; --primary-d:#1f4f3a; --primary-h:#3d8c6e;
    --accent:#2d5fa6; --accent2:#2a8a88;
    --fg:#1a2e22; --fg2:#3d5c48; --fg3:#7a9070;
    --red:#c0392b; --green:#27855a; --gold:#b8860b; --teal:#2a8a88; --rose:#b5446e;
    --card-bg:#ffffff; --shadow:0 2px 16px rgba(0,0,0,0.1); --radius:12px; --radius-sm:8px;
    --topbar-bg:rgba(242,243,241,0.95);
    --active-bg:rgba(45,106,79,0.1);
    --tag-bg:rgba(45,106,79,0.08); --tag-color:#2d6a4f; --tag-border:rgba(45,106,79,0.2);
    --toolbar-active-bg:rgba(45,106,79,0.12);
    --input-focus-shadow:rgba(45,106,79,0.15);
    --btn-primary-shadow:rgba(45,106,79,0.25);
    --sp-char-color:#2d6a4f;
  }

  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Lora',Georgia,serif;font-size:15px;line-height:1.6;transition:background 0.2s,color 0.2s;}
  #app{height:100%;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Belleza',serif;letter-spacing:0.03em;}
  ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Lora',serif;font-size:13px;transition:all 0.18s ease;white-space:nowrap;}
  .btn-primary{background:var(--primary);color:white;} .btn-primary:hover{background:var(--primary-d);transform:translateY(-1px);box-shadow:0 4px 12px var(--btn-primary-shadow);}
  .btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--border);} .btn-ghost:hover{background:var(--bg3);color:var(--fg);border-color:var(--border2);}
  .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,92,111,0.3);} .btn-danger:hover{background:rgba(224,92,111,0.1);}
  .btn-icon{padding:7px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;color:var(--fg3);transition:all 0.15s;font-size:14px;} .btn-icon:hover{background:var(--bg3);color:var(--fg);}
  .btn-sm{padding:5px 10px;font-size:12px;}

  /* ── Inputs ── */
  .input,.textarea,.select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);font-family:'Lora',serif;font-size:14px;outline:none;transition:border-color 0.2s;}
  .input:focus,.textarea:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--input-focus-shadow);}
  .textarea{resize:vertical;min-height:80px;line-height:1.6;} .select{appearance:none;cursor:pointer;}
  .input::placeholder,.textarea::placeholder{color:var(--fg3);}
  .label{font-size:12px;color:var(--fg3);margin-bottom:5px;display:block;letter-spacing:0.06em;text-transform:uppercase;}

  /* ── Topbar ── */
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Belleza',serif;font-size:22px;color:var(--primary);letter-spacing:0.08em;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg3);}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'Belleza',serif;font-size:14px;color:white;}
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--fg3);}
  .breadcrumb span{cursor:pointer;transition:color 0.15s;} .breadcrumb span:hover{color:var(--primary);} .breadcrumb .sep{opacity:0.4;}

  /* ── Theme toggle ── */
  .theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);transition:all 0.15s;}
  .theme-toggle:hover{border-color:var(--border2);}
  .toggle-track{width:34px;height:18px;border-radius:9px;background:var(--border2);position:relative;transition:background 0.2s;}
  .toggle-track.on{background:var(--primary);}
  .toggle-knob{width:12px;height:12px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:transform 0.2s;}
  .toggle-track.on .toggle-knob{transform:translateX(16px);}
  .toggle-label{font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;}

  /* ── Layout ── */
  #main{flex:1;display:flex;overflow:hidden;}
  #sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;}
  #content{flex:1;overflow-y:auto;}
  .sidebar-project{padding:16px 16px 10px;} .sidebar-project-name{font-family:'Belleza',serif;font-size:15px;color:var(--fg);margin-bottom:2px;line-height:1.3;} .sidebar-project-tag{font-size:11px;color:var(--fg3);}
  .sidebar-divider{height:1px;background:var(--border);margin:8px 0;}
  .nav-section{padding:6px 10px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--fg2);transition:all 0.15s;}
  .nav-item:hover{background:var(--bg3);color:var(--fg);} .nav-item.active{background:var(--active-bg);color:var(--primary);}
  .sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border);}
  .page{padding:32px 40px;max-width:1100px;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
  .page-title{font-family:'Belleza',serif;font-size:28px;color:var(--fg);} .page-subtitle{color:var(--fg3);font-size:13px;margin-top:3px;}
  #home-wrap{padding:40px;max-width:1100px;margin:0 auto;}
  .home-hero{text-align:center;padding:60px 20px 48px;}
  .home-hero h1{font-family:'Belleza',serif;font-size:48px;color:var(--primary);margin-bottom:10px;}
  .home-hero p{color:var(--fg3);font-size:16px;max-width:500px;margin:0 auto 32px;}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .project-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .project-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
  .project-card-color{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
  .project-card h3{font-family:'Belleza',serif;font-size:18px;margin-bottom:6px;color:var(--fg);}
  .project-card p{font-size:13px;color:var(--fg3);line-height:1.5;margin-bottom:16px;max-height:52px;overflow:hidden;}
  .project-card-footer{display:flex;align-items:center;justify-content:space-between;}
  .project-card-meta{font-size:11px;color:var(--fg3);}
  .project-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;} .project-card:hover .project-card-actions{opacity:1;}
  .color-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;} .color-swatch.selected{border-color:white;transform:scale(1.2);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--fg3);}
  .empty-state h3{font-family:'Belleza',serif;font-size:20px;color:var(--fg2);margin-bottom:8px;}
  .empty-state p{font-size:13px;max-width:340px;margin:0 auto 20px;}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .item-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all 0.2s;}
  .item-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,0.15);}
  .item-card h3{font-family:'Belleza',serif;font-size:16px;margin-bottom:6px;} .item-card p{font-size:12px;color:var(--fg3);line-height:1.5;}
  .item-card-footer{margin-top:14px;display:flex;justify-content:flex-end;gap:6px;opacity:0;transition:opacity 0.15s;} .item-card:hover .item-card-footer{opacity:1;}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;justify-content:flex-end;animation:fadeIn 0.15s;}
  .drawer{width:480px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn 0.2s ease;overflow:hidden;}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
  .drawer-title{font-family:'Belleza',serif;font-size:20px;}
  .drawer-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
  .drawer-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
  .field{display:flex;flex-direction:column;gap:6px;} .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--tag-bg);color:var(--tag-color);border:1px solid var(--tag-border);}
  .doc-list{display:flex;flex-direction:column;gap:10px;}
  .doc-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s;}
  .doc-item:hover{border-color:var(--border2);background:var(--bg3);}
  .doc-item-left h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:3px;}
  .doc-item-badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;}
  .badge-narrative{background:rgba(104,147,239,0.15);color:var(--accent);border:1px solid rgba(104,147,239,0.2);}
  .badge-screenplay{background:rgba(229,184,110,0.15);color:var(--gold);border:1px solid rgba(229,184,110,0.2);}
  .editor-view{display:flex;flex-direction:column;height:calc(100vh - 57px);}
  .editor-topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg2);}
  .editor-title-input{font-family:'Belleza',serif;font-size:18px;background:transparent;border:none;color:var(--fg);outline:none;flex:1;min-width:150px;}
  .editor-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
  .toolbar-btn{padding:5px 8px;border-radius:5px;background:transparent;border:none;cursor:pointer;color:var(--fg2);font-size:13px;transition:all 0.15s;font-family:'Lora',serif;}
  .toolbar-btn:hover{background:var(--bg3);color:var(--fg);} .toolbar-btn.active{background:var(--toolbar-active-bg);color:var(--primary);}
  /* Compact toolbar mode — hides text labels on type-selector buttons to save ~120px on Chromebooks */
  .editor-topbar.compact .type-btn{font-size:0;padding:5px 7px;min-width:24px;}
  .editor-topbar.compact .type-btn::before{font-size:10px;font-family:'JetBrains Mono',monospace;content:attr(data-short);}
  .editor-topbar.compact .toolbar-compact-toggle{opacity:1;}
  .toolbar-compact-toggle{background:transparent;border:none;cursor:pointer;color:var(--fg3);font-size:14px;padding:4px 6px;border-radius:4px;margin-left:auto;flex-shrink:0;transition:color 0.15s;}
  .toolbar-compact-toggle:hover{color:var(--fg);}
  .editor-body{flex:1;padding:40px;overflow-y:auto;}
  .editor-content{max-width:700px;margin:0 auto;min-height:400px;outline:none;font-size:16px;line-height:1.85;color:var(--fg);}
  .editor-content:empty::before{content:attr(data-placeholder);color:var(--fg3);pointer-events:none;}
  .editor-content p{margin-bottom:0.8em;}
  .editor-content h1,.editor-content h2,.editor-content h3{font-family:'Belleza',serif;color:var(--primary);margin:1.2em 0 0.5em;}
  .editor-content ul,.editor-content ol{padding-left:1.6em;margin-bottom:0.8em;}
  .editor-word-count{padding:8px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--fg3);text-align:right;background:var(--bg2);}
  .screenplay-body{flex:1;padding:40px;overflow-y:auto;background:var(--bg);}
  .screenplay-page{max-width:680px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:60px;min-height:600px;}
  .screenplay-content{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;outline:none;}
  .screenplay-content [data-type="scene-heading"]{text-transform:uppercase;font-weight:600;color:var(--fg);margin:1.4em 0 0.6em;}
  .screenplay-content [data-type="character"]{text-align:center;text-transform:uppercase;margin:1em 0 0;color:var(--sp-char-color);padding-left:160px;}
  .screenplay-content [data-type="dialogue"]{padding:0 80px;margin:0 0 0.4em;color:var(--fg2);}
  .screenplay-content [data-type="parenthetical"]{text-align:center;padding:0 120px;color:var(--fg3);font-style:italic;margin:0;}
  .screenplay-content [data-type="action"]{margin:0.7em 0;color:var(--fg);}
  .screenplay-content [data-type="transition"]{text-align:right;text-transform:uppercase;font-weight:600;margin:1.2em 0;color:var(--fg3);}
  .screenplay-type-selector{display:flex;gap:6px;flex-wrap:wrap;}
  .type-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--fg3);transition:all 0.15s;}
  .type-btn:hover{border-color:var(--border2);color:var(--fg);} .type-btn.active{background:var(--toolbar-active-bg);color:var(--primary);border-color:var(--border2);}
  /* Autofill suggestion dropdown */
  .sp-suggest{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);min-width:180px;z-index:50;box-shadow:var(--shadow);overflow:hidden;}
  .sp-suggest-item{padding:8px 14px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--fg2);cursor:pointer;transition:background 0.1s;}
  .sp-suggest-item:hover,.sp-suggest-item.focused{background:var(--active-bg);color:var(--primary);}
  /* ── v2 (scene-aware) chrome ── */
  .v2-status-bar{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg2);font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--fg3);flex-wrap:wrap;}
  .v2-status-bar .v2-stat{display:inline-flex;align-items:center;gap:5px;}
  .v2-status-bar .v2-stat strong{color:var(--fg2);font-weight:500;}
  .v2-status-bar .v2-spacer{flex:1;}
  .v2-mode-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;border:1px solid var(--border);background:var(--bg3);color:var(--fg2);}
  .v2-mode-pill.draft{color:var(--fg2);}
  .v2-mode-pill.locked{color:var(--gold);background:rgba(229,184,110,0.08);border-color:rgba(229,184,110,0.25);}
  .v2-mode-pill.production{color:var(--rose);background:rgba(229,120,168,0.08);border-color:rgba(229,120,168,0.25);}
  .v2-body-wrap{flex:1;display:flex;overflow:hidden;}
  .v2-navigator{width:240px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:width 0.2s,padding 0.2s;}
  .v2-navigator.collapsed{width:0;padding:0;border-right:0;overflow:hidden;}
  .v2-nav-header{padding:14px 16px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;color:var(--fg3);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
  .v2-nav-list{padding:0 8px 16px;display:flex;flex-direction:column;gap:2px;}
  .v2-nav-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--fg2);line-height:1.4;}
  .v2-nav-item:hover{background:var(--bg3);}
  .v2-nav-item.active{background:var(--active-bg);color:var(--primary);}
  .v2-nav-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg3);flex-shrink:0;min-width:28px;padding-top:1px;}
  .v2-nav-item.active .v2-nav-num{color:var(--primary);}
  .v2-nav-text{flex:1;overflow:hidden;}
  .v2-nav-slug{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .v2-nav-meta{font-size:10px;color:var(--fg3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
  .v2-nav-orphan{font-size:9px;color:var(--gold);font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
  /* Gutter overlay container — sits on top of editor area, pointer-events disabled
     except on individual chips which re-enable them. The layer must span the full
     scrollable content height so chips stay positioned with their sluglines. */
  .v2-gutter-layer{position:absolute;left:0;top:0;width:100%;min-height:100%;pointer-events:none;z-index:5;}
  .v2-gutter-num{position:absolute;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg3);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;pointer-events:auto;transition:all 0.12s;user-select:none;line-height:1.4;}
  .v2-gutter-num:hover{background:var(--bg3);color:var(--fg);border-color:var(--border2);}
  .v2-gutter-num.manual{color:var(--teal);border-color:rgba(94,202,200,0.35);background:rgba(94,202,200,0.06);}
  .v2-gutter-num.locked{color:var(--gold);border-color:rgba(229,184,110,0.3);background:rgba(229,184,110,0.05);}
  .v2-gutter-prompt{position:absolute;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);background:var(--bg2);border:1px dashed rgba(229,184,110,0.4);border-radius:4px;padding:1px 6px;cursor:pointer;pointer-events:auto;transition:all 0.12s;user-select:none;line-height:1.4;}
  .v2-gutter-prompt:hover{background:rgba(229,184,110,0.08);border-style:solid;}
  /* Number-edit popover */
  .v2-num-popover{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:12px;z-index:80;min-width:220px;}
  .v2-num-popover .v2-pop-title{font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;color:var(--fg3);margin-bottom:8px;}
  .v2-num-popover input{width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:13px;}
  .v2-num-popover .v2-pop-hint{font-size:10px;color:var(--fg3);margin-top:6px;line-height:1.4;}
  .v2-num-popover .v2-pop-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end;}
  /* Editor body needs relative positioning so gutter overlay can absolute-position correctly */
  .v2-editor-host{flex:1;overflow-y:auto;background:var(--bg);position:relative;}
  .v2-editor-host .screenplay-page{margin-left:60px;margin-right:20px;}
  /* ── Block-based v2 editor flow ── */
  .v2-flow{max-width:8.5in;margin:0 auto;padding:30px 40px 60px;}
  .v2-block{position:relative;padding-left:50px;padding-right:30px;margin-bottom:18px;border-radius:6px;transition:background 0.15s;}
  .v2-block:hover{background:rgba(255,255,255,0.012);}
  .v2-block.preamble{padding-left:30px;}
  .v2-block.placeholder{padding:0;}
  .v2-block.highlight-pulse{background:var(--toolbar-active-bg);transition:background 0.6s;}
  .v2-block-num{position:absolute;left:8px;top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg3);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;user-select:none;line-height:1.4;transition:all 0.12s;}
  .v2-block-num:hover{background:var(--bg3);color:var(--fg);border-color:var(--border2);}
  .v2-block-num.manual{color:var(--teal);border-color:rgba(94,202,200,0.35);background:rgba(94,202,200,0.06);}
  .v2-block-num.locked{color:var(--gold);border-color:rgba(229,184,110,0.3);background:rgba(229,184,110,0.05);}
  .v2-block-editor{outline:none;min-height:1.6em;}
  .v2-block-editor:focus{background:transparent;}
  /* Subtle separator between blocks */
  .v2-block + .v2-block::before{content:'';position:absolute;left:50px;right:30px;top:-9px;height:1px;background:linear-gradient(to right, transparent, var(--border), transparent);opacity:0.5;}
  /* Placeholder block card style */
  .v2-placeholder-card{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:18px 22px;margin:8px 0;transition:border-color 0.2s;}
  .v2-placeholder-card:hover{border-color:var(--primary);}
  .v2-placeholder-card-slug{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;color:var(--fg2);font-weight:600;margin-bottom:6px;}
  .v2-placeholder-card-desc{font-size:12px;color:var(--fg3);line-height:1.55;margin-bottom:8px;}
  .v2-nav-item.placeholder{opacity:0.7;font-style:italic;}
  /* Old placeholder strip (kept for any legacy refs but not used in 3a) */
  .v2-placeholder{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;transition:border-color 0.2s;}
  .v2-placeholder:hover{border-color:var(--primary);}
  .v2-placeholder-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
  .v2-placeholder-num{font-size:10px;color:var(--fg3);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;}
  .v2-placeholder-slug{font-size:12px;text-transform:uppercase;color:var(--fg2);font-weight:600;}
  .v2-placeholder-desc{font-size:12px;color:var(--fg3);line-height:1.55;margin-bottom:12px;max-height:60px;overflow:hidden;}
  .v2-placeholder-actions{display:flex;gap:8px;}
  .v2-placeholder.drafted{border-color:rgba(94,202,200,0.35);background:rgba(94,202,200,0.04);}
  .v2-placeholder.drafted .v2-placeholder-slug{color:var(--teal);}
  /* Conflict resolution modal */
  .v2-conflict-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s;}
  .v2-conflict-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);max-width:900px;width:95%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.4);}
  .v2-conflict-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .v2-conflict-header h3{font-family:'Belleza',serif;font-size:17px;color:var(--fg);}
  .v2-conflict-body{flex:1;display:flex;overflow:hidden;min-height:0;}
  .v2-conflict-side{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .v2-conflict-side+.v2-conflict-side{border-left:1px solid var(--border);}
  .v2-conflict-side-head{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;color:var(--fg3);background:var(--bg3);}
  .v2-conflict-side-body{flex:1;overflow-y:auto;padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;color:var(--fg2);}
  .v2-conflict-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
  .scene-list{display:flex;flex-direction:column;gap:10px;}
  .scene-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;gap:14px;align-items:flex-start;transition:all 0.2s;}
  .scene-item:hover{border-color:var(--border2);}
  .scene-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3);background:var(--bg3);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
  .scene-body{flex:1;} .scene-body h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:4px;} .scene-body p{font-size:12px;color:var(--fg3);}
  .scene-chars{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .world-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .world-section h3{font-family:'Belleza',serif;font-size:15px;color:var(--primary);margin-bottom:10px;}
  .world-section-guide{font-size:11px;color:var(--fg3);margin-bottom:8px;line-height:1.5;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);border-left:2px solid var(--primary);}
  .wb-template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:8px;}
  .wb-template-card{background:var(--card-bg);border:2px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .wb-template-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
  .wb-template-card.selected{border-color:var(--primary);background:var(--active-bg);}
  .wb-template-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
  .wb-template-icon{font-size:28px;margin-bottom:10px;}
  .wb-template-name{font-family:'Belleza',serif;font-size:18px;color:var(--fg);margin-bottom:6px;}
  .wb-template-desc{font-size:12px;color:var(--fg3);line-height:1.55;}
  .wb-template-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
  .wb-template-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--fg3);border:1px solid var(--border);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease;}
  .modal-title{font-family:'Belleza',serif;font-size:22px;margin-bottom:20px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
  #toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:500;}
  .toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--fg);box-shadow:var(--shadow);animation:toastIn 0.2s ease;min-width:200px;}
  .toast.success{border-left:3px solid var(--green);} .toast.error{border-left:3px solid var(--red);} .toast.info{border-left:3px solid var(--accent);}
  @keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .outline-list{display:flex;flex-direction:column;gap:6px;}
  .outline-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .outline-handle{color:var(--fg3);cursor:grab;font-size:14px;padding-top:1px;}
  .outline-content{flex:1;} .outline-content input{background:transparent;border:none;outline:none;font-family:'Lora',serif;font-size:14px;color:var(--fg);width:100%;} .outline-content input::placeholder{color:var(--fg3);}
  .outline-level{display:flex;gap:4px;margin-top:6px;}
  .stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;cursor:pointer;transition:border-color 0.2s;}
  .stat-card:hover{border-color:var(--border2);}
  .stat-num{font-family:'Belleza',serif;font-size:32px;color:var(--primary);} .stat-label{font-size:12px;color:var(--fg3);}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:400px;max-width:95vw;}
  .auth-logo{font-family:'Belleza',serif;font-size:28px;color:var(--primary);text-align:center;margin-bottom:6px;}
  .auth-sub{text-align:center;color:var(--fg3);font-size:13px;margin-bottom:32px;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--fg3);border-bottom:2px solid transparent;transition:all 0.15s;}
  .auth-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .auth-error{background:rgba(224,92,111,0.1);border:1px solid rgba(224,92,111,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;}
  .saving-indicator{font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;}
  /* Guided prompts toggle */
  .guide-toggle{font-size:12px;color:var(--primary);cursor:pointer;margin-bottom:6px;display:inline-flex;align-items:center;gap:4px;opacity:0.8;}
  .guide-toggle:hover{opacity:1;}
  /* Phase 4 — Props */
  .props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  /* Phase 4 — Linking */
  .link-btn{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid;text-decoration:none;transition:opacity 0.15s;}
  .link-btn:hover{opacity:0.75;}
  .link-btn.pinned::after{content:' 📌';font-size:9px;opacity:0.7;vertical-align:middle;}
  .link-char{background:rgba(82,183,136,0.12);color:var(--primary);border-color:rgba(82,183,136,0.25);}
  .link-loc{background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.25);}
  .link-scene{background:rgba(104,147,239,0.1);color:var(--accent);border-color:rgba(104,147,239,0.25);}
  .link-prop{background:rgba(229,184,110,0.1);color:var(--gold);border-color:rgba(229,184,110,0.25);}
  .link-popover{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 4px;z-index:60;box-shadow:var(--shadow);min-width:160px;animation:fadeIn 0.1s;}
  .link-popover-title{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg3);padding:4px 10px 6px;font-family:'JetBrains Mono',monospace;}
  .link-popover-item{padding:6px 10px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--fg2);display:flex;align-items:center;gap:7px;transition:background 0.1s;}
  .link-popover-item:hover{background:var(--active-bg);color:var(--primary);}
  .link-popover-sep{height:1px;background:var(--border);margin:4px 0;}

  /* Floating selection tooltip — appears next to a text selection inside any
     link-aware editor. One global instance, repositioned via selectionchange. */
  .link-selection-tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 11px;font-family:'Lora',serif;font-size:12px;color:var(--fg);cursor:pointer;box-shadow:var(--shadow);z-index:65;display:none;align-items:center;gap:5px;transition:opacity 0.12s;animation:fadeIn 0.1s;}
  .link-selection-tooltip:hover{background:var(--bg3);border-color:var(--primary);color:var(--primary);}
  .link-selection-tooltip.visible{display:inline-flex;}

  /* ── Pinned Cards system ─────────────────────────────────────────────── */
  /* Floating card — free-positioned overlay used for entity quick references.
     Cards default compact: title bar visible, body collapsed. Dragging the
     title bar repositions; dropping over the dock zone snaps into the dock. */
  .pin-card{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:55;width:280px;display:flex;flex-direction:column;font-family:'Lora',serif;animation:fadeIn 0.12s;}
  .pin-card.dragging{opacity:0.85;cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,0.35);z-index:70;transition:none;}
  .pin-card-header{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border-bottom:1px solid var(--border);border-radius:var(--radius-sm) var(--radius-sm) 0 0;cursor:grab;user-select:none;}
  .pin-card-header:active{cursor:grabbing;}
  .pin-card.collapsed .pin-card-header{border-bottom:0;border-radius:var(--radius-sm);}
  .pin-card-icon{font-size:13px;flex-shrink:0;}
  .pin-card-title{flex:1;font-size:12px;font-weight:600;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Lora',serif;}
  .pin-card-type{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg3);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
  .pin-card-btn{background:none;border:0;color:var(--fg3);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;line-height:1;transition:background 0.1s,color 0.1s;}
  .pin-card-btn:hover{background:var(--active-bg);color:var(--primary);}
  .pin-card-body{padding:14px 14px 12px;max-height:340px;overflow-y:auto;}
  .pin-card.collapsed .pin-card-body{display:none;}
  .pin-card .char-card-section{margin-top:8px;}
  .pin-card .char-card-section:first-child{margin-top:0;}

  /* Pin Dock — right-side column anchoring docked cards. Lives inside the
     editor's body wrap as a third flex column. Collapsible to a thin strip. */
  .pin-dock{width:300px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width 0.2s;overflow:hidden;}
  .pin-dock.collapsed{width:36px;}
  .pin-dock-header{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg3);flex-shrink:0;}
  .pin-dock.collapsed .pin-dock-header{padding:10px 8px;justify-content:center;border-bottom:0;}
  .pin-dock-title{flex:1;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg3);font-family:'JetBrains Mono',monospace;}
  .pin-dock.collapsed .pin-dock-title{display:none;}
  .pin-dock-toggle{background:none;border:0;color:var(--fg3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:3px;}
  .pin-dock-toggle:hover{background:var(--active-bg);color:var(--primary);}
  .pin-dock-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .pin-dock.collapsed .pin-dock-body{display:none;}
  .pin-dock.drag-over{background:rgba(94,202,200,0.08);}
  .pin-dock.drag-over .pin-dock-header{background:rgba(94,202,200,0.15);}
  .pin-dock-empty{color:var(--fg3);font-size:11px;text-align:center;padding:30px 14px;line-height:1.6;font-style:italic;}
  .pin-dock-empty-icon{font-size:24px;display:block;margin-bottom:8px;opacity:0.4;}

  /* Docked card — sits inside the dock body. Same anatomy as floating but
     uses static positioning and full-width within the dock column. */
  .pin-docked{position:static;width:auto;box-shadow:none;border:1px solid var(--border);}
  .pin-docked.dragging{position:fixed;width:280px;box-shadow:0 8px 24px rgba(0,0,0,0.35);z-index:70;}
  .pin-card-deleted{padding:14px;font-size:12px;color:var(--rose);font-style:italic;text-align:center;}
  /* Phase 4 — Beat Board */
  .beat-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:4px 2px;}
  .beat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:grab;transition:all 0.2s;position:relative;}
  .beat-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,0.2);}
  .beat-card.dragging{opacity:0.4;cursor:grabbing;}
  .beat-card.drag-over{border-color:var(--primary);background:var(--active-bg);}
  .beat-card-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg3);margin-bottom:6px;}
  .beat-card-title{font-family:'Belleza',serif;font-size:14px;color:var(--fg);margin-bottom:6px;line-height:1.3;}
  .beat-card-desc{font-size:11px;color:var(--fg3);line-height:1.5;margin-bottom:8px;}
  .beat-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .beat-card-actions{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity 0.15s;}
  .beat-card:hover .beat-card-actions{opacity:1;}
  .beat-add-card{background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--fg3);font-size:13px;transition:all 0.2s;min-height:80px;}
  .beat-add-card:hover{border-color:var(--primary);color:var(--primary);background:var(--active-bg);}

  /* Document Library */
  .doclibrary-list{display:flex;flex-direction:column;gap:10px;}
  .doclibrary-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:all 0.2s;}
  .doclibrary-item:hover{border-color:var(--border2);}
  .doclibrary-item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
  .doclibrary-item-title{font-family:'Belleza',serif;font-size:15px;color:var(--fg);}
  .doclibrary-item-meta{font-size:11px;color:var(--fg3);margin-top:2px;}
  .doclibrary-versions{display:flex;flex-direction:column;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .doclibrary-version{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--bg3);border-radius:var(--radius-sm);font-size:12px;color:var(--fg2);}
  .doclibrary-version-label{display:flex;align-items:center;gap:8px;}
  .version-badge{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--active-bg);color:var(--primary);padding:2px 7px;border-radius:10px;}
  .version-current{background:var(--primary);color:white;}
  /* PDF preview overlay */
  .pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s;}
  .pdf-frame{background:#f8f8f4;width:min(860px,95vw);max-height:92vh;border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .pdf-frame-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#2d6a4f;color:white;}
  .pdf-frame-title{font-family:'Belleza',serif;font-size:16px;letter-spacing:0.04em;}
  .pdf-frame-actions{display:flex;gap:8px;}
  .pdf-frame-body{flex:1;overflow-y:auto;padding:0;}
  /* Outline tabs */
  .outline-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;}
  .outline-tab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--fg3);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;font-family:'Lora',serif;}
  .outline-tab:hover{color:var(--fg2);}
  .outline-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .outline-tab-add{padding:9px 12px;font-size:18px;cursor:pointer;color:var(--fg3);line-height:1;transition:color 0.15s;}
  .outline-tab-add:hover{color:var(--primary);}
  /* Draggable outline items */
  .outline-item{cursor:grab;user-select:none;}
  .outline-item.dragging{opacity:0.4;cursor:grabbing;}
  .outline-item.drag-over{border-color:var(--primary);background:var(--active-bg);}

  /* ── Phase 5A — Classroom System ── */
  .mode-toggle{display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;}

<script type="module">

const firebaseConfig = {

// ══════════════════════════════════════════════
//  THEME SYSTEM
// ══════════════════════════════════════════════
let currentTheme = 'dark';

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.toggle-track').forEach(t => t.classList.toggle('on', theme === 'light'));
  document.querySelectorAll('.toggle-label').forEach(t => t.textContent = theme === 'light' ? 'Light' : 'Dark');
}

function toggleTheme() {
  const next = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (currentUser) {
    fsUpdate('userPrefs', 'prefs', { theme: next }).catch(async () => {
      try { await fsCreate('userPrefs', { theme: next }); } catch {}
    });
  }
}

async function loadUserTheme() {
  try {
    const prefs = await fsGet('userPrefs', 'prefs');
    applyTheme(prefs && prefs.theme ? prefs.theme : 'dark');
  } catch { applyTheme('dark'); }
}

function themeToggleEl() {
  const wrap = document.createElement('div');
  wrap.className = 'theme-toggle';
  wrap.onclick = toggleTheme;
  wrap.innerHTML = `<div class="toggle-track${currentTheme==='light'?' on':''}"><div class="toggle-knob"></div></div><span class="toggle-label">${currentTheme==='light'?'Light':'Dark'}</span>`;
  return wrap;
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const COLOR_MAP = {purple:'#9378ca',blue:'#6893ef',teal:'#5ecac8',rose:'#e578a8',red:'#e05c6f',gold:'#e5b86e',green:'#6fcf97',gray:'#7a7090'};
function colorStyle(label){return COLOR_MAP[label]||COLOR_MAP.purple;}
function relativeTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff=Date.now()-d.getTime(), s=Math.floor(diff/1000), m=Math.floor(s/60), h=Math.floor(m/60), dy=Math.floor(h/24);
  if(s<60) return 'just now'; if(m<60) return m+'m ago'; if(h<24) return h+'h ago';
  if(dy===1) return 'yesterday'; if(dy<30) return dy+'d ago';
  return d.toLocaleDateString();
}
function toast(msg, type='success'){
  const e=document.createElement('div'); e.className='toast '+type; e.textContent=msg;
  document.getElementById('toast-container').appendChild(e);
  setTimeout(()=>e.remove(), 2800);
}
function el(tag, attrs, children){
  attrs=attrs||{}; children=children||[];
  const e=document.createElement(tag);
  Object.keys(attrs).forEach(k=>{
    const v=attrs[k];
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  const kids=Array.isArray(children)?children:[children];
  kids.forEach(c=>{
    if(c===null||c===undefined) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function v(id){const e=document.getElementById(id); return e?e.value.trim():'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Alias used throughout the PDF engine
const escHtml = esc;
function wordCount(html){const t=html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim(); return t?t.split(' ').length:0;}
function showSaving(){ setSavingIndicator('◌ Saving…','var(--fg3)'); }

// ══════════════════════════════════════════════
//  FIRESTORE HELPERS
// ══════════════════════════════════════════════
let currentUser = null;

function userCol(colName){ return collection(db,'users',currentUser.uid,colName); }
function userDoc(colName,id){ return doc(db,'users',currentUser.uid,colName,id); }

async function fsCreate(colName, data){
  const ref = await addDoc(userCol(colName), {...data, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
  return ref.id;
}
async function fsGet(colName, id){
  const snap = await getDoc(userDoc(colName,id));
  return snap.exists() ? {id:snap.id,...snap.data()} : null;
}
async function fsQuery(colName, ...constraints){
  const q = query(userCol(colName), ...constraints);
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fsUpdate(colName, id, data){
  await updateDoc(userDoc(colName,id), {...data, updatedAt:serverTimestamp()});
}
async function fsDelete(colName, id){
  await deleteDoc(userDoc(colName,id));
}
async function fsBatchDelete(colName, fieldName, value){
  const items = await fsQuery(colName, where(fieldName,'==',value));
  if(!items.length) return;
  const batch = writeBatch(db);
  items.forEach(item => batch.delete(userDoc(colName,item.id)));
  await batch.commit();
}

// ══════════════════════════════════════════════
//  PHASE 5A — CLASSROOM CONSTANTS & HELPERS
// ══════════════════════════════════════════════
const TEACHER_UID = 'vCXND7JhhscwvGoWS4kztBBDmbk2';
function isTeacher(){ return currentUser && currentUser.uid === TEACHER_UID; }

// Classroom Firestore helpers (top-level collections, not user-scoped)
function classroomDoc(classroomId){ return doc(db,'classrooms',classroomId); }
function classroomMemberDoc(classroomId,uid){ return doc(db,'classrooms',classroomId,'members',uid); }
function classroomMembersCol(classroomId){ return collection(db,'classrooms',classroomId,'members'); }

async function getAllClassrooms(){
  const q = query(collection(db,'classrooms'), where('teacherUid','==',TEACHER_UID));
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function getClassroomMembers(classroomId){
  const snap = await getDocs(classroomMembersCol(classroomId));
  return snap.docs.map(d=>({uid:d.id,...d.data()}));
}

async function getStudentClassrooms(uid){
  // Find all classrooms where this student is a member
  const allQ = query(collection(db,'classrooms'), where('teacherUid','==',TEACHER_UID), where('archived','==',false));
  const snap = await getDocs(allQ);
  const results = [];
  for(const d of snap.docs){
    const memberSnap = await getDoc(doc(db,'classrooms',d.id,'members',uid));
    if(memberSnap.exists()) results.push({id:d.id,...d.data()});
  }
  return results;
}

function generateClassCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<8;i++){
    if(i===4) code+='-';
    code+=chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

async function createClassroom(name){
  const code = generateClassCode();
  const ref = doc(collection(db,'classrooms'));
  await setDoc(ref,{
    name, code, teacherUid:TEACHER_UID,
    archived:false,
    createdAt:serverTimestamp(), updatedAt:serverTimestamp()
  });
  return {id:ref.id, name, code};
}

async function joinClassroomByCode(code){
  const q = query(collection(db,'classrooms'), where('code','==',code.toUpperCase().trim()), where('archived','==',false));
  const snap = await getDocs(q);
  if(snap.empty) return null;
  const classroomId = snap.docs[0].id;
  const data = snap.docs[0].data();
  await setDoc(classroomMemberDoc(classroomId, currentUser.uid),{
    displayName: currentUser.displayName||currentUser.email,
    email: currentUser.email,
    joinedAt: serverTimestamp()
  });
  return {id:classroomId,...data};

// Get student stats from their Firestore subtree
async function getStudentStats(studentUid){
  try{
    const stuCol = (c)=>collection(db,'users',studentUid,c);
    const [projSnap, scenesSnap, docsSnap] = await Promise.all([
      getDocs(query(stuCol('projects'), limit(50))),
      getDocs(query(stuCol('scenes'), limit(200))),
      getDocs(query(stuCol('generatedDocs'), limit(50))),
    ]);
    const allDocs = await getDocs(query(stuCol('documents'), limit(50)));
    let totalWords = 0;
    allDocs.docs.forEach(d=>{
      const html = d.data().content||'';
      const txt = html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      if(txt) totalWords += txt.split(' ').length;
    });
    // approximate last active
    let lastActive = null;
    [...projSnap.docs,...allDocs.docs].forEach(d=>{
      const ua = d.data().updatedAt;
      if(ua && (!lastActive || ua.seconds > lastActive.seconds)) lastActive = ua;
    });
    return {
      projects: projSnap.size,
      scenes: scenesSnap.size,
      wordCount: totalWords,
      documents: docsSnap.size,
      lastActive
    };
  } catch(e){ return {projects:'—',scenes:'—',wordCount:'—',documents:'—',lastActive:null}; }
}

// Tear down every pin workspace currently mounted. Used during navigation
// so floating cards from the previous editor session don't leak into the
// next view. Defined here as a forward-reference; the actual implementation
// lives in the Pin Workspace module further down.
function destroyAllPinWorkspaces(){
  if(typeof _activeWorkspaces === 'undefined') return;
  // Snapshot the set since destroy() mutates it
  const snapshot = Array.from(_activeWorkspaces);
  snapshot.forEach(ws => { try { ws.destroy(); } catch(e){} });
}

async function render(){
  const {page,projectId,sub,subId} = currentRoute;
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const bc = document.getElementById('breadcrumb-area');
  const tr = document.getElementById('topbar-right');

  tr.innerHTML = '';
  const savingSpan = document.createElement('span');
  savingSpan.id = 'saving-indicator';
  savingSpan.className = 'saving-indicator';
  tr.appendChild(savingSpan);

  if(page==='classView'){
    sidebar.style.display='none';
    bc.innerHTML='';
    renderClassViewButtons(tr);
    await renderClassView(content);
  } else if(page==='home'){
    sidebar.style.display='none';
    bc.innerHTML='';
    renderHomeButtons(tr);
    await renderHome(content);
  } else if(page==='dashboard'){
    sidebar.style.display='flex';
    sidebar.style.flexDirection='column';
    await renderSidebar(sidebar, projectId, sub||'overview');
    renderBreadcrumb(bc, projectId, sub);
    renderDashboardButtons(tr);
    const s = sub||'overview';
    if(s==='overview')        await renderOverview(content, projectId);
    else if(s==='characters') await renderCharacters(content, projectId);
    else if(s==='locations')  await renderLocations(content, projectId);
    else if(s==='scenes')     await renderScenes(content, projectId);
    else if(s==='world')      await renderWorld(content, projectId);
    else if(s==='outline')    await renderOutline(content, projectId);
    else if(s==='props')      await renderProps(content, projectId);
    else if(s==='beatboard')  await renderBeatBoard(content, projectId);
    else if(s==='library')    await renderDocumentLibrary(content, projectId);
    else if(s==='writing'){
      if(subId) await renderEditor(content, projectId, subId);
      else await renderWritingDesk(content, projectId);
    }
  }
}

  const card = el('div',{class:'classroom-card'+(isArchived?' archived':'')});

    }
    sec.append(lbl, txt);
    return sec;
  }

  // ── Helper: inject teacher feedback button for this context ──
  function injectTeacherFeedback(context, label){
    if(isTeacher()) injectFeedbackButton(studentUid, context, projectId, label);
  }

  container.innerHTML='';
  const wrap = el('div',{class:'page'});

        if(c.occupation) addMeta(c.occupation);

        if(c.nationality) addMeta(c.nationality);

        if(c.traits){ const t=el('div',{class:'char-card-traits'});t.textContent=c.traits;card.appendChild(t); }

        if(c.skinTone) appearParts.push('Skin: '+c.skinTone);

        const appearText = appearParts.length ? appearParts.join(' · ') : (c.appearance||'');

        const f2 = roField('Distinguishing Marks', c.distinguishingMarks); if(f2) card.appendChild(f2);
        const f3 = roField('First Impression', c.firstImpression); if(f3) card.appendChild(f3);

        const voiceParts=[c.speakingStyle,c.speechHabit,c.humor?'Humor: '+c.humor:''].filter(Boolean);
        const f4 = roField('Voice & Manner', voiceParts.join(' · ')); if(f4) card.appendChild(f4);

        const psychParts=[c.personality,c.internalConflict].filter(Boolean);
        const f5 = roField('Psychology', psychParts.join(' / ')); if(f5) card.appendChild(f5);
        const fearDesire=[c.fear&&'Fear: '+c.fear, c.desire&&'Desire: '+c.desire].filter(Boolean);
        const f6 = roField('Fear / Desire', fearDesire.join('  ·  ')); if(f6) card.appendChild(f6);

        const bsText = c.backstory||(c.childhoodHome||c.formativeEvent ? [c.childhoodHome&&'From: '+c.childhoodHome,c.formativeEvent].filter(Boolean).join('. '):'');
        const f7 = roField('Backstory', bsText, {truncate:300}); if(f7) card.appendChild(f7);
        const f8 = roField('The Wound', c.wound); if(f8) card.appendChild(f8);
        const f9 = roField('Secret', c.secret); if(f9) card.appendChild(f9);

        const roleParts=[c.wantVsNeed,c.motivation].filter(Boolean);
        const f10 = roField('Want / Need / Motivation', roleParts.join(' · ')); if(f10) card.appendChild(f10);
        const f11 = roField('Character Arc', c.arc); if(f11) card.appendChild(f11);
        const f12 = roField('Role in Story', c.storyRole); if(f12) card.appendChild(f12);

        const tags=[];
        if(c.flaw) tags.push({text:'Flaw: '+c.flaw,color:'var(--rose)'});
        if(c.strength) tags.push({text:'Strength: '+c.strength,color:'var(--green)'});
        if(c.secret) tags.push({text:'Has a secret',color:'var(--accent)'});

          tags.forEach(t=>{ const tg=el('span',{class:'tag',style:'font-size:10px;color:'+t.color+';background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);'});tg.textContent=t.text;tagsEl.appendChild(tg); });
          card.appendChild(tagsEl);
        }
        grid.appendChild(card);
      });
      wrap.appendChild(grid);
    }
    injectTeacherFeedback('characters','Characters');

  // ══════════════════════════════════════════════
  //  LOCATIONS — full field parity
  // ══════════════════════════════════════════════
  } else if(sub==='locations'){

  // ══════════════════════════════════════════════
  } else if(sub==='scenes'){

        if(sc.sceneGoal||sc.charAWant||sc.charBWant){
          const parts=[sc.sceneGoal&&'Goal: '+sc.sceneGoal, sc.charAWant&&'A wants: '+sc.charAWant, sc.charBWant&&'B wants: '+sc.charBWant].filter(Boolean);

async function viewStudentDoc(container, doc2, sub, studentUid, projectId, stuDoc, stuCol){
  container.innerHTML='';
  const page=el('div',{class:'page',style:'display:flex;flex-direction:column;height:calc(100vh - 57px);'});
  const headerBar = el('div',{style:'flex-shrink:0;'});
  const backBtn=el('button',{class:'btn btn-ghost btn-sm',style:'margin-bottom:18px',onclick:()=>{
    if(page._pinWorkspace) page._pinWorkspace.destroy();
    renderStudentSubView(container,studentUid,projectId,sub,stuDoc,stuCol);
  }});backBtn.textContent='← Back to Documents';
  headerBar.appendChild(backBtn);
  const title=el('div',{class:'page-title',style:'margin-bottom:16px'});title.textContent=doc2.title||'Untitled';
  headerBar.appendChild(title);
  page.appendChild(headerBar);

  // Body wrap: read-only content on the left, teacher's pin dock on the right
  const bodyWrap=el('div',{style:'flex:1;display:flex;overflow:hidden;border-top:1px solid var(--border);'});
  const body=el('div',{class:'editor-body',style:'padding:20px;flex:1;overflow-y:auto;'});
  // Read-only doc view: text is non-interactive (no editing) but the teacher
  // can still click linked entity chips to open the quick-reference card. We
  // achieve this by disabling pointer events on the content wrapper, then
  // re-enabling them on .link-btn descendants via inline style.
  const content=el('div',{class:'editor-content',style:'max-width:700px;pointer-events:none;'});
  content.innerHTML=doc2.content||'<p style="color:var(--fg3)">No content yet.</p>';

  // ── Teacher Pin Workspace ──
  // Pins are stored on the teacher's account, scoped to studentUid + docId.
  // Async load — must happen before the workspace is created so initial pins
  // render correctly.
  const teacherCtx = makeTeacherPinContext(studentUid, doc2.id, projectId, stuDoc);
  await teacherCtx.ensureLoaded();
  const teacherPinWorkspace = createPinWorkspace({ host: bodyWrap, ctx: teacherCtx });
  page._pinWorkspace = teacherPinWorkspace;

  // Re-enable click on link chips and route them to openLinkedCard with the
  // STUDENT'S project context (so the lookups hit the student's collections).
  // The drawer's pin button will use the active workspace (teacher's).
  content.querySelectorAll('.link-btn').forEach(span => {
    span.style.pointerEvents = 'auto';
    span.style.cursor = 'pointer';
    span.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      const type = span.dataset.linkType, id = span.dataset.linkId;
      // Wire pin context so the drawer offers a Pin button targeting the
      // teacher's workspace.
      const pinContext = {
        getPins: () => teacherPinWorkspace.getPins(),
        addPin:  (pin) => teacherPinWorkspace.addPin(pin),
        removePin: (t, i) => teacherPinWorkspace.removePin(t, i),
      };
      const opts = { pinContext };
      const loaders = {
        char:  () => getDoc(stuDoc('characters', id)).then(s=>s.exists()?{id,...s.data()}:null).then(e=>showRichEntityPanel('character', e, projectId, opts)),
        loc:   () => getDoc(stuDoc('locations', id)).then(s=>s.exists()?{id,...s.data()}:null).then(e=>showRichEntityPanel('location', e, projectId, opts)),
        scene: () => getDoc(stuDoc('scenes', id)).then(s=>s.exists()?{id,...s.data()}:null).then(e=>showRichEntityPanel('scene', e, projectId, opts)),
        prop:  () => getDoc(stuDoc('props', id)).then(s=>s.exists()?{id,...s.data()}:null).then(e=>showRichEntityPanel('prop', e, projectId, opts)),
      };
      if(loaders[type]) loaders[type]();
    });
  });
  body.appendChild(content);

  // Reorder: bodyWrap should contain body + the dock that the workspace
  // already appended. The workspace appended dock to bodyWrap; we now insert
  // body before the dock.
  bodyWrap.insertBefore(body, bodyWrap.firstChild);
  page.appendChild(bodyWrap);
  container.appendChild(page);
}

// ── Firestore helpers for comments ──
function commentsCol(){ return collection(db,'comments'); }
function commentDoc(id){ return doc(db,'comments',id); }
function repliesCol(commentId){ return collection(db,'comments',commentId,'replies'); }

async function getCommentsForContext(studentUid, toolContext){
  try{
    const q = query(commentsCol(), where('studentUid','==',studentUid), where('toolContext','==',toolContext), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ return []; }
}

async function postComment(studentUid, toolContext, body, projectId){
  const ref = await addDoc(commentsCol(),{
    studentUid,
    projectId: projectId||null,
    toolContext,
    authorUid: currentUser.uid,
    authorName: currentUser.displayName||currentUser.email,
    body,
    read: false,
    createdAt: serverTimestamp()
  });
  return ref.id;
}

async function postReply(commentId, body2){
  await addDoc(repliesCol(commentId),{
    authorUid: currentUser.uid,
    authorName: currentUser.displayName||currentUser.email,
    body: body2,
    createdAt: serverTimestamp()
  });
}

async function getReplies(commentId){

    return snap.docs.map(d=>({id:d.id,...d.data()}));

}

        loadComments();
      }});rb2.textContent='↵';
      ri2.addEventListener('keydown',e=>{if(e.key==='Enter')rb2.click();});
      replyRow.append(ri2,rb2);

  try{
    const q = query(collection(db,'users',studentUid,'projects'), where('shared','==',true));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));

async function getClassmateSharedProjects(studentUid){
  const classes = await getStudentClassrooms(studentUid);
  if(!classes.length) return [];
  const allShared = [];
  for(const classroom of classes){
    const members = await getClassroomMembers(classroom.id);
    for(const m of members){
      if(m.uid===studentUid) continue;
      const shared = await getSharedProjectsForStudent(m.uid);
      shared.forEach(p=>allShared.push({...p, ownerName:m.displayName||m.email, ownerUid:m.uid}));
    }
  }
  return allShared;
}

  const isShared = project.shared===true;
  const toggleRow=el('div',{class:'share-toggle-row',onclick:e=>e.stopPropagation()});
  const lbl=el('span',{class:'share-toggle-label'});lbl.textContent='Share with classmates';
  const track=el('div',{class:'toggle-sm'+(isShared?' on':'')});
  const knob=el('div',{class:'toggle-sm-knob'});
  track.appendChild(knob);
  track.onclick=async(e)=>{
    e.stopPropagation();
    const next=!track.classList.contains('on');
    track.classList.toggle('on',next);
    await setProjectShared(project.id, next);
  };
  toggleRow.append(lbl,track);
  return toggleRow;
}

function renderAuth(){
  document.getElementById('topbar').style.display='none';
  document.getElementById('main').style.display='none';
  const container = document.getElementById('auth-container');
  container.innerHTML='';

  let activeTab = 'signin';
  let errorMsg = '';

  function buildAuth(){
    container.innerHTML='';
    const wrap = el('div',{class:'auth-wrap'});
    const card = el('div',{class:'auth-card'});
    card.innerHTML=`
      <div class="auth-logo">✦ Narrative Studio</div>
      <div class="auth-sub">Your personal writing workspace</div>
      <div class="auth-tabs">
        <div class="auth-tab${activeTab==='signin'?' active':''}" id="tab-signin">Sign In</div>
        <div class="auth-tab${activeTab==='signup'?' active':''}" id="tab-signup">Create Account</div>
      </div>
      ${errorMsg?`<div class="auth-error">${esc(errorMsg)}</div>`:''}
      ${activeTab==='signup'?`<div class="field" style="margin-bottom:14px"><label class="label">Your Name</label><input class="input" id="auth-name" placeholder="How should we address you?"></div>`:''}
      <div class="field" style="margin-bottom:14px"><label class="label">Email</label><input class="input" id="auth-email" type="email" placeholder="you@example.com"></div>
      <div class="field" style="margin-bottom:24px"><label class="label">Password</label><input class="input" id="auth-pass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="auth-submit">${activeTab==='signin'?'Sign In':'Create Account'}</button>
    `;
    wrap.appendChild(card);
    container.appendChild(wrap);

    card.querySelector('#tab-signin').onclick=()=>{activeTab='signin';errorMsg='';buildAuth();};
    card.querySelector('#tab-signup').onclick=()=>{activeTab='signup';errorMsg='';buildAuth();};
    card.querySelector('#auth-submit').onclick=()=>handleAuth();
    card.addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
    setTimeout(()=>{const em=document.getElementById('auth-email');if(em)em.focus();},50);
  }

  async function handleAuth(){
    const email=v('auth-email'), pass=v('auth-pass'), name=v('auth-name');
    if(!email||!pass){errorMsg='Please enter your email and password.';buildAuth();return;}
    const btn=document.getElementById('auth-submit');
    if(btn){btn.textContent='…';btn.disabled=true;}
    try{
      if(activeTab==='signup'){
        const cred = await createUserWithEmailAndPassword(auth,email,pass);
        if(name) await updateProfile(cred.user,{displayName:name});
      } else {
        await signInWithEmailAndPassword(auth,email,pass);
      }
      // onAuthStateChanged handles the rest
    } catch(err){
      errorMsg = friendlyAuthError(err.code);
      buildAuth();
    }
  }

  buildAuth();
}

function friendlyAuthError(code){
  const map = {
    'auth/email-already-in-use':'That email is already registered. Try signing in.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password. Please try again.',
    'auth/invalid-credential':'Incorrect email or password. Please try again.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment and try again.',
  };
  return map[code]||'Something went wrong. Please try again.';
}

  await signOut(auth);
}

async function renderHome(container){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading your projects…</div>';
  const projects = await fsQuery('projects', orderBy('updatedAt','desc'));
  container.innerHTML='';
  const wrap = el('div',{id:'home-wrap'});
  const hero = el('div',{class:'home-hero'});
  hero.innerHTML='<h1>Narrative Studio</h1><p>Welcome back, '+(currentUser.displayName||'writer')+'.</p>';
  const newBtn = el('button',{class:'btn btn-primary',style:'font-size:15px;padding:12px 28px;',onclick:()=>createAndOpenProject()});
  newBtn.textContent='+ New Story';
  hero.appendChild(newBtn);
  wrap.appendChild(hero);

  if(projects.length===0){
    wrap.appendChild(emptyState('✦','No Stories Yet','Begin your first project and build a world that lasts.'));
  } else {
    const grid = el('div',{class:'projects-grid'});
    projects.forEach(p=>{
      const card = projectCard(p);
      // Students get a share toggle on each project card
      if(!isTeacher()) card.appendChild(makeShareToggle(p));
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }

  // Class Projects section — shared work from classmates (students only)
  if(!isTeacher()){
    getClassmateSharedProjects(currentUser.uid).then(shared=>{
      if(!shared.length) return;
      const section = el('div',{class:'class-projects-section'});
      const secTitle=el('div',{class:'class-projects-title'});secTitle.textContent='Class Projects';
      const secSub=el('div',{class:'class-projects-sub'});secSub.textContent='Work your classmates have shared with the class.';
      section.append(secTitle,secSub);
      const grid2 = el('div',{class:'projects-grid'});
      shared.forEach(p=>{
        const card=el('div',{class:'project-card',style:'cursor:default;'});
        card.appendChild(el('div',{class:'project-card-color',style:'background:'+colorStyle(p.colorLabel)}));
        const h3=el('h3');h3.textContent=p.name||'Untitled';card.appendChild(h3);
        const desc=el('p');desc.textContent=p.description||'No description yet.';card.appendChild(desc);
        const footer=el('div',{class:'project-card-footer'});
        const meta=el('div',{class:'project-card-meta'});meta.textContent='by '+(p.ownerName||'classmate');
        footer.appendChild(meta);card.appendChild(footer);
        grid2.appendChild(card);
      });
      section.appendChild(grid2);
      wrap.appendChild(section);
    });
  }

  container.appendChild(wrap);
}

function projectCard(p){
  const card = el('div',{class:'project-card',onclick:()=>navigate('dashboard',p.id)});
  card.appendChild(el('div',{class:'project-card-color',style:'background:'+colorStyle(p.colorLabel)}));
  card.appendChild(el('h3',{},[p.name||'Untitled']));
  card.appendChild(el('p',{},[p.description||'No description yet.']));
  const footer = el('div',{class:'project-card-footer'});
  const meta = el('div',{class:'project-card-meta'},[relativeTime(p.updatedAt)]);
  const actions = el('div',{class:'project-card-actions'});
  const editBtn = el('button',{class:'btn-icon',title:'Edit',onclick:e=>{e.stopPropagation();openEditProject(p);}});editBtn.textContent='✎';
  const delBtn = el('button',{class:'btn-icon',title:'Delete',style:'color:var(--red)',onclick:e=>{e.stopPropagation();confirmDelete('Delete "'+p.name+'"? This will also delete all characters, scenes, and documents inside it.',async()=>{await deleteProjectCascade(p.id);renderHome(document.getElementById('content'));toast('Project deleted');});}});delBtn.textContent='✕';
  actions.append(editBtn,delBtn);
  footer.append(meta,actions);
  card.appendChild(footer);
  return card;
}

async function createAndOpenProject(){
  const id = await fsCreate('projects',{name:'Untitled Story',description:'',tags:[],colorLabel:'purple'});
  navigate('dashboard',id,'overview');
}

async function deleteProjectCascade(projectId){
  await Promise.all([
    fsDelete('projects',projectId),
    fsBatchDelete('characters','storyProjectId',projectId),
    fsBatchDelete('locations','storyProjectId',projectId),
    fsBatchDelete('scenes','storyProjectId',projectId),
    fsBatchDelete('worlds','storyProjectId',projectId),
    fsBatchDelete('outlines','storyProjectId',projectId),
    fsBatchDelete('documents','storyProjectId',projectId),
    fsBatchDelete('generatedDocs','storyProjectId',projectId),
    fsBatchDelete('props','storyProjectId',projectId),
    fsBatchDelete('beats','storyProjectId',projectId),
  ]);
}

const NAV_ITEMS=[{id:'overview',label:'Overview',icon:'◈'},{id:'characters',label:'Characters',icon:'◉'},{id:'locations',label:'Locations',icon:'⬡'},{id:'scenes',label:'Scenes',icon:'◧'},{id:'props',label:'Props',icon:'◇'},{id:'world',label:'World Building',icon:'◎'},{id:'outline',label:'Outline',icon:'≡'},{id:'beatboard',label:'Beat Board',icon:'▦'},{id:'library',label:'Document Library',icon:'📁'},{id:'writing',label:'Writing Desk',icon:'✦'}];

async function renderSidebar(sb, projectId, active){
  sb.innerHTML='';
  const p = await fsGet('projects',projectId);
  if(p){
    const info = el('div',{class:'sidebar-project'});
    info.innerHTML='<div class="sidebar-project-name">'+esc(p.name)+'</div><div class="sidebar-project-tag">'+relativeTime(p.updatedAt)+'</div>';
    sb.appendChild(info);
    sb.appendChild(el('div',{class:'sidebar-divider'}));
  }
  const nav = el('div',{class:'nav-section'});
  NAV_ITEMS.forEach(item=>{
    const isActive = item.id===active || (item.id==='writing' && active==='writing');
    const navItem = el('div',{class:'nav-item'+(isActive?' active':''),onclick:()=>navigate('dashboard',projectId,item.id)});
    navItem.innerHTML='<span style="font-size:14px">'+item.icon+'</span><span>'+item.label+'</span>';
    nav.appendChild(navItem);
  });
  sb.appendChild(nav);
  const bottom = el('div',{class:'sidebar-bottom'});
  const delBtn = el('button',{class:'btn btn-ghost btn-sm',style:'width:100%;justify-content:center;color:var(--red)',onclick:()=>confirmDelete('Delete this entire project and all its contents?',async()=>{await deleteProjectCascade(projectId);navigate('home');toast('Project deleted');})});
  delBtn.textContent='✕ Delete Project';
  bottom.appendChild(delBtn);
  sb.appendChild(bottom);
}

async function renderOverview(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const [p, chars, locs, scenes, docs] = await Promise.all([
    fsGet('projects',projectId),
    fsQuery('characters',where('storyProjectId','==',projectId)),
    fsQuery('locations',where('storyProjectId','==',projectId)),
    fsQuery('scenes',where('storyProjectId','==',projectId)),
    fsQuery('documents',where('storyProjectId','==',projectId)),
  ]);
  if(!p){navigate('home');return;}
  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  wrap.innerHTML=`
    <div class="page-header">
      <div>
        <div class="page-title" contenteditable="true" id="proj-name-edit" style="outline:none;border-bottom:1px solid transparent;padding:2px 4px;border-radius:4px;">${esc(p.name)}</div>
        <div class="page-subtitle">Last updated ${relativeTime(p.updatedAt)}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="color-picker">${Object.keys(COLOR_MAP).map(k=>`<div class="color-swatch${p.colorLabel===k?' selected':''}" style="background:${COLOR_MAP[k]}" onclick="setProjectColorFb('${projectId}','${k}')" title="${k}"></div>`).join('')}</div>
      </div>
    </div>
    <div class="overview-grid">
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','characters')"><div class="stat-num">${chars.length}</div><div class="stat-label">Characters</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','locations')"><div class="stat-num">${locs.length}</div><div class="stat-label">Locations</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','scenes')"><div class="stat-num">${scenes.length}</div><div class="stat-label">Scenes</div></div>
      <div class="stat-card" onclick="navigate('dashboard','${projectId}','writing')"><div class="stat-num">${docs.length}</div><div class="stat-label">Documents</div></div>
    </div>
    <div class="field" style="max-width:600px;">
      <label class="label">Project Description</label>
      <textarea class="textarea" id="proj-desc" rows="3" placeholder="What is this story about?">${esc(p.description||'')}</textarea>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="saveProjDescFb('${projectId}')">Save Description</button>
      <button class="btn btn-ghost btn-sm" onclick="generateFullProjectPdf('${projectId}')">📄 Export Project as PDF</button>
    </div>
  `;
  const _hintOv=toolHintBanner('overview');
  if(_hintOv){
    const _ovGrid=wrap.querySelector('.overview-grid');
    if(_ovGrid) wrap.insertBefore(_hintOv,_ovGrid);
    else wrap.appendChild(_hintOv);
  }
  container.appendChild(wrap);
  const nameEl = wrap.querySelector('#proj-name-edit');
  nameEl.addEventListener('focus',()=>nameEl.style.borderBottomColor='var(--border)');
  nameEl.addEventListener('blur',async()=>{
    nameEl.style.borderBottomColor='transparent';
    const newName = nameEl.textContent.trim()||'Untitled';
    showSaving();
    await fsUpdate('projects',projectId,{name:newName});
    showSaved();
    renderSidebar(document.getElementById('sidebar'),projectId,currentRoute.sub||'overview');
  });
}

window.setProjectColorFb = async function(id,color){
  showSaving();
  await fsUpdate('projects',id,{colorLabel:color});
  showSaved();
  render();
};
window.saveProjDescFb = async function(id){
  const desc = document.getElementById('proj-desc')?.value||'';
  showSaving();
  await fsUpdate('projects',id,{description:desc});
  showSaved();
  toast('Saved');
};
