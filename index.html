async function renderCharacters(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const chars = await fsQuery('characters',where('storyProjectId','==',projectId));
  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Characters</div><div class="page-subtitle">'+chars.length+' character'+(chars.length!==1?'s':'')+'</div></div>';
  const hbtns=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});
  const buildBtn=el('button',{class:'btn btn-primary',onclick:()=>openCharacterBuilder(projectId)});
  buildBtn.innerHTML='✦ Build from Template';
  buildBtn.title='Guided step-by-step character creation with writing prompts';
  const addBtn=el('button',{class:'btn btn-ghost',onclick:()=>openCharacterDrawer(null,projectId)});
  addBtn.textContent='+ Quick Add';
  addBtn.title='Add a character card manually';
  const pdfBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateCharactersPdf(projectId)});pdfBtn.textContent='📄 Create Document';
  hbtns.append(buildBtn,addBtn,pdfBtn);
  header.appendChild(hbtns); wrap.appendChild(header);
  const _hintC=toolHintBanner('characters'); if(_hintC) wrap.appendChild(_hintC);
  if(chars.length===0){
    wrap.appendChild(emptyState('◉','No Characters Yet','Use "Build from Template" for a guided walkthrough, or "Quick Add" to fill in a card directly.'));
  } else {
    const grid = el('div',{class:'items-grid'});
    chars.forEach(c=>grid.appendChild(characterCard(c, projectId, container)));
    wrap.appendChild(grid);
  }
  container.appendChild(wrap);
}

function characterCard(c, projectId, container){
  const card = el('div',{class:'char-card'});
  card.appendChild(el('div',{class:'char-card-accent'}));

  // Name + archetype
  const nameEl = el('div',{class:'char-card-name'});nameEl.textContent=c.name||'Unnamed';
  card.appendChild(nameEl);

  // Meta row
  const metaEl = el('div',{class:'char-card-meta'});
  const addMeta = (t)=>{ const s=el('span');s.textContent=t;metaEl.appendChild(s); };
  if(c.age) addMeta('Age '+c.age);
  if(c.pronouns) addMeta(c.pronouns);
  if(c.occupation) addMeta(c.occupation);
  if(c.archetype) addMeta('◈ '+c.archetype);
  if(c.nationality) addMeta(c.nationality);
  if(metaEl.children.length) card.appendChild(metaEl);

  // Summary / traits line
  if(c.traits){ const t=el('div',{class:'char-card-traits'});t.textContent=c.traits;card.appendChild(t); }

  // Appearance — built from individual fields OR composite
  const appearParts=[];
  if(c.height||c.build) appearParts.push([c.height,c.build].filter(Boolean).join(', '));
  if(c.hairColor) appearParts.push('Hair: '+c.hairColor+(c.hairStyle?' ('+c.hairStyle+')':''));
  if(c.eyeColor) appearParts.push('Eyes: '+c.eyeColor);
  if(c.skinTone) appearParts.push('Skin: '+c.skinTone);
  if(c.clothingStyle) appearParts.push(c.clothingStyle);
  const appearText = appearParts.length ? appearParts.join(' · ') : (c.appearance||'');
  if(appearText){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Appearance';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=appearText;
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.distinguishingMarks){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Distinguishing Marks';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=c.distinguishingMarks;
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.firstImpression){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='First Impression';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=c.firstImpression;
    sec.append(lbl,txt); card.appendChild(sec);
  }

  // Voice
  if(c.speakingStyle||c.speechHabit||c.humor){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Voice & Manner';
    const parts=[c.speakingStyle,c.speechHabit,c.humor?'Humor: '+c.humor:''].filter(Boolean);
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=parts.join(' · ');
    sec.append(lbl,txt); card.appendChild(sec);
  }

  // Psychology
  if(c.personality||c.internalConflict){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Psychology';
    const txt=el('div',{class:'char-card-section-text'});
    txt.textContent=[c.personality,c.internalConflict].filter(Boolean).join(' / ');
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.fear||c.desire){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Fear / Desire';
    const txt=el('div',{class:'char-card-section-text'});
    txt.textContent=[c.fear&&'Fear: '+c.fear, c.desire&&'Desire: '+c.desire].filter(Boolean).join('  ·  ');
    sec.append(lbl,txt); card.appendChild(sec);
  }

  // Backstory summary
  const bsText = c.backstory||(c.childhoodHome||c.formativeEvent ? [c.childhoodHome&&'From: '+c.childhoodHome, c.formativeEvent].filter(Boolean).join('. ') : '');
  if(bsText){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Backstory';
    const txt=el('div',{class:'char-card-section-text'});
    // Truncate long backstories on card
    txt.textContent=bsText.length>200?bsText.substring(0,200)+'…':bsText;
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.wound){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='The Wound';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=c.wound;
    sec.append(lbl,txt); card.appendChild(sec);
  }

  // Story role
  if(c.wantVsNeed||c.motivation){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Want / Need / Motivation';
    const txt=el('div',{class:'char-card-section-text'});
    txt.textContent=[c.wantVsNeed,c.motivation].filter(Boolean).join(' · ');
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.arc){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Character Arc';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=c.arc;
    sec.append(lbl,txt); card.appendChild(sec);
  }
  if(c.storyRole){
    const sec=el('div',{class:'char-card-section'});
    const lbl=el('div',{class:'char-card-section-label'});lbl.textContent='Role in Story';
    const txt=el('div',{class:'char-card-section-text'});txt.textContent=c.storyRole;
    sec.append(lbl,txt); card.appendChild(sec);
  }

  // Flaw / Strength tags
  const tags=[];
  if(c.flaw) tags.push({text:'Flaw: '+c.flaw,color:'var(--rose)'});
  if(c.strength) tags.push({text:'Strength: '+c.strength,color:'var(--green)'});
  if(c.secret) tags.push({text:'Has a secret',color:'var(--accent)'});
  if(tags.length){
    const tagsEl=el('div',{class:'char-card-tags'});
    tags.forEach(t=>{
      const tg=el('span',{class:'tag',style:'font-size:10px;color:'+t.color+';background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);'});
      tg.textContent=t.text;tagsEl.appendChild(tg);
    });
    card.appendChild(tagsEl);
  }

  // Footer
  const footer=el('div',{class:'char-card-footer'});
  const eb=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openCharacterDrawer(c,projectId)});eb.textContent='Edit';
  const db2=el('button',{class:'btn btn-danger btn-sm',onclick:()=>confirmDelete('Delete "'+c.name+'"?',async()=>{await fsDelete('characters',c.id);renderCharacters(container,projectId);toast('Deleted');})});db2.textContent='✕';
  footer.append(eb,db2);card.appendChild(footer);
  return card;
}

function openCharacterDrawer(char, projectId){
  const isNew=!char;
  const data=char||{name:'',traits:'',age:'',pronouns:'',occupation:'',backstory:'',appearance:'',personality:'',internalConflict:'',wantVsNeed:'',storyRole:'',flaw:'',strength:'',archetype:''};
  const overlay=el('div',{class:'drawer-overlay',onclick:e=>{if(e.target===overlay)overlay.remove();}});
  const drawer=el('div',{class:'drawer'});
  drawer.innerHTML=`
    <div class="drawer-header">
      <div>
        <div class="drawer-title">${isNew?'Create Character Card':'Edit Character'}</div>
        ${isNew?'<div style="font-size:11px;color:var(--fg3);margin-top:2px;">Quick add — fill in what you know now, edit later</div>':''}
      </div>
      <button class="btn-icon" onclick="this.closest('.drawer-overlay').remove()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="field"><label class="label">Name *</label><input class="input" id="cd-name" value="${esc(data.name)}" placeholder="Character name"></div>
      <div class="field-row">
        <div class="field"><label class="label">Age</label><input class="input" id="cd-age" value="${esc(data.age||'')}" placeholder="e.g. 34"></div>
        <div class="field"><label class="label">Pronouns</label><input class="input" id="cd-pronouns" value="${esc(data.pronouns||'')}" placeholder="she/her"></div>
      </div>
      <div class="field-row">
        <div class="field"><label class="label">Occupation</label><input class="input" id="cd-occ" value="${esc(data.occupation||'')}" placeholder="What do they do?"></div>
        <div class="field"><label class="label">Archetype</label><input class="input" id="cd-arch" value="${esc(data.archetype||'')}" placeholder="e.g. The Mentor"></div>
      </div>
      <div class="field">
        <label class="label">Traits / Summary</label>
        <div class="guide-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.innerHTML=(this.nextElementSibling.style.display==='block'?'▾':'▸')+' Writing prompt'">▸ Writing prompt</div>
        <div class="world-section-guide" style="display:none;">What is the first thing someone notices about them? What do they laugh at? What do they never talk about? What do they want people to think of them vs. what they actually are?</div>
        <textarea class="textarea" id="cd-traits" rows="3" placeholder="Key personality traits, voice, summary...">${esc(data.traits||'')}</textarea>
      </div>
      <div class="field">
        <label class="label">Backstory</label>
        <div class="guide-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.innerHTML=(this.nextElementSibling.style.display==='block'?'▾':'▸')+' Writing prompt'">▸ Writing prompt</div>
        <div class="world-section-guide" style="display:none;">What is the wound they carry? What decision do they regret most? Who do they blame — correctly or incorrectly? What would they die for?</div>
        <textarea class="textarea" id="cd-back" rows="3" placeholder="Their history, motivations, secrets...">${esc(data.backstory||'')}</textarea>
      </div>
      <div class="field-row">
        <div class="field"><label class="label">Core Flaw</label><input class="input" id="cd-flaw" value="${esc(data.flaw||'')}" placeholder="e.g. Pride, Fear of loss"></div>
        <div class="field"><label class="label">Core Strength</label><input class="input" id="cd-strength" value="${esc(data.strength||'')}" placeholder="e.g. Loyalty, Wit"></div>
      </div>
      <div class="field"><label class="label">Role in Story</label><input class="input" id="cd-role" value="${esc(data.storyRole||'')}" placeholder="e.g. Protagonist, Antagonist, Foil"></div>
    </div>
    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this character?',async()=>{await fsDelete('characters','${char.id}');document.querySelector('.drawer-overlay').remove();renderCharacters(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="cd-save">Save Character</button>
    </div>`;
  document.body.appendChild(overlay); overlay.appendChild(drawer);
  drawer.querySelector('#cd-save').onclick=async()=>{
    const name=v('cd-name');
    if(!name){document.getElementById('cd-name').focus();toast('Name is required','error');return;}
    const up={name,traits:v('cd-traits'),age:v('cd-age'),pronouns:v('cd-pronouns'),occupation:v('cd-occ'),backstory:v('cd-back'),archetype:v('cd-arch'),flaw:v('cd-flaw'),strength:v('cd-strength'),storyRole:v('cd-role')};
    showSaving();
    if(isNew) await fsCreate('characters',{storyProjectId:projectId,...up});
    else await fsUpdate('characters',char.id,up);
    showSaved();
    overlay.remove();
    renderCharacters(document.getElementById('content'),projectId);
    toast(isNew?'Character card created':'Character saved');
  };
}

// ══════════════════════════════════════════════
//  CHARACTER BUILDER WIZARD
// ══════════════════════════════════════════════

// Steps: Identity | Appearance | Voice & Mind | Backstory | Psychology | Story Role | Review
const CB_STEPS = [
  { id:'identity',    label:'Identity'     },
  { id:'appearance',  label:'Appearance'   },
  { id:'voice',       label:'Voice & Mind' },
  { id:'backstory',   label:'Backstory'    },
  { id:'psychology',  label:'Psychology'   },
  { id:'role',        label:'Story Role'   },
  { id:'review',      label:'Review'       },
];

// ── Inline exit confirm (z-index safe — lives inside the wizard, not behind it) ──
function wizardExitConfirm(onConfirm){
  // Remove any existing confirm banner first
  document.getElementById('wiz-exit-banner')?.remove();
  const banner = el('div',{id:'wiz-exit-banner',style:'position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);animation:fadeIn 0.15s;'});
  const box = el('div',{style:'background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:400px;max-width:92vw;'});
  const title = el('div',{style:'font-family:\'Belleza\',serif;font-size:20px;margin-bottom:12px;color:var(--fg);'});
  title.textContent = 'Exit Character Builder?';
  const msg = el('div',{style:'font-size:14px;color:var(--fg2);margin-bottom:24px;line-height:1.6;'});
  msg.textContent = 'Your progress will be lost. This cannot be undone.';
  const btnRow = el('div',{style:'display:flex;justify-content:flex-end;gap:10px;'});
  const cancel = el('button',{class:'btn btn-ghost',onclick:()=>banner.remove()});cancel.textContent = 'Keep Working';
  const confirm = el('button',{class:'btn btn-danger',onclick:()=>{banner.remove();onConfirm();}});confirm.textContent = 'Exit & Discard';
  btnRow.append(cancel,confirm);
  box.append(title,msg,btnRow);
  banner.appendChild(box);
  document.body.appendChild(banner);
}

function openCharacterBuilder(projectId, prefill={}){
  const data = {
    // Identity
    name:'', age:'', pronouns:'', occupation:'', archetype:'', nationality:'', hometown:'',
    // Appearance — individual fields
    height:'', build:'', weight:'', hairColor:'', hairStyle:'', eyeColor:'', skinTone:'',
    clothingStyle:'', distinguishingMarks:'', firstImpression:'', bodyLanguage:'',
    // Voice & Mind
    speakingStyle:'', vocabulary:'', speechHabit:'', humor:'', intelligence:'', education:'',
    // Backstory
    childhoodHome:'', familyDynamic:'', formativeEvent:'', wound:'', secret:'', biggestRegret:'',
    // Psychology
    personality:'', internalConflict:'', fear:'', desire:'', flaw:'', strength:'', coping:'', traits:'',
    // Story Role
    wantVsNeed:'', storyRole:'', motivation:'', arc:'', firstScene:'',
    // Assembled composite fields (auto-built on save)
    appearance:'', backstory:'',
    ...prefill
  };
  let step = 0;

  const overlay = el('div',{class:'wizard-overlay'});

  function render(){
    overlay.innerHTML = '';

    // ── Topbar ──
    const topbar = el('div',{class:'wizard-topbar'});
    const titleEl = el('div',{class:'wizard-topbar-title'});titleEl.textContent = 'Character Builder';
    const progressWrap = el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:6px;'});
    const dots = el('div',{class:'wizard-progress'});
    CB_STEPS.forEach((s,i)=>{
      const dot = el('div',{class:'wizard-step-dot'+(i===step?' active':i<step?' done':'')});
      dot.title = s.label; dots.appendChild(dot);
    });
    const stepLbl = el('div',{class:'wizard-step-label'});
    stepLbl.textContent = `Step ${step+1} of ${CB_STEPS.length} — ${CB_STEPS[step].label}`;
    progressWrap.append(dots, stepLbl);
    const closeBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{
      collectStep();
      if(step < CB_STEPS.length-1){
        wizardExitConfirm(()=>overlay.remove());
      } else { overlay.remove(); }
    }});closeBtn.textContent = '✕ Exit';
    topbar.append(titleEl, progressWrap, closeBtn);

    // ── Body ──
    const body = el('div',{class:'wizard-body'});
    const pane = el('div',{class:'wizard-pane'});
    body.appendChild(pane);

    // ── Footer ──
    const footer = el('div',{class:'wizard-footer'});
    const backBtn = el('button',{class:'btn btn-ghost',onclick:()=>{collectStep();step--;render();}});
    backBtn.textContent = '← Back';
    if(step===0) backBtn.style.visibility='hidden';
    const nav = el('div',{class:'wizard-footer-nav'});

    if(step < CB_STEPS.length-1){
      const nextBtn = el('button',{class:'btn btn-primary',onclick:()=>{
        if(!collectStep()) return;
        step++; render();
      }});
      nextBtn.textContent = step===CB_STEPS.length-2 ? 'Review →' : 'Next →';
      nav.appendChild(nextBtn);
    } else {
      const saveBtn = el('button',{class:'btn btn-primary',onclick:async()=>{
        if(!data.name.trim()){toast('Give your character a name first','error');return;}
        saveBtn.disabled=true; saveBtn.textContent='Saving…';
        // Assemble composite appearance string for search/display compatibility
        const appearParts = [
          data.height&&'Height: '+data.height, data.build&&'Build: '+data.build,
          data.hairColor&&'Hair: '+data.hairColor+(data.hairStyle?' ('+data.hairStyle+')':''),
          data.eyeColor&&'Eyes: '+data.eyeColor, data.skinTone&&'Skin: '+data.skinTone,
          data.clothingStyle&&'Style: '+data.clothingStyle,
          data.distinguishingMarks&&'Marks: '+data.distinguishingMarks,
          data.firstImpression, data.bodyLanguage,
        ].filter(Boolean);
        data.appearance = appearParts.join(' · ');
        // Assemble backstory composite
        const bsParts = [
          data.childhoodHome&&'Grew up: '+data.childhoodHome,
          data.familyDynamic&&'Family: '+data.familyDynamic,
          data.formativeEvent&&'Formative event: '+data.formativeEvent,
          data.wound&&'Wound: '+data.wound,
          data.biggestRegret&&'Regret: '+data.biggestRegret,
        ].filter(Boolean);
        data.backstory = bsParts.join(' · ');
        showSaving();
        await fsCreate('characters',{storyProjectId:projectId,...data});
        showSaved();
        overlay.remove();
        renderCharacters(document.getElementById('content'), projectId);
        toast('Character "'+data.name+'" created');
      }});
      saveBtn.textContent = '✦ Save Character';
      nav.appendChild(saveBtn);
    }
    footer.append(backBtn, nav);
    overlay.append(topbar, body, footer);

    switch(CB_STEPS[step].id){
      case 'identity':   cbIdentity(pane, data); break;
      case 'appearance': cbAppearance(pane, data); break;
      case 'voice':      cbVoice(pane, data); break;
      case 'backstory':  cbBackstory(pane, data); break;
      case 'psychology': cbPsychology(pane, data); break;
      case 'role':       cbRole(pane, data); break;
      case 'review':     cbReview(pane, data); break;
    }

    // Scroll body to top on step change
    body.scrollTop = 0;
  }

  function collectStep(){
    const s = CB_STEPS[step].id;
    const g = (id)=>{ const e=document.getElementById('cb-'+id); return e?(e.value||'').trim():''; };
    if(s==='identity'){
      if(!g('name')){ document.getElementById('cb-name')?.focus(); toast('Give your character a name to continue','error'); return false; }
      data.name=g('name'); data.age=g('age'); data.pronouns=g('pronouns');
      data.occupation=g('occupation'); data.archetype=g('archetype');
      data.nationality=g('nationality'); data.hometown=g('hometown');
    }
    if(s==='appearance'){
      data.height=g('height'); data.build=g('build'); data.weight=g('weight');
      data.hairColor=g('hairColor'); data.hairStyle=g('hairStyle');
      data.eyeColor=g('eyeColor'); data.skinTone=g('skinTone');
      data.clothingStyle=g('clothingStyle'); data.distinguishingMarks=g('distinguishingMarks');
      data.firstImpression=g('firstImpression'); data.bodyLanguage=g('bodyLanguage');
    }
    if(s==='voice'){
      data.speakingStyle=g('speakingStyle'); data.vocabulary=g('vocabulary');
      data.speechHabit=g('speechHabit'); data.humor=g('humor');
      data.intelligence=g('intelligence'); data.education=g('education');
    }
    if(s==='backstory'){
      data.childhoodHome=g('childhoodHome'); data.familyDynamic=g('familyDynamic');
      data.formativeEvent=g('formativeEvent'); data.wound=g('wound');
      data.secret=g('secret'); data.biggestRegret=g('biggestRegret');
    }
    if(s==='psychology'){
      data.personality=g('personality'); data.internalConflict=g('internalConflict');
      data.fear=g('fear'); data.desire=g('desire');
      data.flaw=g('flaw'); data.strength=g('strength');
      data.coping=g('coping'); data.traits=g('traits');
    }
    if(s==='role'){
      data.wantVsNeed=g('wantVsNeed'); data.storyRole=g('storyRole');
      data.motivation=g('motivation'); data.arc=g('arc'); data.firstScene=g('firstScene');
    }
    return true;
  }

  document.body.appendChild(overlay);
  render();
}

// ── Shared helper functions ──

function cbTitle(pane, title, sub){
  const t=el('div',{class:'wizard-pane-title'});t.textContent=title;
  const s=el('div',{class:'wizard-pane-sub'});s.textContent=sub;
  pane.append(t,s);
}

function cbRow(...fields){
  const row=el('div',{style:'display:grid;grid-template-columns:repeat('+fields.length+',1fr);gap:14px;margin-bottom:4px;'});
  fields.forEach(f=>row.appendChild(f));
  return row;
}

function cbF(id, label, placeholder, value, rows=1, hint=null, tipLines=null){
  const wrap=el('div',{class:'wizard-field'});
  const lbl=el('label',{class:'wizard-field-label'});lbl.textContent=label;lbl.htmlFor='cb-'+id;
  wrap.appendChild(lbl);
  if(hint){const h=el('div',{class:'wizard-field-hint'});h.textContent=hint;wrap.appendChild(h);}
  if(tipLines && tipLines.length){
    const toggle=el('div',{class:'wizard-tip-toggle'});toggle.innerHTML='▸ Stuck? Try this';
    const tipBox=el('div',{class:'wizard-tip',style:'display:none;'});
    const tipLbl=el('div',{class:'wizard-tip-label'});tipLbl.textContent="Writer's Block?";
    tipBox.appendChild(tipLbl);
    tipLines.forEach(line=>{const p=el('p',{style:'margin:0 0 4px;'});p.textContent=line;tipBox.appendChild(p);});
    toggle.onclick=()=>{
      const open=tipBox.style.display==='none';
      tipBox.style.display=open?'block':'none';
      toggle.innerHTML=(open?'▾':'▸')+' Stuck? Try this';
    };
    wrap.append(toggle,tipBox);
  }
  if(rows===1){
    const inp=el('input',{class:'input',id:'cb-'+id,placeholder,value:value||''});
    wrap.appendChild(inp);
  } else {
    const ta=el('textarea',{class:'textarea',id:'cb-'+id,placeholder,rows:String(rows)});
    ta.value=value||'';
    wrap.appendChild(ta);
  }
  return wrap;
}

function cbDivider(label){
  const d=el('div',{style:'display:flex;align-items:center;gap:12px;margin:24px 0 20px;'});
  const line1=el('div',{style:'flex:1;height:1px;background:var(--border);'});
  const lbl=el('div',{style:'font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg3);font-family:\'JetBrains Mono\',monospace;white-space:nowrap;'});
  lbl.textContent=label;
  const line2=el('div',{style:'flex:1;height:1px;background:var(--border);'});
  d.append(line1,lbl,line2);
  return d;
}

// ── Step builders ──

function cbIdentity(pane, data){
  cbTitle(pane,'Who are they?','Start with the basics. The only required field is their name — fill in what you know now and come back to the rest later.');
  pane.appendChild(cbF('name','Full Name *','e.g. Elena Vasquez, "Razor," Marcus Webb',data.name,1,'The name they go by in your story. Could be a nickname, a code name, or a full formal name.'));
  pane.appendChild(cbRow(
    cbF('age','Age','e.g. 34',data.age),
    cbF('pronouns','Pronouns','she/her, they/them…',data.pronouns)
  ));
  pane.appendChild(cbF('occupation','Occupation','e.g. Homicide detective, failed musician, corporate lawyer',data.occupation,1,'What do they do for work — or how do they spend most of their time?',[
    'Try starting with what they do, then ask: is this what they wanted?',
    'A job often says more about where someone came from than where they are going.',
  ]));
  pane.appendChild(cbRow(
    cbF('nationality','Nationality / Ethnicity','e.g. Cuban-American, Nigerian, Korean',data.nationality),
    cbF('hometown','Hometown / Where They\'re From','e.g. Rural Mississippi, East London',data.hometown)
  ));
  pane.appendChild(cbF('archetype','Character Archetype','e.g. The Reluctant Hero, The Trickster, The Mentor',data.archetype,1,'Optional — a shorthand for their role or energy in the story.',[
    'Common archetypes: The Hero, The Shadow, The Mentor, The Herald, The Trickster, The Shapeshifter, The Guardian, The Ally.',
    'Don\'t force it — write a description in your own words if nothing fits.',
  ]));
}

function cbAppearance(pane, data){
  cbTitle(pane,'What do they look like?','Appearance is the first language a character speaks. Answer what you know — every field is optional, but specifics are more useful than vague descriptions.');
  pane.appendChild(cbDivider('Physical Build'));
  pane.appendChild(cbRow(
    cbF('height','Height','e.g. 5\'9", tall, short',data.height),
    cbF('build','Build / Body Type','e.g. Lean, stocky, athletic, lanky',data.build),
    cbF('weight','Weight (optional)','e.g. 160 lbs, heavyset',data.weight)
  ));
  pane.appendChild(cbDivider('Facial Features & Coloring'));
  pane.appendChild(cbRow(
    cbF('hairColor','Hair Color','e.g. Dark brown, bleached blonde, silver',data.hairColor),
    cbF('hairStyle','Hair Style','e.g. Short and neat, long braids, shaved',data.hairStyle)
  ));
  pane.appendChild(cbRow(
    cbF('eyeColor','Eye Color','e.g. Brown, pale gray, green',data.eyeColor),
    cbF('skinTone','Skin Tone','e.g. Light brown, pale, deep brown, olive',data.skinTone)
  ));
  pane.appendChild(cbDivider('Style & Presence'));
  pane.appendChild(cbF('clothingStyle','Clothing Style / How They Dress','e.g. Always in a suit regardless of occasion. Thrift store layers. Practical work clothes.',data.clothingStyle,2,'How they dress tells us what they want people to think of them — or what they don\'t bother thinking about.',[
    'Are they trying to blend in, stand out, or simply not thinking about it at all?',
    'Does their clothing match their personality, or is there a mismatch that says something?',
  ]));
  pane.appendChild(cbF('distinguishingMarks','Distinguishing Marks or Features','e.g. A scar across the chin. Tattoo on the left forearm. Always wears the same silver ring.',data.distinguishingMarks,2,'Physical details that are specific and memorable — scars, tattoos, unusual features.',[
    'The best physical details carry meaning — an old injury, something they hide, something they display on purpose.',
    'A detail that comes up again later in the story is worth noting here.',
  ]));
  pane.appendChild(cbF('firstImpression','First Impression','How does a stranger react the first time they see this character?',data.firstImpression,2,'What someone notices and feels before this character says a word.',[
    'Try: write it from the POV of another character meeting them for the first time.',
    'Is the first impression accurate? Or is it misleading?',
  ]));
  pane.appendChild(cbF('bodyLanguage','Body Language & How They Carry Themselves','e.g. Quiet and controlled. Never stops moving. Takes up space deliberately.',data.bodyLanguage,2,'How they occupy a room — posture, movement, eye contact, energy.',[
    'Body language is personality made physical — how a shy person stands is different from how a confident one does.',
    'Try: what does this character do with their hands when they\'re nervous?',
  ]));
}

function cbVoice(pane, data){
  cbTitle(pane,'How do they think and speak?','Voice is one of the most powerful tools in character writing. A reader should be able to identify your character from a single line of dialogue.');
  pane.appendChild(cbF('speakingStyle','Speaking Style','e.g. Clipped and direct. Rambles when nervous. Speaks in questions. Formal, never uses contractions.',data.speakingStyle,2,'The rhythm and manner of how they talk.',[
    'Try writing one line of dialogue this character would say in a tense moment.',
    'Do they talk too much, or too little? Why?',
    'Do they say what they mean, or do they always say something slightly different from what they mean?',
  ]));
  pane.appendChild(cbF('vocabulary','Vocabulary & Word Choice','e.g. Uses technical jargon. Lots of sports metaphors. Swears constantly. Unusually precise.',data.vocabulary,2,'The specific words and phrases they reach for.',[
    'What does their vocabulary reveal about their background, education, or upbringing?',
    'Do they have a pet phrase or expression that\'s uniquely theirs?',
  ]));
  pane.appendChild(cbF('speechHabit','Speech Habit or Verbal Tic','e.g. Always qualifies statements ("I think," "maybe"). Interrupts. Long pauses before answering.',data.speechHabit,1,'A small, consistent verbal behavior that makes them recognizable.'));
  pane.appendChild(cbF('humor','Sense of Humor','e.g. Dry and deadpan. Self-deprecating. Dark. Slapstick. No sense of humor at all.',data.humor,1,'What they find funny — and what they don\'t.',[
    'Humor reveals character: what someone laughs at tells you a lot about what they value.',
    'Is their humor a defense mechanism, a social tool, or just genuine?',
  ]));
  pane.appendChild(cbDivider('Mind & Background'));
  pane.appendChild(cbRow(
    cbF('intelligence','Intelligence / How They Think','e.g. Highly analytical, emotionally intelligent, street-smart, book-smart',data.intelligence),
    cbF('education','Education','e.g. Self-taught, college dropout, PhD, military training',data.education)
  ));
}

function cbBackstory(pane, data){
  cbTitle(pane,'Where did they come from?','You don\'t need a complete biography — just enough to explain why they are who they are. A character\'s past explains their present without excusing it.');
  pane.appendChild(cbF('childhoodHome','Childhood Home','e.g. Small town in rural Tennessee. A crowded apartment in Mumbai. Foster care in Detroit.',data.childhoodHome,1,'Where and what kind of environment did they grow up in?'));
  pane.appendChild(cbF('familyDynamic','Family Dynamic','e.g. Raised by a single mother. Estranged from parents. Close-knit immigrant family. Only child.',data.familyDynamic,2,'Who raised them and what was the household like?',[
    'The family we grow up in is the first world we learn to navigate — it shapes everything.',
    'Did they feel loved? Safe? Like a burden? Like the responsible one?',
    'What did they learn about relationships from watching the adults around them?',
  ]));
  pane.appendChild(cbF('formativeEvent','Formative Event','e.g. A death in the family at age 9. A scholarship that changed everything. A moment of public humiliation.',data.formativeEvent,3,'A specific event or period that shaped who they became.',[
    'It doesn\'t have to be dramatic — sometimes a small moment lands hard and changes everything.',
    'Ask: what did this teach them about how the world works?',
  ]));
  pane.appendChild(cbF('wound','The Wound','e.g. Abandoned by a parent. Failed at the one thing they worked hardest for. Witnessed something they can\'t unsee.',data.wound,3,'The specific past hurt that still affects their behavior today.',[
    'The wound is not the same as the formative event — it\'s the belief the event created.',
    'Try: "Because of what happened, they now believe ___."',
    'What behavior do they engage in today that is secretly about managing this old pain?',
  ]));
  pane.appendChild(cbF('biggestRegret','Biggest Regret','Something they did — or didn\'t do — that they still carry.',data.biggestRegret,2,'Not the worst thing that happened to them, but the worst thing they chose.',[
    'Regret implies agency — it\'s about a choice, not just a loss.',
    'Would they make the same choice again? Why or why not?',
  ]));
  pane.appendChild(cbF('secret','A Secret They Keep','Something no one — or almost no one — knows about them.',data.secret,2,'What are they hiding, and why?',[
    'The best secrets are ones where keeping them costs the character something.',
    'Is it a shameful secret, a protective one, or something they\'ve simply never been asked about?',
  ]));
}

function cbPsychology(pane, data){
  cbTitle(pane,'How do they work on the inside?','Psychology is the engine beneath behavior. This step digs into what drives your character, what breaks them, and what they\'re capable of.');
  pane.appendChild(cbF('personality','Personality in One Paragraph','How do they move through the world? What\'s their baseline — before anything goes wrong?',data.personality,3,'Their default mode: optimistic or guarded, curious or closed, warm or cool.',[
    'Describe them at a dinner party — a setting where personality is impossible to hide.',
    'What do people like about them immediately? What takes time to appreciate?',
  ]));
  pane.appendChild(cbRow(
    cbF('flaw','Core Flaw','e.g. Pride, jealousy, self-deception, cowardice',data.flaw,1,'Their deepest weakness — one that actively damages them or others.',[
      'A flaw is not a bad habit. It\'s a fundamental crack in how they see themselves or the world.',
      'The flaw should be something that makes sense given their wound.',
    ]),
    cbF('strength','Core Strength','e.g. Loyalty, persistence, empathy, wit',data.strength,1,'What is genuinely good or admirable about them?')
  ));
  pane.appendChild(cbF('fear','What Do They Fear Most?','e.g. Being abandoned. Being found out. Becoming their father. Losing control.',data.fear,2,'Their deepest fear — the thing that shapes their decisions even when they don\'t realize it.',[
    'Fear is often the inverse of the wound — what they\'re afraid will happen again.',
    'Is this fear conscious (they know about it) or unconscious (they\'d deny it)?',

  pane.appendChild(cbF('desire','What Do They Want More Than Anything?','e.g. To be understood. To prove they\'re worthy. To protect someone. To finally feel safe.',data.desire,2,'Their deepest desire — which may be different from their stated goal in the story.',[
    'This is the want beneath the want. It\'s rarely about money or success — it\'s about what they think those things will give them.',
  ]));
  pane.appendChild(cbF('internalConflict','Internal Conflict','The tension they carry inside — a belief they can\'t reconcile, a desire that contradicts their values.',data.internalConflict,3,'What is the war happening inside them?',[
    'The best internal conflicts can\'t be fixed by outside events — they require the character to change.',
    'Try: "They believe ___, but they also believe ___, and those two things can\'t both be true."',
  ]));
  pane.appendChild(cbF('coping','How Do They Cope Under Pressure?','e.g. Goes quiet. Gets sarcastic. Overworks. Drinks. Cleans obsessively. Calls the one person who can talk them down.',data.coping,2,'Their default stress response — constructive or destructive.',[
    'Coping mechanisms usually start as reasonable responses to hard situations, then become habits.',
    'What\'s the thing they do that they know they shouldn\'t, but keeps working in the short term?',
  ]));
  pane.appendChild(cbF('traits','Three Words / Short Summary','e.g. Stubborn, brilliant, deeply lonely. Or: charming on the surface, terrified underneath.',data.traits,1,'A quick-reference summary of who they are at their core.'));
}

function cbRole(pane, data){
  cbTitle(pane,'What do they want — and need?','A character\'s want is what they\'re consciously chasing. Their need is what would actually make them whole. The gap between the two is where the story lives.');
  pane.appendChild(cbF('wantVsNeed','Want vs. Need','e.g. WANT: to solve the murder and restore order. NEED: to forgive herself for the partner she couldn\'t save.',data.wantVsNeed,4,'What do they think they want? What do they actually need — even if they\'d never admit it?',[
    'The WANT is usually external and concrete: a goal, a person, a status, a thing.',
    'The NEED is usually internal and invisible: acceptance, courage, forgiveness, belonging.',
    'A satisfying arc often ends with the character getting the NEED — and sometimes giving up the WANT to get it.',
    'Try: "They think they need ___, but what they actually need is ___."',
  ]));
  pane.appendChild(cbF('motivation','Core Motivation','What is the engine driving them through this specific story?',data.motivation,2,'Not their want or their need — but the emotional fuel that keeps them moving forward.',[
    'Motivation answers "why do they keep going when it gets hard?"',
    'Is their motivation something they\'re proud of, or something they\'d be embarrassed to admit?',
  ]));
  pane.appendChild(cbF('storyRole','Role in This Story','e.g. Protagonist, Antagonist, Mentor, Foil, Love Interest, Comic Relief, Catalyst',data.storyRole,1,'How do they function in your specific narrative?'));
  pane.appendChild(cbF('arc','Character Arc','e.g. Learns to trust others. Goes from cynical to hopeful. Crosses a moral line and can\'t go back.',data.arc,2,'How do they change — or refuse to change — over the course of the story?',[
    'Not every character needs a full arc — some are foils, some are catalysts for others.',
    'If they do change: what do they gain, and what do they lose?',
    'If they don\'t change: why not — and what does that cost them?',
  ]));
  pane.appendChild(cbF('firstScene','First Scene','Describe the moment we first meet them. What are they doing?',data.firstScene,3,'Their entrance sets every expectation the audience will have about them.',[
    'A great entrance shows the character in their natural element — just before something disrupts it.',
    'The best first scenes contain something that will mean something different at the end of the story.',
    'Try: what is the most revealing thing they could be doing when we first see them?',
  ]));
}

function cbReview(pane, data){
  cbTitle(pane,'Review your character.','Here is everything you\'ve built. Go back to any step to make changes, or save now and edit from the character card at any time.');

  function revSec(heading, fields){
    const hasContent = fields.some(({key})=>data[key] && data[key].trim());
    if(!hasContent) return null;
    const sec=el('div',{class:'wizard-review-section'});
    const h=el('h3');h.textContent=heading;sec.appendChild(h);
    fields.forEach(({label,key})=>{
      if(!data[key]||!data[key].trim()) return;
      const f=el('div',{class:'wizard-review-field'});
      const l=el('div',{class:'wizard-review-label'});l.textContent=label;
      const v2=el('div',{class:'wizard-review-value'});v2.textContent=data[key];
      f.append(l,v2);sec.appendChild(f);
    });
    return sec;
  }

  if(!data.name){
    const warn=el('div',{class:'wizard-tip',style:'border-color:var(--red);margin-bottom:16px;'});
    warn.innerHTML='<div class="wizard-tip-label" style="color:var(--red);">Missing name</div><p style="margin:0;">Go back to Step 1 and give your character a name before saving.</p>';
    pane.appendChild(warn);
  }

  const sections=[
    {heading:'Identity', fields:[
      {label:'Name',key:'name'},{label:'Age',key:'age'},{label:'Pronouns',key:'pronouns'},
      {label:'Occupation',key:'occupation'},{label:'Archetype',key:'archetype'},
      {label:'Nationality',key:'nationality'},{label:'Hometown',key:'hometown'},
    ]},
    {heading:'Appearance', fields:[
      {label:'Height',key:'height'},{label:'Build',key:'build'},{label:'Weight',key:'weight'},
      {label:'Hair',key:'hairColor'},{label:'Hair Style',key:'hairStyle'},
      {label:'Eyes',key:'eyeColor'},{label:'Skin Tone',key:'skinTone'},
      {label:'Clothing Style',key:'clothingStyle'},{label:'Distinguishing Marks',key:'distinguishingMarks'},
      {label:'First Impression',key:'firstImpression'},{label:'Body Language',key:'bodyLanguage'},
    ]},
    {heading:'Voice & Mind', fields:[
      {label:'Speaking Style',key:'speakingStyle'},{label:'Vocabulary',key:'vocabulary'},
      {label:'Speech Habit',key:'speechHabit'},{label:'Humor',key:'humor'},
      {label:'Intelligence',key:'intelligence'},{label:'Education',key:'education'},
    ]},
    {heading:'Backstory', fields:[
      {label:'Childhood Home',key:'childhoodHome'},{label:'Family Dynamic',key:'familyDynamic'},
      {label:'Formative Event',key:'formativeEvent'},{label:'The Wound',key:'wound'},
      {label:'Biggest Regret',key:'biggestRegret'},{label:'Secret',key:'secret'},
    ]},
    {heading:'Psychology', fields:[
      {label:'Personality',key:'personality'},{label:'Core Flaw',key:'flaw'},
      {label:'Core Strength',key:'strength'},{label:'Greatest Fear',key:'fear'},
      {label:'Deepest Desire',key:'desire'},{label:'Internal Conflict',key:'internalConflict'},
      {label:'Coping Under Pressure',key:'coping'},{label:'Summary',key:'traits'},
    ]},
    {heading:'Story Role', fields:[
      {label:'Want vs. Need',key:'wantVsNeed'},{label:'Core Motivation',key:'motivation'},
      {label:'Role in Story',key:'storyRole'},{label:'Character Arc',key:'arc'},
      {label:'First Scene',key:'firstScene'},
    ]},
  ];

  sections.forEach(s=>{
    const sec=revSec(s.heading, s.fields);
    if(sec) pane.appendChild(sec);
  });
}


// ══════════════════════════════════════════════
//  LOCATION BUILDER WIZARD
// ══════════════════════════════════════════════

// Steps: Identity | Atmosphere | Geography | History | Story Role | Sensory Detail | Review
const LB_STEPS = [
  { id:'identity',  label:'Identity'       },
  { id:'atmosphere',label:'Atmosphere'     },
  { id:'geography', label:'Geography'      },
  { id:'history',   label:'History'        },
  { id:'role',      label:'Story Role'     },
  { id:'sensory',   label:'Sensory Detail' },
  { id:'review',    label:'Review'         },
];

function openLocationBuilder(projectId, prefill={}){
  const data = {
    // Identity
    name:'', locationType:'', region:'', climate:'',
    // Atmosphere
    emotionalRegister:'', dominantMood:'', lightQuality:'', soundscape:'', smell:'', firstImpression:'',
    // Geography
    physicalDescription:'', keyFeatures:'', borders:'', dangerousAreas:'', hiddenAreas:'', scale:'',
    // History
    origin:'', formativeEvent:'', whatPeopleRememberWrong:'', whatHasBeenForgotten:'', currentTension:'',
    // Story Role
    storyRole:'', scenesItSupports:'', whoControls:'', whoIsExcluded:'', symbolism:'',
    // Sensory Detail
    touchTextures:'', tasteSmell:'', soundsAtNight:'', weatherBehavior:'', uniqueDetail:'',
    // Composite fields (assembled on save, compatible with existing PDF/search)
    description:'', atmosphere:'',
    ...prefill
  };
  let step = 0;

  const overlay = el('div',{class:'wizard-overlay'});

  function render(){
    overlay.innerHTML = '';

    const topbar = el('div',{class:'wizard-topbar'});
    const titleEl = el('div',{class:'wizard-topbar-title'});titleEl.textContent = 'Location Builder';
    const progressWrap = el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:6px;'});
    const dots = el('div',{class:'wizard-progress'});
    LB_STEPS.forEach((s,i)=>{
      const dot = el('div',{class:'wizard-step-dot'+(i===step?' active':i<step?' done':'')});
      dot.title = s.label; dots.appendChild(dot);
    });
    const stepLbl = el('div',{class:'wizard-step-label'});
    stepLbl.textContent = 'Step '+(step+1)+' of '+LB_STEPS.length+' — '+LB_STEPS[step].label;
    progressWrap.append(dots, stepLbl);
    const closeBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{
      collectStep();
      if(step < LB_STEPS.length-1){ wizardExitConfirm(()=>overlay.remove()); }
      else { overlay.remove(); }
    }});closeBtn.textContent = '✕ Exit';
    topbar.append(titleEl, progressWrap, closeBtn);

    const body = el('div',{class:'wizard-body'});
    const pane = el('div',{class:'wizard-pane'});
    body.appendChild(pane);

    const footer = el('div',{class:'wizard-footer'});
    const backBtn = el('button',{class:'btn btn-ghost',onclick:()=>{collectStep();step--;render();}});
    backBtn.textContent = '← Back';
    if(step===0) backBtn.style.visibility='hidden';
    const nav = el('div',{class:'wizard-footer-nav'});

    if(step < LB_STEPS.length-1){
      const nextBtn = el('button',{class:'btn btn-primary',onclick:()=>{
        if(!collectStep()) return;
        step++; render();
      }});
      nextBtn.textContent = step===LB_STEPS.length-2 ? 'Review →' : 'Next →';
      nav.appendChild(nextBtn);
    } else {
      const saveBtn = el('button',{class:'btn btn-primary',onclick:async()=>{
        if(!data.name.trim()){toast('Give your location a name first','error');return;}
        saveBtn.disabled=true; saveBtn.textContent='Saving…';
        // Assemble composite description for PDF/search/display compatibility
        const descParts = [
          data.physicalDescription,
          data.keyFeatures && 'Key features: '+data.keyFeatures,
          data.borders && 'Borders: '+data.borders,
          data.scale && 'Scale: '+data.scale,
        ].filter(Boolean);
        data.description = descParts.join(' · ');
        // Assemble composite atmosphere
        const atmParts = [
          data.emotionalRegister,
          data.dominantMood && 'Mood: '+data.dominantMood,
          data.lightQuality && 'Light: '+data.lightQuality,
          data.soundscape && 'Sound: '+data.soundscape,
          data.smell && 'Smell: '+data.smell,
          data.firstImpression,
        ].filter(Boolean);
        data.atmosphere = atmParts.join(' · ');
        showSaving();
        await fsCreate('locations',{storyProjectId:projectId,...data});
        showSaved();
        overlay.remove();
        renderLocations(document.getElementById('content'), projectId);
        toast('Location "'+data.name+'" created');
      }});
      saveBtn.textContent = '♦ Save Location';
      nav.appendChild(saveBtn);
    }
    footer.append(backBtn, nav);
    overlay.append(topbar, body, footer);

    switch(LB_STEPS[step].id){
      case 'identity':   lbIdentity(pane, data); break;
      case 'atmosphere': lbAtmosphere(pane, data); break;
      case 'geography':  lbGeography(pane, data); break;
      case 'history':    lbHistory(pane, data); break;
      case 'role':       lbRole(pane, data); break;
      case 'sensory':    lbSensory(pane, data); break;
      case 'review':     lbReview(pane, data); break;
    }
    body.scrollTop = 0;
  }

  function collectStep(){
    const s = LB_STEPS[step].id;
    const g = (id)=>{ const e=document.getElementById('lb-'+id); return e?(e.value||'').trim():''; };
    if(s==='identity'){
      if(!g('name')){ document.getElementById('lb-name')?.focus(); toast('Give your location a name to continue','error'); return false; }
      data.name=g('name'); data.locationType=g('locationType');
      data.region=g('region'); data.climate=g('climate');
    }
    if(s==='atmosphere'){
      data.emotionalRegister=g('emotionalRegister'); data.dominantMood=g('dominantMood');
      data.lightQuality=g('lightQuality'); data.soundscape=g('soundscape');
      data.smell=g('smell'); data.firstImpression=g('firstImpression');
    }
    if(s==='geography'){
      data.physicalDescription=g('physicalDescription'); data.keyFeatures=g('keyFeatures');
      data.borders=g('borders'); data.dangerousAreas=g('dangerousAreas');
      data.hiddenAreas=g('hiddenAreas'); data.scale=g('scale');
    }
    if(s==='history'){
      data.origin=g('origin'); data.formativeEvent=g('formativeEvent');
      data.whatPeopleRememberWrong=g('whatPeopleRememberWrong');
      data.whatHasBeenForgotten=g('whatHasBeenForgotten'); data.currentTension=g('currentTension');
    }
    if(s==='role'){
      data.storyRole=g('storyRole'); data.scenesItSupports=g('scenesItSupports');
      data.whoControls=g('whoControls'); data.whoIsExcluded=g('whoIsExcluded');
      data.symbolism=g('symbolism');
    }
    if(s==='sensory'){
      data.touchTextures=g('touchTextures'); data.tasteSmell=g('tasteSmell');
      data.soundsAtNight=g('soundsAtNight'); data.weatherBehavior=g('weatherBehavior');
      data.uniqueDetail=g('uniqueDetail');
    }
    return true;
  }

  document.body.appendChild(overlay);
  render();
}

// ── Shared helpers (lb- prefix, reuse cb/sb pattern) ──
function lbF(id, label, placeholder, value, rows=1, hint=null, tipLines=null){
  const wrap=el('div',{class:'wizard-field'});
  const lbl=el('label',{class:'wizard-field-label'});lbl.textContent=label;lbl.htmlFor='lb-'+id;
  wrap.appendChild(lbl);
  if(hint){const h=el('div',{class:'wizard-field-hint'});h.textContent=hint;wrap.appendChild(h);}
  if(tipLines && tipLines.length){
    const toggle=el('div',{class:'wizard-tip-toggle'});toggle.innerHTML='▸ Stuck? Try this';
    const tipBox=el('div',{class:'wizard-tip',style:'display:none;'});
    const tipLbl=el('div',{class:'wizard-tip-label'});tipLbl.textContent="Writer’s Block?";
    tipBox.appendChild(tipLbl);
    tipLines.forEach(line=>{const p=el('p',{style:'margin:0 0 4px;'});p.textContent=line;tipBox.appendChild(p);});
    toggle.onclick=()=>{
      const open=tipBox.style.display==='none';
      tipBox.style.display=open?'block':'none';
      toggle.innerHTML=(open?'▾':'▸')+' Stuck? Try this';
    };
    wrap.append(toggle,tipBox);
  }
  if(rows===1){
    const inp=el('input',{class:'input',id:'lb-'+id,placeholder,value:value||''});
    wrap.appendChild(inp);
  } else {
    const ta=el('textarea',{class:'textarea',id:'lb-'+id,placeholder,rows:String(rows)});
    ta.value=value||'';
    wrap.appendChild(ta);
  }
  return wrap;
}

function lbSelect(id, label, options, value, hint=null){
  const wrap=el('div',{class:'wizard-field'});
  const lbl=el('label',{class:'wizard-field-label'});lbl.textContent=label;lbl.htmlFor='lb-'+id;
  wrap.appendChild(lbl);
  if(hint){const h=el('div',{class:'wizard-field-hint'});h.textContent=hint;wrap.appendChild(h);}
  const sel=el('select',{class:'select',id:'lb-'+id});
  options.forEach(opt=>{
    const o=el('option',{value:opt.val||(typeof opt==='string'?opt:'')});
    o.textContent=opt.label||(typeof opt==='string'?opt:'');
    if((opt.val||opt)===value) o.selected=true;
    sel.appendChild(o);
  });
  wrap.appendChild(sel);
  return wrap;
}

function lbCallout(icon, text){
  const box=el('div',{style:'background:rgba(94,202,200,0.06);border:1px solid rgba(94,202,200,0.2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:18px;display:flex;gap:12px;align-items:flex-start;'});
  const ic=el('div',{style:'font-size:18px;flex-shrink:0;margin-top:2px;'});ic.textContent=icon;
  const tx=el('div',{style:'font-size:13px;color:var(--fg2);line-height:1.6;'});tx.textContent=text;
  box.append(ic,tx);
  return box;
}

// ── Step 1: Identity ──
function lbIdentity(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='What is this place?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Start with the basics. Every location in a story does work beyond providing a backdrop. A well-built location has character of its own.';
  pane.append(t,s);
  pane.appendChild(lbCallout('⊕','A location is not just a setting. It is a container for conflict, a reflection of theme, and a force in the story. The best locations are characters in their own right.'));

  pane.appendChild(lbF('name','Location Name *','e.g. The Bellamy Hotel, The Eastern Checkpoint, Crater Lake',data.name,1,'The name used in your story. Could be a proper name, a nickname, or a descriptive label.'));
  pane.appendChild(lbSelect('locationType','Location Type',[
    {val:'',label:'— Choose one —'},
    {val:'interior-private',label:'Interior — Private (home, bedroom, office, safe house)'},
    {val:'interior-public',label:'Interior — Public (bar, hospital, courtroom, station)'},
    {val:'exterior-urban',label:'Exterior — Urban (street, rooftop, alley, plaza)'},
    {val:'exterior-natural',label:'Exterior — Natural (forest, coast, mountain, desert)'},
    {val:'liminal',label:'Liminal — In-between space (corridor, stairwell, train, threshold)'},
    {val:'institutional',label:'Institutional (school, prison, government building, hospital)'},
    {val:'ruin-abandoned',label:'Ruin or Abandoned (derelict building, ghost town, wreck)'},
    {val:'symbolic',label:'Symbolic / Mythic (a place with heightened meaning in the world)'},
    {val:'imagined',label:'Imagined / Fantastical (does not exist in the physical world)'},
  ],data.locationType,'The type of location shapes its energy, who has access, and what kinds of scenes work there.'));
  pane.appendChild(cbRow(
    lbF('region','Region or Country','e.g. Southeast London, rural Mississippi, orbital station',data.region),
    lbF('climate','Climate or Season','e.g. Humid summer. Permanent winter. Artificial atmosphere.',data.climate)
  ));
  pane.appendChild(lbF('scale','Scale and Scope','e.g. A single room. A city block. A continent. An entire world.',data.scale,1,'How large is this location? Scale affects how characters move through it and what relationships form within it.',[
    'Scale shapes who can be alone and who is always watched.',
    'A small location creates claustrophobia; a vast one creates isolation. Both are useful.',
  ]));
}

// ── Step 2: Atmosphere ──
function lbAtmosphere(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='Atmosphere: What does it feel like to be here?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Atmosphere is what the audience experiences before anyone speaks. It is the emotional pressure of the environment — invisible but always present.';
  pane.append(t,s);
  pane.appendChild(lbCallout('◎','Consider: What is the dominant emotional register of this place? What does the sky look like? What do people do on a Tuesday? What is the smell of the air?'));

  pane.appendChild(lbF('emotionalRegister','Emotional register — what feeling does this place carry?','e.g. Dread just beneath the surface. A kind of exhausted hope. Oppressive calm. Barely suppressed violence.',data.emotionalRegister,2,'The emotional weather of the location — what the audience feels before anything dramatic happens.',[
    'Try: if you walked in off the street, what would your body know before your mind processed it?',
    'The register does not have to match the events that happen there. A massacre in a cheerful place lands differently than one in a dark one.',
  ]));
  pane.appendChild(cbRow(
    lbF('dominantMood','Dominant mood in one word or phrase','e.g. Watchful. Suffocating. Elegiac. Feverish.',data.dominantMood),
    lbF('lightQuality','Quality of light','e.g. Flat fluorescent. Golden and slow. Perpetual grey overcast. No natural light.',data.lightQuality)
  ));
  pane.appendChild(lbF('soundscape','Soundscape — what does this place sound like?','e.g. Always a low hum. Traffic that never stops. Silence except for wind. The sound of money.',data.soundscape,2,'Sound is often the most atmospheric sense and the one most writers forget.',[
    'What sounds are always present? What sounds are conspicuously absent?',
    'Ask: what would someone hear if they stood still here for five minutes?',
  ]));
  pane.appendChild(cbRow(
    lbF('smell','Dominant smell or scent','e.g. Damp concrete. Pine and diesel. Antiseptic. Old paper and wood.',data.smell),
    lbF('firstImpression','A stranger’s first impression','e.g. Too quiet. Too clean. Like something happened here once.',data.firstImpression)
  ));
}

// ── Step 3: Geography ──
function lbGeography(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='Geography: How is this place laid out?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Geography determines who can go where, who is visible to whom, and where danger lives. The layout of a space is often its most dramatic feature.';
  pane.append(t,s);

  pane.appendChild(lbF('physicalDescription','Physical description — what does it look like?','e.g. A converted warehouse on three levels. The ground floor is open. The upper walkways are narrow and dark.',data.physicalDescription,4,'Describe the space as a director would brief a production designer. What is actually here?',[
    'Think about levels, openings, sight lines, and dead ends. These are what create tension in physical space.',
    'Try: describe it from the perspective of someone entering for the first time.',
    'You do not need to cover everything — focus on the features that will matter for scenes.',
  ]));
  pane.appendChild(lbF('keyFeatures','Key features or landmarks within this location','e.g. The bar at the back that everyone faces. The single window. The locked door no one mentions.',data.keyFeatures,3,'Specific elements that characters will interact with, hide behind, use as weapons, or return to.',[
    'The best location details become dramatic assets. A locked drawer. A broken railing. A back exit.',
    'What physical feature of this space will recur across scenes?',
  ]));
  pane.appendChild(cbRow(
    lbF('borders','Borders and thresholds — how do you get in and out?','e.g. One entrance. Three exits only staff know. A checkpoint at the gate.',data.borders),
    lbF('dangerousAreas','Dangerous or contested areas within the space','e.g. The blind corridor behind the kitchen. The roof access. The basement.',data.dangerousAreas)
  ));
  pane.appendChild(lbF('hiddenAreas','Hidden, secret, or restricted areas','e.g. The room behind the bookcase. The maintenance tunnels. The private floor.',data.hiddenAreas,2,'Places within the location that not everyone knows about or has access to. These often become dramatically crucial.',[
    'Hidden areas create information asymmetry — who knows about this place and who does not?',
    'A hidden area is often where the truth lives.',
  ]));
}

// ── Step 4: History ──
function lbHistory(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='History: What happened here?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='Every significant location carries its history in its walls. What a place used to be shapes what it is now — even when nobody talks about it.';
  pane.append(t,s);
  pane.appendChild(lbCallout('✶','Consider: What war, catastrophe, or founding shaped this place? What do people remember wrong? What has been deliberately forgotten? What wound has never healed?'));

  pane.appendChild(lbF('origin','Origin — how did this place come to be?','e.g. Built as a transit hub, repurposed after the evacuation. Founded by a family who fled north. Grew up around a mine that closed.',data.origin,3,'The original purpose of a location often haunts its present function.',[
    'A place built for one purpose and used for another carries a kind of dissonance.',
    'Ask: what was this place designed to do, and does it still do that?',
  ]));
  pane.appendChild(lbF('formativeEvent','The formative event — what happened here that people do not forget?','e.g. A murder. A fire that killed twelve. A famous trial. A riot that nobody talks about anymore.',data.formativeEvent,3,'The event that defines this location in collective memory — or that some want to erase.',[
    'The best location histories leave a mark on the physical space and on the people who use it.',
    'Ask: what would a long-time resident say if you asked them about the worst thing that ever happened here?',
  ]));
  pane.appendChild(cbRow(
    lbF('whatPeopleRememberWrong','What do people remember wrong about this place?','e.g. They say it burned once, but it never did. The founder is celebrated, but was actually a thief.',data.whatPeopleRememberWrong,3),
    lbF('whatHasBeenForgotten','What has been deliberately forgotten or buried?','e.g. Who owned the land before. What the building was used for during the occupation.',data.whatHasBeenForgotten,3)
  ));
  pane.appendChild(lbF('currentTension','Current unresolved tension or conflict tied to this place','e.g. A disputed ownership claim. A community still divided over what happened. A renovation that will erase everything.',data.currentTension,2,'What is the ongoing wound? What argument or conflict is this location still hosting?',[
    'A location with unresolved tension is a location that is still alive in the story.',
    'Ask: who wants this place to stay the same, and who wants to change it?',
  ]));
}

// ── Step 5: Story Role ──
function lbRole(pane, data){
  const t=el('div',{class:'wizard-pane-title'});t.textContent='Story Role: What does this place DO in the narrative?';
  const s=el('div',{class:'wizard-pane-sub'});s.textContent='A location earns its place in a story the same way a scene does — it must DO something. Every significant location has a function, a relationship to power, and a meaning beyond its walls.';
  pane.append(t,s);

  pane.appendChild(lbF('storyRole','What role does this location play in the story?','e.g. The protagonist’s only refuge. The place where all evidence converges. The threshold between the old life and the new.',data.storyRole,2,'Not what it is — what it DOES for the narrative.',[
    'Try finishing this sentence: "This location exists in the story because..."',
    'A location that only provides backdrop can be replaced with any other location. A location with a story role cannot.',
  ]));
  pane.appendChild(lbF('scenesItSupports','What kinds of scenes does this location naturally support?','e.g. Confrontations that cannot be overheard. Chance encounters. Secrets that need to be hidden. A place where people lower their guard.',data.scenesItSupports,3,'The physical and atmospheric properties of a location shape what scenes work there.',[
    'Ask: what does the layout or atmosphere of this place make easier or harder for characters?',
    'A narrow corridor makes escape difficult. A public space makes honesty dangerous. Use the location as a dramatic tool.',
  ]));
  pane.appendChild(cbRow(
    lbF('whoControls','Who controls or owns this place?','e.g. The mayor’s office. An absent landlord. No one — that is the problem.',data.whoControls,2),
    lbF('whoIsExcluded','Who is excluded or unwelcome here?','e.g. Anyone without a clearance. The old neighborhood. Women after dark.',data.whoIsExcluded,2)
  ));
  pane.appendChild(lbF('symbolism','What does this location symbolize or represent thematically?','e.g. The cost of ambition. A world that is ending. Everything the protagonist is trying to escape — or return to.',data.symbolism,3,'Optional but powerful. The best locations carry meaning beyond their physical description.',[
    'Ask: if this location appeared in a dream, what would it mean?',
    'Does this place mirror a character’s internal state? Does it represent a theme of the story?',

// Scan every screenplay document in the project, extract location names from
// all sluglines using extractLocationFromSlug(), and create Location records
// for any names not already in the collection. Returns the count of new records
// created. This is the one-time backfill path for scripts written before
// autoAddLocationsFromBlocks was introduced in 4-1.
async function backfillLocationsFromAllDocs(projectId){
  // Load all documents in this project that have sceneBlocks (v2 screenplays)
  const [docs, existing] = await Promise.all([
    fsQuery('documents', where('storyProjectId','==',projectId)),
    fsQuery('locations', where('storyProjectId','==',projectId)),
  ]);
  const existingNames = new Set(existing.map(l => l.name.trim().toUpperCase()));
  // Collect unique location names from all blocks across all docs
  const found = new Set();
  docs.forEach(doc => {
    const blocks = doc.sceneBlocks || [];
    blocks.forEach(b => {
      const slug = getBlockSlug(b);
      const name = extractLocationFromSlug(slug);
      if(name) found.add(name);
    });
  });
  // Filter to those not already in the collection
  const toCreate = [...found].filter(n => !existingNames.has(n.toUpperCase()));
  if(!toCreate.length) return 0;
  await Promise.all(toCreate.map(name => fsCreate('locations', {
    storyProjectId: projectId,
    name,
    description: '',
    atmosphere: '',
    storyRole: '',
    autoCreated: true,
  })));
  // Sync session set and autofill cache so subsequent saves stay fast
  if(_sessionLocNames) toCreate.forEach(n => _sessionLocNames.add(n.toUpperCase()));
  loadAutofillNames(projectId);
  return toCreate.length;
}

async function renderLocations(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const locs = await fsQuery('locations',where('storyProjectId','==',projectId));
  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Locations</div><div class="page-subtitle">'+locs.length+' location'+(locs.length!==1?'s':'')+'</div></div>';
  const hbtns=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});
  const wizBtn=el('button',{class:'btn btn-primary',onclick:()=>openLocationBuilder(projectId)});
  wizBtn.innerHTML='&#10022; Build Location from Template';
  wizBtn.title='Guided location builder — atmosphere, geography, history, and story role';
  const addBtn=el('button',{class:'btn btn-ghost',onclick:()=>openLocationDrawer(null,projectId)});addBtn.textContent='+ Create Blank Location';
  const pdfBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateLocationsPdf(projectId)});pdfBtn.textContent='📄 Create Document';
  // Backfill button: scans all screenplay docs in this project and imports
  // any slugline location names that don't already exist as Location records.
  const backfillBtn=el('button',{class:'btn btn-ghost btn-sm',title:'Scan all screenplays in this project and import any slugline locations not already in your collection'});
  backfillBtn.textContent='↺ Import from Script';
  backfillBtn.onclick=async()=>{
    backfillBtn.disabled=true;
    backfillBtn.textContent='Scanning…';
    try{
      const created = await backfillLocationsFromAllDocs(projectId);

      toast('Import failed','error');

  else{

      card.innerHTML='<h3>'+esc(l.name)+'</h3><p>'+esc(l.description||l.atmosphere||'No description')+'</p>'+(l.storyRole?'<p style="margin-top:6px;font-size:11px;"><span class="tag" style="font-size:10px;">'+esc(l.storyRole)+'</span></p>':'');
      const footer = el('div',{class:'item-card-footer'});
      const eb = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openLocationDrawer(l,projectId)});eb.textContent='Edit';
      const db2 = el('button',{class:'btn btn-danger btn-sm',onclick:()=>confirmDelete('Delete "'+l.name+'"?',async()=>{await fsDelete('locations',l.id);renderLocations(container,projectId);toast('Deleted');})});db2.textContent='✕';
      footer.append(eb,db2); card.appendChild(footer); grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }
  container.appendChild(wrap);
}

//  SCENE BUILDER WIZARD  (SCTR Framework)
// ══════════════════════════════════════════════

// Steps: Setup | Confrontation | Turn | Resolution | Craft | Review
const SB_STEPS = [
  { id:'setup',         label:'S — Setup'         },
  { id:'confrontation', label:'C — Confrontation'  },
  { id:'turn',          label:'T — Turn'           },
  { id:'resolution',    label:'R — Resolution'     },
  { id:'craft',         label:'Craft & Context'    },
  { id:'review',        label:'Review'             },
];

function openSceneBuilder(projectId, chars, locs, nextSeq){
  const data = {
    // Identity / logistics
    title:'', sequenceNumber: nextSeq||1, locationId:'', characterIds:[],
    // S — Setup
    sceneGoal:'', charAWant:'', charBWant:'', stakesDescription:'', tensionType:'',
    // C — Confrontation
    confrontationType:'', confrontationDesc:'', obstacleType:'', obstacleDesc:'',
    // T — Turn
    turnLine:'', turnType:'', turnDescription:'', turnQuiet:'',
    // R — Resolution
    resolutionChange:'', changeType:'', whoChanges:'', newStatus:'',
    // Craft
    subtext:'', openingImage:'', closingImage:'', sceneTest:'', toneNotes:'',
    // Assembled composite for display/search
    description:'',
  };
  let step = 0;

  const overlay = el('div',{class:'wizard-overlay'});

  function render(){
    overlay.innerHTML = '';

    // ── Topbar ──
    const topbar = el('div',{class:'wizard-topbar'});
    const titleEl = el('div',{class:'wizard-topbar-title'});titleEl.textContent = 'Scene Builder — SCTR Framework';
    const progressWrap = el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:6px;'});
    const dots = el('div',{class:'wizard-progress'});
    SB_STEPS.forEach((s,i)=>{
      const dot = el('div',{class:'wizard-step-dot'+(i===step?' active':i<step?' done':'')});
      dot.title = s.label; dots.appendChild(dot);
    });
    const stepLbl = el('div',{class:'wizard-step-label'});
    stepLbl.textContent = 'Step '+(step+1)+' of '+SB_STEPS.length+' — '+SB_STEPS[step].label;
    progressWrap.append(dots, stepLbl);
    const closeBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{
      collectStep();
      if(step < SB_STEPS.length-1){
        wizardExitConfirm(()=>overlay.remove());
      } else { overlay.remove(); }
    }});closeBtn.textContent = '✕ Exit';
    topbar.append(titleEl, progressWrap, closeBtn);

    // ── Body ──
    const body = el('div',{class:'wizard-body'});
    const pane = el('div',{class:'wizard-pane'});
    body.appendChild(pane);

    // ── Footer ──
    const footer = el('div',{class:'wizard-footer'});
    const backBtn = el('button',{class:'btn btn-ghost',onclick:()=>{collectStep();step--;render();}});
    backBtn.textContent = '← Back';
    if(step===0) backBtn.style.visibility='hidden';
    const nav = el('div',{class:'wizard-footer-nav'});

    if(step < SB_STEPS.length-1){
      const nextBtn = el('button',{class:'btn btn-primary',onclick:()=>{
        if(!collectStep()) return;
        step++; render();
      }});
      nextBtn.textContent = step===SB_STEPS.length-2 ? 'Review →' : 'Next →';
      nav.appendChild(nextBtn);
    } else {
      // Shared assembly logic for both Save options
      const assembleAndSave = async (openDraftAfter) => {
        if(!data.title.trim()){toast('Give your scene a title first','error');return null;}
        // Resolve location text to an ID (creates a location card if new)
        if(data._locationText && !data.locationId){
          data.locationId = await resolveOrCreateLocation(projectId, data._locationText, locs);
        }
        // Clean up the temporary field so it doesn't get saved to firestore
        delete data._locationText;
        const parts = [
          data.sceneGoal && 'Goal: '+data.sceneGoal,
          data.charAWant && 'Setup: '+data.charAWant,
          data.confrontationDesc && 'Confrontation: '+data.confrontationDesc,
          data.turnLine && 'Turn: '+data.turnLine,
          data.resolutionChange && 'Resolution: '+data.resolutionChange,
          data.subtext && 'Subtext: '+data.subtext,
        ].filter(Boolean);
        data.description = parts.join(' · ');
        showSaving();
        const newId = await fsCreate('scenes',{storyProjectId:projectId, ...data});
        showSaved();
        overlay.remove();
        if(openDraftAfter){
          const fresh = await fsGet('scenes', newId);
          // Refresh locs in case a new one was created
          const freshLocs = await fsQuery('locations', where('storyProjectId','==',projectId));
          openSceneDraftEditor(fresh, projectId, chars, freshLocs);
        } else {
          renderScenes(document.getElementById('content'), projectId);
        }
        toast('Scene "'+data.title+'" created');
        return newId;
      };

      const saveBtn = el('button',{class:'btn btn-ghost',onclick:async()=>{
        saveBtn.disabled=true; saveBtn.textContent='Saving…';
        await assembleAndSave(false);
      }});
      saveBtn.textContent = '♦ Save Scene';
      const saveDraftBtn = el('button',{class:'btn btn-primary',onclick:async()=>{
        saveDraftBtn.disabled=true; saveDraftBtn.textContent='Saving…';
        await assembleAndSave(true);
      }, title:'Save this scene and immediately open the draft editor to write the screenplay prose'});
      saveDraftBtn.textContent = '✎ Save & Write This Scene';
      nav.append(saveBtn, saveDraftBtn);
    }
    footer.append(backBtn, nav);
    overlay.append(topbar, body, footer);

    switch(SB_STEPS[step].id){
      case 'setup':         sbSetup(pane, data, chars, locs); break;
      case 'confrontation': sbConfrontation(pane, data); break;
      case 'turn':          sbTurn(pane, data); break;
      case 'resolution':    sbResolution(pane, data); break;
      case 'craft':         sbCraft(pane, data); break;
      case 'review':        sbReview(pane, data, chars, locs); break;
    }

    body.scrollTop = 0;
  }

  function collectStep(){
    const s = SB_STEPS[step].id;
    const g = (id)=>{ const e=document.getElementById('sb-'+id); return e?(e.value||'').trim():''; };
    if(s==='setup'){
      if(!g('title')){ document.getElementById('sb-title')?.focus(); toast('Give your scene a title to continue','error'); return false; }
      data.title=g('title'); data.sequenceNumber=parseInt(g('seq'))||1;
      // Location: the combo returns a name (text), not an ID. We store the raw
      // text and resolve it to an ID at save time (async).
      data._locationText = g('loc');
      // Try to match existing location by name for immediate preview purposes.
      const matchedLoc = locs.find(l => l.name.toLowerCase() === data._locationText.toLowerCase());
      data.locationId = matchedLoc ? matchedLoc.id : '';
      data.sceneGoal=g('sceneGoal'); data.stakesDescription=g('stakesDescription'); data.tensionType=g('tensionType');
      data.charAWant=g('charAWant'); data.charBWant=g('charBWant');
      // character checkboxes
      const cbs = Array.from(overlay.querySelectorAll('input[data-sb-char]:checked')).map(c=>c.value);
      data.characterIds = cbs;
    }
    if(s==='confrontation'){
      data.confrontationType=g('confrontationType'); data.confrontationDesc=g('confrontationDesc');
      data.obstacleType=g('obstacleType'); data.obstacleDesc=g('obstacleDesc');
    }
    if(s==='turn'){
      data.turnLine=g('turnLine'); data.turnType=g('turnType');
      data.turnDescription=g('turnDescription'); data.turnQuiet=g('turnQuiet');
    }
    if(s==='resolution'){
      data.resolutionChange=g('resolutionChange'); data.changeType=g('changeType');
      data.whoChanges=g('whoChanges'); data.newStatus=g('newStatus');
    }
    if(s==='craft'){
      data.subtext=g('subtext'); data.openingImage=g('openingImage');
      data.closingImage=g('closingImage'); data.sceneTest=g('sceneTest'); data.toneNotes=g('toneNotes');
    }
    return true;
  }

  document.body.appendChild(overlay);
  render();
}

// ── Shared field helper (reuses cbF pattern with sb- prefix) ──
function sbF(id, label, placeholder, value, rows=1, hint=null, tipLines=null){
  const wrap=el('div',{class:'wizard-field'});
  const lbl=el('label',{class:'wizard-field-label'});lbl.textContent=label;lbl.htmlFor='sb-'+id;
  wrap.appendChild(lbl);
  if(hint){const h=el('div',{class:'wizard-field-hint'});h.textContent=hint;wrap.appendChild(h);}
  if(tipLines && tipLines.length){
    const toggle=el('div',{class:'wizard-tip-toggle'});toggle.innerHTML='▸ Stuck? Try this';
    const tipBox=el('div',{class:'wizard-tip',style:'display:none;'});
    const tipLbl=el('div',{class:'wizard-tip-label'});tipLbl.textContent="Writer's Block?";
    tipBox.appendChild(tipLbl);
    tipLines.forEach(line=>{const p=el('p',{style:'margin:0 0 4px;'});p.textContent=line;tipBox.appendChild(p);});
    toggle.onclick=()=>{
      const open=tipBox.style.display==='none';
      tipBox.style.display=open?'block':'none';
      toggle.innerHTML=(open?'▾':'▸')+' Stuck? Try this';
    };
    wrap.append(toggle,tipBox);
  }
  if(rows===1){
    const inp=el('input',{class:'input',id:'sb-'+id,placeholder,value:value||''});
    wrap.appendChild(inp);
  } else {
    const ta=el('textarea',{class:'textarea',id:'sb-'+id,placeholder,rows:String(rows)});
    ta.value=value||'';
    wrap.appendChild(ta);
  }
  return wrap;
}

function sbSelect(id, label, options, value, hint=null){
  const wrap=el('div',{class:'wizard-field'});
  const lbl=el('label',{class:'wizard-field-label'});lbl.textContent=label;lbl.htmlFor='sb-'+id;
  wrap.appendChild(lbl);
  if(hint){const h=el('div',{class:'wizard-field-hint'});h.textContent=hint;wrap.appendChild(h);}
  const sel=el('select',{class:'select',id:'sb-'+id});
  options.forEach(opt=>{
    const o=el('option',{value:opt.val||(typeof opt==='string'?opt:'')});
    o.textContent=opt.label||(typeof opt==='string'?opt:'');
    if((opt.val||opt)===value) o.selected=true;
    sel.appendChild(o);
  });
  wrap.appendChild(sel);
  return wrap;
}
