<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Narrative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Belleza&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK MODE (default) ── */
  :root, [data-theme="dark"] {
    --bg:#181f1a; --bg2:#1c2620; --bg3:#223028; --border:#2a3d2d; --border2:#3a5540;
    --primary:#52b788; --primary-d:#3d9e72; --primary-h:#74c99e;
    --accent:#6893ef; --accent2:#5ecac8;
    --fg:#d4ede0; --fg2:#8aad96; --fg3:#536b5c;
    --red:#e05c6f; --green:#6fcf97; --gold:#e5b86e; --teal:#5ecac8; --rose:#e578a8;
    --card-bg:#1c2620; --shadow:0 4px 24px rgba(0,0,0,0.5); --radius:12px; --radius-sm:8px;
    --topbar-bg:rgba(24,31,26,0.92);
    --active-bg:rgba(82,183,136,0.14);
    --tag-bg:rgba(82,183,136,0.12); --tag-color:#74c99e; --tag-border:rgba(82,183,136,0.2);
    --toolbar-active-bg:rgba(82,183,136,0.18);
    --input-focus-shadow:rgba(82,183,136,0.2);
    --btn-primary-shadow:rgba(82,183,136,0.3);
    --sp-char-color:#74c99e;
  }

  /* ── LIGHT MODE ── */
  [data-theme="light"] {
    --bg:#f2f3f1; --bg2:#e8ebe7; --bg3:#dde3da; --border:#d1d8d0; --border2:#b8c4b6;
    --primary:#2d6a4f; --primary-d:#1f4f3a; --primary-h:#3d8c6e;
    --accent:#2d5fa6; --accent2:#2a8a88;
    --fg:#1a2e22; --fg2:#3d5c48; --fg3:#7a9070;
    --red:#c0392b; --green:#27855a; --gold:#b8860b; --teal:#2a8a88; --rose:#b5446e;
    --card-bg:#ffffff; --shadow:0 2px 16px rgba(0,0,0,0.1); --radius:12px; --radius-sm:8px;
    --topbar-bg:rgba(242,243,241,0.95);
    --active-bg:rgba(45,106,79,0.1);
    --tag-bg:rgba(45,106,79,0.08); --tag-color:#2d6a4f; --tag-border:rgba(45,106,79,0.2);
    --toolbar-active-bg:rgba(45,106,79,0.12);
    --input-focus-shadow:rgba(45,106,79,0.15);
    --btn-primary-shadow:rgba(45,106,79,0.25);
    --sp-char-color:#2d6a4f;
  }

  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Lora',Georgia,serif;font-size:15px;line-height:1.6;transition:background 0.2s,color 0.2s;}
  #app{height:100%;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Belleza',serif;letter-spacing:0.03em;}
  ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Lora',serif;font-size:13px;transition:all 0.18s ease;white-space:nowrap;}
  .btn-primary{background:var(--primary);color:white;} .btn-primary:hover{background:var(--primary-d);transform:translateY(-1px);box-shadow:0 4px 12px var(--btn-primary-shadow);}
  .btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--border);} .btn-ghost:hover{background:var(--bg3);color:var(--fg);border-color:var(--border2);}
  .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,92,111,0.3);} .btn-danger:hover{background:rgba(224,92,111,0.1);}
  .btn-icon{padding:7px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;color:var(--fg3);transition:all 0.15s;font-size:14px;} .btn-icon:hover{background:var(--bg3);color:var(--fg);}
  .btn-sm{padding:5px 10px;font-size:12px;}

  /* ── Inputs ── */
  .input,.textarea,.select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);font-family:'Lora',serif;font-size:14px;outline:none;transition:border-color 0.2s;}
  .input:focus,.textarea:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--input-focus-shadow);}
  .textarea{resize:vertical;min-height:80px;line-height:1.6;} .select{appearance:none;cursor:pointer;}
  .input::placeholder,.textarea::placeholder{color:var(--fg3);}
  .label{font-size:12px;color:var(--fg3);margin-bottom:5px;display:block;letter-spacing:0.06em;text-transform:uppercase;}

  /* ── Topbar ── */
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Belleza',serif;font-size:22px;color:var(--primary);letter-spacing:0.08em;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg3);}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'Belleza',serif;font-size:14px;color:white;}
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--fg3);}
  .breadcrumb span{cursor:pointer;transition:color 0.15s;} .breadcrumb span:hover{color:var(--primary);} .breadcrumb .sep{opacity:0.4;}

  /* ── Theme toggle ── */
  .theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);transition:all 0.15s;}
  .theme-toggle:hover{border-color:var(--border2);}
  .toggle-track{width:34px;height:18px;border-radius:9px;background:var(--border2);position:relative;transition:background 0.2s;}
  .toggle-track.on{background:var(--primary);}
  .toggle-knob{width:12px;height:12px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:transform 0.2s;}
  .toggle-track.on .toggle-knob{transform:translateX(16px);}
  .toggle-label{font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;}

  /* ── Layout ── */
  #main{flex:1;display:flex;overflow:hidden;}
  #sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;}
  #content{flex:1;overflow-y:auto;}
  .sidebar-project{padding:16px 16px 10px;} .sidebar-project-name{font-family:'Belleza',serif;font-size:15px;color:var(--fg);margin-bottom:2px;line-height:1.3;} .sidebar-project-tag{font-size:11px;color:var(--fg3);}
  .sidebar-divider{height:1px;background:var(--border);margin:8px 0;}
  .nav-section{padding:6px 10px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--fg2);transition:all 0.15s;}
  .nav-item:hover{background:var(--bg3);color:var(--fg);} .nav-item.active{background:var(--active-bg);color:var(--primary);}
  .sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border);}
  .page{padding:32px 40px;max-width:1100px;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
  .page-title{font-family:'Belleza',serif;font-size:28px;color:var(--fg);} .page-subtitle{color:var(--fg3);font-size:13px;margin-top:3px;}
  #home-wrap{padding:40px;max-width:1100px;margin:0 auto;}
  .home-hero{text-align:center;padding:60px 20px 48px;}
  .home-hero h1{font-family:'Belleza',serif;font-size:48px;color:var(--primary);margin-bottom:10px;}
  .home-hero p{color:var(--fg3);font-size:16px;max-width:500px;margin:0 auto 32px;}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .project-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .project-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
  .project-card-color{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
  .project-card h3{font-family:'Belleza',serif;font-size:18px;margin-bottom:6px;color:var(--fg);}
  .project-card p{font-size:13px;color:var(--fg3);line-height:1.5;margin-bottom:16px;max-height:52px;overflow:hidden;}
  .project-card-footer{display:flex;align-items:center;justify-content:space-between;}
  .project-card-meta{font-size:11px;color:var(--fg3);}
  .project-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;} .project-card:hover .project-card-actions{opacity:1;}
  .color-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;} .color-swatch.selected{border-color:white;transform:scale(1.2);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--fg3);}
  .empty-state h3{font-family:'Belleza',serif;font-size:20px;color:var(--fg2);margin-bottom:8px;}
  .empty-state p{font-size:13px;max-width:340px;margin:0 auto 20px;}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .item-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all 0.2s;}
  .item-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,0.15);}
  .item-card h3{font-family:'Belleza',serif;font-size:16px;margin-bottom:6px;} .item-card p{font-size:12px;color:var(--fg3);line-height:1.5;}
  .item-card-footer{margin-top:14px;display:flex;justify-content:flex-end;gap:6px;opacity:0;transition:opacity 0.15s;} .item-card:hover .item-card-footer{opacity:1;}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;justify-content:flex-end;animation:fadeIn 0.15s;}
  .drawer{width:480px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn 0.2s ease;overflow:hidden;}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
  .drawer-title{font-family:'Belleza',serif;font-size:20px;}
  .drawer-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
  .drawer-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
  .field{display:flex;flex-direction:column;gap:6px;} .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--tag-bg);color:var(--tag-color);border:1px solid var(--tag-border);}
  .doc-list{display:flex;flex-direction:column;gap:10px;}
  .doc-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s;}
  .doc-item:hover{border-color:var(--border2);background:var(--bg3);}
  .doc-item-left h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:3px;}
  .doc-item-badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;}
  .badge-narrative{background:rgba(104,147,239,0.15);color:var(--accent);border:1px solid rgba(104,147,239,0.2);}
  .badge-screenplay{background:rgba(229,184,110,0.15);color:var(--gold);border:1px solid rgba(229,184,110,0.2);}
  .editor-view{display:flex;flex-direction:column;height:calc(100vh - 57px);}
  .editor-topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg2);}
  .editor-title-input{font-family:'Belleza',serif;font-size:18px;background:transparent;border:none;color:var(--fg);outline:none;flex:1;min-width:150px;}
  .editor-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
  .toolbar-btn{padding:5px 8px;border-radius:5px;background:transparent;border:none;cursor:pointer;color:var(--fg2);font-size:13px;transition:all 0.15s;font-family:'Lora',serif;}
  .toolbar-btn:hover{background:var(--bg3);color:var(--fg);} .toolbar-btn.active{background:var(--toolbar-active-bg);color:var(--primary);}
  .editor-body{flex:1;padding:40px;overflow-y:auto;}
  .editor-content{max-width:700px;margin:0 auto;min-height:400px;outline:none;font-size:16px;line-height:1.85;color:var(--fg);}
  .editor-content:empty::before{content:attr(data-placeholder);color:var(--fg3);pointer-events:none;}
  .editor-content p{margin-bottom:0.8em;}
  .editor-content h1,.editor-content h2,.editor-content h3{font-family:'Belleza',serif;color:var(--primary);margin:1.2em 0 0.5em;}
  .editor-content ul,.editor-content ol{padding-left:1.6em;margin-bottom:0.8em;}
  .editor-word-count{padding:8px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--fg3);text-align:right;background:var(--bg2);}
  .screenplay-body{flex:1;padding:40px;overflow-y:auto;background:var(--bg);}
  .screenplay-page{max-width:680px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:60px;min-height:600px;}
  .screenplay-content{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;outline:none;}
  .screenplay-content [data-type="scene-heading"]{text-transform:uppercase;font-weight:600;color:var(--fg);margin:1.4em 0 0.6em;}
  .screenplay-content [data-type="character"]{text-align:center;text-transform:uppercase;margin:1em 0 0;color:var(--sp-char-color);padding-left:160px;}
  .screenplay-content [data-type="dialogue"]{padding:0 80px;margin:0 0 0.4em;color:var(--fg2);}
  .screenplay-content [data-type="parenthetical"]{text-align:center;padding:0 120px;color:var(--fg3);font-style:italic;margin:0;}
  .screenplay-content [data-type="action"]{margin:0.7em 0;color:var(--fg);}
  .screenplay-content [data-type="transition"]{text-align:right;text-transform:uppercase;font-weight:600;margin:1.2em 0;color:var(--fg3);}
  .screenplay-type-selector{display:flex;gap:6px;flex-wrap:wrap;}
  .type-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--fg3);transition:all 0.15s;}
  .type-btn:hover{border-color:var(--border2);color:var(--fg);} .type-btn.active{background:var(--toolbar-active-bg);color:var(--primary);border-color:var(--border2);}
  /* Autofill suggestion dropdown */
  .sp-suggest{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);min-width:180px;z-index:50;box-shadow:var(--shadow);overflow:hidden;}
  .sp-suggest-item{padding:8px 14px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--fg2);cursor:pointer;transition:background 0.1s;}
  .sp-suggest-item:hover,.sp-suggest-item.focused{background:var(--active-bg);color:var(--primary);}
  .scene-list{display:flex;flex-direction:column;gap:10px;}
  .scene-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;gap:14px;align-items:flex-start;transition:all 0.2s;}
  .scene-item:hover{border-color:var(--border2);}
  .scene-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3);background:var(--bg3);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
  .scene-body{flex:1;} .scene-body h3{font-family:'Belleza',serif;font-size:15px;margin-bottom:4px;} .scene-body p{font-size:12px;color:var(--fg3);}
  .scene-chars{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .world-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .world-section h3{font-family:'Belleza',serif;font-size:15px;color:var(--primary);margin-bottom:10px;}
  .world-section-guide{font-size:11px;color:var(--fg3);margin-bottom:8px;line-height:1.5;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);border-left:2px solid var(--primary);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease;}
  .modal-title{font-family:'Belleza',serif;font-size:22px;margin-bottom:20px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
  #toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:500;}
  .toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--fg);box-shadow:var(--shadow);animation:toastIn 0.2s ease;min-width:200px;}
  .toast.success{border-left:3px solid var(--green);} .toast.error{border-left:3px solid var(--red);} .toast.info{border-left:3px solid var(--accent);}
  @keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .outline-list{display:flex;flex-direction:column;gap:6px;}
  .outline-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .outline-handle{color:var(--fg3);cursor:grab;font-size:14px;padding-top:1px;}
  .outline-content{flex:1;} .outline-content input{background:transparent;border:none;outline:none;font-family:'Lora',serif;font-size:14px;color:var(--fg);width:100%;} .outline-content input::placeholder{color:var(--fg3);}
  .outline-level{display:flex;gap:4px;margin-top:6px;}
  .stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;cursor:pointer;transition:border-color 0.2s;}
  .stat-card:hover{border-color:var(--border2);}
  .stat-num{font-family:'Belleza',serif;font-size:32px;color:var(--primary);} .stat-label{font-size:12px;color:var(--fg3);}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:400px;max-width:95vw;}
  .auth-logo{font-family:'Belleza',serif;font-size:28px;color:var(--primary);text-align:center;margin-bottom:6px;}
  .auth-sub{text-align:center;color:var(--fg3);font-size:13px;margin-bottom:32px;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--fg3);border-bottom:2px solid transparent;transition:all 0.15s;}
  .auth-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .auth-error{background:rgba(224,92,111,0.1);border:1px solid rgba(224,92,111,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;}
  .saving-indicator{font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;}
  /* Guided prompts toggle */
  .guide-toggle{font-size:12px;color:var(--primary);cursor:pointer;margin-bottom:6px;display:inline-flex;align-items:center;gap:4px;opacity:0.8;}
  .guide-toggle:hover{opacity:1;}
  /* Document Library */
  .doclibrary-list{display:flex;flex-direction:column;gap:10px;}
  .doclibrary-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:all 0.2s;}
  .doclibrary-item:hover{border-color:var(--border2);}
  .doclibrary-item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
  .doclibrary-item-title{font-family:'Belleza',serif;font-size:15px;color:var(--fg);}
  .doclibrary-item-meta{font-size:11px;color:var(--fg3);margin-top:2px;}

  /* ── CLASSROOM / TEACHER STYLES ── */
  .teacher-banner{position:sticky;top:0;z-index:90;background:linear-gradient(135deg,rgba(104,147,239,0.18),rgba(94,202,200,0.12));border-bottom:2px solid var(--accent);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;backdrop-filter:blur(8px);}

  .home-tab:hover{color:var(--fg2);}
  .home-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .roster-table{width:100%;border-collapse:collapse;margin-top:8px;}

  .roster-table td{padding:14px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--fg2);vertical-align:middle;}
  .roster-table tr:last-child td{border-bottom:none;}

  .roster-status.pending{background:rgba(229,184,110,0.15);color:var(--gold);border:1px solid rgba(229,184,110,0.25);}
  .roster-status.active{background:rgba(111,207,151,0.12);color:var(--green);border:1px solid rgba(111,207,151,0.2);}
  .class-code-display{display:inline-flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.12em;color:var(--primary);}
  .feedback-fab{position:fixed;bottom:28px;right:28px;z-index:80;background:var(--accent);color:white;border:none;border-radius:50px;padding:12px 20px;font-family:'Belleza',serif;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(104,147,239,0.4);transition:all 0.2s;display:flex;align-items:center;gap:8px;}
  .feedback-fab:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(104,147,239,0.5);}
  .comment-thread{display:flex;flex-direction:column;gap:12px;}
  .comment-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
  .comment-bubble-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .comment-bubble-author{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:500;}
  .comment-bubble-time{font-size:10px;color:var(--fg3);}
  .comment-bubble-text{font-size:13px;color:var(--fg2);line-height:1.5;}
  .comment-empty{text-align:center;padding:32px;color:var(--fg3);font-size:13px;font-style:italic;}
  .feedback-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:85;box-shadow:-4px 0 20px rgba(0,0,0,0.3);animation:slideIn 0.2s ease;}
  .feedback-panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .feedback-panel-title{font-family:'Belleza',serif;font-size:18px;}
  .feedback-panel-body{flex:1;overflow-y:auto;padding:16px;}
  .feedback-panel-footer{padding:14px 16px;border-top:1px solid var(--border);}
  .student-project-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .student-project-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
  .teacher-settings-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
  .teacher-settings-section h3{font-family:'Belleza',serif;font-size:17px;margin-bottom:16px;color:var(--primary);}
</style>
</head>
<body>
<div id="app">
  <div id="topbar" style="display:none;">
    <div class="topbar-logo" id="logo-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2L13.5 8H20L14.5 12L16.5 18.5L11 15L5.5 18.5L7.5 12L2 8H8.5L11 2Z" fill="currentColor" opacity="0.85"/></svg>
      Narrative Studio
    </div>
    <div id="breadcrumb-area"></div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div id="main" style="display:none;">
    <div id="sidebar" style="display:none;"></div>
    <div id="content"></div>
  </div>
  <div id="auth-container"></div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, writeBatch
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════
//  FIREBASE INIT
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyClzB9zJGEDptWLy8BNrnD0QAdVRJDbk1E",
  authDomain: "narrative-studio-backend.firebaseapp.com",
  projectId: "narrative-studio-backend",
  storageBucket: "narrative-studio-backend.firebasestorage.app",
  messagingSenderId: "465446631091",
  appId: "1:465446631091:web:fe86a6f49d8e8e947d22c6"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

// ══════════════════════════════════════════════
//  THEME SYSTEM
// ══════════════════════════════════════════════
let currentTheme = 'dark';

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.toggle-track').forEach(t => t.classList.toggle('on', theme === 'light'));
  document.querySelectorAll('.toggle-label').forEach(t => t.textContent = theme === 'light' ? 'Light' : 'Dark');
}

function toggleTheme() {
  const next = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (currentUser) {
    fsUpdate('userPrefs', 'prefs', { theme: next }).catch(async () => {
      try { await fsCreate('userPrefs', { theme: next }); } catch {}
    });
  }
}

async function loadUserTheme() {
  try {
    const prefs = await fsGet('userPrefs', 'prefs');
    applyTheme(prefs && prefs.theme ? prefs.theme : 'dark');
  } catch { applyTheme('dark'); }
}

function themeToggleEl() {
  const wrap = document.createElement('div');
  wrap.className = 'theme-toggle';
  wrap.onclick = toggleTheme;
  wrap.innerHTML = `<div class="toggle-track${currentTheme==='light'?' on':''}"><div class="toggle-knob"></div></div><span class="toggle-label">${currentTheme==='light'?'Light':'Dark'}</span>`;
  return wrap;
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const COLOR_MAP = {purple:'#9378ca',blue:'#6893ef',teal:'#5ecac8',rose:'#e578a8',red:'#e05c6f',gold:'#e5b86e',green:'#6fcf97',gray:'#7a7090'};
function colorStyle(label){return COLOR_MAP[label]||COLOR_MAP.purple;}
function relativeTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff=Date.now()-d.getTime(), s=Math.floor(diff/1000), m=Math.floor(s/60), h=Math.floor(m/60), dy=Math.floor(h/24);
  if(s<60) return 'just now'; if(m<60) return m+'m ago'; if(h<24) return h+'h ago';
  if(dy===1) return 'yesterday'; if(dy<30) return dy+'d ago';
  return d.toLocaleDateString();
}
function toast(msg, type='success'){
  const e=document.createElement('div'); e.className='toast '+type; e.textContent=msg;
  document.getElementById('toast-container').appendChild(e);
  setTimeout(()=>e.remove(), 2800);
}
function el(tag, attrs, children){
  attrs=attrs||{}; children=children||[];
  const e=document.createElement(tag);
  Object.keys(attrs).forEach(k=>{
    const v=attrs[k];
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  const kids=Array.isArray(children)?children:[children];
  kids.forEach(c=>{
    if(c===null||c===undefined) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function v(id){const e=document.getElementById(id); return e?e.value.trim():'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function wordCount(html){const t=html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim(); return t?t.split(' ').length:0;}
function showSaving(){ setSavingIndicator('◌ Saving…','var(--fg3)'); }
function showSaved(){  setSavingIndicator('✓ Saved','var(--green)'); setTimeout(()=>setSavingIndicator('',''),2000); }
function setSavingIndicator(text,color){
  const el=document.getElementById('saving-indicator');
  if(el){el.textContent=text; el.style.color=color;}
}

// ══════════════════════════════════════════════
//  FIRESTORE HELPERS
// ══════════════════════════════════════════════
let currentUser = null;

function userCol(colName){ return collection(db,'users',currentUser.uid,colName); }
function userDoc(colName,id){ return doc(db,'users',currentUser.uid,colName,id); }

async function fsCreate(colName, data){
  const ref = await addDoc(userCol(colName), {...data, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
  return ref.id;
}
async function fsGet(colName, id){
  const snap = await getDoc(userDoc(colName,id));
  return snap.exists() ? {id:snap.id,...snap.data()} : null;
}
async function fsQuery(colName, ...constraints){
  const q = query(userCol(colName), ...constraints);
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fsUpdate(colName, id, data){
  await updateDoc(userDoc(colName,id), {...data, updatedAt:serverTimestamp()});
}
async function fsDelete(colName, id){
  await deleteDoc(userDoc(colName,id));
}
async function fsBatchDelete(colName, fieldName, value){
  const items = await fsQuery(colName, where(fieldName,'==',value));
  if(!items.length) return;
  const batch = writeBatch(db);
  items.forEach(item => batch.delete(userDoc(colName,item.id)));
  await batch.commit();
}

// ── Cross-user helpers (teacher reads student data) ──
function studentCol(uid, colName){ return collection(db,'users',uid,colName); }
function studentDocRef(uid, colName, id){ return doc(db,'users',uid,colName,id); }

async function fsGetStudent(uid, colName, id){
  const snap = await getDoc(studentDocRef(uid,colName,id));
  return snap.exists() ? {id:snap.id,...snap.data()} : null;
}
async function fsQueryStudent(uid, colName, ...constraints){
  const q = query(studentCol(uid,colName), ...constraints);
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

// ── Global userProfiles collection (top-level, not per-user) ──
async function getProfile(uid){
  const snap = await getDoc(doc(db,'userProfiles',uid));
  return snap.exists() ? {id:snap.id,...snap.data()} : null;
}
async function setProfile(uid, data){
  await setDoc(doc(db,'userProfiles',uid), data, {merge:true});
}
async function getAllStudentProfiles(){
  const q = query(collection(db,'userProfiles'), where('role','==','student'));
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
// Teacher comments stored at top-level for cross-user access
async function getTeacherComments(studentUid, projectId){
  const q = query(collection(db,'teacherComments'), where('studentUid','==',studentUid), where('projectId','==',projectId), orderBy('createdAt','asc'));
  const snap = await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function addTeacherComment(studentUid, projectId, text){
  await addDoc(collection(db,'teacherComments'),{
    studentUid, projectId, text,
    teacherUid: currentUser.uid,
    teacherName: currentUser.displayName || currentUser.email,
    createdAt: serverTimestamp()
  });
}
async function deleteTeacherComment(commentId){
  await deleteDoc(doc(db,'teacherComments',commentId));
}

// ══════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════
let currentRoute = {page:'home', projectId:null, sub:null, subId:null};

// Classroom state — null when not in student-view mode
let viewingStudent = null; // {uid, displayName, email}

function navigate(page, projectId, sub, subId){
  currentRoute = {page:page||'home', projectId:projectId||null, sub:sub||null, subId:subId||null};
  render();
}
function exitStudentView(){
  viewingStudent = null;
  // Remove any open feedback panels
  document.getElementById('feedback-panel-wrap')?.remove();
  navigate('home');
}

// ══════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════
async function render(){
  const {page,projectId,sub,subId} = currentRoute;
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const bc = document.getElementById('breadcrumb-area');
  const tr = document.getElementById('topbar-right');

  // Rebuild topbar right (preserve saving indicator)
  tr.innerHTML = '';
  const savingSpan = document.createElement('span');
  savingSpan.id = 'saving-indicator';
  savingSpan.className = 'saving-indicator';
  tr.appendChild(savingSpan);

  // Remove any lingering feedback panel when navigating
  document.getElementById('feedback-panel-wrap')?.remove();

  if(page==='home'){
    sidebar.style.display='none';
    bc.innerHTML='';
    renderHomeButtons(tr);
    if(viewingStudent){
      // Teacher is browsing a student's home screen
      renderTeacherBanner(content);
      await renderStudentHome(content, viewingStudent.uid);
    } else {
      await renderHome(content);
    }
  } else if(page==='dashboard'){
    sidebar.style.display='flex';
    sidebar.style.flexDirection='column';

    if(viewingStudent){
      // Render student sidebar (read-only)
      await renderStudentSidebar(sidebar, viewingStudent.uid, projectId, sub||'overview');
      renderTeacherBannerInline(bc);
    } else {
      await renderSidebar(sidebar, projectId, sub||'overview');
      renderBreadcrumb(bc, projectId, sub);
      renderDashboardButtons(tr);
    }

    const s = sub||'overview';
    const uid = viewingStudent ? viewingStudent.uid : null;
    if(s==='overview')        await renderOverview(content, projectId, uid);
    else if(s==='characters') await renderCharacters(content, projectId, uid);
    else if(s==='locations')  await renderLocations(content, projectId, uid);
    else if(s==='scenes')     await renderScenes(content, projectId, uid);
    else if(s==='world')      await renderWorld(content, projectId, uid);
    else if(s==='outline')    await renderOutline(content, projectId, uid);
    else if(s==='library')    await renderDocumentLibrary(content, projectId, uid);
    else if(s==='writing'){
      if(subId) await renderEditor(content, projectId, subId, uid);
      else await renderWritingDesk(content, projectId, uid);
    }

    // Show feedback FAB for teacher in student view
    if(viewingStudent && s!=='writing'){
      showFeedbackFab(viewingStudent.uid, projectId);
    }
  }
}

function renderHomeButtons(tr){
  const userDiv = el('div',{class:'user-badge'});
  const avatar = el('div',{class:'user-avatar'},[currentUser.displayName?currentUser.displayName[0].toUpperCase():'U']);
  const name = el('span',{},[currentUser.displayName||currentUser.email]);
  const signOutBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>handleSignOut()},'Sign Out');
  userDiv.append(avatar,name);
  tr.insertBefore(themeToggleEl(),tr.firstChild);
  tr.insertBefore(signOutBtn,tr.firstChild);
  if(isTeacher()){
    const teacherBadge = el('span',{style:'font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:rgba(104,147,239,0.18);color:var(--accent);border:1px solid rgba(104,147,239,0.3);padding:3px 10px;border-radius:10px;'},'Teacher');
    tr.insertBefore(teacherBadge,tr.firstChild);
  }
  tr.insertBefore(userDiv,tr.firstChild);
}

// ── Teacher banner shown while viewing a student ──
function renderTeacherBanner(container){
  const existing = document.getElementById('teacher-banner');
  if(existing) existing.remove();
  if(!viewingStudent) return;
  const banner = el('div',{class:'teacher-banner',id:'teacher-banner'});
  const left = el('div',{class:'teacher-banner-left'});
  left.innerHTML=`<span class="teacher-banner-badge">👁 Viewing</span><div><div class="teacher-banner-name">${esc(viewingStudent.displayName||viewingStudent.email)}</div><div class="teacher-banner-sub">Read-only · You can browse and leave feedback, but not edit.</div></div>`;
  const exitBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>exitStudentView()},'← Exit Student View');
  banner.append(left,exitBtn);
  container.parentNode.insertBefore(banner, container);
}

function renderTeacherBannerInline(bcEl){
  bcEl.innerHTML='';
  if(!viewingStudent) return;
  const banner = el('div',{style:'display:flex;align-items:center;gap:10px;'});
  banner.innerHTML=`<span style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;background:rgba(104,147,239,0.18);color:var(--accent);padding:2px 8px;border-radius:8px;">👁 ${esc(viewingStudent.displayName||viewingStudent.email)}</span>`;
  const exitBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>exitStudentView()},'← Exit');
  banner.appendChild(exitBtn);
  bcEl.appendChild(banner);
}

// ── Render a student's home (teacher view) ──
async function renderStudentHome(container, studentUid){
  // Insert banner above content
  const existing = document.getElementById('teacher-banner');
  if(!existing){
    const banner = el('div',{class:'teacher-banner',id:'teacher-banner'});
    const left = el('div',{class:'teacher-banner-left'});
    left.innerHTML=`<span class="teacher-banner-badge">👁 Viewing</span><div><div class="teacher-banner-name">${esc(viewingStudent.displayName||viewingStudent.email)}</div><div class="teacher-banner-sub">Read-only · You can browse and leave feedback, but not edit.</div></div>`;
    const exitBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>exitStudentView()},'← Exit Student View');
    banner.append(left,exitBtn);
    container.before(banner);
  }

  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading student workspace…</div>';
  const projects = await fsQueryStudent(studentUid, 'projects', orderBy('updatedAt','desc'));
  container.innerHTML='';
  const wrap = el('div',{id:'home-wrap'});
  const hero = el('div',{class:'home-hero'});
  hero.innerHTML=`<h1 style="font-size:32px;">${esc(viewingStudent.displayName||'Student')}'s Projects</h1><p style="margin-bottom:0;">${projects.length} project${projects.length!==1?'s':''}</p>`;
  wrap.appendChild(hero);

  if(!projects.length){
    wrap.appendChild(emptyState('✦','No Projects Yet','This student hasn't created any projects.'));
  } else {

function renderAuth(){
  document.getElementById('topbar').style.display='none';
  document.getElementById('main').style.display='none';
  const container = document.getElementById('auth-container');
  container.innerHTML='';

  let activeTab = 'signin';
  let errorMsg = '';

  function buildAuth(){
    container.innerHTML='';
    const wrap = el('div',{class:'auth-wrap'});
    const card = el('div',{class:'auth-card'});
    card.innerHTML=`
      <div class="auth-logo">✦ Narrative Studio</div>
      <div class="auth-sub">Your personal writing workspace</div>
      <div class="auth-tabs">
        <div class="auth-tab${activeTab==='signin'?' active':''}" id="tab-signin">Sign In</div>
        <div class="auth-tab${activeTab==='signup'?' active':''}" id="tab-signup">Create Account</div>
      </div>
      ${errorMsg?`<div class="auth-error">${esc(errorMsg)}</div>`:''}
      ${activeTab==='signup'?`<div class="field" style="margin-bottom:14px"><label class="label">Your Name</label><input class="input" id="auth-name" placeholder="How should we address you?"></div>`:''}
      <div class="field" style="margin-bottom:14px"><label class="label">Email</label><input class="input" id="auth-email" type="email" placeholder="you@example.com"></div>
      <div class="field" style="margin-bottom:24px"><label class="label">Password</label><input class="input" id="auth-pass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="auth-submit">${activeTab==='signin'?'Sign In':'Create Account'}</button>
    `;
    wrap.appendChild(card);
    container.appendChild(wrap);

    card.querySelector('#tab-signin').onclick=()=>{activeTab='signin';errorMsg='';buildAuth();};
    card.querySelector('#tab-signup').onclick=()=>{activeTab='signup';errorMsg='';buildAuth();};
    card.querySelector('#auth-submit').onclick=()=>handleAuth();
    card.addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
    setTimeout(()=>{const em=document.getElementById('auth-email');if(em)em.focus();},50);
  }

  async function handleAuth(){
    const email=v('auth-email'), pass=v('auth-pass'), name=v('auth-name');
    if(!email||!pass){errorMsg='Please enter your email and password.';buildAuth();return;}
    const btn=document.getElementById('auth-submit');
    if(btn){btn.textContent='…';btn.disabled=true;}
    try{
      if(activeTab==='signup'){
        const cred = await createUserWithEmailAndPassword(auth,email,pass);
        if(name) await updateProfile(cred.user,{displayName:name});
      } else {
        await signInWithEmailAndPassword(auth,email,pass);
      }
      // onAuthStateChanged handles the rest
    } catch(err){
      errorMsg = friendlyAuthError(err.code);
      buildAuth();
    }
  }

  buildAuth();
}

function friendlyAuthError(code){
  const map = {
    'auth/email-already-in-use':'That email is already registered. Try signing in.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/user-not-found':'No account found with that email.',
    'auth/wrong-password':'Incorrect password. Please try again.',
    'auth/invalid-credential':'Incorrect email or password. Please try again.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment and try again.',
  };
  return map[code]||'Something went wrong. Please try again.';
}

async function handleSignOut(){
  await signOut(auth);
}

      email: currentUser.email,
      displayName: currentUser.displayName || currentUser.email,
      role: uid === TEACHER_UID ? 'teacher' : 'student',

async function joinWithClassCode(code){
  const snap = await getDocs(query(collection(db,'classSettings'), where('code','==',code.trim().toUpperCase())));
  if(snap.empty){
    return {ok:false, error:'Class code not found. Check with your teacher.'};

  await setProfile(currentUser.uid,{
    role:'student',
    classCode: code.trim().toUpperCase(),
    enrolledAt: serverTimestamp()
  });
  return {ok:true};

async function getClassSettings(){
  const snap = await getDoc(doc(db,'classSettings','main'));
  return snap.exists() ? snap.data() : {code: DEFAULT_CLASS_CODE};
}

  await setDoc(doc(db,'classSettings','main'),{code:code.trim().toUpperCase()},{merge:true});

async function addStudentByEmail(email){
  // Find a userProfile with this email
  const q = query(collection(db,'userProfiles'), where('email','==',email.trim().toLowerCase()));
  const snap = await getDocs(q);
  if(snap.empty) return {ok:false, error:'No account found with that email. The student must sign up first.'};
  const profile = snap.docs[0];
  await setProfile(profile.id,{role:'student',addedByTeacher:true});
  return {ok:true, name: profile.data().displayName||email};
}

async function renderScenes(container, projectId, studentUid){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const qry = studentUid ? (col,...c)=>fsQueryStudent(studentUid,col,...c) : fsQuery;
  const [scenes, chars, locs] = await Promise.all([
    qry('scenes',where('storyProjectId','==',projectId)),
    qry('characters',where('storyProjectId','==',projectId)),
    qry('locations',where('storyProjectId','==',projectId)),
  ]);
  scenes.sort((a,b)=>(a.sequenceNumber||0)-(b.sequenceNumber||0));
  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Scenes</div><div class="page-subtitle">'+scenes.length+' scene'+(scenes.length!==1?'s':'')+'</div></div>';
  if(!studentUid){
    const hbtns=el('div',{style:'display:flex;gap:8px;'});
    const addBtn=el('button',{class:'btn btn-primary',onclick:()=>openSceneDrawer(null,projectId,chars,locs,scenes.length+1)});addBtn.textContent='+ Add Scene';
    const pdfBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateScenesPdf(projectId)});pdfBtn.textContent='📄 Create Document';
    hbtns.append(addBtn,pdfBtn);
    header.appendChild(hbtns);
  }
  wrap.appendChild(header);
  if(scenes.length===0){wrap.appendChild(emptyState('◧','No Scenes Yet',studentUid?'No scenes added yet.':'Break your story into scenes and keep track of the action.'));}
  else{
    const list = el('div',{class:'scene-list'});
    scenes.forEach(sc=>{
      const loc = locs.find(l=>l.id===sc.locationId);
      const scChars = chars.filter(c=>sc.characterIds&&sc.characterIds.includes(c.id));
      const item = el('div',{class:'scene-item'});
      const num = el('div',{class:'scene-num'},['#'+sc.sequenceNumber]);
      const body = el('div',{class:'scene-body'});
      body.innerHTML='<h3>'+esc(sc.title)+'</h3><p>'+esc(sc.description||'No description')+'</p>';
      if(loc||scChars.length){
        const meta = el('div',{class:'scene-chars'});
        if(loc){const lt=el('span',{class:'tag',style:'background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.2)'});lt.textContent='⬡ '+loc.name;meta.appendChild(lt);}
        scChars.forEach(c=>{const ct=el('span',{class:'tag'});ct.textContent='◉ '+c.name;meta.appendChild(ct);});
        body.appendChild(meta);
      }
      if(!studentUid){
        const acts = el('div',{style:'display:flex;gap:6px;margin-left:auto;opacity:0;transition:opacity 0.15s;'});

        acts.append(eb,db2); item.append(num,body,acts);

    });

    <div class="drawer-footer">
      ${!isNew?`<button class="btn btn-danger" onclick="confirmDelete('Delete this scene?',async()=>{await fsDelete('scenes','${scene.id}');document.querySelector('.drawer-overlay').remove();renderScenes(document.getElementById('content'),'${projectId}');toast('Deleted');})">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="this.closest('.drawer-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="sd-save">Save Scene</button>
    </div>`;
  document.body.appendChild(overlay); overlay.appendChild(drawer);
  drawer.querySelector('#sd-save').onclick=async()=>{
    const cbs=Array.from(drawer.querySelectorAll('input[type="checkbox"]:checked')).map(c=>c.value);
    const up={title:v('sd-title'),description:v('sd-desc'),locationId:v('sd-loc'),sequenceNumber:parseInt(v('sd-seq'))||1,characterIds:cbs};
    showSaving();
    if(isNew) await fsCreate('scenes',{storyProjectId:projectId,...up});
    else await fsUpdate('scenes',scene.id,up);
    showSaved();
    overlay.remove(); renderScenes(document.getElementById('content'),projectId); toast(isNew?'Scene created':'Scene saved');
  };
}

// Active outline ID per project (session-only — resets to first on reload)
const _activeOutlineId = {};

async function renderOutline(container, projectId, studentUid) {
  container.innerHTML = '<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const qry = studentUid ? (col,...c)=>fsQueryStudent(studentUid,col,...c) : fsQuery;

  // Load all outlines (grouped by outlineId)
  const allItems = await qry('outlines', where('storyProjectId','==',projectId));
  // Get distinct outline groups
  const outlineGroups = {};
  allItems.forEach(item => {
    const gid = item.outlineId || 'default';
    if (!outlineGroups[gid]) outlineGroups[gid] = { id:gid, name:item.outlineName||'Outline', items:[] };
    outlineGroups[gid].items.push(item);
  });
  // If no outlines exist, create a default one
  if (Object.keys(outlineGroups).length === 0) {
    outlineGroups['default'] = { id:'default', name:'Outline', items:[] };
  }
  // Sort items within each group
  Object.values(outlineGroups).forEach(g => g.items.sort((a,b)=>(a.order||0)-(b.order||0)));

  const groupList = Object.values(outlineGroups);
  // Determine active group
  if (!_activeOutlineId[projectId] || !outlineGroups[_activeOutlineId[projectId]]) {
    _activeOutlineId[projectId] = groupList[0].id;
  }

  container.innerHTML = '';
  const wrap = el('div',{class:'page'});

  // Header
  const header = el('div',{class:'page-header'});
  header.innerHTML = '<div><div class="page-title">Outline</div><div class="page-subtitle">'+(studentUid?'Read-only view':'Multiple outlines supported — add a new one with +')+'</div></div>';
  const headerRight = el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});

  if(!studentUid){
    // Structure template dropdown
    const structLabel = el('span',{style:'font-size:12px;color:var(--fg3);'});structLabel.textContent='New from template:';
    const structSelect = el('select',{class:'select',style:'width:auto;font-size:12px;padding:5px 10px;'});
    Object.entries(STRUCTURE_TEMPLATES).forEach(([k,v])=>{
      const opt=document.createElement('option');opt.value=k;opt.textContent=v.name;
      structSelect.appendChild(opt);
    });
    const pdfOutlineBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{
      const ag=outlineGroups[_activeOutlineId[projectId]];
      if(ag) generateOutlinePdf(projectId, ag.id, ag.name);
    }});pdfOutlineBtn.textContent='📄 Create Document';
    headerRight.appendChild(pdfOutlineBtn);
    const addFromTemplate = el('button',{class:'btn btn-primary btn-sm',onclick:async()=>{
      const key = structSelect.value;
      const tmpl = STRUCTURE_TEMPLATES[key];
      const newId = 'ol-'+Date.now();
      const name = tmpl.name === 'Blank Outline' ? 'New Outline' : tmpl.name;
      for(let i=0;i<tmpl.items.length;i++){
        const it = tmpl.items[i];
        await fsCreate('outlines',{storyProjectId:projectId,outlineId:newId,outlineName:name,text:it.text,level:it.level,order:i});
      }
      if(tmpl.items.length === 0){
        await fsCreate('outlines',{storyProjectId:projectId,outlineId:newId,outlineName:name,text:'',level:1,order:0});
      }
      _activeOutlineId[projectId] = newId;
      await renderOutline(container, projectId);
    }});
    addFromTemplate.textContent = '+ Create';
    headerRight.append(structLabel, structSelect, addFromTemplate);
  }
  header.appendChild(headerRight);
  wrap.appendChild(header);

  // Tabs
  const tabs = el('div',{class:'outline-tabs'});
  groupList.forEach(g => {
    const tab = el('div',{class:'outline-tab'+(_activeOutlineId[projectId]===g.id?' active':'')});
    tab.textContent = g.name;
    tab.onclick = () => { _activeOutlineId[projectId]=g.id; renderOutline(container,projectId,studentUid); };
    if(!studentUid){
      // Double-click to rename
      tab.ondblclick = async(e) => {
        e.stopPropagation();
        const newName = prompt('Rename outline:', g.name);
        if(!newName || newName===g.name) return;
        const groupItems = allItems.filter(i=>(i.outlineId||'default')===g.id);
        await Promise.all(groupItems.map(i=>fsUpdate('outlines',i.id,{outlineName:newName})));
        await renderOutline(container,projectId);
      };
    }
    tabs.appendChild(tab);
  });
  // Delete tab button (only if more than one outline, and not teacher view)
  if(!studentUid && groupList.length > 1){
    const activeGroup = outlineGroups[_activeOutlineId[projectId]];
    const delTab = el('div',{class:'outline-tab',style:'color:var(--red);margin-left:auto;',onclick:()=>{
      confirmDelete('Delete outline "'+activeGroup.name+'" and all its items?', async()=>{
        await Promise.all(activeGroup.items.map(i=>fsDelete('outlines',i.id)));
        _activeOutlineId[projectId] = groupList.find(g=>g.id!==activeGroup.id)?.id || 'default';
        await renderOutline(container,projectId);
      });
    }});
    delTab.textContent = '✕ Delete';
    tabs.appendChild(delTab);
  }
  wrap.appendChild(tabs);

  // Active outline items
  const listContainer = el('div',{id:'outline-list'});
  wrap.appendChild(listContainer);
  container.appendChild(wrap);

  const activeGroup = outlineGroups[_activeOutlineId[projectId]];
  renderOutlineList(projectId, activeGroup.items, activeGroup.id, activeGroup.name, container, studentUid);

  // Add item button at bottom (not in teacher view)
  if(!studentUid){
    const addBtn = el('button',{class:'btn btn-ghost btn-sm',style:'margin-top:14px;',onclick:()=>{
      addOutlineItem(projectId, activeGroup.id, activeGroup.name, activeGroup.items.length, 1, container);
    }});
    addBtn.textContent = '+ Add Item';
    wrap.appendChild(addBtn);
  }
}

function renderOutlineList(projectId, items, outlineId, outlineName, container, studentUid) {
  const list = document.getElementById('outline-list');
  if(!list) return;
  list.innerHTML = '';

  if(items.length === 0){
    list.appendChild(emptyState('≡','Empty Outline',studentUid?'No outline items yet.':'Add beats, acts, or chapters. Or create from a template above.'));
    return;
  }

  let dragSrc = null;

  items.forEach(o => {
    const item = el('div',{class:'outline-item',style:'margin-left:'+((o.level-1)*22)+'px'});
    item.dataset.id = o.id;

    const content = el('div',{class:'outline-content'});

    if(studentUid){
      // Read-only: just show text
      const text = el('div',{style:'padding:4px 0;font-size:14px;color:var(--fg);'});
      text.textContent = o.text||'';
      content.appendChild(text);
      item.appendChild(content);
    } else {
      item.draggable = true;
      const input = el('input',{placeholder:'Outline beat...',value:o.text||''});
      input.addEventListener('blur', async()=>{ await fsUpdate('outlines',o.id,{text:input.value}); });
      input.addEventListener('keydown', async e=>{
        if(e.key==='Enter'){
          e.preventDefault();
          addOutlineItem(projectId,outlineId,outlineName,o.order+1,o.level,container);
        }
        if(e.key==='Tab'){
          e.preventDefault();
          const nl=e.shiftKey?Math.max(1,o.level-1):Math.min(4,o.level+1);
          await fsUpdate('outlines',o.id,{level:nl});
          await refreshOutlineList(projectId,outlineId,outlineName,container);
        }
        if(e.key==='Backspace'&&input.value===''){
          e.preventDefault();
          await fsDelete('outlines',o.id);
          await refreshOutlineList(projectId,outlineId,outlineName,container);
        }
      });

      const levelDots = el('div',{class:'outline-level'});
      for(let i=1;i<=4;i++){
        (function(lvl){
          const d=el('div',{style:'width:8px;height:8px;border-radius:50%;background:'+(lvl<=o.level?'var(--primary)':'var(--border)')+';cursor:pointer;flex-shrink:0;',onclick:async()=>{
            await fsUpdate('outlines',o.id,{level:lvl});
            await refreshOutlineList(projectId,outlineId,outlineName,container);
          }});
          levelDots.appendChild(d);
        })(i);
      }

      const del = el('button',{class:'btn-icon',style:'font-size:11px;',onclick:async()=>{
        await fsDelete('outlines',o.id);
        await refreshOutlineList(projectId,outlineId,outlineName,container);
      }});del.textContent='✕';

      content.append(input,levelDots);
      item.append(content,del);

      // ── Drag-and-drop ──
      item.addEventListener('dragstart', e=>{
        dragSrc = item;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',o.id);
      });
      item.addEventListener('dragend', ()=>{
        item.classList.remove('dragging');
        list.querySelectorAll('.outline-item').forEach(i=>i.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', e=>{
        e.preventDefault();
        e.dataTransfer.dropEffect='move';
        list.querySelectorAll('.outline-item').forEach(i=>i.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('drop', async e=>{
        e.preventDefault();
        if(dragSrc===item) return;
        item.classList.remove('drag-over');
        const allItemEls = Array.from(list.querySelectorAll('.outline-item'));
        const srcIdx = allItemEls.indexOf(dragSrc);
        const dstIdx = allItemEls.indexOf(item);
        if(srcIdx < dstIdx) item.after(dragSrc);
        else item.before(dragSrc);
        const reordered = Array.from(list.querySelectorAll('.outline-item'));
        await Promise.all(reordered.map((el,i)=>fsUpdate('outlines',el.dataset.id,{order:i})));
        await refreshOutlineList(projectId,outlineId,outlineName,container);
      });
    }

    list.appendChild(item);
  });
}

async function refreshOutlineList(projectId, outlineId, outlineName, container) {
  // Fetch all outlines for project, then filter client-side to avoid composite index requirement
  const all = await fsQuery('outlines',where('storyProjectId','==',projectId));
  const fresh = all.filter(i=>(i.outlineId||'default')===outlineId);
  fresh.sort((a,b)=>(a.order||0)-(b.order||0));
  renderOutlineList(projectId,fresh,outlineId,outlineName,container);
}

async function addOutlineItem(projectId, outlineId, outlineName, order, level, container) {
  await fsCreate('outlines',{storyProjectId:projectId,outlineId,outlineName,text:'',level:level||1,order:order||0});
  await refreshOutlineList(projectId,outlineId,outlineName,container);
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#outline-list input');
    if(inputs.length) inputs[inputs.length-1].focus();
  },100);
}

    const list=el('div',{class:'doc-list'});

const SP_TYPES=['scene-heading','action','character','dialogue','parenthetical','transition'];
const SP_LABELS={'scene-heading':'Scene Heading','action':'Action','character':'Character','dialogue':'Dialogue','parenthetical':'Parenthetical','transition':'Transition'};
let currentSpType='scene-heading';

// ── Autofill helpers ──
let _cachedCharNames = [];
let _cachedLocNames  = [];

async function loadAutofillNames(projectId) {
  const [chars, locs] = await Promise.all([
    fsQuery('characters', where('storyProjectId','==',projectId)),
    fsQuery('locations',  where('storyProjectId','==',projectId)),
  ]);
  _cachedCharNames = chars.map(c => c.name.toUpperCase());
  _cachedLocNames  = locs.map(l => l.name.toUpperCase());
}

function getLineSuggestions(type, typed) {
  const q = typed.toUpperCase();
  if (!q) return [];
  if (type === 'scene-heading') {
    // INT. / EXT. prefix expansion
    const prefixSuggestions = [];
    if ('INT.'.startsWith(q) || q === 'I')  prefixSuggestions.push('INT. ');
    if ('EXT.'.startsWith(q) || q === 'E')  prefixSuggestions.push('EXT. ');
    if ('INT./EXT.'.startsWith(q))           prefixSuggestions.push('INT./EXT. ');
    // Also match known location names for scene headings
    const locMatches = _cachedLocNames
      .filter(n => n.includes(q))
      .slice(0, 4)
      .map(n => 'INT. ' + n + ' - DAY');
    return [...prefixSuggestions, ...locMatches].slice(0, 6);
  }
  if (type === 'character') {
    return _cachedCharNames.filter(n => n.startsWith(q)).slice(0, 6);
  }
  return [];
}

function showSuggestions(editor, typeBar, node) {
  removeSuggestions();
  if (!node || node === editor) return;

  const type = node.dataset.type;
  if (type !== 'scene-heading' && type !== 'character') return;

  const text = node.textContent || '';
  const suggestions = getLineSuggestions(type, text);
  if (!suggestions.length) return;

  const rect = node.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'sp-suggest';
  dropdown.id = 'sp-suggest-box';
  dropdown.style.cssText = `top:${rect.bottom + window.scrollY + 2}px;left:${rect.left + window.scrollX}px;`;

  suggestions.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sp-suggest-item' + (i === 0 ? ' focused' : '');
    item.textContent = s;
    item.dataset.idx = i;
    item.onmousedown = (e) => {
      e.preventDefault();
      applySuggestion(node, s);
      removeSuggestions();
    };
    dropdown.appendChild(item);
  });

  document.body.appendChild(dropdown);
}

function removeSuggestions() {
  const existing = document.getElementById('sp-suggest-box');
  if (existing) existing.remove();
}

function moveFocus(dir) {
  const box = document.getElementById('sp-suggest-box');
  if (!box) return false;
  const items = box.querySelectorAll('.sp-suggest-item');
  let focused = box.querySelector('.focused');
  let idx = focused ? parseInt(focused.dataset.idx) : -1;
  idx = ((idx + dir) + items.length) % items.length;
  items.forEach(i => i.classList.remove('focused'));
  items[idx].classList.add('focused');
  return true;
}

function acceptFocusedSuggestion(node) {
  const box = document.getElementById('sp-suggest-box');
  if (!box) return false;
  const focused = box.querySelector('.focused');
  if (!focused) return false;
  applySuggestion(node, focused.textContent);
  removeSuggestions();
  return true;
}

function applySuggestion(node, text) {
  node.textContent = text;
  // Place cursor at end
  const sel = window.getSelection();
  const r = document.createRange();
  r.selectNodeContents(node);
  r.collapse(false);
  sel.removeAllRanges();
  sel.addRange(r);
}

function renderScreenplayEditor(view, doc, projectId, studentUid) {
  // Pre-load character and location names for autofill (own projects only)
  if(!studentUid) loadAutofillNames(projectId);

  const toolbar=el('div',{class:'editor-topbar',style:'flex-wrap:wrap;gap:6px;'});
  const titleIn=el('input',{class:'editor-title-input',value:doc.title||'',placeholder:'Screenplay title...'});
  if(!studentUid) titleIn.addEventListener('blur',async()=>{ showSaving(); await fsUpdate('documents',doc.id,{title:titleIn.value}); showSaved(); });
  else titleIn.readOnly=true;
  toolbar.appendChild(titleIn); toolbar.appendChild(el('div',{class:'editor-divider'}));

  let typeBar;
  if(!studentUid){
    typeBar=el('div',{class:'screenplay-type-selector'});
    SP_TYPES.forEach(t=>{
      const btn=el('button',{class:'type-btn'+(t===currentSpType?' active':''),onclick:()=>setSpType(t,typeBar)});
      btn.textContent=SP_LABELS[t]; btn.dataset.type=t; typeBar.appendChild(btn);
    });
    toolbar.append(typeBar,el('div',{class:'editor-divider'}));
  }

  const backBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{removeSuggestions();navigate('dashboard',projectId,'writing');}}); backBtn.textContent='← Back';
  toolbar.appendChild(backBtn);
  if(!studentUid){
    const exportSpBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:()=>generateWritingDeskPdf(projectId,doc)});exportSpBtn.textContent='📄 Export';
    toolbar.appendChild(exportSpBtn);
  }

  const body=el('div',{class:'screenplay-body'});
  const page=el('div',{class:'screenplay-page'});
  const editor=el('div',{class:'screenplay-content'});
  editor.style.position='relative';
  editor.innerHTML=doc.content||'<p data-type="scene-heading">INT. LOCATION - DAY</p>';

  if(studentUid){
    // Read-only: no contenteditable, no event listeners
    editor.style.cursor='default';
    editor.style.userSelect='text';
  } else {
    editor.setAttribute('contenteditable','true');
    editor.addEventListener('keydown',e=>{
      const box = document.getElementById('sp-suggest-box');
      if (box) {
        if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); return; }
        if (e.key === 'Tab' || e.key === 'Enter') {
          const sel = window.getSelection();
          let node = sel.rangeCount ? sel.getRangeAt(0).startContainer : null;
          while (node && node.parentNode !== editor) node = node.parentNode;
          if (acceptFocusedSuggestion(node)) { e.preventDefault(); return; }
        }
        if (e.key === 'Escape') { removeSuggestions(); return; }
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        const idx=SP_TYPES.indexOf(currentSpType);
        const next=e.shiftKey?SP_TYPES[(idx-1+SP_TYPES.length)%SP_TYPES.length]:SP_TYPES[(idx+1)%SP_TYPES.length];
        setSpType(next,typeBar); applyTypeToCurrentLine(editor,next);
      }
      if (e.key === 'Enter') {
        removeSuggestions();
        setTimeout(()=>{
          if(currentSpType==='character') setSpType('dialogue',typeBar);
          else if(currentSpType==='dialogue') setSpType('action',typeBar);
          else if(currentSpType==='parenthetical') setSpType('dialogue',typeBar);
          applyTypeToCurrentLine(editor,currentSpType);
          applyContinuedMarkers(editor);
        },0);
      }
    });
    editor.addEventListener('keyup', e => {
      if (['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) {
        removeSuggestions(); syncTypeFromCursor(editor, typeBar); return;
      }
      syncTypeFromCursor(editor, typeBar);
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let node = sel.getRangeAt(0).startContainer;
      while (node && node.parentNode !== editor) node = node.parentNode;
      showSuggestions(editor, typeBar, node);
    });
    editor.addEventListener('mouseup', () => { removeSuggestions(); syncTypeFromCursor(editor, typeBar); });
    editor.addEventListener('input', () => {
      applyContinuedMarkers(editor);
      clearTimeout(editorSaveTimer);
      editorSaveTimer = setTimeout(async()=>{ showSaving(); await fsUpdate('documents',doc.id,{content:editor.innerHTML}); showSaved(); }, 1000);
    });
    document.addEventListener('mousedown', e => {
      if (!e.target.closest('#sp-suggest-box') && !e.target.closest('.screenplay-content')) {
        removeSuggestions();
      }
    });
    if(!doc.content) applyTypeToCurrentLine(editor,'scene-heading');
    else setTimeout(()=>applyContinuedMarkers(editor), 50);
  }

  page.appendChild(editor); body.appendChild(page);
  const wc=el('div',{class:'editor-word-count'},studentUid?'Read-only view':'Tab cycles line types · I/E + Tab autofills INT./EXT. · ↑↓ navigate suggestions');
  view.append(toolbar,body,wc);
}

function setSpType(type,typeBar){currentSpType=type;typeBar.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));}

function applyTypeToCurrentLine(editor,type){
  const sel=window.getSelection();if(!sel.rangeCount)return;
  let node=sel.getRangeAt(0).startContainer;
  while(node&&node.parentNode!==editor)node=node.parentNode;
  if(node&&node!==editor){node.dataset.type=type;}
  else{
    const p=document.createElement('p');p.dataset.type=type;editor.appendChild(p);
    const r=document.createRange();r.setStart(p,0);r.collapse(true);
    sel.removeAllRanges();sel.addRange(r);
  }
  // After setting type, refresh CONT'D markers
  setTimeout(()=>applyContinuedMarkers(editor),0);
}

function syncTypeFromCursor(editor,typeBar){
  const sel=window.getSelection();if(!sel.rangeCount)return;
  let node=sel.getRangeAt(0).startContainer;
  while(node&&node.parentNode!==editor)node=node.parentNode;
  if(node&&node.dataset&&node.dataset.type)setSpType(node.dataset.type,typeBar);
}

// ── CONT'D logic ──
// Rule: if a character line's name matches the most recent previous character
// line name (regardless of intervening action/dialogue/parenthetical lines),
// append (CONT'D) to the second occurrence.
function getCharName(node){
  // Strip existing (CONT'D) suffix to get the base name
  return (node.textContent||'').replace(/\s*\(CONT'D\)\s*$/i,'').trim().toUpperCase();
}

function applyContinuedMarkers(editor){
  const lines = Array.from(editor.children);
  let lastCharName = null;

  lines.forEach(node=>{
    const type = node.dataset && node.dataset.type;

    if(type === 'character'){
      const baseName = getCharName(node);
      if(!baseName) return;

      const hasContinued = /\(CONT'D\)$/i.test(node.textContent.trim());

      if(lastCharName && baseName === lastCharName){
        // Same character — add CONT'D if not already present
        if(!hasContinued){
          // Preserve cursor position
          const sel = window.getSelection();
          let savedRange = null;
          if(sel.rangeCount && node.contains(sel.getRangeAt(0).startContainer)){
            savedRange = sel.getRangeAt(0).cloneRange();
          }
          node.textContent = baseName + " (CONT'D)";
          if(savedRange){
            try{ sel.removeAllRanges(); sel.addRange(savedRange); }catch{}
          }
        }
        // Keep lastCharName as-is (same char continues)
      } else {
        // Different character — remove CONT'D if present
        if(hasContinued){
          const sel = window.getSelection();
          let savedRange = null;
          if(sel.rangeCount && node.contains(sel.getRangeAt(0).startContainer)){
            savedRange = sel.getRangeAt(0).cloneRange();
          }
          node.textContent = baseName;
          if(savedRange){
            try{ sel.removeAllRanges(); sel.addRange(savedRange); }catch{}
          }
        }
        lastCharName = baseName;
      }
    }
    // Non-character lines don't reset lastCharName —
    // CONT'D fires whenever the same character appears again, regardless of intervening lines
  });
}

function buildScreenplayPdf(project,doc){
  const rawHtml=doc.content||'';
  const parser=new DOMParser();
  const parsed=parser.parseFromString('<div>'+rawHtml+'</div>','text/html');
  const nodes=parsed.querySelector('div').children;
  let body='';
  Array.from(nodes).forEach(node=>{
    const type=node.dataset&&node.dataset.type;
    const text=node.textContent||'';
    if(!text.trim()&&type!=='scene-heading')return;
    switch(type){
      case 'scene-heading': body+=`<p style="text-transform:uppercase;font-weight:bold;margin:1.5em 0 0.5em;">${escHtml(text.toUpperCase())}</p>`; break;
      case 'action':        body+=`<p style="margin:0 0 1em;">${escHtml(text)}</p>`; break;
      case 'character':     body+=`<p style="margin:1em 0 0;margin-left:200px;text-transform:uppercase;">${escHtml(text)}</p>`; break;
      case 'dialogue':      body+=`<p style="margin:0 100px 0.5em 120px;">${escHtml(text)}</p>`; break;
      case 'parenthetical': body+=`<p style="margin:0 160px 0.25em 150px;font-style:italic;">${escHtml(text)}</p>`; break;
      case 'transition':    body+=`<p style="text-align:right;text-transform:uppercase;margin:1em 0;font-weight:bold;">${escHtml(text)}</p>`; break;
      default:              body+=`<p style="margin:0 0 0.5em;">${escHtml(text)}</p>`;
    }
  });
  const tp=doc.titlePage||{};
  const titlePage=`<div style="min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;page-break-after:always;text-align:center;"><div style="margin-bottom:60px;"><div style="font-size:22px;font-weight:bold;text-transform:uppercase;margin-bottom:12px;">${escHtml(tp.title||doc.title||'Untitled')}</div>${tp.writtenBy?`<div style="margin-top:20px;font-size:14px;">Written by</div><div style="font-size:16px;font-weight:bold;">${escHtml(tp.writtenBy)}</div>`:''}${tp.basedOn?`<div style="margin-top:16px;font-size:13px;color:#555;">${escHtml(tp.basedOn)}</div>`:''}</div>${tp.contact?`<div style="margin-top:40px;font-size:12px;color:#555;text-align:left;">${escHtml(tp.contact)}</div>`:''}</div>`;
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:white;color:#111;font-family:'Courier New',Courier,monospace;font-size:12pt;line-height:1.7;}.sp-page{max-width:680px;margin:0 auto;padding:72px 72px 72px 96px;}@media print{.sp-page{padding:1in 1in 1in 1.5in;}}</style></head><body><div class="sp-page">${titlePage}${body}</div></body></html>`;
}

function showPdfOverlay(title,htmlContent,onDownload){
  const existing=document.getElementById('pdf-overlay-wrap');
  if(existing)existing.remove();
  const overlay=document.createElement('div');overlay.className='pdf-overlay';overlay.id='pdf-overlay-wrap';
  const frame=document.createElement('div');frame.className='pdf-frame';
  const topbar=document.createElement('div');topbar.className='pdf-frame-topbar';
  topbar.innerHTML=`<div class="pdf-frame-title">${escHtml(title)}</div>`;
  const actions=document.createElement('div');actions.className='pdf-frame-actions';
  const dlBtn=document.createElement('button');dlBtn.className='btn btn-primary btn-sm';dlBtn.textContent='⬇ Download PDF';dlBtn.onclick=onDownload;
  const closeBtn=document.createElement('button');closeBtn.className='btn btn-ghost btn-sm';closeBtn.style.cssText='background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:white;';closeBtn.textContent='✕ Close';closeBtn.onclick=()=>overlay.remove();
  actions.append(dlBtn,closeBtn);topbar.appendChild(actions);
  const body=document.createElement('div');body.className='pdf-frame-body';
  const iframe=document.createElement('iframe');iframe.style.cssText='width:100%;height:100%;min-height:70vh;border:none;background:white;';iframe.srcdoc=htmlContent;
  body.appendChild(iframe);frame.append(topbar,body);overlay.appendChild(frame);document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function downloadPdf(htmlContent,filename){
  const win=window.open('','_blank');
  if(!win){toast('Please allow popups to download PDF','error');return;}
  win.document.write(htmlContent);win.document.close();
  win.onload=()=>setTimeout(()=>win.print(),300);
}

async function hashData(data){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(JSON.stringify(data)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

const DOC_TYPES={
  'project':{label:'Full Project PDF',icon:'◈'},
  'characters':{label:'Characters',icon:'◉'},
  'locations':{label:'Locations',icon:'⬡'},
  'scenes':{label:'Scenes',icon:'◧'},
