      if(!selectedTemplate){toast("Choose a template to continue","error");return;}
      step=1; render();
    }});beginBtn.textContent="Begin \u2192";
    right.appendChild(beginBtn);
    footer.append(left,right);
    overlay.append(topbar,body,footer);
  }

  function renderWizardStep(){
    const steps = getSteps();
    const si = step - 1;
    const currentStepId = steps[si];
    const tmpl = WB_TEMPLATES[selectedTemplate];

    const topbar=el("div",{class:"wizard-topbar"});
    const titleEl=el("div",{class:"wizard-topbar-title"});titleEl.textContent="World Builder \u2014 "+tmpl.name;
    const progressWrap=el("div",{style:"display:flex;flex-direction:column;align-items:center;gap:5px;"});
    const dots=el("div",{class:"wizard-progress"});
    steps.filter(s=>s!=="review").forEach((s,i)=>{
      const dot=el("div",{class:"wizard-step-dot"+(i===si?" active":i<si?" done":"")});
      dot.title=wbStepLabel(s); dots.appendChild(dot);
    });
    const lbl=el("div",{class:"wizard-step-label"});
    lbl.textContent="Step "+(si+1)+" of "+steps.length+" \u2014 "+wbStepLabel(currentStepId);
    progressWrap.append(dots,lbl);
    const closeBtn=el("button",{class:"btn btn-ghost btn-sm",onclick:()=>{
      collectStep(currentStepId);
      wizardExitConfirm(()=>overlay.remove());
    }});closeBtn.textContent="Exit";
    topbar.append(titleEl,progressWrap,closeBtn);

    const body=el("div",{class:"wizard-body"});
    const pane=el("div",{class:"wizard-pane"});
    body.appendChild(pane);

    const footer=el("div",{class:"wizard-footer"});
    const backBtn=el("button",{class:"btn btn-ghost",onclick:()=>{collectStep(currentStepId);step--;render();}});
    backBtn.textContent="\u2190 Back";
    if(si===0) backBtn.style.visibility="hidden";
    const nav=el("div",{class:"wizard-footer-nav"});

    if(si < steps.length-1){
      const nextBtn=el("button",{class:"btn btn-primary",onclick:()=>{
        collectStep(currentStepId); step++; render();
      }});
      nextBtn.textContent=si===steps.length-2?"Review \u2192":"Next \u2192";
      nav.appendChild(nextBtn);
    } else {
      const saveBtn=el("button",{class:"btn btn-primary",onclick:async()=>{
        assembleCompositeFields();
        saveBtn.disabled=true; saveBtn.textContent="Saving\u2026";
        showSaving();
        if(existingWorld.id) await fsUpdate("worlds",existingWorld.id,data);
        else {
          const newId = await fsCreate("worlds",{storyProjectId:projectId,...data});
          existingWorld.id = newId;
        }
        showSaved();
        overlay.remove();
        renderWorld(document.getElementById("content"),projectId);
        toast("World saved");
      }});
      saveBtn.textContent="\u2726 Save World";
      nav.appendChild(saveBtn);
    }
    footer.append(backBtn,nav);
    overlay.append(topbar,body,footer);
    buildWbStep(pane, currentStepId);
    body.scrollTop=0;
  }

  function wbStepLabel(id){
    const m={atmosphere:"Atmosphere",geography:"Geography",rules:"Rules of the World",
      society:"Society & Power",history:"History",conflict:"Conflict & Stakes",
      religion:"Religion & Belief",language:"Language",symbolism:"Symbolism",
      microgeo:"The Space",hierarchy:"Hierarchy & Roles",microhistory:"History of This Place",review:"Review"};
    return m[id]||id;
  }

  function collectStep(sid){
    const g=(id)=>{const e=document.getElementById("wb-"+id);return e?(e.value||"").trim():"";};
    if(sid==="atmosphere"){data.w_atm_emotion=g("atm_emotion");data.w_atm_sky=g("atm_sky");data.w_atm_tuesday=g("atm_tuesday");data.w_atm_senses=g("atm_senses");data.w_atm_outsider=g("atm_outsider");}
    if(sid==="geography"){data.w_geo_landscape=g("geo_landscape");data.w_geo_borders=g("geo_borders");data.w_geo_dangerous=g("geo_dangerous");data.w_geo_beyond=g("geo_beyond");data.w_geo_keyplaces=g("geo_keyplaces");}
    if(sid==="rules"){data.w_rules_altered=g("rules_altered");data.w_rules_system=g("rules_system");data.w_rules_cost=g("rules_cost");data.w_rules_access=g("rules_access");data.w_rules_broken=g("rules_broken");data.w_rules_tech=g("rules_tech");}
    if(sid==="society"){data.w_soc_power=g("soc_power");data.w_soc_howgot=g("soc_howgot");data.w_soc_fear=g("soc_fear");data.w_soc_celebrate=g("soc_celebrate");data.w_soc_taboo=g("soc_taboo");data.w_soc_mobility=g("soc_mobility");data.w_soc_punishment=g("soc_punishment");}
    if(sid==="history"){data.w_hist_event=g("hist_event");data.w_hist_wrong=g("hist_wrong");data.w_hist_forgotten=g("hist_forgotten");data.w_hist_wound=g("hist_wound");data.w_hist_calendar=g("hist_calendar");}
    if(sid==="conflict"){data.w_conf_worldwant=g("conf_worldwant");data.w_conf_collision=g("conf_collision");data.w_conf_winning=g("conf_winning");data.w_conf_cost=g("conf_cost");data.w_conf_sides=g("conf_sides");}
    if(sid==="religion"){data.w_rel_worship=g("rel_worship");data.w_rel_role=g("rel_role");data.w_rel_faithless=g("rel_faithless");data.w_rel_sacred=g("rel_sacred");}
    if(sid==="language"){data.w_lang_multiple=g("lang_multiple");data.w_lang_unique=g("lang_unique");data.w_lang_untranslatable=g("lang_untranslatable");data.w_lang_swearing=g("lang_swearing");}
    if(sid==="symbolism"){data.w_sym_register=g("sym_register");data.w_sym_archetype=g("sym_archetype");data.w_sym_meaning=g("sym_meaning");data.w_sym_recurring=g("sym_recurring");}
    if(sid==="microgeo"){data.w_micro_setting=g("micro_setting");data.w_micro_rooms=g("micro_rooms");data.w_micro_rules=g("micro_rules");}
    if(sid==="hierarchy"){data.w_micro_top=g("micro_top");data.w_micro_bottom=g("micro_bottom");}
    if(sid==="microhistory"){data.w_micro_history=g("micro_history");data.w_micro_secret=g("micro_secret");}
  }

  function assembleCompositeFields(){
    const join=(...parts)=>parts.filter(Boolean).join("\n");
    data.moodAndTone=join(data.w_atm_emotion,data.w_atm_sky&&"Sky/environment: "+data.w_atm_sky,data.w_atm_tuesday&&"A normal day: "+data.w_atm_tuesday,data.w_atm_senses&&"Sensory details: "+data.w_atm_senses,data.w_atm_outsider&&"First impression: "+data.w_atm_outsider,data.w_sym_register&&"Symbolic register: "+data.w_sym_register,data.w_sym_meaning&&"What this world means: "+data.w_sym_meaning)||data.moodAndTone;
    data.geography=join(data.w_geo_landscape,data.w_geo_borders&&"Borders: "+data.w_geo_borders,data.w_geo_dangerous&&"Dangerous places: "+data.w_geo_dangerous,data.w_geo_beyond&&"Beyond: "+data.w_geo_beyond,data.w_geo_keyplaces&&"Key locations: "+data.w_geo_keyplaces,data.w_micro_setting&&"Setting: "+data.w_micro_setting,data.w_micro_rooms&&"Key spaces: "+data.w_micro_rooms)||data.geography;
    data.lawsOfPhysics=join(data.w_rules_altered&&"What is different: "+data.w_rules_altered,data.w_rules_system&&"How it works: "+data.w_rules_system,data.w_rules_cost&&"Cost: "+data.w_rules_cost,data.w_rules_access&&"Access: "+data.w_rules_access,data.w_rules_broken&&"When broken: "+data.w_rules_broken,data.w_rules_tech&&"Technology: "+data.w_rules_tech)||data.lawsOfPhysics;
    data.society=join(data.w_soc_power&&"Power: "+data.w_soc_power,data.w_soc_howgot&&"How obtained: "+data.w_soc_howgot,data.w_soc_fear&&"What people fear: "+data.w_soc_fear,data.w_soc_celebrate&&"Celebrations: "+data.w_soc_celebrate,data.w_soc_taboo&&"Taboos: "+data.w_soc_taboo,data.w_soc_mobility&&"Social mobility: "+data.w_soc_mobility,data.w_soc_punishment&&"Punishment: "+data.w_soc_punishment,data.w_micro_top&&"Top of hierarchy: "+data.w_micro_top,data.w_micro_bottom&&"Bottom: "+data.w_micro_bottom,data.w_micro_rules&&"Unwritten rules: "+data.w_micro_rules)||data.society;
    data.history=join(data.w_hist_event&&"Formative event: "+data.w_hist_event,data.w_hist_wrong&&"Misremembered: "+data.w_hist_wrong,data.w_hist_forgotten&&"Forgotten: "+data.w_hist_forgotten,data.w_hist_wound&&"Collective wound: "+data.w_hist_wound,data.w_hist_calendar&&"Calendar: "+data.w_hist_calendar,data.w_micro_history&&"History: "+data.w_micro_history,data.w_micro_secret&&"Buried secret: "+data.w_micro_secret,data.w_sym_archetype&&"Archetypes: "+data.w_sym_archetype,data.w_sym_recurring&&"Recurring symbols: "+data.w_sym_recurring)||data.history;
    data.conflicts=join(data.w_conf_worldwant&&"What the world wants: "+data.w_conf_worldwant,data.w_conf_collision&&"Where conflict lives: "+data.w_conf_collision,data.w_conf_sides&&"The sides: "+data.w_conf_sides,data.w_conf_winning&&"Winning looks like: "+data.w_conf_winning,data.w_conf_cost&&"Cost: "+data.w_conf_cost)||data.conflicts;
    data.religion=join(data.w_rel_worship&&"Objects of devotion: "+data.w_rel_worship,data.w_rel_role&&"Role of faith: "+data.w_rel_role,data.w_rel_faithless&&"The faithless: "+data.w_rel_faithless,data.w_rel_sacred&&"Sacred: "+data.w_rel_sacred)||data.religion;
    data.language=join(data.w_lang_multiple&&"Languages: "+data.w_lang_multiple,data.w_lang_unique&&"Unique words: "+data.w_lang_unique,data.w_lang_untranslatable&&"Untranslatable: "+data.w_lang_untranslatable,data.w_lang_swearing&&"Swearing: "+data.w_lang_swearing)||data.language;
    if(!data.technology && data.w_rules_tech) data.technology = data.w_rules_tech;
  }

  document.body.appendChild(overlay);
  render();
}

// ── Step content builders ──

function wbTitle(pane, title, sub){
  const t=el("div",{class:"wizard-pane-title"});t.textContent=title;
  const s=el("div",{class:"wizard-pane-sub"});s.textContent=sub;
  pane.append(t,s);
}

function wbF(id, label, placeholder, value, rows, hint, tipLines){
  return cbF(id, label, placeholder, value, rows, hint, tipLines);
}

function buildWbStep(pane, stepId){
  if(stepId==="atmosphere"){
    wbTitle(pane,"What does this world feel like?","Atmosphere is the emotional contract between writer and reader. Before anything happens, the world has already made a promise about how things work here.");
    pane.appendChild(wbF("atm_emotion","Dominant Emotional Register","e.g. Dread and dark humor. Wonder with undertones of loss. Hard-edged cynicism. Warm but precarious.",data.w_atm_emotion,2,"The feeling that underlies every scene — even the quiet ones.",["Try: if this world were a song, what genre would it be?","What emotion does a new reader feel in their first paragraph?","What emotion are you, the writer, trying to feel while you write it?"]));
    pane.appendChild(wbF("atm_sky","The Sky / The Environment","e.g. Low gray clouds that never fully break. A second moon that only rises in winter. The coast, always.",data.w_atm_sky,2,"What the physical environment looks and feels like at a glance.",["Describe the sky specifically — it is one of the fastest ways to establish a world.","What does the weather do to people here? What does it mean?"]));
    pane.appendChild(wbF("atm_tuesday","A Normal Tuesday","What does an ordinary person in this world do on an average unremarkable day?",data.w_atm_tuesday,3,"The texture of daily life — the baseline before your story disrupts it.",["Mundane detail creates believability. What do they eat for breakfast? How do they commute?","What does having a good day look like for an ordinary person here?","What do people complain about that they take for granted?"]));
    pane.appendChild(wbF("atm_senses","Sensory Details","What are the sounds, smells, textures of this world?",data.w_atm_senses,2,"Specific sensory anchors that make the world feel physical and real.",["Smell is the most memory-linked sense — what does this world smell like?","What sound is uniquely this world? What sound is conspicuously absent?"]));
    pane.appendChild(wbF("atm_outsider","An Outsider First Impression","Someone arrives here for the first time. What do they immediately notice?",data.w_atm_outsider,2,"What stands out to fresh eyes — which reveals what locals have stopped seeing.",["The outsider notices what residents have normalized. That gap is useful.","What would make a stranger feel welcome? Unsafe? Confused?"]));
    return;
  }
  if(stepId==="geography"){
    wbTitle(pane,"What does this world look like?","Geography shapes politics, culture, and story logistics. It is not just scenery — it is the terrain your characters have to navigate.");
    pane.appendChild(wbF("geo_landscape","Physical Landscape","Terrain, climate, scale — continent, country, city, neighborhood?",data.w_geo_landscape,2,"The broad physical shape of the world, or the part of it your story inhabits.",["Your story only needs the geography relevant to it.","What does the terrain force people to do or prevent them from doing?"]));
    pane.appendChild(wbF("geo_keyplaces","Key Locations","The specific places your story will return to — the bar, the palace, the station, the apartment.",data.w_geo_keyplaces,2,"Named, important places that characters will inhabit repeatedly.",["Think of your key locations as characters — each should have a personality.","What does each location represent thematically, beyond its function?"]));
    pane.appendChild(wbF("geo_borders","Borders, Walls and Divisions","What physical or political lines divide this world? Who can cross them?",data.w_geo_borders,2,"Separation and access are core dramatic engines — who is kept out, and by what?",["Borders can be literal (walls, checkpoints) or social (neighborhoods, class lines).","What happens to people who try to cross a border they are not supposed to?"]));
    pane.appendChild(wbF("geo_dangerous","The Dangerous Places","What do people call the places they avoid? What happens there?",data.w_geo_dangerous,2,"Where the world dark edges live — and what they say about the center.",["Every world has a wrong side of the tracks. What is it, and who lives there?","Is the danger real, exaggerated, or a lie told by people in power?"]));
    pane.appendChild(wbF("geo_beyond","Beyond the Map","What lies beyond the known parts of this world? What do people believe is out there?",data.w_geo_beyond,1,"The unknown generates tension and possibility — even if the story never goes there.",null));
    return;
  }
  if(stepId==="rules"){
    wbTitle(pane,"How does this world work?","The rules of reality in your world. What is possible, what is impossible, and most importantly — what does it cost to push those limits?");
    pane.appendChild(wbF("rules_altered","What Is Different From Our World","Magic exists. Faster-than-light travel is real. The dead can speak. Everyone is born with a number visible above their head.",data.w_rules_altered,2,"State the core difference(s) between this world and ours clearly and specifically.",["Be specific. Magic exists is not a rule. People can take pain from others into their own bodies is a rule.","What is the single most important way this world differs from ours?"]));
    pane.appendChild(wbF("rules_system","How The System Works","The mechanics — how does the altered element function? What are its parameters?",data.w_rules_system,3,"The internal logic that makes the world consistent and believable.",["Readers will accept almost anything if it is consistent. Inconsistency breaks the spell.","You do not have to explain everything — but you should know the rules even if readers do not.","What does this system look like in practice? Describe it in action."]));
    pane.appendChild(wbF("rules_cost","What Does It Cost?","Using it, having it, or knowing about it — what does it cost the person involved?",data.w_rules_cost,2,"Cost is what makes magic and power dramatically interesting. Free power is boring.",["The cost does not have to be physical — it can be social, moral, temporal, or psychological.","Is the cost worth it? To whom? What do people sacrifice to use this?"]));
    pane.appendChild(wbF("rules_access","Who Has Access?","Is it rare or common? Inherited, learned, bought, or stolen?",data.w_rules_access,2,"Access creates inequality, which creates conflict.",["Unequal access to power is the engine of most speculative fiction.","What would someone do to get access if they did not have it?"]));
    pane.appendChild(wbF("rules_broken","What Happens When The Rules Break?","What does a violation look like? Who enforces the rules? What is the punishment?",data.w_rules_broken,2,"Rules only mean something if breaking them has consequences.",null));
    pane.appendChild(wbF("rules_tech","Technology Level and Key Technologies","What can people do that we cannot? What can they not do that we can?",data.w_rules_tech,2,"The technological context — how advanced, and what does it change?",["Technology shapes daily life, warfare, medicine, communication, and class.","What is the most important piece of technology in this world — and who controls it?"]));
    return;
  }
  if(stepId==="society"){
    wbTitle(pane,"Who holds power — and who does not?","Society is the human operating system. Who wrote the rules, who benefits from them, and who is trying to change them?");
    pane.appendChild(wbF("soc_power","Who Holds Power?","An individual, a class, a corporation, a council, a god, a system?",data.w_soc_power,2,"The current distribution of power in this world.",["Power can be political, economic, military, religious, or cultural — often several at once.","Is power concentrated or distributed? Is it stable or contested?"]));
    pane.appendChild(wbF("soc_howgot","How Did They Get It?","Conquest, inheritance, election, magic, money, violence, divine right?",data.w_soc_howgot,2,"The origin of power tells you about its legitimacy and its vulnerabilities.",["Power obtained by violence must be maintained by threat of violence.","Is the origin story of power true, or is it a myth that serves the powerful?"]));
    pane.appendChild(wbF("soc_fear","What Do Ordinary People Fear?","Not abstract danger — the specific things that keep a normal person up at night.",data.w_soc_fear,2,"The texture of everyday anxiety — what does insecurity feel like here?",["Fear reveals what the social contract is, and where it is fraying.","Is what people fear rational, or have they been trained to fear the wrong things?"]));
    pane.appendChild(wbF("soc_celebrate","What Do Ordinary People Celebrate?","Holidays, rituals, victories, milestones — what does joy look like here?",data.w_soc_celebrate,2,"Celebration reveals values — what a society says it is, even if that is aspirational.",null));
    pane.appendChild(cbRow(
      wbF("soc_taboo","What Is Taboo?","Things forbidden to say or do — formally or by unspoken rule.",data.w_soc_taboo,1,null,null),
      wbF("soc_mobility","Social Mobility","Can people move between classes? How? Is it common or exceptional?",data.w_soc_mobility,1,null,null)
    ));
    pane.appendChild(wbF("soc_punishment","What Happens to People Who Break the Rules?","The formal and informal mechanisms of enforcement and punishment.",data.w_soc_punishment,2,"Punishment reveals what a society actually values, as opposed to what it claims to value.",["Who has discretion in applying punishment? That is where real power lives."]));
    return;
  }
  if(stepId==="history"){
    wbTitle(pane,"Where did this world come from?","History is the weight your world carries. What happened, what people think happened, and what has been buried are often three different things.");
    pane.appendChild(wbF("hist_event","The Event That Shaped Everything","The war, the revolution, the disaster, the discovery — the thing that made the world what it is today.",data.w_hist_event,3,"One event or period that is the hinge of this world present.",["This does not have to be ancient history — it can be within living memory.","How does the present-day world still live in the shadow of this event?","What would have been different if it had not happened?"]));
    pane.appendChild(wbF("hist_wrong","What Do People Remember Wrong?","The official story of history vs. what actually happened.",data.w_hist_wrong,2,"Collective misremembering is one of the most powerful forces in any society.",["Who benefits from the false version of events? Who is harmed by it?","Is the truth recoverable? Is anyone looking for it?"]));
    pane.appendChild(wbF("hist_forgotten","What Has Been Deliberately Forgotten?","Things that were purged, suppressed, or simply allowed to fade.",data.w_hist_forgotten,2,"Active erasure implies someone had something to hide.",["What would change if people remembered?","Who still knows? What do they do with that knowledge?"]));
    pane.appendChild(wbF("hist_wound","The Collective Wound","The shared trauma that has not healed — that still shapes behavior, policy, and emotion today.",data.w_hist_wound,2,"Collective wounds explain irrational behavior at a societal scale.",["Is the wound acknowledged, or is it politely avoided?","Different groups often have very different versions of the same wound."]));
    pane.appendChild(wbF("hist_calendar","Calendar and Rituals","Holidays, commemorations, anniversaries — the scheduled moments when the world values are performed.",data.w_hist_calendar,2,"What a society chooses to remember on a calendar reveals its identity.",null));
    return;
  }
  if(stepId==="conflict"){
    wbTitle(pane,"What is this world fighting over?","Conflict at the world level is the container your story lives in. Your characters individual conflicts should rhyme with the world larger tensions.");
    pane.appendChild(wbF("conf_worldwant","What Does the World Want?","The dominant force, ideology, or momentum — what is the world current direction?",data.w_conf_worldwant,2,"Not what any one character wants — what the world itself seems to be pushing toward.",["Is the world expanding, contracting, stabilizing, or collapsing?","What does progress look like here? Who defines it?"]));
    pane.appendChild(wbF("conf_collision","Where Does Your Story Conflict Live?","The specific fault line — class, belief, identity, survival, power — where your story takes place.",data.w_conf_collision,2,"The pressure point your characters are standing on.",["Your story does not need to address all the world conflicts — just the ones that pressure your characters.","What would have to change in the world for your protagonist problem to disappear?"]));
    pane.appendChild(wbF("conf_sides","The Sides","The factions, forces, or ideologies in opposition.",data.w_conf_sides,2,"Not necessarily good vs. evil — often two different visions of the same good.",["The most interesting conflicts are ones where both sides have a point.","What does each side think the other side is wrong about?"]));
    pane.appendChild(cbRow(
      wbF("conf_winning","What Does Winning Look Like?","For the side your story follows — what is victory?",data.w_conf_winning,2,null,null),
      wbF("conf_cost","What Does It Cost?","What does winning — or losing — take from the people involved?",data.w_conf_cost,2,null,null)
    ));
    return;
  }
  if(stepId==="religion"){
    wbTitle(pane,"What do people believe in?","Religion, faith, and collective belief shape behavior, architecture, calendar, and the stories people tell about themselves — even in worlds without gods.");
    pane.appendChild(wbF("rel_worship","What Do People Pray To, Fear, or Revere?","Gods, ancestors, machines, the market, the party, nature — formal or informal.",data.w_rel_worship,2,"The objects of devotion — what people organize their spiritual lives around.",["You do not need a fully invented religion — the market or science can function as religion.","Is this faith official (organized, institutional) or personal and informal?"]));
    pane.appendChild(wbF("rel_role","Role of Faith in Daily Life","Is faith a comfort, a weapon, a social obligation, a private matter, or a source of conflict?",data.w_rel_role,2,"How religion functions practically — not theologically.",["In many worlds, religion and politics are inseparable. In others they are in open conflict.","Who uses faith to control others? Who finds genuine solace in it?"]));
    pane.appendChild(cbRow(
      wbF("rel_faithless","What Happens to the Faithless?","Tolerance, persecution, pity, invisibility?",data.w_rel_faithless,2,null,null),
      wbF("rel_sacred","What Is Sacred?","Objects, places, times, words — what cannot be touched?",data.w_rel_sacred,2,null,null)
    ));
    return;
  }
  if(stepId==="language"){
    wbTitle(pane,"How do people communicate?","Language reveals culture. What a society has words for — and what it does not — tells you what it notices, what it values, and what it suppresses.");
    pane.appendChild(wbF("lang_multiple","Languages, Dialects and Registers","How many languages are spoken? By whom? Is any of them a marker of status or exclusion?",data.w_lang_multiple,2,"The linguistic landscape — who speaks to whom in what.",["Even in a one-language world, there are registers: how your character speaks to their boss vs. their grandmother.","Is there a prestige dialect that signals education or class?"]));
    pane.appendChild(wbF("lang_unique","Words That Only Exist Here","Invented words, concepts, or terms that do not translate into our world.",data.w_lang_unique,2,"The vocabulary gap reveals what this culture thinks about that our culture does not.",["You do not need a constructed language — one or two untranslatable words can do a lot of work.","What concept is so central to this world that it needed its own word?"]));
    pane.appendChild(cbRow(
      wbF("lang_untranslatable","Untranslatable Concepts","Ideas that do not translate because our world does not have them.",data.w_lang_untranslatable,2,null,null),
      wbF("lang_swearing","Swearing and Insults","What do people swear by? What is the worst thing you can call someone?",data.w_lang_swearing,2,"Swearing reveals the sacred and the profane in any culture.",null)
    ));
    return;
  }
  if(stepId==="symbolism"){
    wbTitle(pane,"What does this world mean?","Mythic and symbolic worlds run on a different logic — pattern, resonance, and archetype matter more than consistency. These questions ask about meaning rather than mechanics.");
    pane.appendChild(wbF("sym_register","Emotional and Symbolic Register","Is this a world of grief? Of transformation? Of the in-between? Of things that will not stay dead?",data.w_sym_register,2,"The emotional and symbolic key the world is written in.",["Fairy tales have a register. So do myths. So does magical realism. What is yours?","What emotion should a reader carry with them after finishing your story?"]));
    pane.appendChild(wbF("sym_archetype","Archetypes Present","What timeless figures inhabit this world? The trickster? The crone? The sacrifice? The child who sees truth?",data.w_sym_archetype,2,"The archetypal characters who give the story mythic weight.",["Archetypes do not need to be obvious — they can be subverted, hidden, or shared across multiple characters."]));
    pane.appendChild(wbF("sym_meaning","What Is This World An Expression Of?","An emotion? A question? A political condition? A stage of grief?",data.w_sym_meaning,2,"The allegorical or thematic subtext — what the world is really about beneath its surface.",["Narnia is about faith. The Handmaid Tale is about control of the body. What is yours about?","You do not have to have an answer yet — but having one makes every decision easier."]));
    pane.appendChild(wbF("sym_recurring","Recurring Symbols or Images","Objects, colors, weather patterns, animals that carry meaning through the story.",data.w_sym_recurring,2,"The symbolic vocabulary you will return to repeatedly.",["Symbols work by repetition — the first time is decoration, the third time is meaning."]));
    return;
  }
  if(stepId==="microgeo"){
    wbTitle(pane,"What is this space?","In a micro world, the setting is the world. Its geography is the layout of rooms, territories, and zones — and who controls each one.");
    pane.appendChild(wbF("micro_setting","The Setting","Name and describe the confined space: the building, the ship, the institution, the town.",data.w_micro_setting,2,"What is this place? What is it officially for?",["Give it a name. A specific name immediately makes it feel real.","What was it built for? What is it actually used for?"]));
    pane.appendChild(wbF("micro_rooms","Key Zones and Spaces","The specific rooms, floors, areas, or territories that will matter in your story.",data.w_micro_rooms,3,"The geography of the micro world — where things happen and what they mean.",["Every key space should have a function and a feeling.","Which spaces are contested? Which are safe? Which are forbidden?"]));
    pane.appendChild(wbF("micro_rules","The Unwritten Rules","What does everyone here know but no one says out loud?",data.w_micro_rules,2,"The informal code that governs behavior — often more powerful than official rules.",["What happens to people who do not know the rules yet?"]));
    return;
  }
  if(stepId==="hierarchy"){
    wbTitle(pane,"Who is in charge — and who is at the bottom?","In a confined world, hierarchy is everything. Who has power over whom, and how is that maintained moment to moment?");
    pane.appendChild(wbF("micro_top","Who Is At the Top?","The person, role, or force that controls this space.",data.w_micro_top,2,"The apex of the micro world power structure — and how they exercise it.",["Is the person at the top officially the most powerful, or is the real power held by someone else?","How visible is their power? Do they use it openly or quietly?"]));
    pane.appendChild(wbF("micro_bottom","Who Is At the Bottom?","The least powerful — invisible, expendable, or exploited.",data.w_micro_bottom,2,"The people the system relies on and treats as interchangeable.",["Stories often find their most interesting perspectives at the bottom of a hierarchy.","What would happen to the whole system if the people at the bottom simply stopped?"]));
    return;
  }
  if(stepId==="microhistory"){
    wbTitle(pane,"What happened here before your story began?","Every place has a history that lives in its walls. What your characters inherit from the past shapes what is possible now.");
    pane.appendChild(wbF("micro_history","The History of This Place","What events shaped this space into what it is today?",data.w_micro_history,3,"The specific past of this setting — before your characters arrived.",["What was this place before it was what it is now?","What happened here that people still feel, even if they do not talk about it?"]));
    pane.appendChild(wbF("micro_secret","The Buried Secret","Something about this place that most people do not know — or choose not to see.",data.w_micro_secret,2,"Every institution has a secret. The secret reveals what the place actually is beneath its official version.",["Is the secret about what happened here? About who built it? About what it is really for?","Who knows? What do they do to keep it buried?"]));
    return;
  }
  if(stepId==="review"){
    wbTitle(pane,"Review your world.","Everything you have built so far. Go back to any step to edit, or save now and continue filling in the grid directly.");
    const tmpl=WB_TEMPLATES[selectedTemplate];
    const badge=el("div",{style:"display:inline-flex;align-items:center;gap:8px;background:var(--active-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;margin-bottom:20px;font-size:13px;color:var(--fg2);"});
    badge.innerHTML="<span style=\"font-size:18px;\">"+tmpl.icon+"</span><span>"+tmpl.name+"</span>";
    pane.appendChild(badge);

    const reviewGroups=[
      {label:"Atmosphere", keys:[["w_atm_emotion","Emotional Register"],["w_atm_sky","Environment"],["w_atm_tuesday","A Normal Day"],["w_atm_senses","Sensory Details"],["w_atm_outsider","First Impression"]]},
      {label:"Geography",  keys:[["w_geo_landscape","Landscape"],["w_geo_keyplaces","Key Locations"],["w_geo_borders","Borders"],["w_geo_dangerous","Dangerous Places"],["w_geo_beyond","Beyond the Map"],["w_micro_setting","The Setting"],["w_micro_rooms","Key Spaces"]]},
      {label:"Rules of the World", keys:[["w_rules_altered","What Is Different"],["w_rules_system","How It Works"],["w_rules_cost","Cost"],["w_rules_access","Access"],["w_rules_broken","When Broken"],["w_rules_tech","Technology"]]},
      {label:"Society",    keys:[["w_soc_power","Who Holds Power"],["w_soc_howgot","How Obtained"],["w_soc_fear","What People Fear"],["w_soc_celebrate","Celebrations"],["w_soc_taboo","Taboos"],["w_soc_mobility","Social Mobility"],["w_soc_punishment","Punishment"],["w_micro_top","Top of Hierarchy"],["w_micro_bottom","Bottom"],["w_micro_rules","Unwritten Rules"]]},
      {label:"History",    keys:[["w_hist_event","Formative Event"],["w_hist_wrong","Misremembered"],["w_hist_forgotten","Forgotten"],["w_hist_wound","Collective Wound"],["w_hist_calendar","Calendar"],["w_micro_history","History of This Place"],["w_micro_secret","Buried Secret"]]},
      {label:"Conflict",   keys:[["w_conf_worldwant","What the World Wants"],["w_conf_collision","Where Conflict Lives"],["w_conf_sides","The Sides"],["w_conf_winning","Winning"],["w_conf_cost","Cost"]]},
      {label:"Religion",   keys:[["w_rel_worship","Objects of Devotion"],["w_rel_role","Role of Faith"],["w_rel_faithless","The Faithless"],["w_rel_sacred","Sacred"]]},
      {label:"Language",   keys:[["w_lang_multiple","Languages"],["w_lang_unique","Unique Words"],["w_lang_untranslatable","Untranslatable"],["w_lang_swearing","Swearing"]]},
      {label:"Symbolism",  keys:[["w_sym_register","Symbolic Register"],["w_sym_archetype","Archetypes"],["w_sym_meaning","What It Means"],["w_sym_recurring","Recurring Symbols"]]},
    ];

    reviewGroups.forEach(g=>{
      const hasContent=g.keys.some(([k])=>data[k]&&data[k].trim());
      if(!hasContent) return;
      const sec=el("div",{class:"wizard-review-section"});
      const h=el("h3");h.textContent=g.label;sec.appendChild(h);
      g.keys.forEach(([k,l])=>{
        if(!data[k]||!data[k].trim()) return;
        const f=el("div",{class:"wizard-review-field"});
        const lbl=el("div",{class:"wizard-review-label"});lbl.textContent=l;
        const val=el("div",{class:"wizard-review-value"});val.textContent=data[k];
        f.append(lbl,val);sec.appendChild(f);
      });
      pane.appendChild(sec);
    });
  }
}

// Active outline ID per project (session-only — resets to first on reload)
const _activeOutlineId = {};

async function renderOutline(container, projectId) {
  container.innerHTML = '<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';

  // Load all outlines (grouped by outlineId)
  const allItems = await fsQuery('outlines', where('storyProjectId','==',projectId));
  // Get distinct outline groups
  const outlineGroups = {};
  allItems.forEach(item => {
    const gid = item.outlineId || 'default';
    if (!outlineGroups[gid]) outlineGroups[gid] = { id:gid, name:item.outlineName||'Outline', items:[] };
    outlineGroups[gid].items.push(item);
  });
  // If no outlines exist, create a default one
  if (Object.keys(outlineGroups).length === 0) {
    outlineGroups['default'] = { id:'default', name:'Outline', items:[] };
  }
  // Sort items within each group
  Object.values(outlineGroups).forEach(g => g.items.sort((a,b)=>(a.order||0)-(b.order||0)));

  const groupList = Object.values(outlineGroups);
  // Determine active group
  if (!_activeOutlineId[projectId] || !outlineGroups[_activeOutlineId[projectId]]) {
    _activeOutlineId[projectId] = groupList[0].id;
  }

  container.innerHTML = '';
  const wrap = el('div',{class:'page'});

  // Header
  const header = el('div',{class:'page-header'});
  header.innerHTML = '<div><div class="page-title">Outline</div><div class="page-subtitle">Multiple outlines supported — add a new one with +</div></div>';
  const headerRight = el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;'});

  // Structure template dropdown
  const structLabel = el('span',{style:'font-size:12px;color:var(--fg3);'});structLabel.textContent='New from template:';
  const structSelect = el('select',{class:'select',style:'width:auto;font-size:12px;padding:5px 10px;'});
  Object.entries(STRUCTURE_TEMPLATES).forEach(([k,v])=>{
    const opt=document.createElement('option');opt.value=k;opt.textContent=v.name;
    structSelect.appendChild(opt);
  });
  const pdfOutlineBtn = el('button',{class:'btn btn-ghost btn-sm',onclick:()=>{
    const ag=outlineGroups[_activeOutlineId[projectId]];
    if(ag) generateOutlinePdf(projectId, ag.id, ag.name);
  }});pdfOutlineBtn.textContent='📄 Create Document';
  headerRight.appendChild(pdfOutlineBtn);
  const addFromTemplate = el('button',{class:'btn btn-primary btn-sm',onclick:async()=>{
    const key = structSelect.value;
    const tmpl = STRUCTURE_TEMPLATES[key];
    const newId = 'ol-'+Date.now();
    const name = tmpl.name === 'Blank Outline' ? 'New Outline' : tmpl.name;
    // Create items
    for(let i=0;i<tmpl.items.length;i++){
      const it = tmpl.items[i];
      await fsCreate('outlines',{storyProjectId:projectId,outlineId:newId,outlineName:name,text:it.text,level:it.level,order:i});
    }
    if(tmpl.items.length === 0){
      // blank — create one empty item so the group exists
      await fsCreate('outlines',{storyProjectId:projectId,outlineId:newId,outlineName:name,text:'',level:1,order:0});
    }
    _activeOutlineId[projectId] = newId;
    await renderOutline(container, projectId);
  }});
  addFromTemplate.textContent = '+ Create';
  headerRight.append(structLabel, structSelect, addFromTemplate);
  header.appendChild(headerRight);
  wrap.appendChild(header);
  const _hintOl=toolHintBanner('outline'); if(_hintOl) wrap.appendChild(_hintOl);

  // Tabs
  const tabs = el('div',{class:'outline-tabs'});
  groupList.forEach(g => {
    const tab = el('div',{class:'outline-tab'+(_activeOutlineId[projectId]===g.id?' active':'')});
    tab.textContent = g.name;
    tab.onclick = () => { _activeOutlineId[projectId]=g.id; renderOutline(container,projectId); };
    // Double-click to rename
    tab.ondblclick = async(e) => {
      e.stopPropagation();
      const newName = prompt('Rename outline:', g.name);
      if(!newName || newName===g.name) return;
      // Update all items in this group
      const groupItems = allItems.filter(i=>(i.outlineId||'default')===g.id);
      await Promise.all(groupItems.map(i=>fsUpdate('outlines',i.id,{outlineName:newName})));
      await renderOutline(container,projectId);
    };
    tabs.appendChild(tab);
  });
  // Delete tab button (only if more than one outline)
  if(groupList.length > 1){
    const activeGroup = outlineGroups[_activeOutlineId[projectId]];
    const delTab = el('div',{class:'outline-tab',style:'color:var(--red);margin-left:auto;',onclick:()=>{
      confirmDelete('Delete outline "'+activeGroup.name+'" and all its items?', async()=>{
        await Promise.all(activeGroup.items.map(i=>fsDelete('outlines',i.id)));
        _activeOutlineId[projectId] = groupList.find(g=>g.id!==activeGroup.id)?.id || 'default';
        await renderOutline(container,projectId);
      });
    }});
    delTab.textContent = '✕ Delete';
    tabs.appendChild(delTab);
  }
  wrap.appendChild(tabs);

  // Active outline items
  const listContainer = el('div',{id:'outline-list'});
  wrap.appendChild(listContainer);
  container.appendChild(wrap);

  const activeGroup = outlineGroups[_activeOutlineId[projectId]];
  renderOutlineList(projectId, activeGroup.items, activeGroup.id, activeGroup.name, container);

  // Add item button at bottom
  const addBtn = el('button',{class:'btn btn-ghost btn-sm',style:'margin-top:14px;',onclick:()=>{
    addOutlineItem(projectId, activeGroup.id, activeGroup.name, activeGroup.items.length, 1, container);
  }});
  addBtn.textContent = '+ Add Item';
  wrap.appendChild(addBtn);
}

function renderOutlineList(projectId, items, outlineId, outlineName, container) {
  const list = document.getElementById('outline-list');
  if(!list) return;
  list.innerHTML = '';

  if(items.length === 0){
    list.appendChild(emptyState('≡','Empty Outline','Add beats, acts, or chapters. Or create from a template above.'));
    return;
  }

  let dragSrc = null;

  items.forEach(o => {
    const item = el('div',{class:'outline-item',style:'margin-left:'+((o.level-1)*22)+'px'});
    item.draggable = true;
    item.dataset.id = o.id;

    const content = el('div',{class:'outline-content'});
    const input = el('input',{placeholder:'Outline beat...',value:o.text||''});
    input.addEventListener('blur', async()=>{ await fsUpdate('outlines',o.id,{text:input.value}); });
    input.addEventListener('keydown', async e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const newItems = await fsQuery('outlines',where('storyProjectId','==',projectId),where('outlineId','==',outlineId));
        newItems.sort((a,b)=>(a.order||0)-(b.order||0));
        addOutlineItem(projectId,outlineId,outlineName,o.order+1,o.level,container);
      }
      if(e.key==='Tab'){
        e.preventDefault();
        const nl=e.shiftKey?Math.max(1,o.level-1):Math.min(4,o.level+1);
        await fsUpdate('outlines',o.id,{level:nl});
        await refreshOutlineList(projectId,outlineId,outlineName,container);
      }
      if(e.key==='Backspace'&&input.value===''){
        e.preventDefault();
        await fsDelete('outlines',o.id);
        await refreshOutlineList(projectId,outlineId,outlineName,container);
      }
    });

    const levelDots = el('div',{class:'outline-level'});
    for(let i=1;i<=4;i++){
      (function(lvl){
        const d=el('div',{style:'width:8px;height:8px;border-radius:50%;background:'+(lvl<=o.level?'var(--primary)':'var(--border)')+';cursor:pointer;flex-shrink:0;',onclick:async()=>{
          await fsUpdate('outlines',o.id,{level:lvl});
          await refreshOutlineList(projectId,outlineId,outlineName,container);
        }});
        levelDots.appendChild(d);
      })(i);
    }

    const del = el('button',{class:'btn-icon',style:'font-size:11px;',onclick:async()=>{
      await fsDelete('outlines',o.id);
      await refreshOutlineList(projectId,outlineId,outlineName,container);
    }});del.textContent='✕';

    content.append(input,levelDots);
    item.append(content,del);
    list.appendChild(item);

    // ── Drag-and-drop ──
    item.addEventListener('dragstart', e=>{
      dragSrc = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',o.id);
    });
    item.addEventListener('dragend', ()=>{
      item.classList.remove('dragging');
      list.querySelectorAll('.outline-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      list.querySelectorAll('.outline-item').forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', async e=>{
      e.preventDefault();
      if(dragSrc===item) return;
      item.classList.remove('drag-over');
      // Reorder: collect all items in DOM order, reassign order values
      const allItemEls = Array.from(list.querySelectorAll('.outline-item'));
      const srcIdx = allItemEls.indexOf(dragSrc);
      const dstIdx = allItemEls.indexOf(item);
      // Move src to dst position
      if(srcIdx < dstIdx) item.after(dragSrc);
      else item.before(dragSrc);
      // Write new order to Firestore
      const reordered = Array.from(list.querySelectorAll('.outline-item'));
      await Promise.all(reordered.map((el,i)=>fsUpdate('outlines',el.dataset.id,{order:i})));
      await refreshOutlineList(projectId,outlineId,outlineName,container);
    });
  });
}

async function refreshOutlineList(projectId, outlineId, outlineName, container) {
  // Fetch all outlines for project, then filter client-side to avoid composite index requirement
  const all = await fsQuery('outlines',where('storyProjectId','==',projectId));
  const fresh = all.filter(i=>(i.outlineId||'default')===outlineId);
  fresh.sort((a,b)=>(a.order||0)-(b.order||0));
  renderOutlineList(projectId,fresh,outlineId,outlineName,container);
}

async function addOutlineItem(projectId, outlineId, outlineName, order, level, container) {
  await fsCreate('outlines',{storyProjectId:projectId,outlineId,outlineName,text:'',level:level||1,order:order||0});
  await refreshOutlineList(projectId,outlineId,outlineName,container);
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#outline-list input');
    if(inputs.length) inputs[inputs.length-1].focus();
  },100);
}

async function renderWritingDesk(container, projectId){
  container.innerHTML='<div style="padding:60px;text-align:center;color:var(--fg3);">Loading…</div>';
  const docs = await fsQuery('documents',where('storyProjectId','==',projectId));
  docs.sort((a,b)=>{
    const at=a.updatedAt?.toDate?a.updatedAt.toDate():new Date(a.updatedAt||0);
    const bt=b.updatedAt?.toDate?b.updatedAt.toDate():new Date(b.updatedAt||0);
    return bt-at;
  });
  container.innerHTML='';
  const wrap = el('div',{class:'page'});
  const header = el('div',{class:'page-header'});
  header.innerHTML='<div><div class="page-title">Writing Desk</div><div class="page-subtitle">'+docs.length+' document'+(docs.length!==1?'s':'')+'</div></div>';
  const actions = el('div',{style:'display:flex;gap:8px;'});
  const nb=el('button',{class:'btn btn-ghost',onclick:()=>createDoc(projectId,'narrative')});nb.textContent='+ Narrative';
  const sb=el('button',{class:'btn btn-primary',onclick:()=>createDoc(projectId,'screenplay')});sb.textContent='+ Screenplay';
  actions.append(nb,sb); header.appendChild(actions); wrap.appendChild(header);
  const _hintWD=toolHintBanner('writing'); if(_hintWD) wrap.appendChild(_hintWD);
  if(docs.length===0){wrap.appendChild(emptyState('✦','Empty Desk','Start writing — a narrative document or a screenplay.'));}
  else{
    const list=el('div',{class:'doc-list'});
    docs.forEach(d=>{
      const item=el('div',{class:'doc-item',onclick:()=>navigate('dashboard',projectId,'writing',d.id)});
      const left=el('div',{class:'doc-item-left'});
      // Tiny scene-aware tag for v2 screenplays, so users can see at a glance
      // which scripts have been upgraded.
      let v2Tag = '';
      if(d.type==='screenplay' && (d.formatVersion||'v1')==='v2'){
        v2Tag = '<span class="doc-item-badge" style="background:rgba(94,202,200,0.1);color:var(--teal);border-color:rgba(94,202,200,0.22);margin-left:6px;font-size:9px;">✦ scene-aware</span>';
      }
      left.innerHTML='<h3>'+esc(d.title||'Untitled')+'</h3><span class="doc-item-badge '+(d.type==='screenplay'?'badge-screenplay':'badge-narrative')+'">'+d.type+'</span>'+v2Tag;
      const right=el('div',{style:'display:flex;align-items:center;gap:10px;'});
      const meta=el('div',{style:'font-size:11px;color:var(--fg3);'},[relativeTime(d.updatedAt)]);
      const pdfDBtn=el('button',{class:'btn btn-ghost btn-sm',onclick:e=>{e.stopPropagation();generateWritingDeskPdf(projectId,d);}});pdfDBtn.textContent='📄';pdfDBtn.title='Export as PDF';
      const del=el('button',{class:'btn btn-danger btn-sm',onclick:e=>{e.stopPropagation();confirmDelete('Delete "'+d.title+'"?',async()=>{await fsDelete('documents',d.id);renderWritingDesk(container,projectId);toast('Deleted');});}});del.textContent='✕';
      right.append(meta,pdfDBtn,del); item.append(left,right); list.appendChild(item);
    });
    wrap.appendChild(list);
  }
  container.appendChild(wrap);
}

async function createDoc(projectId, type){
  const base = {storyProjectId:projectId,type,title:type==='screenplay'?'Untitled Screenplay':'Untitled Document',content:'',titlePage:{title:'',writtenBy:'',basedOn:'',contact:''}};
  // New screenplays use the v2 (scene-aware) format. Narrative docs are unversioned.
  if(type==='screenplay'){
    base.formatVersion = 'v2';
    base.sceneBlocks = []; // ordered array of scene blocks; populated as user writes
    base.lockState = 'draft'; // 'draft' | 'locked' | 'production'
  }
  const id=await fsCreate('documents',base);
  navigate('dashboard',projectId,'writing',id);
}

  editor.innerHTML=doc.content||'';

  loadLinkCache(projectId);

  toolbar.appendChild(buildCompactToggle(toolbar));

  editor.addEventListener('input',()=>{
    wc.textContent=wordCount(editor.innerHTML)+' words';
    clearTimeout(editorSaveTimer);
    editorSaveTimer=setTimeout(async()=>{ showSaving(); await fsUpdate('documents',doc.id,{content:editor.innerHTML}); showSaved(); },1000);
  });

  view.append(toolbar, bodyWrap, wc);
  setupEditorLinkClicks(editor, projectId);
  function updateToolbar(){fmtBtns.forEach((b,i)=>{toolbar.querySelectorAll('.toolbar-btn')[i].classList.toggle('active',document.queryCommandState(b.cmd));});}

// ── Slugline autocorrect ─────────────────────────────────────────────
// Normalises the raw text of a scene-heading paragraph into standard
// screenplay format. Runs on Enter and blur so the student's intent is
// preserved while they type. Never runs on non-scene-heading paragraphs.
//
// Rules applied in order:
//   1. Strip leading/trailing whitespace.
//   2. Uppercase the whole line (should already be uppercase via CSS, but
//      the stored text needs to match what the student sees so PDFs are clean).
//   3. Expand common INT/EXT shorthand:
//        int  int.  int/ext  i/e  i./e.  ext  ext.  → INT. / EXT. / INT./EXT.
//   4. Ensure exactly one space between INT./EXT. and the location name.
//   5. Detect a time-of-day word anywhere in the line; move it to the end
//      separated by  " - " if not already there.
//   6. Normalise any existing " - " separator (e.g. " -", "- ", "--") to " - ".
//
// Returns the corrected string, or the original if nothing needed changing.
const SLUG_TIMES = ['DAY','NIGHT','DAWN','DUSK','MORNING','AFTERNOON','EVENING',
  'SUNSET','SUNRISE','CONTINUOUS','LATER','MOMENTS LATER','CONTINUOUS ACTION'];

function autocorrectSlugline(raw){
  if(!raw || !raw.trim()) return raw;
  let s = raw.trim().toUpperCase();

  // Expand INT/EXT prefix variants ─────────────────────────────────────
  // Order matters: longer patterns first to avoid partial matches.
  const prefixMap = [
    [/^INT\.?\/EXT\.?\s*/,  'INT./EXT. '],
    [/^EXT\.?\/INT\.?\s*/,  'INT./EXT. '],
    [/^I\.?\/E\.?\s*/,      'INT./EXT. '],
    [/^INT\.?\s*/,          'INT. '],
    [/^EXT\.?\s*/,          'EXT. '],
  ];
  let matched = false;
  for(const [re, replacement] of prefixMap){
    if(re.test(s)){
      s = s.replace(re, replacement);
      matched = true;
      break;
    }
  }
  // If no recognised prefix, return unchanged — don't mangle arbitrary text
  if(!matched) return raw;

  // Normalise separator and time-of-day ─────────────────────────────────
  // Strip any existing time-of-day so we can re-append it cleanly.
  // Also normalise messy separators like " -X", "- X", "--X".
  let timeOfDay = '';

  // Try to find a time-of-day word already at the end (with or without " - ")
  const sepAndTimeRe = new RegExp(
    '\\s*[-–—]+\\s*(' + SLUG_TIMES.map(t => t.replace(' ', '\\s+')).join('|') + ')\\s*$', 'i'
  );
  const endMatch = s.match(sepAndTimeRe);
  if(endMatch){
    timeOfDay = endMatch[1].toUpperCase().replace(/\s+/, ' ');
    s = s.slice(0, s.length - endMatch[0].length).trimEnd();
  } else {
    // Time-of-day embedded mid-line without a separator, e.g. "INT. OFFICE DAY"
    for(const t of SLUG_TIMES){
      const re = new RegExp('\\s+' + t.replace(' ', '\\s+') + '(?:\\s|$)', 'i');
      const m = s.match(re);
      if(m){
        timeOfDay = t;
        s = (s.slice(0, m.index) + s.slice(m.index + m[0].length)).trim();
        break;
      }
    }
  }

  // Clean up double spaces in the location name part
  s = s.replace(/\s{2,}/g, ' ').trim();

  // Re-append time-of-day with canonical separator
  if(timeOfDay) s = s + ' - ' + timeOfDay;

  return s;
}

// Apply autocorrectSlugline to a live <p data-type="scene-heading"> element.
// Preserves cursor position at end of line after correction.
function autocorrectSluglineNode(node){
  if(!node || node.dataset?.type !== 'scene-heading') return false;
  const original = node.textContent || '';
  const corrected = autocorrectSlugline(original);
  if(corrected === original) return false;
  // Rebuild the text content without disturbing any link spans inside
  // (walk child nodes, replacing text nodes only)
  // For scene-headings, content is typically plain text so this is safe:
  node.textContent = corrected;
  return true;
}

// ── Autofill helpers ──
let _cachedCharNames = [];
let _cachedLocNames  = [];

// Session-level location name Set for autoAddLocationsFromBlocks.
// Loaded once when a screenplay editor opens; avoids a Firestore read on
// every debounced save (every ~600ms while typing).
// null = not yet loaded for this session. Clear on navigate().
let _sessionLocNames = null;

async function loadSessionLocNames(projectId){
  const locs = await fsQuery('locations', where('storyProjectId','==',projectId));
  _sessionLocNames = new Set(locs.map(l => l.name.trim().toUpperCase()));
}

async function loadAutofillNames(projectId) {
  const [chars, locs] = await Promise.all([
    fsQuery('characters', where('storyProjectId','==',projectId)),
    fsQuery('locations',  where('storyProjectId','==',projectId)),
  ]);
  _cachedCharNames = chars.map(c => c.name.toUpperCase());
  _cachedLocNames  = locs.map(l => l.name.toUpperCase());
}

function getLineSuggestions(type, typed) {
  const q = typed.toUpperCase();
  if (!q) return [];
  if (type === 'scene-heading') {
    // INT. / EXT. prefix expansion
    const prefixSuggestions = [];
    if ('INT.'.startsWith(q) || q === 'I')  prefixSuggestions.push('INT. ');
    if ('EXT.'.startsWith(q) || q === 'E')  prefixSuggestions.push('EXT. ');
    if ('INT./EXT.'.startsWith(q))           prefixSuggestions.push('INT./EXT. ');
    // Also match known location names for scene headings
    const locMatches = _cachedLocNames
      .filter(n => n.includes(q))
      .slice(0, 4)
      .map(n => 'INT. ' + n + ' - DAY');
    return [...prefixSuggestions, ...locMatches].slice(0, 6);
  }
  if (type === 'character') {
    return _cachedCharNames.filter(n => n.startsWith(q)).slice(0, 6);
  }
  return [];
}

function showSuggestions(editor, typeBar, node) {
  removeSuggestions();
  if (!node || node === editor) return;

  const type = node.dataset.type;
  if (type !== 'scene-heading' && type !== 'character') return;

  const text = node.textContent || '';
  const suggestions = getLineSuggestions(type, text);
  if (!suggestions.length) return;

  const rect = node.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'sp-suggest';
  dropdown.id = 'sp-suggest-box';
  dropdown.style.cssText = `top:${rect.bottom + window.scrollY + 2}px;left:${rect.left + window.scrollX}px;`;

  suggestions.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sp-suggest-item' + (i === 0 ? ' focused' : '');
    item.textContent = s;
    item.dataset.idx = i;
    item.onmousedown = (e) => {
      e.preventDefault();
      applySuggestion(node, s);
      removeSuggestions();
    };
    dropdown.appendChild(item);
  });

  document.body.appendChild(dropdown);
}

function removeSuggestions() {
  const existing = document.getElementById('sp-suggest-box');
  if (existing) existing.remove();
}

function moveFocus(dir) {
  const box = document.getElementById('sp-suggest-box');
  if (!box) return false;
  const items = box.querySelectorAll('.sp-suggest-item');
  let focused = box.querySelector('.focused');
  let idx = focused ? parseInt(focused.dataset.idx) : -1;
  idx = ((idx + dir) + items.length) % items.length;
  items.forEach(i => i.classList.remove('focused'));
  items[idx].classList.add('focused');
  return true;
}

function acceptFocusedSuggestion(node) {
  const box = document.getElementById('sp-suggest-box');
  if (!box) return false;
  const focused = box.querySelector('.focused');
  if (!focused) return false;
  applySuggestion(node, focused.textContent);
  removeSuggestions();
  return true;
}

function applySuggestion(node, text) {
  node.textContent = text;
  // Place cursor at end
  const sel = window.getSelection();
  const r = document.createRange();
  r.selectNodeContents(node);
  r.collapse(false);
  sel.removeAllRanges();
  sel.addRange(r);
}

// ══════════════════════════════════════════════
//  SCREENPLAY FORMAT VERSIONING (v1 ↔ v2)
// ══════════════════════════════════════════════
// v1 = legacy single-HTML-blob format. Stored in doc.content as one big
//      string of <p data-type="..."> elements.
// v2 = scene-aware format. doc.sceneBlocks is an ordered array of blocks,
//      each with { id, sceneNumber, sceneId (optional link to scenes
//      collection), kind: 'drafted' | 'placeholder', html, lastSyncedAt }.
//      doc.content is also kept in sync as a flat HTML mirror so existing
//      PDF export and search keep working unchanged.
//
// Documents created before this version have no formatVersion field; they
// are treated as v1. The user converts opt-in via the upgrade banner.

function getFormatVersion(doc){
  if(doc.type !== 'screenplay') return null;
  return doc.formatVersion || 'v1';
}

// Parse a v1 HTML blob into v2 sceneBlocks. Used ONLY during v1→v2 upgrade.
// After upgrade, blocks are the source of truth and never re-parsed from HTML.
//
// New schema: each block has { id, kind, sceneId, manualNumber, content,
// contentAtSync, lastSyncedAt }. The `content` field is a self-contained
// HTML string for that block (its slugline + body paragraphs).
function parseV1ContentToBlocks(html){
  if(!html || !html.trim()) return [];
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const paragraphs = Array.from(tmp.children);

  const blocks = [];
  let current = null;
  let preamble = [];
  // Stable ID generator for this parse: monotonic counter, no collisions.
  const _idBase = Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6);
  let _idCounter = 0;
  const newId = () => 'blk_' + _idBase + '_' + (++_idCounter);

  function flushCurrent(){
    if(current){ blocks.push(current); current = null; }
  }
  function newBlock(){
    return {
      id: newId(),
      kind: 'drafted',
      sceneId: null,
      manualNumber: null,
      content: '',
      contentAtSync: null,
      lastSyncedAt: null,
    };
  }

  paragraphs.forEach(p=>{
    const isHeading = p.getAttribute && p.getAttribute('data-type')==='scene-heading';
    const txt = (p.textContent||'').trim().toUpperCase();
    const isFadeMarker = /^FADE (IN|OUT)[:.]?$/.test(txt);
    const isEmptyHeading = isHeading && !txt;

    if(isHeading && !isFadeMarker && !isEmptyHeading){
      flushCurrent();
      current = newBlock();
      current.content = p.outerHTML;
    } else if(current){
      current.content += p.outerHTML;
    } else {
      preamble.push(p.outerHTML);
    }
  });
  flushCurrent();

  if(preamble.length){
    blocks.unshift({
      id: 'blk_preamble_' + _idBase,
      kind: 'preamble',
      sceneId: null,
      manualNumber: null,
      content: preamble.join(''),
      contentAtSync: null,
      lastSyncedAt: null,
    });
  }
  return blocks;
}

// Migrate a v2 doc with the old block schema (block.html) to the new one
// (block.content). Returns the migrated blocks array. Idempotent: if blocks
// already use the new schema, returns them unchanged.
function migrateV2Blocks(blocks){
  if(!blocks || !blocks.length) return [];
  let needsMigration = false;
  blocks.forEach(b => {
    if(b.html !== undefined && b.content === undefined) needsMigration = true;
  });
  if(!needsMigration) return blocks;
  // Migrate: rename `html` to `content`, add new metadata fields.
  return blocks.map(b => ({
    id: b.id,
    kind: b.kind || 'drafted',
    sceneId: b.sceneId || null,
    manualNumber: b.manualNumber || null,
    content: b.content || b.html || '',
    contentAtSync: b._htmlAtSync || null,
    lastSyncedAt: b.lastSyncedAt || null,
  }));
}

// Re-flatten v2 sceneBlocks into a single HTML string for search/PDF compatibility.
// Reads the new `content` field. Falls back to legacy `html` field for
// docs that haven't yet been migrated.
function flattenBlocksToHtml(blocks){
  if(!blocks || !blocks.length) return '';
  return blocks.map(b => b.content || b.html || '').join('');
}

// Convert a v1 doc to v2 in place. Backs up the original content to _v1Backup.
async function upgradeScreenplayToV2(doc){
  const blocks = parseV1ContentToBlocks(doc.content || '');
  const update = {
    formatVersion: 'v2',
    sceneBlocks: blocks,
    lockState: 'draft',
    _v1Backup: doc.content || '',
    _v1BackupAt: new Date().toISOString(),
    content: flattenBlocksToHtml(blocks),
  };
  showSaving();
  await fsUpdate('documents', doc.id, update);
  showSaved();
  return Object.assign({}, doc, update);
}

// Restore a v2 doc back to its v1 state using the backup. Used if the user
// regrets the conversion. Available from the editor menu on upgraded docs.
async function revertScreenplayToV1(doc){
  if(!doc._v1Backup && doc._v1Backup !== ''){
    toast('No v1 backup available to restore', 'error');
    return doc;
  }
  const update = {
    formatVersion: 'v1',
    content: doc._v1Backup,
    sceneBlocks: [],          // clear v2 state but keep the backup field intact
    lockState: 'draft',
  };
  showSaving();
  await fsUpdate('documents', doc.id, update);
  showSaved();
  return Object.assign({}, doc, update);
}

// Small badge shown in the editor toolbar indicating format version.
function buildVersionBadge(doc){
